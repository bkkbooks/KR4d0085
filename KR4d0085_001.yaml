body:
  text: 山谷內集詩注卷一宋黃庭堅撰任淵注古詩二首上蘇子瞻前篇梅以屬東坡後篇松以屬東坡茯苓以屬門下士之賢者􅊵絲以自況東坡報山谷書云古風二首託物引類得古詩人之風其推重如此故置諸篇首云江梅有佳實託根桃李埸文選古詩云冉冉孤生竹結根太山阿此句效其體老杜有江梅詩又有詩云欲發照江梅吳淑事類梅賦云亦果中之佳實文選趙景真與嵇茂齊書曰北土之性難以託根場謂埸圃寒山子詩昨晚何悠悠埸中可憐許上為桃李徑下作蘭蓀渚此句並摘其字山谷詩律妙一世用意高逺未易窺測然置字下語皆有所從來孫莘老云老杜詩無兩字無來歷劉夢得論詩亦言無來歷字前輩未嘗用山谷屢拈此語蓋亦以自表見也第恨淺聞未能盡知其源委姑隨所見箋于其下庶幾因指以識月象外之意學者當自得之桃李終不言朝露借恩光漢書李廣傳贊曰桃李不言下自成蹊此借用言江梅為桃李所忌文選樂府曰入門各自媚誰肯相為言此用其意白樂天有木詩曰風煙借顔色雨露助華滋文選江淹上書曰大王惠以恩光顧以顔色此用其字下皆效此詩意謂東坡見嫉于當世獨為人主所知耳孤芳忌皎潔氷雪空自香退之詩異質忌處羣孤芳難寄林文選顔延年祭屈原文云物忌堅芳人諱明潔鮑明逺詩艷陽桃李節皎潔不成妍樂府蘇子卿梅花落曰只言花是雪不悟有香來古來和鼎實此物升廟廊老杜詩古來才大難為用文選潘安仁詩王生和鼎實書曰若作和羮爾惟鹽梅文選古詩曰此物何足貴但感别經時慎子曰廊廟之材蓋非一木之枝嵗月坐成晚煙雨青巳黃文選古詩曰思君令人老嵗月忽巳晚玉臺新詠鮑照雜詩曰煙雨交將夕從此遂分形周處風土記云夏至前雨名黃梅雨初學記曰梅熟而雨曰梅雨江東呼為黃梅雨得升桃李盤以逺初見嘗韓退之李花詩氷盤夏薦碧實脆韓詩外傳田饒曰黃鵠無五德君猶貴之以其所從來者逺矣東坡蓋蜀人終然不可口擲置官道傍選詩終然謝夭伐老杜病橘詩紛然不適口豈止存其皮莊子曰柤梨橘柚皆可于口李賀詩擲置黃金解龍馬官道傍用王説王戎不趣道傍苦李意詩意謂東坡棄置于外郡也但使本根在棄捐果何傷君子之于世視其所立何如不在遇不遇也左傳曰葛藟猶能庇其本根文選古詩曰棄捐勿復道努力加餐飯左傳曰一抶女庸何傷青松出澗壑十里聞風聲文選左太沖詠史詩鬱鬱澗底松離離山上苗顔延年詩松風遵路急宋玉髙唐賦曰不見其底虛聞松聲詩意謂東坡以大材而沈下僚其蓋世之名則不可掩也上有百尺絲下有千嵗苓淮南子説山訓曰千嵗之松下有茯苓上有絲注云茯苓千嵗松脂也絲生其上而無根一名女蘿又按頍棄詩蔦與女蘿施于松柏注云女蘿絲松蘿也正義則曰陸璣疏云今絲蔓連草上生非松蘿松蘿自蔓松上生事或當然陶隱居注本草絲條亦云舊言下有茯苓上有絲今未必爾讀山谷此句當不以詞害意也自性得久要為人制頽齡此句指茯苓本草木部茯苓條陶隱居注曰為藥無朽蛀嘗得昔人所埋計二十年而色理無異明其真全不朽矣而本經言久服安魂養神不飢延年圎覺經曰圎覺自性非性性有魯論曰久要不忘平生之言陶淵明詩菊為制頽齡小草有逺志相依在平生此句以下並指絲按絲在本草草部世説桓溫問謝安逺志又名小草何以一物而有二名郝隆曰處則為逺志出則為小草此特借用以指絲言其不依附凡木所志逺矣左傳曰輔車相依平生見前注醫和不並世深根且固蒂人言可醫國可用太早計本草絲條掌禹錫注引抱朴子云絲之草下有伏之根無此則絲不生然實不屬也此詩借用而本經言絲久服明月輕身延年詩意謂依附賢者足以自樂至其不為當世所知則亦自重難進而未嘗汲汲也晉語平公有疾秦伯使醫和視之文子曰醫及國家乎對曰上醫醫國其次醫人固醫官也老子曰是謂深根固蒂長生久視之道史記孔子弟子傳曰孔子皆後之不並世莊子曰且汝亦太早計小大材則殊氣味固相似左傳曰今譬于草木寡君在君君之臭味也明皇雜録髙力士詠薺詩曰夷夏雖有殊氣味終不改醇道得蛤蜊復索舜泉舜泉巳酌盡官醖不堪不敢送青州從事難再得牆底數樽猶未眠商略督郵風味惡不堪持到蛤蜊前世説桓公有主簿善别酒有酒輒令先嘗好者謂青州從事惡者謂平原督郵注云青州有齊郡平原有鬲縣從事謂到齊下督郵謂到鬲上住也漢書李夫人傳曰佳人難再得張籍詩酒盡卧空瓶開元傳信記曰麴生風味不可忘也此反而用之世説孫綽許詢共在白亭樓共商略先往名達次韻王稚川客舍二首彭山黃氏有山谷手書此詩云王谹稚川元豐初調官京師寓家鼎州親年九十餘矣嘗閲貴人家歌舞醉歸書其旅邸壁間云鴈外無書為客久蛩邊有夢到家多畫堂玉佩縈雲響不及桃源欸乃歌余訪稚川于邸中而和之五更歸夢常苦短一寸客愁無奈多孟郊詩一夕九起嗟夢短不到家文選短歌行曰來日苦短去日苦長庾信愁賦曰且將一寸心能容萬斛愁五更字從黃氏本而別本或作五湖慈母每占烏鵲喜家人應賦扊扅歌黃氏本作慈母不嗔烏鵲喜閨人應賦扊扅歌元注曰百里奚仕秦其妻歌曰百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴忘我為西京雜記陸生曰乾鵲噪而行人至老杜詩浪傳烏鵲喜身如病鶴翅翎短心似亂絲頭緒多王介甫折翼鶴詩云每憐今日長垂翅却悔當時誤剪翎退之南山有高樹行曰路逺翅翎短不能持汝歸樂府華山畿曰腹中如亂絲老杜詩玉壘題詩心緒亂太白詩繅絲憶君頭緒多此曲朱門歌不得湖南湖北竹枝歌老杜詩為公歌此曲歐陽公詩朱門歌舞爭新態竹枝歌見後注欸乃歌二章戲王稚川欸音襖乃音藹黃氏有山谷手寫舊本題云豫復代稚川之妻林夫人寄稚川時稚川在都下有所顧盼留連未歸也花上盈盈人不歸棗下纂纂實巳垂黃氏本前章曰花上盈盈人不歸棗下纂纂實巳垂尋師訪道魚千里蓋世功名黍一炊初學記歌門載劉敬叔異苑曰臨川聶包死數年忽詣南豐相沈道襲歌笑每歌輒作花上盈盈正聞行當歸不聞死復生文選潘嶽笙賦歌曰棗下纂纂朱實離離宛其落矣化為枯枝人生不能行樂死何以虛諡為李善注引古咄唶歌曰棗下何攢攢榮華各有時棗欲初赤時人從四邊來棗適今日賜誰能仰視之什邡張氏有山谷手書此詩與今本正同唯一二字稍異實巳垂作實已稀又有跋云宋時有鬼女至人家歌花上盈盈曲聲悲怨不可聽潘嶽間居賦中歌曰棗下纂纂云云所援引小有抵牾蓋隨所記憶略舉大概耳臘雪在時聽馬嘶張氏本作聽嘶馬長安城中花片飛老杜詩一片花飛減却春長安蓋借言汴京從師學道魚千里蓋世功名黍一炊黃氏本後章曰卧氷泣竹慰母飢天吳紫鳯補兒衣臘雪在時聽嘶馬長安城中花片飛四句蓋舊所作後方改定今附見于此庶知前輩有日新之功也後漢李固傳步行尋師不逺千里晉書夏侯湛傳曰古之人厥乃千里尋師漢書項羽歌曰力拔山兮氣蓋世莊子曰功蓋天下而似不自已張氏本有山谷跋云魚千里蓋陶朱公養魚法凡魚逺行則肥池中養魚慮其瘦故于池中聚石作九島魚繞之日行千里黍炊即淳于棼夢富貴百年于蟻穴中破夢起坐舍中炊黃粱猶未􅍄也山谷之説如此豫按齊民要術載陶朱公養魚經曰以六畝地為池池中有九洲六谷求鯉魚內池中云云又按吳越春秋范蠡曰會稽之山有魚池水中有三江四瀆之流九溪六谷之廣山谷本引用此説特以意加損爾然詩意則謂千里訪道如魚之回旋往復徒自苦耳不若歸而求之有餘師劉向新序邱吾子曰吾有三失少好學問周遍天下還後吾親亡一失也山谷蓋用此意又按異聞集道者吕翁經邯鄲道上邸舍中有少年盧生自嘆其貧困言訖思寐時主人方炊黃粱為饌翁乃探懷中枕以授生枕兩端有竅生夢中自竅入其家見其身富貴五十年老病而卒欠伸而悟顧吕翁在傍主人炊黃粱尚未熟山谷所引蟻穴夢自是一事亦見異聞集當是記憶不審耳詩意則謂功名正復蓋世豈若菽水奉親之樂耶日日倚門人不見看盡林烏反哺兒戰國䇿齊王孫賈之母謂賈曰汝朝出而晚來則吾倚門而望暮出而不還則吾倚閭而望錢起詩曲終人不見文選束晳補亡陔詩曰嗷嗷林烏受哺于子李善注云純黑而反哺者烏也老杜詩舟鷁排風影林烏反哺聲詠史呈徐仲車元注曰仲車以聵棄官哲宗實録曰徐積楚州人治平四年擢進士第事母孝篤鄉閭化之積字仲車山谷同年生也諸葛見益州釋耒答三顧蜀志諸葛亮傳亮躬耕壠畝先主詣亮三往乃見上疏後主曰先帝不以臣卑鄙猥自枉屈三顧臣于草廬之中先主傳曰建安十九年復領益州牧文選沈休文安陸王碑曰農夫釋耒按鹽鐵論曰儒者釋耒耜而學不驗之語川流恨未平武功原上路諸葛亮傳建興十二年據武功五丈原與司馬宣王對于渭南其年八月卒老杜武侯廟詩曰功蓋三分國名成八陳圗江流石不轉遺恨失吞吳此借用以不得滅魏為恨杜微對諸葛輿致但求去傾心倚經綸坐上漫書疏蜀志杜微傳微字國輔先主定蜀微嘗稱聾閉門不出丞相亮領益州牧選迎皆妙簡舊德以微為主簿固辭舉以致之亮以微不聞人語坐上與書微自乞老病求歸亮又與書答曰君但以德輔時耳不責君軍事拜為諫議大夫以從其志仲車病聾故以此事戲之白鷗渺蒹葭霜鶻在指呼借問諸葛公如何迎主簿何遜詩可憐雙白鷗朝夕水上遊老杜詩白鷗沒浩蕩萬里誰能馴蒹葭字見詩又杜詩莫作翻雲鶻聞呼向禽急按通典選舉門陳依粱制諸州迎主簿得未壯而仕宿舊彭澤懷陶令彭澤今屬江州故城在縣東四十里昭明太子作淵明傳謂親朋曰聊欲絃歌以為三徑之資可乎執事者以為彭澤令嵗終會郡遣督郵至縣淵明即日解印綬去職南史隱逸傳曰陶潛字淵明或云字深明名元亮潛魚願深渺淵明無由逃彭澤當此時沈冥一世豪莊子曰鳥獸不厭髙魚鱉不厭深夫全其形生之人藏其身也不厭深渺而巳矣正月詩曰魚在于沼亦匪克樂潛雖伏矣亦孔之照箋云池魚之所樂而非能樂其潛伏于淵又不足以逃甚照照易見以喻時賢者在朝廷道不行無所樂退而窮處又無所施也揚子曰蜀莊沈冥宋子京詩云虛負詩中一世豪司馬寒如灰禮樂卯金刀東晉司馬氏末年禮樂征伐自劉裕出范文正公作狄梁公碑云武暴如火李寒如灰漢書王莽傳曰夫劉之為字卯金刀也嵗晚以字行更始號元亮凄其望諸葛骯髒猶漢相老杜詩凄其望吕葛蜀志建安二十五年傳聞漢帝見害先主發喪制服二十六年四月即皇帝位改元章武以諸葛亮為丞相後漢趙一傳曰伊優北堂上骯髒倚門邊注云骯髒高亢婞直之貌也時無益州牧指揮用諸將益州牧見前注老杜詩指揮若定失蕭曹平生本朝心嵗月閲江浪南史陶潛傳曰自以曽祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來唯云甲子而已漢書蕭望之雅意本朝文選孔文舉論盛孝章書曰嵗月不居時節如流空餘詩語工落筆九天上謂非世間語也太白詩咳唾落九天隨風生珠玉此句頗采其意孫子曰善攻者動于九天之上向來非無人此友獨可尚孟子曰頌其詩讀其書不知其人可乎是以論其世也是尚友也屬豫剛制酒無用酌杯盎書曰矧汝剛制于酒欲招千載魂斯文或宜當楚辭宋玉有招魂賦王介甫詩曰狂言豈宜當按韓退之詩吁嗟苦駑緩但懼失宜當題山谷石牛洞石牛洞在舒州三祖山皇祐中王荆公通守舒州嘗題詩云水泠泠而北出山靡靡以旁圍欲窮源而不得竟悵望以空歸故山谷亦擬作司命無心播物祖師有記傳衣灊山在舒州懷寧縣北有九天司命真君祠山谷寺在縣西有三祖僧璨大師塔漢書賈誼賦曰大鈞播物坱北無垠傳燈録達磨傳以袈裟授慧可曰內傳法印以契證心外付袈裟以定宗旨汝今受此衣用以表明其化無礙至吾滅後二百年衣止不傳法周沙界白雲橫而不度高鳥倦而猶飛退之詩雲橫秦嶺家何在老杜詩野留行地日江入度山雲漢書韓信傳曰高鳥書良弓藏淵明歸去來詞曰鳥倦飛而知還題灊峰閣閣在舒州提刑司徐老海棠巢上元注云徐佺樂道隱于藥肆中家有海棠數株結巢其上時與客巢飲其間王翁主簿峯菴元注云王道人參禪四方歸結屋于主簿峯上嘗有毛人至其間問道梅花破顔氷雪緑叢不見黃甘樂天詩一放狂歌一破顔東坡和李公擇梅花詩云何人慰流落嘉花天為種又懷公擇詩云我有同舍郎官居在灊嶽遺我三寸柑照坐光卓犖時公擇作淮西憲使治所在舒州次韻公擇舅昨夢黃粱半􅍄立談白璧一雙驚鹿要須野草鳴鷗本願秋江黃粱見前注史記虞卿傳曰説趙孝成王一見賜黃金百鎰白璧一雙唐人王建六言詩曰再見封侯萬戶立談賜璧一雙嵇康絶交書曰禽鹿志在豐草贛上食蓮有感蓮實大如指分甘念母慈爾雅荷芙渠其華菡萏其實蓮其根藕其中菂菂中薏注曰蓮謂房也菂蓮中子也南山有臺詩疏引陸璣草木疏云枸樹似白楊有子著樹端大如指此借用其字詩意謂拇指也唐本草亦曰丹砂其次大者如拇指晉書王羲之傳曰牽諸子抱弱孫有一味之甘割而分之以娛目前共房頭􅋾􅋾更深兄弟思王子年拾遺記曰西王母見穆天子進素蓮一房百子詩曰其角􅋾􅋾此借用實中有么荷拳如小兒手令我憶衆雛迎門索梨棗么荷謂小葉太白詩曰初拳幾枝蕨圖經本草曰菰根嵗久者中心生白臺如小兒臂謂之菰手此句頗采其意禰正平鸚鵡賦曰憫衆雛之無知淵明歸去來辭曰稚子候門又責子詩曰通子垂九齡但覓梨與栗公詩有蕨芽已作小兒拳之句張閣見之云此忍人也時閣為河內推官與通判葛繁皆蔬食誦經故有此語王直方云今此亦云么荷拳如小兒手兩用皆有妙處蓮心正自苦食苦何能甘甘餐恐臘毒素食則懷慚爾雅菂中薏注曰中心苦陸璣草木疏曰里語云苦如薏是也晉書謝安傳曰正自不能爾耳又國語曰厚味實臘毒伐檀詩曰不素食兮蓮生淤泥中不與泥同調維摩經曰譬如髙原陸地不生蓮花卑濕淤泥乃生此花選詩曰異代可同調食蓮誰不甘知味良獨少中庸曰人莫不飲食也鮮能知味也晉書桓伊歌曰為臣良獨難吾家雙井塘十里秋風香安得同袍子歸製芙蓉裳雙井在洪州分寧縣詩曰豈曰無衣與子同袍此借用王介甫和俞秀老詩亦曰解我蔥珩脫孟勞暮年甘與子同袍離騷曰製芰荷以為衣集芙蓉以為裳秋思寄子由黃落山川知晚秋小蟲催女獻功裘禮記月令曰草木黃落春秋考異郵曰立秋促織鳴宋均注曰趣織蟋蟀也立秋女功急故趣之周禮司裘季秋獻功裘注云人功微粗謂狐青麛裘之屬老松閲世卧雲壑挽著滄江無萬牛老杜詩雲壑布衣鮐背死又古相行大厦如傾要梁棟萬牛回首邱山重贈别李次翁利欲薰心隨人翕張國好駿馬盡為王良韓退之送高間序曰利欲鬪進有得有喪易艮之九三曰艮其限列其夤厲薰心老子曰將欲張之必固翕之盡為王良言流俗之隨逐世好不能特立獨行也不有德人俗無津梁莊子苑風曰願聞德人張湛注列子曰體道窮宗為世津梁江文通詩曰道喪涉千載津梁誰能了世説庾亮嘗入佛寺見卧佛曰此子疲于津梁于時以為名言德人天遊秋月寒江莊子曰天之穿之日夜無降人則顧塞其竇胞有重䦘心有天遊室無空虛則婦姑勃磎心無天逰則六鑿相攘寒山子詩曰吾心似秋月碧潭清皎潔映徹萬物玲瓏八窗言心之虛明如此韻書曰玲瓏明貌禮記明堂位疏引孝經援神契曰明堂八窗四達于愛欲泥如蓮生塘處水超然出泥而香孔竅穿穴明氷其相維乃根華其本含光圎覺經曰愛欲為因愛命為果維摩經曰示有妻妾婇女而常樂逺離五欲淤泥超日經曰如蓮華不著水心清淨超于彼詩曰金玉其相注云相質也竅穴氷相皆謂藕文選崔子玉座右銘曰在涅貴不淄曖曖內含光大雅次翁用心不忘日問月學旅人念鄉能如斯蓮汔可小康漢書河間獻王贊曰夫惟大雅卓爾不羣孟子曰必有事焉而勿正心勿忘勿助長也旅人念鄉言不忘也如鍾儀莊舄之類是巳詩曰汔可小康此借用言僅可以居安耳在俗行李密密堂堂左傳行李之往來供其乏困唐有密密堂堂之謡此借用傳燈録坦然問慧安國師曰如何是自已意師曰當觀密作用又志公頌曰丈夫運用堂堂逍遙自在無妨觀物慈哀涖民愛莊魯論曰臨之以莊則敬又云不莊以涖之則民不敬成功萬年付之面牆草衣石質與世低昂欲成逺大事業當如少林之面壁自求巳事也雖草衣木食鐵石其心然未嘗違世亦與之俯仰聊同其波耳唐黃檗禪師傳心法要曰勤苦修行草衣木食又權德輿有草衣禪師宴坐記漢書司馬遷書曰故且從俗浮沈與時俯仰楚辭曰服偃蹇以低昂演雅桑蠶作繭自纒裹蛛蝥結網工遮邏樂天詩燭蛾誰救護蠶繭自纒縈吕氏春秋湯祝綱曰蛛蝥作網令人學之符子曰公子重耳逰大澤之中見蜘蛛布網曵蠅執豸而食之顧舅犯曰此蟲也德薄矣而猶役其智云云燕無居舍經始忙蝶為風光勾引破詩云經始勿亟老杜詩傳語風光共流轉又落花詩云影遭碧水潛勾引樂天桞詩勾引春風無限情老鶬銜石宿水飲稚蜂趨衙供蜜課司馬相如上林賦曰雙鶬下注云鶬鴣也梅聖俞詩不比西池老頽鶬樹萱録曰嘗見數鳥銜山間碎石登于樹杪俄復入水又銜石登樹者數四處士楊存素曰是鸛伏卵多入水其體冷濕還取礜石耳按博物志云鸛水鳥也伏卵時卵冷則不沸取礜石用繞卵以助燥氣陶隱居注本草礜石條亦引此説又按陳藏器本草云鸛巢中以泥為池含水滿池中養魚及蛇以哺其子山谷以為老鶬未喻埤雅曰蜂有兩衙應潮唐書食貨志曰主户內有課口者為課戶鵲傳吉語安得間雞催晨興不敢卧陸賈新語曰乾鵲噪而行人至漢書陳湯傳曰不出五日當有吉語聞炙轂子云雞一名司晨氣陵千里蠅附驥枉過一生蟻旋磨後漢書曰蒼蠅之飛不過十步若附驥尾日馳千里晉書天文志周髀家云譬之于蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨而左回焉蝨聞湯沸尚血食雀喜宫成自相賀淮南子曰湯沐具而蟣蝨相弔大厦成而燕雀相賀晴天振羽樂蜉蝣空穴祝兒成蜾螺詩曰蜉蝣之羽衣裳楚楚注蜉蝣渠略也朝生夕死七月詩曰六月莎雞振羽法言曰螟蛉之子殪而逢果羸祝之曰類我類我久則肖之矣注謂螟蛉蟲也果羸蒲盧也桑蟲子始生而蒲盧取之于木空中七日祝而化之以變為已子蛣蜣轉丸賤蘇合飛蛾赴燭甘死禍莊子齊物論注曰蛣蜣之智在于轉丸而笑蛣蜣者乃以蘇合為貴按爾雅蛣蜣蜣蜋也南史傅亮傳直宿禁中覩夜蛾赴燭作感物賦以寄意井邊蠧李螬苦肥枝頭飲露蟬常餓孟子曰井上有李螬食實者過半矣徐廣車服雜志曰侍臣加貂蟬取其清高飲露不食天螻伏隙録人語射工含沙須影過本草螻蛄一名蟪蛄一名天螻陶隱居注曰此物頗協神鬼昔人獄中得其力者今人夜忽見出多打殺之言為鬼所使也博物志曰江南溪水中有射工蟲長一二寸口中有弩形氣射人影不治則殺人春秋莊公十八年有􅈮疏謂含沙射人影訓狐啄屋真行怪蠨蛸報喜太多可退之射訓狐曰有鳥夜飛名訓狐矝凶挾狡誇自呼時乘陰黑止我屋聲勢慷慨非常粗禮記中庸曰素隱行怪行音下孟反東山詩注曰蠨蛸長䗁也疏云河內人謂之喜母此蟲來著人衣當有親客至有喜也嵇康絶交書曰足下旁通多可而少怪鸕鷀密伺魚蝦便白鷺不禁塵土涴涅盤經曰如人有怨逐伺其便詩義疏曰鷺水鳥也好而潔白謂之白鷺退之詩願書巖上石勿使塵泥涴老杜詩冷蕊疏枝恐不禁絡緯何嘗省機織布榖未應勤種播炙轂子曰莎雞古今注一名促織一名絡緯謂其鳴如紡績織緯也杜詩布榖處處催春種按爾雅鳲鳩鴶鵴注曰今布榖也書曰㮨降播種五技鼯鼠笑鳩拙百足馬蚿憐鱉跛荀子曰鼯鼠五技而窮歐公詩衆鳥笑鳴鳩爾拙固無匹不能取巧婦以共營家室博物志曰百足一名馬蚿莊子曰蚿憐蛇楚詞曰駟跛鱉而上山吾固知其不能升荀子曰豈若跛鱉之與六驥足哉老蚌胎中珠是賊醯雞甕裏天幾大三輔決録孔融見韋元將與其父書曰不意雙珠出于老蚌淮南子曰明月之琳蚌之病而我之利莊子田子方篇曰孔子見老𣆀告顔回曰吾之于道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也注云醯雞者甕中之蠛蠓比吾全于老聃猶甕中之與天地矣談苑劉師道詩醯雞舞甕天螳蜋當轍恃長臂熠耀宵行矜火照莊子曰猶螳蜋之怒臂以當車軼則必不勝任矣音義曰軼音轍詩曰熠耀宵行注云熠磷也螢火也提壺猶能勸沽酒黃口只知貪飯顆提壺鳥名梅聖俞四禽言曰提壺蘆沽美酒風為賓樹為友山花撩亂目前開勸爾今朝千萬夀家語孔子見羅雀者所得皆黃口小雀曰大雀善驚而難得小雀貪食而易得托言李白詩飯顆山頭逢杜甫伯勞饒舌世不問鸚鵡才言便關鎖七月詩曰七月鳴鵙注云鵙伯勞也劇談録白居易玉蕊花詩曰不緣啼鳥春饒舌青瑣仙郎何得知曲禮曰鸚鵡能言不離飛鳥劉夢德和樂天鸚鵡詩曰誰遣聰明好顔色爭須安置入深籠春蛙夏蜩更嘈雜土蚓壁蟫何碎瑣七月詩曰五月鳴蜩注云蜩螳也嘈雜疑作嘈囋文選東京賦云黃奏嚴鼓之嘈囋音才達反孟子曰夫蚓上食稿壤下飲泉酉陽雜俎曰張周封言壁上白瓜子化為白魚韻書曰蟫音淫衣白魚也韓孟聨句竹影金瑣碎江南野水碧于天中有白鷗間似我冦萊公詩野水無人渡盧同詩水泛碧天色老杜詩飄零何所似天地一沙鷗戲和答禽語南村北村雨一犂新婦餉姑翁哺兒田中啼鳥自四時催人脫袴著新衣著新替舊亦不惡去年租重無袴著東坡樂府曰歸去歸去江上一犂春雨東坡在黃州作五禽言自注曰土人謂布榖為脫却布袴晉書列女傳謝安曰王郎逸少子不惡汝何恨也前漢食貨志曰租挈重注曰收田租之約令也贈鄭交山谷有招清公詩跋云草堂鄭交處士隱處小塘芙蕖盛開使雞伏鴛鴦卵與人馴狎不驚畏我禪師恩長老法安師懷道遁世清公少時蓋依之數年今觀跋意即此詩但題不同爾鄭交字子通見于山谷書尺及題跋高居大士是龍象草堂丈人非熊羆大士謂靈源叟惟清清蓋晦堂之法嗣山谷與歐陽元老帖云清師歸所受業院武寧之高居想甚得所也武寧屬洪州蓮經曰文殊師利語彌勒及諸大士如我惟忖今佛世尊欲説大法傳燈録達磨傳曰波羅提法中龍象按智度論云龍象言其力大龍水行中力大象陸行中力大故今以負大法者者比之龍象史記齊世家曰吕尚年老以漁釣干周西伯西伯將獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔果遇于渭水之陽載與俱歸立為師按六韜以非虎為非熊不逢壞衲乞香飯惟見白頭垂釣絲上句謂清公未至延恩下句指鄭交四分律云一切上色衣不得畜當壞作迦沙色智度論云五比邱曰佛當著何等衣佛言應著衲衣金剛經曰爾時世食時著衣持鉢入舍衛大城乞食維摩經曰化菩薩以滿鉢香飯與維摩詰老杜詩江邊老病雖無力強擬晴天理釣絲鴛鴦終日愛水鏡菡萏晚風雕舞衣襄陽記曰司馬德操為水鏡晉書樂廣傳衛瓘曰此人之水鏡也趙嘏詩曰紅衣落盡渚蓮愁書曰胤之舞衣開徑老禪來煮茗還尋密竹徑中歸江淹擬陶淵明詩云開徑望三益老杜寄贊上人詩云柴荆具茶茗徑路通林邱謝靈運詩連巖覺路塞密竹使徑迷平陰張澄居士隱處三首仁亭無心經世網有道藏邱山選詩曰世網嬰我身養生息天黥藝木印嵗寒莊子大宗師篇意而子曰庸詎知造物之不息黥而補我劓管子曰十年之計樹之以木印謂驗其信然必相符合也論語語嵗寒然後知松柏之後凋德人牆九仞強學窺一斑莊子曰德人者居無思行無慮不藏是非善惡論語夫子之牆數仞書為山九仞禮記儒行曰夙夜強學以待問晉書王羲之傳客曰此郎管中窺豹時見一斑張侯大雅質結髮闖儒關大雅見前注李廣傳曰臣結髮而與胸奴戰董仲舒傳曰太學賢士之關闖音丑甚反韻書注云馬出門貌退之詩云闖然入其戶三稱天之言竒贏或諧偶老大嘗艱難漢書食貨志曰操其竒贏日遊都市霍去病傳曰常留落不耦左傳曰險阻艱難備嘗之矣詩意謂張君少年進取如射利者往往逢時遇合既老知世故之多艱遂絶意于仕進也築亭上雲雨日月轉朱欄文選頭陀寺碑曰層軒延袤上出雲霓西都賦曰軼雲雨于太半虹霓回帶于棼楣牀敷聽萬籟我家頗寬間寶積經偈云亦不為求天玉女及諸衣食牀敷事又云牀敷綵女資生具張拙頌云凡聖含靈共我家退之書曰耕于寬間之野牧牛有坦途亡羊自多端傳燈録大安禪師曰安在溈山三十年只看一頭水牿牛若落路入草便牽出若犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作箇露地白牛常在面前終日露回回地趕亦不去也退之詩近來自説尋坦途猶上青雲跨騄駬列子曰楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多歧既反問獲羊乎曰亡之矣曰奚亡之曰歧路之中又有歧焉吾不知所之故亡之也心都子曰大道以多歧亡羊學者以多方喪生楚詞曰多端膠交莊子問臧何事則挾策讀書問榖何事則博塞以遊其為亡羊則一也市聲鏖午枕常以此心觀世故紛紜能亂人意以此心觀之當不戰而勝也漢書霍去病傳曰合短兵鏖蘭臯下注云世俗謂盡死殺人為鏖糟音意曹反復庵舂糧出求仁行李彌宇宙久客渺愁人馬飢僕夫瘦莊子曰適百里者宿舂糧魯論曰求仁而得仁行李見前注詩曰我馬瘏矣我僕痡矣云何吁矣歸來一邱中萬事不改舊漢書敘傳班嗣曰漁釣于一壑則萬物不姦其志栖遲于一邱則天下不易其樂傳燈録曰不改舊時人只改舊時行履處此詩大抵與後卷贈桞展如第八首同意禾黍鋤其驕牛羊鞭在後甫田詩曰無田甫田維莠驕驕莊子曰養生者如牧羊視其後者而鞭之隱几天籟寒六鑿忽通透莊子齊物論曰南郭子綦隱几而坐曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫又外物篇胞有重䦘心有天遊室謂虛空則婦姑勃磎心無天遊則六鑿相攘司馬彪云謂六情攘奪亨泉水德通萬物發源會時亨伏坎非心願成川且意行易蒙卦曰山下出泉蒙子曰蒙亨以亨行時中也坎卦曰有孚唯心亨行有尚彖曰唯心亨乃以剛中也東坡易傳云所遇有難易然而未嘗不志于通是水之心也物之窒我者有盡而是心無巳則終必勝之故水之所以至柔而能勝物者惟不以力爭而以心通也不以力爭故柔外以心通故剛中劉禹錫詩腰斧上高山意行無舊路此借用栖遲林邱下欲濯無塵纓栖遲見前注老杜詩石門斜日到林邱孟子曰滄浪之水清兮可以濯我纓文選北山移文曰今見解蘭縛塵纓沈休文新安江水詩曰紛吾隔泥滓豈假濯衣巾願以潺湲水沾君衣上塵杖藜逢載酒一瓢酌餘清莊子曰原憲杖藜而出漢書揚雄傳曰時有好載酒肴從遊從遊學逸士傳許由隱箕山以手捧水飲之人遺一瓢得以操飲選詩密林含餘清留王郎王純亮字世弼山谷之妹壻見于黃氏世譜河外吹沙塵江南水無津言南北相望之逺文選謝靈運詩河洲多沙塵風悲黃雲起書曰若涉大水其無津涯骨肉常萬里寄聲何由頻角弓詩序曰骨肉相怨漢書趙廣漢傳曰界上亭長寄聲謝我我隨簡書來顧影將一身詩曰畏此簡書曹子建責躬表曰形影相弔五情愧赧資治通鑑晉李密言吾獨立于世顧影無儔退之詩念汝將一身西來曽幾年何晏行步顧影見魏志留我左右手奉承白頭親晉書邵續傳續諫成都王頴討長沙王又曰兄弟如左右手小邦王事略蟲鳥聲無人小邦謂德平鎮詩曰王事靡鹽謝靈運詩虛館絶諍訟空庭來鳥雀退之琴操曰四無人聲王甥解鞍馬夜語雞喚晨爾雅曰姊妹之夫為甥母慈家人肥女惠男垂紳禮記禮運曰父子篤兄弟睦夫婦和家之肥也王介甫作鄞女墓志曰吾女生惠異甚按惠與慧同禮記玉藻曰童子之節也緇布衣錦緣錦紳又曰紳垂有田為酒事豚酒及秋春酒事謂麴糵事見下茗事注禮記王制曰庶人春薦韭秋薦黍韭以卵黍以豚生涯得如此舊學更光新莊子曰吾生也有涯易大畜剛健篤實輝光日新其德索去何草草小留慰艱勤老杜詩問君適萬里取别何草草百年才一炊六籍經幾秦百年一炊用邯鄲夢事見前注文選東都賦曰蓋六籍所不能談李善注引封禪書曰六經載籍之傳王介甫虔州學記曰周道微不幸而有秦燒詩書殺學士然是心非獨秦也當孔子之既有欲毁鄉校者矣介甫又有桃源行曰天下紛紛經幾秦要知胸中有不與迹同陳莊子曰機心存于胸中又天運篇老子曰六經先王之陳迹也豈其所以迹哉郢人懷妙質聊欲運吾斤莊子曰莊子過惠子之墓謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為我為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣送王郎酌君以蒲城桑落之酒庾信詩云蒲城桑落酒灞岸菊花秋按續古今注曰索郎酒桑落時美故因以為名齊民要術載釀桑落酒法亦以九月或云桑落河名非也杜詩坐開桑落酒泛君以湘纍秋菊之英漢書揚雄作反騷曰欽弔楚之湘纍注謂屈原赴湘死故曰湘纍楚詞曰夕餐秋菊之落英贈君以黟川點漆之墨黟音伊漢舊縣今屬歙州墨譜云江南黟歙之地有李廷圭墨尤佳廷圭本易水人唐末渡江居歙造墨有名蕭子良答王僧虔書云仲將之墨一點如漆送君以陽關墮淚之聲王維詩勸君更盡一杯酒西出陽關無故人李商隱詩斷腸聲裏唱陽關淚碑見晉書羊祜傳酒澆胸次之壘塊世説王遜問王忱阮籍何如司馬相如忱曰阮籍胸中壘塊故須以酒澆之言同相如唯有酒異莊子曰喜怒哀樂不入于胸次菊制短世之頽齡淵明詩菊為制頽齡班固幽通賦道修長而世短墨以傳萬古文章之印歌以寫一家兄弟之情印如釋氏所謂傳佛心印詩曰以寫我憂王仲宣詩冀寫憂思情江山千里俱頭白骨肉十年終眼青山谷此對極有妙處前輩多使之老杜詩别來頭併白相對眼終青東坡云讀書頭欲白相對眼終青又曰身更萬事巳頭白相對百年終眼青又曰看鏡白頭知我老平生青眼為君明又曰故人相見尚青眼新貴如今多白頭又曰江山萬里將頭白骨肉十年終眼青其用青眼對白頭非一而工拙各有異耳連牀夜語雞戒曉書囊無底談未了文選趙景真答嵇茂齊書曰雞鳴戒旦則飄爾晨征顔師古注急就章曰有底曰囊無底曰槖世説衛玠與謝鯤達旦微言太白詩語笑未了風吹斷有功翰墨乃如此何恨逺别音書少選詩粲粲翰墨場炊砂作糜終不飽楞嚴經曰若不斷媱修禪定者如蒸砂石欲成其飯經百千劫祗名熱砂何以故此非飯本砂石成故世説曰賔客詣陳太邱使元方季方炊二人聽客議論忘著箄皆成糜佛書又云譬如説食終不能飽鏤氷文章費工巧鹽鐵論曰內無其質而外學其文若畫脂鏤氷費日損工考工記曰工有巧要須心地收汗馬孔孟行世日杲杲謂道義戰勝胸中開明乃曉然見聖賢用心處史記晉世家文公曰矢石之難汗馬之勞此復受次賞孟子曰子夏子張子遊以有若似聖人欲以所事孔子事之曽子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已注曰秋陽周之秋夏之五月六月盛陽也皓皓甚白也皓音杲詩曰其雨其雨杲果出日山谷答王雩書曰想以道義敵紛華之兵戰勝久矣古人云并敵一向千里殺將要須心地收汗馬之功讀書乃有味有弟有弟力持家婦能養姑供珍鮭老杜同谷歌云有弟有弟在逺方古樂府云健婦持門戶南史庾杲之傳任昉戲曰誰謂庾郎貧食鮭常有二十七種鮭音户佳反切韻曰魚名出吳志兒大詩禮女絲麻公但讀書煮春茶禮記曰治其麻絲次韻劉景文登鄴王臺見思五首劉季孫字景文其父平死于趙元昊之難鄴中記魏武于銅雀園立三臺黃濁歸大壑漣漪繞重城郭璞注爾雅曰河所受渠多衆水溷淆宜其濁黃漢書谷永傳黃濁四塞此借用其字列子曰勃海之東不知幾億萬里有大壑焉不惟無底之谷名曰歸墟八紘九野之水莫不注之詩曰河水清且漣漪西風一橫笛金氣與高明杜牧之詩深秋簾幕千家雨落日樓臺一笛風漢書五行志曰金氣病則木沴之老杜詩大火運金氣荆揚不知秋劉禹錫秋螢引曰夜光寂寥金氣靜文選嘯賦李善注引淮南子曰寧戚擊牛角而疾商歌商金聲清故以為曲王逸注楚辭九辨曰秋天髙朗氣清明也歸鴉度晚景落鴈帶邊聲老杜詩輕鳥度層陰又詩邊秋一鴈聲文選李陵書曰邊聲四起平生知音處别離空復情知音見後篇注老杜詩逺送從此别青山空復情謝朓詩嬋娟空復情舊時劉子政憔悴鄴王城把筆已頭白見書猶眼明漢書劉向字子政用以比景文寰宇記故鄴城在相州鄴縣東魏武帝受封于此呼為北都平原秋樹色沙麓暮鐘聲用老杜寄李白詩渭北春天樹江東日暮雲句律平原今德州山谷是時監德州德平鎮寰宇記沙麓在魏州元城縣東即漢書元后傳王翁儒徙居之地今為北京與相州相接歸鴈南飛盡無因寄此情管子曰桓公曰鴻鴈春北而秋南不失其時楚辭曰鴈雍雍而南飛漢書蘇武傳天子射上林中得鴈足有繫帛書老杜詩相憶無南鴈何時有報章繫匏兩相憶極目十餘城繫匏見魯論文選古詩云上有長相憶楚辭曰目極千里兮傷春心按德與相俱在河北漢書吾邱夀王傳曰連十餘城之守積潦干斗極山河皆夜明劉禹錫詩積潦搜山趾司馬相如子虛賦曰上干青雲杜牧詩觚稜拂斗極左傳曰恆星不見夜明也白璧按劍起漢書鄒陽傳曰明月之珠夜光之璧以暗投人于道衆莫不按劍相盼者何則無因而至前也朱絃流水聲記曰朱絃疏越一唱而三嘆有遺音者矣吕氏春秋伯牙鼓琴意在山鍾子期曰巍巍乎意在水子期曰湯湯乎鍾期死白牙遂絶絃以世無知音乖逢四時爾木石了無情達人之于窮通猶木石之于寒暑初無喜愠也莊子曰古之得道者窮亦樂通亦樂所樂非窮通也道得于此則窮通為寒暑風雨之序矣樂天李夫人詩曰人非木石皆有情名士傳曰阮籍了無愧色茗花浮曽坑陸羽茶經云沫餑者湯之華也華之薄者曰沫厚者為餑輕細者曰花東坡和曽仲錫詩云君家新致雪坑茶自注云近得曽坑茶酒泛酌宜城周禮酒正泛齊注曰泛者成而滓浮泛泛然如宜城醪矣疏云宜城説以為地名故曹植酒賦曰宜城醴醪蒼梧縹清劉杲以為酒名未知孰是路尋西九曲此篇以末句考之蓋追記汴京州西舊遊而此句述其經行之地按宋次道東京記閶闔門門外福昌坊有九曲子巷山谷所指或當謂此人似漢三明後漢段熲傳熲字紀明與皇甫威明張然明並知名顯達京師稱為涼州三明贊曰山西多猛三明儷蹤千户非無相後漢班超詣相者相者曰燕頷虎頭飛而肉食萬里侯相後封定逺侯景文將家子故用三明及此事五言空有聲退之石鼎聨句序曰校書郎侯喜新有能詩聲何時郭池晚照影寫間情蜀中舊本雙井前集絶句中有景文見招會宿州西郭園詩文選王仲宣詩曰日暮遊西園冀寫憂思情曲池揚素波列樹敷丹榮陶淵明有間情賦此借用其字公詩如美玉未嫁已傾城漢書李夫人傳李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國嫁作蕩子婦寒機泣到明言其中年之詩多哀傷也選詩曰昔為倡家婦今為蕩子婦北夢瑣言徐月英送人詩云枕前淚與階前雨隔箇間窗滴到明唐人吳融作寒機曉猶織賦此引用緑琴蛛網遍絃絶不成聲傅休奕琴賦序曰蔡雍有緑綺琴天下名器也玊臺新詠徐悱贈內詩曰網蟲生錦薦禮記檀弓子夏既除喪而見豫之琴彈子而不成聲想見鴟夷子江湖萬里情言未逢知已也杜牧之詩西子下姑蘇一舸逐鴟夷史記載范蠡佐越王既霸乃乘扁舟浮江湖自號鴟夷子次韻吳宣義三徑懷友佳眠未知曉屋角聞晴哢王羲之帖云向宅上靜佳眠都不知足下來門太平廣記鄭交謁友人于陳蔡路逢一冡有竹兩杆鄭為詩曰冡上兩杆竹風吹常裊裊冡中人賡之曰下有百年人長眠不知曉又古詩春眠不覺曉處處聞啼鳥老杜詩紅稠屋角花退之詩鳥哢正交加萬事頗忘懷猶牽故人夢老杜夢李詩曰故人入我夢明我我常相憶又詩春渚日落夢相牽采蘭秋蓬深汲井短綆凍香草蔽于蓬艾冽井窮于短綆言薦引之難也老杜詩君不見才士汲引難恐懼棄捐忍羈旅又詩露井凍銀牀莊子綆短不可以汲深起看冥飛鴻乃見天宇空法言曰鴻飛冥冥弋人何慕焉選詩曰昭昭天宇濶甚念故人寒誰省機與綜史記范睢傳須賈曰范叔一寒如此哉又云云以𫀆戀戀有故人之意韻書曰綜機縷也在者天一方日月老賔送文選蘇子卿詩曰良友逺離别各在天一方書堯典曰寅賓出日寅餞納日注云賔導也餞送也往者不可言古柏守翁仲水經注曰鄗南千秋亭壇廟之東枕道有兩石翁仲南北相對又按魏志明帝景初元年鑄銅人二號曰翁仲此引用言冡間石人也送劉季展從軍鴈門二首鴈門今代州劉郎才力耐百戰蒼鷹下韝秋未晚東觀漢記曰趙勤字孟卿太守桓虞署為督郵于是貪令自責還印綬去虞嘆曰善吏如使良鷹下韝命中千里荷戈防犬羊十年讀書厭藜莧詩曰荷戈與祋文選劉越石表曰敢肆犬羊南史沈攸之曰早知窮達有命恨不十年讀書退之詩腸肚集藜莧試尋北産汗血駒莫殺南飛寄書鴈兩句皆用鴈門事左傳曰冀之北士馬之所生史記汗蘇秦傳説秦惠王曰北有代馬老杜詩驊騮作駒已血後漢書王符傳有以貨得鴈門太守者皇甫規問漢卿前在郡食鴈美乎老杜詩汝休枉殺南飛鴻史記使謂單于曰天子射上林中得鴈足有繫帛書人生有祿親白頭可能一日無甘饌禮記內則曰由命士以上父子皆異宫昧爽而朝慈以旨甘謂有親而不可無甘旨之奉也禮記云七十非囱不飽一日無甘饌之句非取此意耶石趺谷中玉子瘦金剛窟前藥草肥寰宇記仙人山在代州五雲縣東南石巖上有人坐迹山腹石上有手迹山下石上有雙腳迹皆西向立張天覺清涼傳曰夢逰五臺山金剛窟按寰宇記五臺山在代州五臺縣東北內經以為清涼山東坡送天覺河東提刑詩曰西登太行嶺北望清涼山餘光入巖石神草出茅菅能令墜指兒虬鬚茁氷顔又有詩曰慿君説與埋輪使速寄長松作解嘲皆謂此草也仙家耕耘成白璧道人煮掘起風痱絳囊璀璨思盈斗竹畚香甘要百圍搜神記曰陽雍伯嘗設義漿以給行旅一日有人飲訖懷中取石子一斗與之曰此可生美玉遂得白璧一雙痱音肥韻書曰風病也百圍謂百束到官莫道無來使日日北風鴻鴈歸老杜詩門問平安無使來禮記仲秋之月鴻鴈來題宛陵張待舉曲肱亭仲蔚蓬蒿宅宣城詩句中三輔決録注曰張仲蔚平陵人所居蓬蒿沒人淵明詩曰仲蔚愛窮居繞宅生蓬蒿齊書謝朓為宣城郡守善詩文選贈答詩中多有朓宣城所作宛陵即今宣州故用此事人賢忘巷陋論語子曰飯疏食飲水曲肱而枕之樂亦在其中矣亭名蓋取之山谷此句使顔子在陋巷一簞食一瓢飲不改其樂夫子曰賢哉回也事蓋用此以盡曲肱之意境勝失途窮晉書阮籍傳率意獨駕不由徑路車迹所窮輒慟哭而反顔延之五君詠曰途窮能無慟此借用寒葅書萬卷零亂剛直胸言胸中所有惟蔬飯與書相雜新序楚惠王食寒葅而得蛭因吞之偃蹇勳業外嘯歌山水重後漢蔡雍傳董卓曰我力能族人蔡雍遂偃蹇者不旋踵矣晉書謝鯤曰猶不廢我嘯歌嘯歌字出毛詩其嘯也歌晨雞催不起擁被聽松風姚嗣宗詩崆洞山叟笑不語靜聽松風春晝眠南史陶𢎞景特愛松風山谷內集詩注卷一
