body:
  text: 山谷内集詩注巻七宋黄庭堅撰任淵註送李徳素歸舒城李楶字徳素隠舒州龍眠山僧夏莫問途麥秋宜煮餅僧夏他本或作魏夏非是韋應物詩曰安居同僧夏清夜諷道言荘子曰七聖皆迷無所問途北寺旬休歸長廊六月冷簟翻寒江浪茶破蒼璧影北寺即酺池寺退之簟詩曰巻送八尺舍風漪坡詞簟紋如水悵如烟山谷謝送碾壑源㨂芽詩矞雲從龍小蒼璧李侯為我來遽以歸期請青衿廢詩書白髪違定省荒畦當鉏灌蠧簡要籖整挽衣不可留決去事幽屏此数句太抵用退之送張道士詩意退之又有詩云胡為乆無成便以歸期告子衿詩注云青衿青領也學子之所服禮父母在衣純以青曲禮曰昏定而晨省荘子曰漢隂丈人方将為圃畦鑿隧而入井抱甕而出灌穆天子傳曰暴蠧書子羽陵老杜詩書籖藥裹封蛛網天恢獵徳網日饎養賢鼎老子曰天網恢恢掦子曰獵徳而得徳此借用言網羅賢俊也易鼎卦曰聖人大亨以養聖賢泂酌詩曰可以餴饎注云饎酒食也音熾此士落江湖熟思令人癭南史劉之遴傳曰之遴時落侯景所孟郊詩長安日下影又落江湖中漢書趙充國傳曰但思惟兵利害至熟悉也魏志賈逵傳注曰逵與典農校尉爭公事不得理乃發憤生癭胷中吉祥宅膜外榮辱境荘子曰瞻彼闋者虚室生白吉祥止止又曰辨乎榮辱之境又徳充符注夫至足者不以憂患驚神若皮外而過去醫書曰膈膜自心肺之下與脊腹相著以遮蔽濁氣膜外一本作劵外荘子曰劵内者行乎無名劵外者志乎明費注云巻分也華嚴經云瞻仰吉祥宅婆娑萬物表藏刃避肯綮萬物表見前注荘子庖丁為惠文君觧牛曰批大卻導大窽因其固然技經肯綮之未嘗而况大觚乎又曰提刀而立為之四顧為之躊躇滿志善力而藏之音義曰肯綮猶結處也綮音苦挺反人生要當學安宴不徹警左傳曰宴安鳩毒不可懐也又曰軍衛不徹警古來惟深地相待汲脩綆易繫辭曰夫易聖人之所以極深而研㡬也惟深也故能通天下之志脩緶見前注詠李伯時摹韓幹三馬次子由韻簡伯時兼寄李徳素太史𤨏牕雲雨垂試開三馬拂蛛絲太史當謂子由作起居郎居左史之任文選鮑照詩玉鉤隔𤨏牕老杜趙公堂詩落架垂雲雨此引用言其在天上也文選江淹擬張華詩云玉臺生網絲李善注引論衡曰蜘蛛結絲以網飛蟲李侯寫影韓幹墨自有筆如沙畫錐書訣墨薮禇河南曰用筆當如印印泥如錐畫沙欲其藏鋒畫乃沈著當其用鋒常欲透過紙背絶塵超日精爽緊若失其一望路馳西京雜記文帝有良馬九匹一名絶塵王子年拾遺記曰周穆王八龍之駿四名越影逐日而行老杜詩魏侯骨聳精爽緊荘子徐無鬼曰天下馬有成材若䘏若失若䘮其一若是者超軼絶塵不知其所選詩四牡向路馳馬官不語臂指揮乃知伏下非新羈言其馴伏如此必非新自西極來者老杜詩馬官厮養森成列臂指揮即無羊詩所謂麾之以肱荘子徐無鬼曰吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也山谷盖用此意唐書李林甫傳曰不見立仗馬乎終日無聲而飫三品芻豆新羈之馬見文選吾嘗覧觀在坰馬駑駘成無權竒列史記封禪書曰後有君子得以覧觀馬駉詩曰駉駉牡馬在坰之野漢書天馬歌曰志俶儻精權竒籋浮雲晻上馳緬懐胡沙英妙質一雄可将千萬雌漢書天馬歌曰天馬來從西極歩流沙九夷服文選西征賦曰終軍山東之英妙此借用老杜天育驃騎歌曰當時四十萬匹馬張公歎其材盡下故獨寫真傳示人見之座右乆更新決非皁櫪所成就天驥生駒人得之元次山詩曰豈欲皁櫪中爭食籺與藖漢書元鼎四年馬生渥洼水中作天馬之歌顔延之赭白馬賦漢道亨而天驥呈才漢書西域傳曰大宛國多善馬馬汗血言其先天馬子也孟康注曰言大宛國有高山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云家語孔子曰人遺弓人得之此借用詩意若曰老于中朝之士與來自釣築者其英傑之氣故自不同如仗下馬與渥洼之驥也千金市骨今何有戦國䇿郭隗謂燕昭王曰古之人君遣使者齋千金市千里馬于他國未至馬已死買其骨五百金以歸天下知君之好也于是朞年而千里之馬至者三焉王誠欲致士先從隗始隗且見事况賢于隗者乎文選孔文舉書曰燕君市駿馬骨乃欲以招絶足也士或不價五羖皮史記秦本紀曰繆公聞百里奚賢欲重贖之恐楚人不與乃請以五羖羊皮贖之楚人遂與之李侯畫隠百僚底初不自期人誤知老杜詩有才無命百僚底王維詩夙世繆詞客前身應書師不能捨餘習偶被時人知戲弄丹青聊卒歳身如閲丗老禪師謂其得游戲三時文選謝惠連詩丹青蹔雕煥李善注引張網集曰圖形丹青詩曰優哉游哉聊以卒歳漢書盖寛饒傳曰此如傳舍所聞多矣老杜詩勢閲人代速代即世也避諱故云次韻子瞻和子由觀韓幹馬因論伯時畫天馬于闐花驄龍八尺看雲不受絡頭絲西河驄作蒲萄錦雙瞳夾鏡耳卓錐東坡三馬圖贊引云元祐初熙河游師雄擒猾羌大首領果荘青宜結以獻時西域貢馬首高八尺龍顅而鳯膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆瘖明年羌温錫沁有良馬願以饋太師潞國公詔許之蒋之竒為熙河帥西蕃有貢駿馬汗血者之竒為請乞不以時入事下禮部軾時為宗伯判其状云朝廷方郤走馬以糞正復汗血亦何所用事遂寝軾嘗私請于承議郎李公麟畫當時三駿馬之状而使果荘青宜結效之藏于家伯時公麟字也按漢書西域傳于闐國王治西域通典云在葱嶺之北二百餘里西河當謂熙河之地周禮曰馬八尺以上為龍老杜高都䕶驄馬行曰青絲絡頭為君老何由郤出横門道謝荘馬舞賦曰養雄神于綺文西京雜記曰霍光妻遺淳于衍蒲萄錦顔延之赭白馬賦曰雙瞳夾鏡两權協月傳燈錄仰山傳香嚴曰去歳蕪卓錐之地長楸落日試天歩知有四極無由馳選詩走馬長楸間詩曰天歩艱難爾雅四極注曰四方極遠之國老杜天育驃騎歌曰嗚呼健歩無由騁電行山立氣深穏可耐珠韉白玉羈崔豹古今注曰秦始皇有名馬躡景追電顔延之赭白馬賦曰異體峯生硃相連發山立字見禮記玉藻老杜畫馬圖引曰顧視清高氣清穏談苑曰劉鋹自結真珠鞍勒為戲龍之状李侯一顧歎絶足領略古法生新竒春秋後語蘇代曰人有駿馬欲賣之見伯樂曰比三旦立于市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而馬價十倍魏文帝與孫權書曰中國雖多馬其知名絶足亦少丗説康僧淵忽徃殷淵源許遂及義理語言詞㫖自若領略粗舉一徃參詣又曰支道林才藻新竒花爛映發一日真龍入圖畫在坰羣雄望風雌老杜丹青引贈曹霸云詔謂将軍拂絹素意匠慘澹經營中斯湏九重真龍出一洗萬古凡馬空真龍盖用新序葉公事曹霸弟子沙苑丞喜作肥馬人笑之丹青引云弟子韓幹旱入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋喪張彦遠畫記曰韓幹官至太府丞尤工鞍馬初師曹霸後自獨擅此云沙苑丞未詳李侯論幹獨不爾妙畫骨相遺毛皮晉書王獻之傳謝安問君書何如君家尊客曰故當不同安曰外論不爾答曰人那得知高僧支通傳謝安曰九方歅之相馬略其驪黄而取其駿逸退之詩自歎虞翻骨相屯又詩未能去毛皮翰林評書乃如此賤肥貴瘦渠未知杜詩書貴瘦硬方通神而東坡詩有曰杜陵評書貴瘦硬此論未公吾不憑况我平生賞神駿僧中云是道林師高僧傳支遁字道林嘗養馬人有譏之者曰爱其神駿聊復畜爾亦見丗説次韻答王眘中有身猶縛律傳燈錄誌公歌曰律師持律自縛老杜詩身猶縳禪寂無夢到行雲宋玉高唐賦曰昔者先王嘗遊高唐畫寝夢見婦人曰妾在巫山之陽高丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下俗裏光塵合胷中涇渭分老子曰和其光同其塵退之與崔羣書曰懼足下以為吾不致黒白于胸中涇渭見前注老杜詩濁涇清渭何當分我搴江南秀一見空馬羣離騷曰朝搴􅀈之木蘭注云搴取也退之送温造序云伯樂一過冀北之野而馬羣遂空夸士慕鍾鼎寒儒守典墳言所見之偏也漢書賈誼鵬鳥賦曰夸者死權文選劉孝標廣絶交論曰書玉牒而刻鐘鼎左傳臧武仲曰作彛器以銘其功烈注謂鍾鼎為宗廟之常器此句引用言夸士徇功名也文選江文通擬鮑照詩曰豎儒守一經左傳曰左史倚相能讀三墳五典吾欲超萬古乃如負山蚊荘子曰猶渉海鑿河而使蚊負山也能來商略此趺坐對爐芬商略見前注蓮經云結加趺坐文選江文通擬古詩云膏爐絶沈燎注云爐薰爐也取其芬香故加之膏子瞻去歳春侍立邇英子由秋冬間相繼入侍作詩各述所懐予亦次韻四首仁宗乾興初日御殿之西廡詔孫奭馮元等勸講祖宗故事以雙日延見儒臣至此雖隻日亦令執經入侍景祐二年正月癸丑詔置邇英延義二閣書無逸篇于屏邇英在迎陽門之下東向東京記曰崇政殿西有邇英閣東有延義閣講諷之所又按國朝春二月至端午秋八月至冬至遇隻日邇英閣輪官講讀赤壁歸來入紫清堂堂心在鬢彫零太白春日行曰深宮高楼入紫清按上皇玉帝吟玉清之隠書曰上景發晨暉金霄欎紫清翰林志云時以居翰苑者謂凌玉清遡紫霄漢書蕭望之賛曰望之堂堂折而不撓歐公表曰風霜所廹鬚髪凋殘江沙踏破青鞋底郤結絲絇侍禁庭寒山子詩浪行朱雀門踏破麻鞋底杜詩青鞋布韈從此始周禮屢人注曰屨有絇有繶有純者餙也絇謂之拘著舄屢之頭以為行戒按經筵中皆繫絲鞋故云胷蟠萬巻夜光寒筆倒三江硯滴乾言筆力有餘傾倒三江之水不足以供其翰墨如漢書朱安丗所謂南山之竹不定受我詞也禹貢曰三江既入西京雜記云以玉為研以酒為滴隋書鄭繹傳上令李徳林立作詔書高熲戲謂譯曰筆乾劉禹錫詩莫怪詩成無淚滴盡傾東海也湏乾大似不䝉稽古力只今猶作侍臣冠言其猶未大用後漢桓榮為太子少傅大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也對掌絲綸罷記言職親黄屋傍堯軒絲綸謂中書舍人翰林學士取禮記王言如絲其出如綸之意記言謂起居郎及舍人即古之左右史禮記曰動則左史書之言則右史書之又曰左史記言右史記事東坡自右史遷中書舍人翰林學士相繼子由自左史為舍人唐昭宗時封舜鄉從子渭對掌内外制文選范蔚宗詩黄屋非堯心杜牧之詩几席延堯舜軒墀立禹湯雁行飛上猶回首不受青雲富貴吞劉禹錫寄楊給事詩曰青雲直上無多地郤要斜飛取勢回盧仝月蝕詩奈何萬里光受此呑吐厄樂天名位聊相似郤是初無富貴心只欠小蠻樊素在我知造物愛公深東坡詩云定似香山老居士世緣終淺道根深自注曰出處老少大畧似樂天雲溪友議載樂天詩曰櫻桃樊素口掦桞小蠻腰盖其家二姬也再次韻四首隆儒殿閣對横經咫尺清都雨露零春明退朝錄曰隆儒殿在邇英閣後叢竹中謝承後漢書曰董春横經捧手李白上裴長史書曰横經藉書左傳曰天威不違顔咫尺列子曰穆王及化人之宫以為清都紫微釣天廣樂帝之所居雨露見前注詩曰零雨其𪷟又曰零露泥泥見説文星環北極人間無路仰天庭老杜詩南斗避文星史記天官書曰中宮天極星環之匡衛十二星藩臣皆曰紫宫曹子建詩衆星環北辰漢書掦雄觧嘲曰未仰天庭又法言曰仰天庭而知天下之居卑也哉風櫺倒影日光寒堯日當中露正乾退之詩暑夕眠風櫺掦雄甘泉賦曰歴倒影而絶飛梁注云在日月之上日月返從下照故具影倒史記堯紀曰就之如日詩曰湛湛露斯匪陽不晞注云晞乾也諸侯唯天子賜爵肅敬承命有似露見日而晞殿上給扶鳴漢履螭頭簪筆見秦冠兩句皆紀述經筵事給扶謂當時元老簪筆謂左右史退之作韓宏碑曰進見上殿拜跪給扶贊漢書鄭崇傳毎見曵革履哀帝笑曰我識鄭尚書履聲唐百官志云起居郎及舍人若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆即拗處時號螭頭漢書趙充國傳曰張安丗持槖簪筆秦冠見柱後惠文注後漢志法冠一曰柱後執法者服之或謂之獬豸冠此借用耳萬國歸心天不言諸儒爭席異􅎔軒魯論曰天何言哉四時行焉百物生焉又曰天下之民歸心焉後漢戴憑傳光武正旦朝㑹畢令羣臣説經者更相難詰有不通者輙奪其席以益通者慿遂重坐五十餘席荘子曰舍者與之爭席矣異􅎔軒言講道雍容非若軒陛之嚴分也漢書史丹傳曰天子自􅎔軒檻上隤銅丸以擿鼓又晉書輿服志曰􅎔軒大㑹則陳乘輿車輦于殿庭聖功典學形歌頌更覺曹劉不足吞書説命念終始典于學歌頌指二蘇詩曹植劉楨皆魏文帝時文士元稹作老杜墓銘序曰言奪蘇李氣吞曹劉延和西路古槐隂不隔朝宗夙夜心東京記曰崇政殿南有延和殿東坡作延和殿奏新樂賦日邇英傍矚念故老之不來又謝賜御書詩注云邇英閣前有雙槐樛枝屬地如龍形書曰江漢朝宗于海詩云夙夜匪懈以事一人詩意謂講筵親近可傾盡忠赤之心也公有胸中五色線平生補衮用功深杜牧之郡齋獨酌詩曰平生五色線願補舜衣裳退之詩曰用功深者其收名也遠次韻子瞻題郭熙畫秋山郭若虚圖畫見聞誌曰郭熙河陽温人熙寕初為御書院藝學工畫山水寒林黄州逐客未賜環江南江北飽看山元豊二年東坡責受黄州團練副使本州安置史記李斯傳曰乃除逐客之令荀子曰聘人以珪問士以璧召人以瑗絶人以玦反絶以環陶淵明詩飢寒飽所更玉堂臥對郭熙畫發興已在青林間金坡遺事淳化二年十月太宗飛白書玉堂之署賜學士承旨蘇易簡按翰林志時以居翰苑者謂凌玉清遡紫霄亦曰登王署玉堂焉元祐元年秋東坡遷翰林學士老杜詩雲山已發興玉佩仍當歌歐公詩行歌招野叟共歩青雲間郭熙官畫但荒遠短紙曲折開秋晚江村烟外雨腳明歸雁行邉餘疊巘山谷有跋惠崇九塵圖云得意于荒寒平遠亦翰墨之秀也短紙言所畫但小景未畫江南之勝故下句云云漢書李廣傳欲上書報天子曲折老杜詩錦里烟塵外江村八九家又詩雨腳如麻未㫁絶選詩連嶂疊巘崿公劉詩注曰巘小山别于大山也坐思黄柑洞庭霜恨身不如雁隨陽米芾書史曰唐人摸王右軍一帖云奉橘三百顆霜未降未可多得韋應物詩云書後欲題三百顆洞亭更待滿林霜盖謂此也老杜詩君看隨陽雁亦有稲梁謀按書禹貢注曰隨陽之鳥鴻雁之屬熙今頭白有眼力尚能弄筆映窗光孟郊詩傾盖眼中力抄詩過與人歐公詩眼力雖已疲心意殊末倦退之寄盧仝詩徃年弄筆嘲同異謗詞驚衆怪不已韓偓詩窗裏日光飛野馬畫取江南好風日慰此将老鏡中髪江南盖山谷鄉里樂天詩春城好風日退之詩白髪忽滿鏡但熙肯畫寛作程十日五日一水石老杜戲題山水圖歌曰十日畫一水五日畫一石能事不受相促廹王宰始肯留真跡題郭熙山水扇郭熙雖老眼猶明便靣江山取意成漢書張敵傳以便靣拊馬注云若今沙彌所持竹扇一段風烟且千里觧如明月逐人行言扇雖小而畫有風烟千里之勢扇中江山常與人俱如月在天處處皆逄也老杜詩烱如一段清冰出萬壑又詩風烟含越鳥西都賦閭閻且干蘇味道詩曰明月逐人來題惠崇畫扇郭若虚圖畫見聞誌云僧惠崇建陽人工畫鵝雁鷺絲尤工小景善為寒汀烟渚瀟灑虚曠之象惠崇筆下開江靣萬里晴波向落暉梅影横斜人不見鴛鴦相對浴紅衣老杜丹青引曰將軍下筆開生靣向落暉謂曰將暮林逋梅詩曰疎影横斜水清淺暗香浮動月黄昏錢起詩曲終人不見杜牧之齊安後池絶句曰鴛鴦相對浴紅衣山谷意謂此清絶之境人所不到雙鴛擅而有之題鄭防畫夾五首惠崇烟雨歸雁坐我瀟湘洞庭欲喚扁舟歸去故人言是丹青王介甫詩畫史紛紛何足数惠崇晩出吾最許旱雲六月漲林莾移我脩然墮洲渚老杜山水障歌白悄然坐我天姥下耳邉已似聞春猿桞惲詩曰汀洲采白蘋日落江南春洞庭有歸客瀟湘逄故人丹青見前注能作山川遠勢白蘋惟有郭熙欲寫李成驟雨惜無六幅鵝溪南史竟陵王子良之孫賁扇上圖山水咫尺之内便覺萬里為遥郭熙見前注名畫評曰李成營丘人丗業儒能畫山水林木當時稱第一有于曹武惠王第見成山水圖爱之不已作詩曰六幅冰綃挂翠屏危峯疊嶂鬬崢嶸山谷跋郭熙山水曰熙因為蘇才翁家摹六幅李成驟雨從此筆墨大進鵝溪在今潼川畫絹所出徐生脱水雙魚吹沬相看晩圖荘子曰魚不可脱于淵又曰泉涸魚相與處于陸相喣以濕相濡以沬不若相忘于江湖老矣箇中得計作書遠寄江湖山谷記以自况荘子曰于魚得計古樂府曰枯魚過河泣何時復還入作書與魴鱮相教慎出入折葦枯荷共晩紅榴苦竹同時睡鴨不知飄雪寒雀四顧風枝老杜詩菱荷枯折墮風濤荘子曰為之四顧退之竹詩風枝未飄吹露粉先含淚又桞子厚詩風枝散陳葉子母猿號槲葉山南山北危機丗説曰桓公入蜀至三峽中部伍有得猿子者其母緣岸哀號集韻曰槲􅈪木名音縠後漢法真傳曰将在北山之北南山之南矣文選趙景真書曰常恐風波潛駭危機宻發蕭大圜云北山之北棄絶人間南山之南超踰世網丗故誰能樗里彀中皆是由基丗故見後注史記樗里子傳滑稽多智秦人號曰智嚢淮南子説山訓曰楚王有白猿王自射之則摶矢而熙使養由基射之始調弓矯矢未發而猿擁柱號矣荘子曰遊于羿之彀中中央者中地也然而不中者命也戲題十雀捕飛蟲畫扇小蟲心在一啄間得失與世同輕重荘子曰澤雉十歩一啄百歩一飲丹青妙處不可傳輪扁斵輪如此用丗説司馬太傳問謝車騎惠子五車何以無一言入𤣥謝曰當是妙處不傳荘子曰桓公讀書于堂上輪扁斵輪于堂下曰以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之于手而應之于心口不能言有数存焉于其間古之人與其不可傳也死矣然則君之所讀者古人之糟粕巳矣題畫孔雀桄榔暗天蕉葉長終露文章嬰丗網歐陽烱南鄉子曲曰路入南中桄榔葉暗蓼花紅老杜古柏行不露文章丗已驚選詩丗網嬰我身故山桂子落秋風無因雌雄青雲上文選謝靈運詩故山曰巳遠風波豈還時樂天詩注曰杭州天竺寺毎嵗中秋月中有桂子墮玉臺新詠吴邁遠樂府曰可憐雙白鶴雙雙絶塵氛連翩弄光景交頸遊青雲逄羅復逄繳䳄雄一旦分又按李太白白紵詞曰願為天池雙鴛鴦一朝飛去青雲上睡鴨山雞照影空自愛孤鸞舞鏡不作雙博物志曰山雞有美毛自愛其色終日映水自眩則溺死王介甫詩山雞照綠水自愛一何愚異苑曰罽賓國王得一鸞三年不鳴夫人懸鏡照之覩影悲嗚宵中一奮而絶言孤鸞見影以謂其雌乃歌舞庾信詩曰青田樹上一黄鶴相思樹下兩鴛鴦無事教渠更相失不及從來莫作雙天下真成長㑹合兩鳧相倚睡秋江徐陵鴛鴦賦曰山雞映水那相得孤鸞照影不成雙天下真成長㑹合無勝比翼兩鴛鴦山谷非蹈襲者以徐語弱故為㸃竄以示學者爾至其末語用意尤深非徐所及唐人吴融池上雙鳧詩曰可憐翡翆歸雲髻莫羡鴛鴦入畫圖幸是羽毛無取處一生安穏老菰蒲意雖佳而語陋山谷兼用二人之長正如􅎔淮王用郭汾陽部曲一經號令氣色益精明云小鴨小鴨看從筆下生幻法生機全得妙王維畫水墨訣曰春夏秋冬生于筆下樂天書竹詩曰不根而生從意生不筍而成由筆成㮙嚴偈曰非幻成幻法列子曰萬物皆出于機皆入于機注云生于此者或死于彼死于彼者或生于此楞嚴經曰生機全破此借用其字自知力小畏滄波睡起晴沙依晩照老杜小鴨詩翅開遭宿雨力小困滄波又詩前軒䫋晩照題劉将軍雁二首滕王蛺蝶雙穿花東丹胡馬歕胡沙名畫記曰嗣滕王湛然善畫蝴蝶王建宮詞云内中数日無呼喚寫得滕王蛺蝶圖老杜詩穿花蛺蝶深深見劉道醇聖朝名畫評曰古今為蕃馬者亦数胡環得其肉東丹得其骨注云東丹王贊華契丹人郭若虚圖畫見聞誌曰東丹王善畫本國人物鞌馬然而馬尚豊肥筆乏壮氣五代史四夷附錄曰契丹安巴堅攻渤海取其扶餘一城以為東丹國以其長子托雲為東丹王後奔于唐明宗賜其姓為東丹更其名曰慕華後賜姓李名替華工畫頗知書穆天子傳時人歌曰黄之池其馬歕沙皇人威儀案安巴堅舊作阿保機托雲舊作突欲今竝依遼史改祁連将軍一筆雁生不並世俱名家漢書匈奴傳有祁連将軍田廣明又按霍去病傳注曰祁連山即天山也匈奴呼天為祁連今引用以比劉君退之詩曰吾與東野生並世如何復躡二子蹤按史記孔子弟子傳曰孔子皆後之不並丗漢書藝文志云傳齊論者唯王陽名家將軍一矢萬人看雪灑晴空碎羽翰乞與失羣沙宿雁筆間千頃暮江寒言劉君悔其射雁有慈哀不忍之心寓于丹青以見意焉乞字作去聲讀張祜詩萬人齊指處一雁落塞空班固西都賦曰風毛雨血灑野蔽天戰國䇿曰雁從東方來更嬴以虚發而下之曰飛徐者故瘡痛也鳴悲者乆失羣也老杜詩宿雁聚圓沙又詩波濤萬頃堆琉璃題劉将軍鵝箭羽不霑春水籀文時印平沙想見山隂書罷舉羣驅向王家樂天放雁詩云㧞汝翅翎為箭羽大篆盖周宜王時史籀所作談藪吴均詩雁足印黄沙老杜詩平沙列萬幕晉書王羲之傳山隂道士好養鵝羲之求市之道士云為寫道徳經舉羣相贈爾羲之欣然寫畢籠鵝而歸題晁以道雪雁圖飛雪灑蘆如銀箭前雁驚飛後回眄慿誰説與謝𤣥暉莫道澄湖靜如練李太白詩烏棲曲銀箭金壺漏水多此借用又詩觧道澄江靜如練令人長憶謝𤣥暉此反而用之言不若于此景物中道出一句也次韻子瞻題无咎所得與可竹二首粥字韻戲嘲无咎人字韻詠竹十字供籠餅一水試茗粥晉書何曽傳蒸餅上不坼作十字不食朝野僉載曰侯思止食籠餅必令縮葱如肉籠餅即饅頭蔡君謨茶錄曰建安鬬茶以水痕沒先者為負耐乆者為勝故較勝負之説相去一水兩水又云茶古不聞晉宋已降吴人採葉煮之名茗粥忽憶故人來壁間風動竹唐李益竹窗聞風詩開簾風動竹疑是故人來舍前粲戎葵舍後荒苜蓿戎葵見前注漢西域傳漢使采蒲萄苜蓿種歸閩川名士傳薛令之詩曰初曰上團團照見先生盤盤中何所有苜蓿長闌干此郎如竹瘦十飯九不肉晉書王獻之傳此郎管中窺豹東坡詩可使食無肉不可使居無竹無肉令人瘦無竹令人俗地下文夫子風流絶此人能和晩煙色幻出嵗寒身文同字與可妙于墨筆老杜詩地下蘇司業又哭李嶧詩一代風流盡修文地下深傳燈錄七佛偈曰身從無相中受生猶如幻出諸形像馬鬛松成拱鵝溪墨尚新禮記檀弓子夏曰昔者夫子言之曰吾見封之若堂者矣見若坊者矣覆夏屋者矣見若斧者矣從若斧者焉馬鬛封之謂也左傳曰爾墓之木拱矣與可嘗有詩曰擬将一段鵞縘絹掃取寒稍萬尺長鵞溪見前注應懐斵泥手去作主林神斵泥見前注華嚴經世主妙嚴品有十主林神所謂布華如雲生林神及擢幹舒光生芽發耀吉祥淨業垂布燄藏清淨光明可意雷音光香普遍妙光廻曜華果光味主林神論曰主林神是法王子住主力波羅宻明説法如林廣多覆䕃故是法師位也次韻文潛休沐不出二首風塵車馬逐得失兩關心惟有張仲蔚門前蓬藋深仲蔚見前注荘子曰夫逃虚空者藜藋拄乎鼪鼬之徑藋音徒弔反自公及歸沐畢願詩書林詩退食自公晉書魏舒傳叔父衡歎曰舒堪数百户長我願畢矣掦雄長揚賦曰并苞書林墻東作瘦馬萬里氣駸駸張方回家本有山谷自注云文潛喜畫馬周生列子曰伯樂相馬採之于瘦聖人相士取之于疎詩曰載驟駸駸與丗自少味閉關非有心退之詩吾老丗味薄後漢馬援傳曰過是欲少味矣丈選顔延年五君詠曰劉伶善閉關懐情滅聞見文中子或問陶元亮子曰放人也歸去來有避地之心焉五桞先生傳則㡬于閉闗矣注謂閉關以喻藏身也戎葵一笑粲露井百尺深上句並見前注古詩曰桃生露井上盧仝詩轆轤無繩井百尺著書灑風雨枯筆束如林老杜詩筆落驚風雨又詩丗亂㦸如林蘇公歎妙墨逼人太駸駸法帖衛夫人書云衛有弟子王逸少甚能學衛真書咄咄逼人筆勢洞精字體道媚南史王僧䖍傳子敬謂中令云弟書如騎騾駸駸常欲度驊騮前奉同子瞻韻寄定國風雲開古鏡淮海熨冰紈退之詩長安雨洗新秋出極目古鏡開塵函言天宇開明也書曰淮海惟揚州定國時為揚倅謝朓詩澄江静如練樂天繚綾詩曰金斗熨波刀剪紋漢書地理志曰齊地織作冰紈王孫醉短舞羅襪歩微瀾楚辭曰王孫遊兮不歸陶岳零陵記曰長沙定王入朝于上前自為短舞曰臣國小地狹不足回旋曹子建洛神賦曰凌波微歩羅襪生塵老驥心雖在白鷗盟巳寒魏武帝歌曰老驥伏櫪志在千里烈士暮年壮心不已文選謝朓詩翻浪揚白鷗列子曰海上有人好鷗鳥者旦而之海上從鷗鳥遊鷗鳥至者百数其父曰吾聞鷗從汝游試取來吾從玩之曰諾明旦之海上鷗鳥舞而不下文選江文通雜體詩曰亹亹𤣥思清胷中去機巧物我俱忘懐可以狎鷗鳥而李白鳴臯歌曰白鷗兮飛來長與君兮相親山谷詩諸多用此意左傳曰盟若可尋亦可寒也斯人氣金玉視丗一䑕肝漢書天文志曰下有積泉金寳上皆有氣不可不察地鏡圖曰黄金氣赤黄千萬斤以上光大若鏡盤禮記曰君子于玉比徳焉氣如白虹天也荘子曰偉哉造化將以汝為䑕肝乎以汝為蟲臂乎南歸脱蟲蠱入對隨孔鸞退之永貞行曰蠱蟲羣飛夜撲燈又和張十一憶昨行曰踐蛇茹蠱不擇死忽有飛詔從天來又詩明庭集孔鸞曷取于鳧鷖按司馬相如上林賦曰道孔鸞促鵕儀又按山海大荒南經曰南方有鸞鳥有翆鳥有孔鳥注云孔雀也忽以口語去鼓船下驚湍東坡以十科薦定國其後言者謂定國諂事東坡遂自宗正丞出倅揚州事具東坡奏議漢書司馬遷傳曰僕以口語遇遭此禍文選禇淵碑曰鼓棹則滄波振蕩潘安仁詩驚湍激巖阿収身薄冰釋置枕泰山安退之詩收身歸關東期不到死迷詩曰如履薄冰老子曰渙若冰将釋楚辭曰故高枕而自適漢書枚乘傅曰易于反掌安于㤗山后土花藥麗海門天水寛王禹偁瓊花詩序云揚州后土庙有花一株潔白可爱俗謂之瓊花東坡樂府云后土祠中玉橤蓬萊殿後鞓紅淵明時運詩云花藥分列此借用張舜民南遷錄云潤州甘露寺東眺海門北見揚州退之詩天水漭相圍伐木思我友知人良獨難伐木詩見小雅知人見臯陶謨晉書桓伊傳撫筝歌怨詩曰為君既不易為臣良獨難盖曹子建所作遙憐鬚鬢綠猶復耐悲歡孟郊詩酒人皆倚春鬢綠病叟獨藏秋髪白文選任彦昇詩悲歡不自持次韻王定國揚州見寄清洛思君晝夜流北歸何日片帆収未生白髪猶堪酒垂上青雲卻佐州神廟元豊中導洛水入汴河謂之清汴揚州水所過之地也詩意謂相思之心與水無極盧仝聞貶韓職方有感詩曰力小垂垂上天高又不登飛雪堆盤鱠魚腹明珠論斗煑雞頭老杜設鱠歌曰無聲細下飛碎雪有骨已剁觜春葱徧勸腹腴愧年少軟炊香飯緣老翁落碪何曽白紙濕放筯未覺金盤空退之詩火齊磊落堆金盤本草雞頭寔一名芡圖經曰其形類雞頭故以名之劉夢得泰娘歌曰斗量明珠鳥傳意樂天詩夜船論鋪賃平生行樂自不惡豈有竹西歌吹愁行樂不惡皆見前注杜牧之詩斜陽竹西路歌吹是揚州徃歳過廣陵値早春嘗作詩云春風十里珠簾捲髣髴三生杜牧之紅藥梢頭初繭栗揚州風物鬢成絲今春有自淮南來者道揚州事戲以前韻寄王定國二首杜牧之贈别詩娉娉嫋嫋十三餘荳䓻梢頭二月初春風十里揚州過巻上珠簾總不如又有詩云觥船一棹百分空十載青春不負公今日鬚絲禅榻畔茶烟悠颺落花中紅藥謂掦州芍藥禮記王制曰祭天地之牛負繭栗此借用以言花苞之小末句謂風物如此惜其身之老也淮南二十四橋月馬上時時夢見之揚州屬淮南杜牧之寄揚州韓判官詩曰二十四橋明月夜玉人何處教吹簫文選樂府曰逺道不可思夙昔夢何之想得揚州醉年少正圍紅䄂寫烏絲醉年少謂定國開元天寳遺事曰申王冬月令宮女宻圍而坐謂之妓圍異聞集霍小玉傳云取朱絡縫繡嚢中出越姬烏絲欄素段三尺以授李生生素多才思援筆成章日邊置論誠深矣聖處時中乃得之言不必求入帝城第曰飲無何可也劉昭幼童傳曰晉明帝紹元帝子元帝問長安何如日遠答曰日遠不聞人從日邉來只聞人從長安來居然可知帝異之明日又以日為近帝問何故答曰舉頭不見長安只見日以是知近置論謂置而不論荘子曰言之淺矣不言深矣魏志徐邈傳趙逹問以曺事邈曰中聖人逹言之太祖太祖甚怒鮮于輔進曰平日醉客謂清者為聖人濁者為賢人邈性修慎偶醉言耳後文帝幸許昌問邈曰頗復中聖人否邈對曰時復中之帝大笑退之詩不到聖處寕非癡孟子曰以意逆志是為得之莫作秋蟲促機杼貧家能有㡬絇絲欲其緩于追科也王介甫促織詩只向貧家促機杼㡬家能有一絇絲次韻錢穆父贈松扇穆父名勰按本傳元豐七年使高麗松扇盖奉使時所得王雲鷄林誌云高麗松扇揭松膚柔者緝成文如㯶心亦染紅間之或言水桞皮也銀鉤玉唾明蠒紙松箑輕凉并送似銀鈎見前注太白詩欬唾落九天隨風生珠玉法書要錄王羲之蘭亭序用蠶繭紙䑕鬚茟揚雄方言曰扇自闗而東謂之箑退之誰氏子詩曰寫吾此詩持送似可憐遠度幘溝婁魏志東夷傳曰高句麗漢時賜鼓吹伎人常從𤣥菟郡受朝服衣幘高句麗令主其名籍後稍驕恣不復詣郡子東界築小城置朝服衣幘其中歳時來取之今猶名此城為幘溝婁溝婁者句麗名城也適堪今時褦襶子初學記載程曉伏曰詩云今丗褦襶子觸熱到人家搖扇臂中疼流汗正滂沱李白贈玉屋山人魏萬詩亦云五方遺我語知非儓儗人按儓儗謂癡人而褦襶謂不曉事人褦音耐襶音戴見集韻此句山谷以自通文人玉立氣高寒文選桓温薦譙元彦表曰抗節王立誓不降辱退之作劉統軍墓銘曰仍丗北邊樂其高寒三韓持節見神山使高麗必從海道通典曰馬韓後漢時通焉有三種一曰馬韓二曰辰韓三曰弁韓其後皆為百濟新羅所并史記封禅書曰自威宣燕昭使人入焉求蓬萊方丈瀛洲此三神山者其傳在海中諸仙人及不死之藥皆在焉合得安期不死藥使我蝉蜕塵埃間薛能曰頼有詩情合得嘗封禅書又云李少言君上曰臣嘗逰海上見安期生後漢書逸民傳曰蝉蜕囂埃之中按史記屈原傳曰蝉蜕于濁穢退之詩未免捶楚塵埃間戲和文潛謝穆父松扇猩毛束筆魚網紙松柎織扇清相似山谷有猩毛筆詩盖亦穆父高麗所得雞林志云高麗楮紙光白可爱號曰白硾紙博物志曰漢桓帝時蔡倫始𢷬魚網造紙此借用柎當作杮説文削木札撲者也音芳廢反動搖懐袖風雨來想見僧前落松子文選班媫妤怨歌行曰出入君懐䄂動搖微風發老杜雙松圖歌曰葉裏松子僧前落張侯哦詩松韻寒六月火雲蒸肉山謂詩雖清寒如松風之韻而體則肥熱如肉山之蒸退之藍田丞㕔壁記曰對樹兩松日哦其問此因松扇故及之初學記載盧思道納凉賦曰火雲赫而四舉楞嚴經曰為綻為爛為大肉山有百千眼無量咂食文潛頗肥故山谷詩有雖肥如瓠壺陳后山詩有詩人要瘦君則肥之句傳燈錄載一通判禮一僧問宗旨僧曰不要你肉山倒地持贈小君聊一笑不湏射雉彀黄間戲謂文潛之肥如賈大夫之陋漢書東方朔傳歸遺細君注曰朔自比于諸侯謂其妻曰小君左傳曰昔賈大夫惡取妻三年不言不笑御以如臯射雉獲之其妻始笑文選潘安仁射雉賦曰捧黄間以宻彀注云黄間弩名謝鄭閎中惠高麗畫扇二首閎中名穆雞林志云高麗疊紙為扇銅獸靨環加以銀餙亦有畫人物者㑹稽内史三韓扇分送黄門畫省中晉書王述王羲之皆為㑹稽内史按職官志諸王國以内史掌太守之任此引用以屬閎中閎中元豊三年守越州告老元祐初入為國子祭酒事具寔錄夲傳越州即會稽也三韓見前注晉志曰給事黄門侍郎與侍中俱管門下衆事或謂之門下省蔡質漢官典職曰尚書省中皆以胡粉塗壁畫古賢烈女此借用按寔錄元祐五年十月詔移祕書省國史案就現今置局處専掌國史寔錄編修曰厯以國史院為名隸門下省山谷時為史官故云海外人烟來眼界全勝博物注魚蟲文選曹子建詩千里無人烟心經曰乃至無眼界退之詩爾雅注蟲魚定非磊落人蘋汀遊女能騎馬傳道蛾眉畫不如詠扇中所畫如此桞惲詩汀洲採白蘋碩人詩曰螓首蛾眉王介甫詩眉目分明畫不如寳扇真成集陳隼史臣今得殺青書陳隼見前注劉向戰國䇿叙曰皆定以殺青書可繕寫應劭風俗通按劉向别錄曰殺青者直用青竹簡書耳山谷内集詩注巻七
