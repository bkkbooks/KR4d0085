body:
  text: 山谷內集詩注卷十八宋黃庭堅撰任淵注夢中和觴字韻并序崇寧二年正月己丑夢東坡先生于寒溪西山之間豫誦寄元明觴字韻詩數篇東坡笑曰公詩更進于曩時因和豫一篇語意清竒豫擊節賞歎東坡亦自喜于九曲嶺道中連誦數過遂得之天教兄弟各異方不使新年對舉觴退之送李正字序曰得燕而舉一觴此天也非人力也文選李陵答蘇武書曰異方之樂祗令人悲又劉琨書云時復相與舉觴對膝作雲作雨手翻覆得馬失馬心清凉老杜詩翻手作雲覆手雨紛紛輕薄何須數淮南子曰近塞上之人有善術者馬無故亡而入胡人皆弔之其父曰此何遽不為福乎居數月其馬將胡駿馬而歸人皆賀之其父曰何遽不能為禍乎冢富良馬其子好騎墮而折其髀人皆弔之其父曰何遽不為福乎居一年胡人入塞丁壯死者十九此獨以跛之故父子相保仙人遏末曲曰獨來勿與競事過心清凉何處胡椒八百斛誰家金叉十二行唐書元載傳籍其家胡椒至八百石樂府梁武帝河中之水歌曰河中之水向東流洛陽女兒名莫愁頭上金叉十二行足下絲履五文章蓋言其首飾之盛爾而白樂天酬牛思黯戲贈詩有鐘乳三千兩金叉十二行之句注言思黯之妓頗多與樂府意異云一丘一壑可曵尾三沐三舋取刳腸晉書謝鯤傳或問論者以君方庾亮何如答曰端委廟堂使百僚準則鯤不如亮一丘一壑自謂過之曵尾見前注齊語曰莊公束縛管仲以豫齊使齊使受之而退比至三舋三浴之桓公親迎之于郊注云以香塗身曰舋亦或謂薰此借用以言墮于世網也按史記龜䇿傳宋元王二年江使神龜使于河漁者豫且得之元王刑白雉驪羊以血灌龜于壇中史以刀剝之橫其腹莊子曰神龜知能七十二鑽而無遺䇿而不能避刳腸之患次韻吳可權題餘干縣白雲亭餘干今隸饒州曩誰築孤亭勝日有感遇永懷劉隨州因榜白雲句遺老不能談嵗月忽成屢緑陰斤斧盡華屋風雨仆勝日見衛玠傳其前注文選江淹擬盧諶詩曰羈旅去舊鄉感遇喻琴瑟唐書陳子昻傳為感遇詩三十八章文選陸機辨亡論曰招攬遺老唐人劉長卿字文房嘗為隨州刺史其集有云同姜濬題裴式微餘干東齊亭詩八韻其首章四句云世事終成夢生涯欲半過白雲心己矣滄海意如何曹子建詩生存華屋處零落歸山丘吳侯七閩英宰縣有真趣七閩見前注謂福建也退之詩出宰山水縣選詩悠悠藴真趣弦歌解民慍根節去吏蠧魯論曰子之武城聞絃歌之聲注云子游為武城宰帝王世紀曰舜彈五絃琴歌南風詩曰南風之薰兮可以解吾民之慍兮退之鄆州溪堂詩曰孰為邦蝥節根之螟又祭馬總文曰去其螟蠧材收佛宫餘工有子來助靈臺詩曰經始勿亟庶民子來厦成燕雀賀水滿鳧鴈翥淮南子曰大厦成而燕雀相賀文選沈休文詩曰白水滿春塘旅雁每回翔劉公幹詩曰方塘含白水中有鳬與雁曹子建七啓曰翔爾鴻翥濈然鳬沒四海名士來一笑佳客聚老杜宴歷下亭詩曰海右此亭古濟南名士多雲興碧山留雨散清江去斯須成蒼狗皆道不如故雲之或留或去其狀如山與江也老杜詩天上浮雲似白衣斯須改變如蒼狗古樂府曰持縑來比素新人不如故至人觀萬物誰有安立處萬物虗幻皆如浮雲之無根也傳燈録天台語曰至人以是獨照能為萬物之主圓覺經曰見聞覺知無處安立寄語吳令君但遣糟牀注老杜詩賴知禾黍收巳覺糟牀注次韻廖明略同吳明府白雲亭宴集廖正一字明略安陸人元祐中召試館職東坡大竒之俄除正字紹聖初貶州信州玉山監稅有詩文號曰白雲集白雲亭在饒餘于縣江靜明花竹山空響管絃謝朓詩澄江淨如練老杜詩山扉花竹幽後漢書皇甫規等贊曰谷靜山空古樂府孔稚圭白紵歌曰山虗弓響徹漢書曰鐘鼓管絃之音未衰風生學士塵雲繞令君筵學士謂廖明略令君謂吳明府太白詩山閒明鏡轉雲繞畫屏移又云作詩掉我驚逸興白雲繞筆窗前飛百越餘生聚三吳逺接連輿地記曰饒州餘干縣即干越之地漢書賈誼過秦論南取百越之地地理志臣瓉注曰自交趾至㑹稽七八千里百越雜處各有種姓通典曰吳郡與吳興丹陽為三吳左傳伍員曰越十年生聚而十年教訓退之詩周楚仍連接老杜詩野水春來更接連庖霜刀落繪執玉酒明船上句舊作鱠魴刀落雪韓孟城南聮句曰庖霜鱠鮮鯽曲禮曰執玉不趨船謂玉酒船老杜詩月朗自明船此借用葉縣飛來舄壺公謫處天上句以屬吳下句以屬廖選詩王喬飛鳬舄按後漢王喬傳顯宗世為葉令每月朔嘗自縣詣臺帝令太史伺望之言其臨至輒有雙鳬從東南飛來于是候鳬至舉羅張之但得一隻履焉則所賜尚書官屬履也又費長房傳曰市中有老翁賣藥懸一壺于肆翁乃與長房俱入壺中惟見玉堂嚴麗㫖酒甘肴盈衍其中太白詩壺中别有日月天酌時多暴謔舞短更成姸漢書蓋寬饒曰毋多酌我左太冲吳都賦云鄱陽暴謔蓋取詩所謂善戲謔兮不為虐兮之意鄱陽今饒州陶嶽零陵記曰長沙王發于上前自為短舞人笑其拙選詩曰皎潔不成姸惟我孤登覽觀詩未究宣空餘五字賞文似兩京然謂觀明略詩未能究景物之詳然歎賞其五字律如兩漢蘇李曹劉之作也漢書儒林傳序曰小吏淺聞未能究宣後漢書張衡傳擬班固兩都作二京賦孟子曰夫道若大路然醫是肱三折官當嵗九遷肱三折見前注言經憂患之多退之上張僕射書曰一嵗九遷其官老夫看鏡罷衰白敢爭先老杜詩勳業頻看鏡又詩衰白已光輝病來十日不舉酒二首病來十日不舉酒回施青春與後生滿袖東風愜人意見君詩與字俱清王羲之帖云官奴小女玉潤病來十餘日了不令民知回施蓋用佛家語楊凝式詩無限歡娛榮樂事一時回施少年人劉禹錫詩分付鶯花與後生老杜詩幽意忽不愜病來十日不舉酒獨卧南牀春草生承君折送袁家紫令我興發郎官清南史謝惠連族兄靈運嘗于永嘉西堂思詩忽夢見惠連即得池塘生春草袁家紫當是牡丹名郎官清蓋酒名國史補云酒則京城之郎官清題小景扇草色青青栁色黃桃花零落杏花香春風不解吹愁却春日偏能惹恨長文選古詩青青河畔草太白詩栁色黃金嫩鄂州南樓書事四首四顧山光接水光憑欄十里芰荷香清風明月無人管併作南樓一味凉莊子曰為之四顧為之躊躇常建詩山光悅鳥性退之詩曲江荷花蓋十里太平廣記鬼詩明月清風良宵㑹同歐陽公詩惟有清秋一味凉畫閣傳觴容十客透風透月兩明軒南樓槃礴三百尺天上雲居不足言文選郭璞江賦曰荆門閟竦而槃礴李善注曰廣大貌退之詩火燒水轉掃地空突兀便髙三百尺江南諺曰天上雲居地上歸宗蓋雲居在山之絶頂舊屬洪州今屬南康軍勢壓湖南可長雄胸吞雲夢略從容北船未嘗覩巨麗復閣重樓天際逢前漢鮑宣傳曰上黨少豪俊易長雄退之祭鱷魚文亦曰爭為長雄胸吞雲夢見前注子虛賦曰君未覩夫巨麗也文選景福殿賦曰復閣重闈謝朓詩天際識歸舟武昌參佐幕中畫我亦來追六月凉老子平生殊不淺諸君少住對胡牀武昌蓋用庾亮事見前注世說注劉𢎞謂陶侃曰吾昔為羊太傅參佐文選謝宣逺詩曰婉婉幕中畫後漢仲長統傳曰濯清水追凉風老杜詩憶昔好追凉故繞池邊樹南樓畫閣觀方公悅二小詩戲次韻十年華屋網蛛塵大斾重來一日新五鳯樓前修造手箇中餘刃亦精神華屋見前注張協雜詩曰蜘蛛網四屋楊文公談苑曰韓浦韓洎咸有詞學洎意嘗輕浦謂人曰吾兄為文譬繩樞草舍吾之為文是造五鳯樓手莊子曰恢恢然其于游刃必有餘地者矣重山復氷繞深幽不見髙賢獨倚樓手拂壁間留恨句凌波微步有人愁老杜詩不見髙人王右丞又詩行藏獨倚樓洛神賦曰凌波微步羅襪生塵李太白樂府云有人樓上愁庭堅以去嵗九月至鄂登南樓歎其制作之美成長句久欲寄逺因循至今書呈公悅江東湖北行畫圖鄂州南樓天下無老杜詩閬州城南天下稀髙明廣深勢抱合表裏江山來畫閣左傳曰表裏山河必無害也筆談載盧宗回慈恩塔詩曰百二山河表裏觀雪筵披襟夏簟寒胸吞雲夢何足言言冬暖而夏凉也雪筵用文選謝惠連雪賦意宋玉風賦曰有風颯然而至王乃披襟而當之曰快哉此風江文通别賦曰夏簟清兮盡不暮漢書司馬相如傳曰吞若雲夢者八九于其胸中曽不蒂芥庾公風流冷似鐵誰其繼之方公悅晉書庾亮傳在武昌諸佐史乘秋夜共登南樓亮至諸人將起避之亮曰諸君少住老子在此處興復不淺更據胡牀談詠老杜詩布衾多年泠似鐵左傳曰子産而死誰其嗣之公悅名澤養鬬雞崢嶸已介季氏甲更以黃金飾兩戈左傳曰季郈之雞鬬季氏介其雞郈氏為之金距注云搗芥子播其羽也或曰以膠沙播之為介雞韓孟鬬雞聮句曰崢嶸顛盛氣洗刷凝鮮綵既取冠為胄復以距為鐓雖有英心甘鬬死其如紀渻木雞何韓孟鬬雞聮句曰英心甘鬬死義肉恥庖宰列子曰紀渻子為周宣王養鬬雞十日而問雞可鬬乎曰未也方虗驕而恃氣十日又問之曰未也猶疾視而盛氣卞日又問之曰幾矣雞雖有鳴者已無變矣望之似木雞矣異雞無敢應者反走耳顔徒貧樂齊二首顔徒姓黃名友顔侍御史昭之第三子山谷有手帖叙宗盟之好衡門低首過環堵容膝坐詩云衡門之下可以棲遲注云衡門橫木為門言淺陋也禮記曰儒有一畝之宫環堵之室韓詩外傳北郭先生妻曰結駟列騎所安不過容膝淵明歸去來詞審容膝之易安四旁無給侍百納自纒裹考工記曰夏后氏世室四旁兩夾窗維摩經曰文殊師利言居士此室何以空無侍者維摩詰言諸佛國土亦復皆空涅槃經佛告文殊汝已朽邁當須使人云何方欲為我給侍樂天詩百納頭陀任運僧論事直如絃觀書曲肱卧後漢五行志順帝之末京都童謡曰直如絃死道邊曲如鈎反封侯曲肱見魯論饑來或乞食有道無不可飢而乞食如陶淵明之徒不害其真也淵明有乞食詩曰飢來驅我去不知竟何之列子曰子列子窮容貌有飢色客有言之鄭子陽者曰列禦冦蓋有道之士也子陽遺之粟子列子再拜而辭孔子曰我則異于是無可無不可小山作友朋義重子輿桑盧同詩草石是親情此句頗采其意莊子曰子輿與子桑友而淋雨十日子輿曰子桑殆病矣裹飯而往食之香草當姬妾不須珠翠妝王逸離騷序曰善鳥香草以配忠貞樂天詩緑桂為佳客紅蕉當美人曹子建七啓曰山鵽斥鷃珠翠之珍鳥烏窺凍硯星月入幽房左傳曰鳥烏之聲樂鄭谷燕詩曰閒凡硯中窺水淺落花徑裏得泥香文選陸機詩安寢北堂下明月入我牖潘安仁哀永逝文曰撫靈櫬兮訣幽房退之詩幽房無人感蛜蝛此借用兒報無炊米浩歌繞屋梁舊唐書韓愈傳雖晨炊不給怡然不介意老杜詩長歌激屋梁按列子曰韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶此借用以言能傲貧賤也楚詞九歌曰臨風恍兮浩歌宋玉神女賦曰耀乎若白日初出照屋梁和凉軒二首打荷看急雨吞月任行雲夜半蚊雷起西風為解紛梁元帝與武陵書曰聚蚊成雷史記滑稽傳曰談言微中可以解紛茗碗夢中覺荷花鏡裏香凉生只當處暑退亦無方退之詩平鋪紅渠蓋明鏡楞嚴經曰當處出生隨處滅盡雄摩經曰來者無所從來去者無所至易曰神無方易無體題默軒和遵老平生三業淨在俗亦超然佛事一盂飯橫眠不學禪攝論云菩薩戒以身口意三業為體老子曰雖有榮觀燕處超然傳燈録大安禪師傳曰安在溈山三十年喫溈山飯不學溈山禪慈明和尚因事頌曰時來開鉢展巾單飯了收盂困即眠松風佳客共茶夢小僧圓傳燈録溈山謂仰山曰我適來得一夢汝試為我原看仰山取一盆水與師洗面少頃香嚴乃㸃一碗茶來師云二子見解過于鶖子原夢或作圓夢按南唐近事馮僎舉進士時有徐文幼能圓夢云云漫續山家頌非詩莫浪傳老杜詩將詩莫浪傳次韻文安國紀夢蘇子由欒城後集第一卷亦載此詩但更其題云贈姚道人當細考之道人偶許俗人知法喜非妻解養兒法喜見前注夜久金莖添沆瀣室虛璧月映琉璃班固西都賦曰抗仙掌以承露擢雙笠之金莖楚辭曰餐六氣而飲沆瀣兮嗽正陽而食朝霞大人賦注云北方夜半氣也室虛及壁月並見前注楞嚴經曰反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等逺來醉俠匆匆去近出詩仙句句竒獨怪區區踐繩墨相逢未省角巾攲醉俠詩仙似指吕洞賓後漢郭泰傳嘗行遇雨巾一角墊老杜詩數語攲紗帽寄賀方回賀鑄字方回少為武吏換文資善長短句少游醉卧古藤下誰與愁眉唱一杯解作江南斷腸句只今惟有賀方回秦少游好事近曲曰醉卧古藤陰下了不知南北賀方回青玉案曲曰彩筆新題斷腸句兩曲皆知名于世時少游巳死矣文安國挽詞二首文勛字安國七閩家舉子百粵海還珠七閩百粵皆見前注魏志鄭渾傳遷邵陵令民生子率皆不舉渾重去子之法民畏罪無不舉贍所育男女多以鄭為字後漢書孟嘗傳遷合浦太守海出珠寶先時宰守貪穢珠遂潜徙交趾嘗到官草易前弊曾未踰嵗去珠復還往日推忠厚窮年領轉輸莊子曰所以窮年也此備用漢書主父偃傳曰天下飛芻挽粟轉輸北河一牀遺杖屨萬事委錙銖遺杖屨言其但有虛座曲禮曰君子缺伸撰杖屨委錙銖言輕視之也禮記儒行曰雖分國如錙銖注曰言君分國以祿之視之輕如錙銖矣八兩曰錙十絫曰銖案說文錙六銖也宜以為正豈有蒼茫恨歸巢未拮据退之孤獨申叔哀詞曰衆萬之生誰非天耶胡喜厚其所薄而常不足于賢耶枊蒼茫無端而暫寓于其間耶此引用以言安國樂天委命不復恨造物之渺茫所遺憾者獨未有家為終焉之計爾鴟梟詩曰豫手拮据豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家注云拮据撠挶也言作之至苦故能攻堅平生翰墨學空走使臣車安國善小篆詩曰皇皇者華君遣使臣也瞿令能蒼史歸公好古書元次山陽華嚴銘序曰江華縣大夫瞿令問藝兼篆籀併依石經刋之法書苑曰古文篆者黃帝史蒼頡所作退之科斗書後記曰愈為四門博士識歸公歸公好古書能通之按歸公名登唐書有傳秦山刋日月周鼓頌畋漁按史記秦始皇紀二十八年刻石泰山及琅邪臺二十八年刻石之罘三十七年刻石㑹稽皆李斯篆石鼓舊在鳯翔府孔子廟世傳以為周宣王鼓其詞曰我車既攻我馬既同又云其魚為何維鱮與鯉何以貫之維楊與桞易繫詞曰以佃以漁不見龍蛇筆新乾研滴蜍龍蛇筆見前注西京雜記廣川王去疾發袁盎冢得玉蟾蜍一枚腹空容五合水王取以盛書滴鄂州節推陳榮緒惠示沿檄崇陽道中六詩老懶不能追韻輒自取韻奉和頭陀寺頭陀全盛時宫殿梯空級頭陀義見前注退之詩梯空上秋旻城中望金碧雲外僧􅋾􅋾魯宗道詩殿古寒爐空流塵暗金碧前人詩云頭陀雲外僧氣多􅋾􅋾見前注人亡經禪盡屋破龍象泣荀子曰其器存其人亡文選陸機演連珠云道繫于神人亡則滅圭峯禪師禪原集序曰經是佛語禪是佛意退之詩破屋數間而巳矣智度論曰龍象言其力大龍水行中力大象陸行中力大維摩經曰龍象蹴踏非驢所堪今以負荷大法者比之龍象傳燈録逹磨傳曰波羅提法中龍象老杜山寺詩如聞龍象泣足今信者衰惟有簡栖碑文字巋然立文選有王簡栖頭陀寺碑注引姓氏英賢録曰王􅋄字簡栖碑在鄂州題云齊國録事參軍琅邪王􅋄製文選王文考靈光殿賦序曰自西京未央建章之殿皆見隳壤而靈光巋然獨存李善注云巋然髙大堅固貌音期軌切道中聞松聲蟠空作風雨發地鳴鼓吹老杜四松詩曰勿矜千載後慘淡蟠穹蒼後漢公孫瓉傳曰梯衝舞吾樓上鼓角鳴于地中東坡殘臘獨出詩云風松獨不靜送我作鼓吹以松聲作鼓吹非得幽隱之趣者果能道此耶日晴四無人聲在髙林際退之履霜操曰四無人聲誰與兒語歐陽公秋聲賦四無人聲聲在樹間意蓋類此伊優兒女語蹇淺市井議言二者皆不足聽伊優見前注退之詩昵昵兒女語莊子曰弊精神于蹇淺楊子曰市井相與言則以財與利張平子西京賦曰街談巷議我欲抱七絃寫此以卒嵗琴有風入松曲文選嵇康書抱琴行吟弋釣草野歐陽公詩携琴寫幽泉詩曰優哉游哉聊以卒嵗中秋山行懷子興節判俗物常堛塞令人眼生白俗物見前注退之南山詩曰堛塞生怐愗晉書阮籍傳能為青白眼見禮俗之士以白眼對之莊子曰虛室生白此借用永懷洛陽人談詩論畫壁洛陽當是榮緒鄉里賈誼傳曰洛陽之人年少初學青山吐秋月阻作南樓客老杜詩四更山吐月殘夜水明樓鄂州有南樓蓋因瘦亮故事但歌靡盬詩賞此無瑕璧北山詩序曰巳勞于從事不得養其父母詩曰王事靡盬憂我父母南史陳後主沈后附傳曰其玉樹後庭花等其略云璧月夜夜滿瓊枝朝朝新史記藺相如傳曰璧有瑕請指示王此反而用之以言月也再登蓮落嶺懷君澤知録邑下羹不和幕中往調護左傳曰和如羹焉宰夫和之齊之以味濟其不及以泄其過漢書張良傳曰煩公幸卒調護太子紛爭非士則各使捐細故退之詩初喧或紛爭中靜雜嘲戲郭有道作陳太丘碑曰言為世範行為士則老杜詩深𠂻見士則又云記憶細故非髙賢按漢書胸奴傳文帝詔曰皆捐細故俱蹈大道頗憶郗參軍能令公喜怒晉書郗超傳桓溫辟王珣為主簿超為參軍荆人語曰髯參軍短主簿能令公喜能令公怒此引用以指君澤應知鞅掌車厯盡崔嵬路北山詩曰或棲遲偃仰或王事鞅掌傳曰鞅掌失容也箋云鞅猶荷也掌謂捧之也負荷捧持以趨走言促遽也卷耳詩曰陟彼崔嵬我馬虺隤崇陽道中崇陽縣𨽻鄂州張公少為令愍俗有遺書張詠字復之嘗為崇陽令梁書司馬相如傳家無遺書左販洞庭橘右擔彭蠡魚左傳曰三苗氏之國左洞庭右彭蠡歌奔中夜女歸抱十年雛元注云借一韻近嵗多儒學仁風似有初言風俗之美自張公始也檀弓曰夫魯有初晚發咸寧行松徑至蘆子咸寧走蘆子終日喬木陰太丘心灑落古松韻清深聊持不俗耳靜聽無絃琴後漢陳實為太邱長此引用以比榮緒文選江文通雜體詩曰五難既灑落超迹絶塵網無絃琴見前注非今胡部律而獨可人心唐書樂志開元二十四年升胡部于堂上又詔道調法曲與胡部新聲合作大方便報恩經曰善友太子善巧禪琴其音和雅悅可衆心悉得充足退之王適墓志曰惟此翁可人意陳榮緒惠示之字韻詩推奬過實非所敢當輒次髙韻三首紛紛不可耐君子有憂之老杜詩紛紛輕薄何須數梁武帝評書曰王子敬書如河朔少年舉體㳫拖而不可耐孟子曰聖人猶憂之按山谷前和榮緒詩有云邑下羹不和幕中往調護紛爭非士則各使捐細故此詩亦指其事鞅掌誠莊語賢勞似怨詩北山詩曰或王事鞅掌其詳見前注又曰大夫不均我從事獨賢注云賢勞也莊子曰以天下為沉濁不可與莊語魯論曰詩可以怨晉書桓伊傳撫箏而歌怨詩頽波閲砥柱濁水得摩尼元注曰杜子美云唯有摩尼珠可照濁水源砥柱見前注上句言獨立不改下句言心地圓明知我無枝葉刳心只有皮見前次韻楊明叔古詩注但其意微異退之枯樹詩曰老樹無枝葉風霜不復侵腹穿人可過皮剝蟻還尋太丘胸量濶一葦莫杭之後漢陳實傳曰天下服其德後除太丘長許劭傳曰太丘道廣廣則難周詩曰誰謂河廣一葦杭之此借用蓋取黃叔度汪汪如千頃陂之意萬事不掛眼四愁猶有詩退之詩吾老嗜讀書餘事不掛眼文選張衡四愁詩序曰陽嘉中出為河間相天下漸弊鬱鬱不得志為四愁詩狀閒聊闒葺心潔似毗尼原注云僧律也漢司馬遷書曰在闒葺之中注云闒下也葺細毛也言非豪楚也佛氏以修多羅為經毗尼為律阿比曇為論皆梵語也早晚同舟去煙波學子皮唐書張志和自號為煙波釣徒史記貨殖傳曰范蠡乘扁舟浮于江湖變名易姓適齊為鴟夷子皮十家有忠信江夏可無之魯論曰十室之邑必有忠信如丘者焉江夏即鄂州榮緒時為幕官政苦寄賣友忽聞衡說詩漢書贊曰天下以酈寄為賣友又匡衡傳諸儒語曰匡說詩解人頥飢䝉青籸飯寒贈紫陀尼原注曰蕃褐籸當作飢按道藏青虛真人王君傳載太極真人青精乾石飢飯上仙靈方云服之使人顔童聰明延年無病按道藏經音義云籸音信又音峻亦作飢字酬報矜難巧深慙陵與皮原注云再和之字非以作難得巧為工亦欲見詩之無窮爾退之詩發難得巧意氣粗北夢瑣言皮曰休與陸龜䝉為文友按二人皆能詩有松陵唱和集山谷內集詩注卷十八
