body:
  text: 山谷內集詩注卷五宋黃庭堅撰任淵注司馬文正公挽詞四首元祐開皇極功歸用老成詩曰雖無老成人尚有典刑惟深萬物表不令四時行魏志曹爽傳注引魏氏春秋何晏嘗曰惟深也故能通天下之志夏侯太初有馬按此語本出易繫辭孟郊詩迥出萬物表文選北山移文曰亭亭物表魯論曰其身正不令而行又曰天何言哉四時行焉晉書禇衰傳謝安曰衰雖不言而四時之氣亦備日者傾三接天乎奠兩楹言入對未及遽爾薨謝為可哀也左傳曰日衛不睦注云往日也漢書髙帝紀立吳王詔曰日者荆王兼有其地易晉卦曰晉畫日三按左傳薑氏哭而過市曰天乎仲為不道禮記檀弓子夏曰天乎豫之無罪也檀弓又載孔子曰豫夢坐奠兩楹之間子殆將死也堂堂寧復有埋玉慟佳城東坡祭韓魏公文曰巍巍堂堂寧復有之晉書庾亮傳將葬何充歎曰埋玉樹于土中使人情何能巳西京雜記滕公駕至東都門馬不能前以足跑地滕公使掘地得石椁有銘曰佳城鬱鬱三千里見白日吁嗟滕公居此室國在多艱日人如大雅詩訪落詩曰未堪家多難漢書贊曰夫惟大雅卓爾不羣河間獻王近之矣注謂明哲保身此引用蓋以仲山甫比公非特取明哲保身而巳忠清俱沒世孝友是生知沒世言至死不改哲廟題溫公碑首曰清忠粹德之碑加璧延諸老􅐤弓撫四夷公為宰相招聘諸儒如程頥等自布衣為講讀又戒敕西鄙息事漢書申公傳上使使束帛加璧迎申公詩曰載槖弓矢漢書陳平傳曰宰相外鎮撫四夷諸侯內親附百姓公身與宗社同作太平基謂宗廟社稷之靈相之于幽而公助之于明也南山有臺詩序曰得賢則能為邦家立太平之基獻納無虛日居然迹已陳班固兩都賦序曰日月獻納左傳曰府無虛月三都賦曰居然而辨八方文子曰形之與名居然别矣王羲之蘭亭序曰俯仰之間巳為陳迹清班區玉石寶厯順星辰上言流品不雜下言燮理有方書曰玉石俱焚魯論曰區以别矣堯典曰厯象日月星辰更化思鳴鵙遺書似獲麟漢書董仲書曰更化則可善治豳詩曰七月鳴鵙此引用言以農尋為王業根本遣書謂資治通鑑言可配春秋也春秋左傳序曰佘以為感麟而作作起獲麟則文止于所起易名無異論今代兩三人易名謂作諡檀弓曰請所以易其名者本朝諡文正惟王曽范仲淹及公爾溫公嘗駮夏竦諡云文正諡之至美無以復加雖以周公之才不敢兼取況如竦者豈易充當毁譽蓋棺了於今名實尊言人死則毁譽亦隨而泯獨公死後其名尤重老杜詩文夫蓋棺事始定孟子曰先名實者為人也哀榮有王命終始酌民言朝廷用公于久外恤公于既殁皆取天下之公論也魯論曰其生也榮其死也哀禮記曰上酌民言蟬冕三公府深衣獨樂園公心兩無纍憂國愛元元言公無窮達之異其心一于憂國愛民而已選詩曰咄此蟬冕客漢時儀文侍中冠惠文冠加金貂附蟬為文貂尾為飾謂之貂蟬公依禮記作深衣每出朝服乘馬用皮篋貯深衣隨其後入獨樂園則衣之事具邵氏聞見録公有獨樂園記曰熙寧四年迂叟始家洛六年買田二十畝于尊賢坊北闢以為圍命之曰獨樂戰國䇿蘇秦曰制海內子元元次韻子瞻武昌西山東坡集此詩序云元祐元年十一月二十九日與翰林承旨鄒聖求會宿玉堂偶話舊事聖求嘗作元次山窪樽銘刻之巖石因為此詩請聖求同賦漫郎江南酒隱處古木參天應手栽元次山自釋曰始自稱猗珂子將家瀼濱乃自稱浪士及有官時人以為浪者亦漫為官乎蒙呼為漫郎及家樊上漫遂顯焉又自注曰言郎者為作尚書郎樊在武昌縣西五里按寰宇記武昌今屬鄂州孟郊詩隱士多隱酒此言信難刋文選曹子建詩荆棘上參天石拗為尊酌花鳥自許作鼎調鹽梅元次山杯樽銘曰郎亭西乳有叢石石臨樊水漫叟構石顛以為亭石有窊顛者因修之以藏酒命為杯樽作銘云云老杜詩春來花鳥莫深愁書曰若作和羮爾惟鹽梅平生四海蘇太史酒澆不下胸崔嵬東坡嘗為直史館故云太史晉書習鑿齒傳曰四海習鑿齒酒澆見前注黃州副使坐間散諌疏無路通銀臺東坡嘗責受黃州副團退之進學解曰投間置散乃分之宜國朝會要云銀臺司掌受天下奏狀東京記云淳化四年八月置知銀臺通進司鸚鵡洲前弄明月江妃起舞襪生埃寰宇記鸚鵡洲在鄂州江夏縣大江之東南黃州與鄂州相望小説載鬼詩曰城市多囂塵還山㺯明月文選蜀都賦曰娉江妃與神遊史記項莊拔劒起舞曹植洛神賦曰凌波微步羅襪生塵次山醉魂招髣佛步入寒溪金碧堆退之詩怪花醉魂馨楚辭有宋玉招魂寰宇記云樊山在鄂州西山東十步有岡岡下有寒溪文選陸機連珠曰金碧之巖必辱鳯舉之使盧同詩青空鑿出黃金堆洗湔塵痕飲嘉客笑倚武昌江作罍誰知文章照今古野老爭席漁爭隈莊子曰含者與之爭席爾雅隩隈郭璞注云今江東呼為浦淮南子曰漁者不爭隈鄧公勒銘留刻畫刳剔銀鈎洗緑苔鄧潤甫字聖求後更名溫伯嘉祐中為武昌令樂天詩題詩此巖壁雲覆莓苔封退之石鼓歌剜苔剔蘚露節角琢磨十年煙雨晦摸索一讀心眼開琢磨謂聖求所刻銘晉賢書曹娥碑後云漢議郎蔡雍聞之來觀夜暗手摸其文而讀之國史纂異許敬宗曰若遇曹劉沈謝暗中摸索亦可識後漢書王常傳曰聞陛下即位河北心開目明歐陽公石篆詩曰見之但覺心眼開謫去長沙憂鵩入歸來杞國痛天摧東坡謫黃州凡七年元豐八年召還時裕陵巳成漢書賈誼為長沙傳三年有鵩飛入誼舍不祥鳥也誼既巳謫居自傷悼乃為賦以自廣列子曰把國有人憂天地崩墮玉堂卻對鄧公直北門喚仗聽風雷翰林志凡當直之法著為條例題于北廳之西門唐書百官志曰乾封以後始號北門學士五代史李琪傳曰唐故事御紫宸殿乃自正衙喚仗由閣門而入百官隨以入見謂之入閣風雷以言號令見周易山川悠遠莫浪許富貴崢嶸今鼎來穆天子傳西王母為天子謠曰白雲在天山陵自出道里悠遠山川間之將子無死尚能復來天子答之曰豫歸東土和治諸夏萬民平均吾顧見汝比及三年將復而野此句頗采其意朝野僉載唐咸亨中謠曰莫浪語阿婆瞋老杜亦云將詩莫浪傳漢書匡衡傳曰無説詩匡鼎來注云鼎方也又賈捐之傳曰石顯鼎貴萬壑松聲如在耳意不及此文生哀萬壑松聲何豫富貴者事情因文生自爾感慨言東坡詩語之妙足以動蕩如此也蓋東坡首章曰請公作詩寄父老往和萬壑松聲哀左傳曰言猶在耳又曰孤始願不及此世説孫楚除服作詩示王武子王曰未知文于情生情于文生覽之悽然增伉儷之重此用其意謂情于文生也子瞻詩句妙一世乃云效庭堅體蓋退之戲效孟郊樊宗師之比以文滑稽耳恐後生不解故次韻道之子瞻送楊孟容詩云我家峩眉陰與子同一邦即此韻我詩如曹鄶淺陋不成邦鄭氏詩譜云周武王封叔振鐸于曹今濟隂定陶是也檜國居添洧之間祝融氏名黎其後八姓惟妘姓檜者處其地焉左傳季子觀樂自鄶以下無譏焉注曰季子聞鄶曹二國歌不復譏之以其微也周禮大宗伯注云子男不執圭者未成國衡門詩注曰言淺陋也公如大國楚吞五湖三江周禮職方氏揚州其川其江其浸五湖左沖沖吳都賦曰或吞江而納漢伽藍記王肅曰羊比齊魯大邦魚比邾莒小國此詩略用其意赤壁風月笛玉堂雲霧窗謂東坡無窮達之異東坡謫黃州凡五年嘗遊赤壁有前後賦按鄂州蒲圻縣有赤壁山黃州亦有之杜牧之詩何人教我吹長笛興倚春風㺯月明元祐元年東坡自中書舍人遷翰林學士玉堂見前注太白詩歸來桃花巖得憩雲窗眼退之詩雲窗霧閣事恍惚山谷題東坡贊曰東坡之酒赤壁之笛又東坡赤壁賦曰客有吹洞簫者赤壁之笛意取此乎句法提一律堅城受我降老杜詩覔句親知律退之樊宗師銘曰由漢迄今用一律此借用其字言自提一家之軍律也受降城見前注枯松倒澗壑波濤所舂撞萬牛挽不前公乃獨力扛枯松以自況太白蜀道難曰枯松倒挂倚絶壁退之詩洪濤舂撞禹穴幽按禮記學記注曰舂容謂重撞擊也老杜古柏行曰大厦如傾要梁棟萬牛回首丘山重漢書鄒陽傳曰使有自悔不前之心退之詩龍文百斛鼎筆力可獨扛諸人方嗤點渠非朝張雙老杜戲為絶句曰今人嗤點流傳賦不覺前賢畏後生按干寶晉紀總論曰蓋共嗤點以為灰塵而相詬病矣朝無咎張文潛皆蘇公門下士但懷相識察牀下拜老龎選詩一心抱區區懼君不識察蜀志龎統傳注引襄陽記曰諸葛孔明為卧龍龎士元為鳯鄒司馬德操為水鏡蓋皆龎德公題品之語也德公襄陽人孔明每至其家獨拜牀下小兒未可知客或許敦龎誠堪壻阿巽買紅纒酒缸終上句相知之意且欲為其子求婚于蘇氏抑東坡或嘗以此許之也山谷在黔中與王瀘州帖云小子相今年十四骨氣差龎厚以此帖觀之在京師時三四嵗矣阿巽蓋蘇邁伯達之女東坡之孫山谷雖有此言其後契濶竟不成婚嫁范子功之孫潩潩字冥叟敷文學士蘇符仲虎伯達之子也其言云爾左氏成十六年傳曰民生敦龎漢書胸奴傳曰願壻漢氏以自親説文曰缸瓶也老杜詩茗飲蔗漿攜所有瓷罌無謝玉為缸今人定壻者多以紅綵纒酒壺云柳閎展如子瞻甥也其才德甚美有意于學故以桃李不言下自成蹊八字作詩贈之柳君文武甚晲視萬人豪穀梁傳子胥挾弓扶矢而干闔廬闔廬曰文之甚武之甚左傳楚子西曰光又甚文老氣鼓不作卷旗解弓刀老杜詩老氣橫九州左傳曰一鼓作氣退之送鄭尚書序曰府帥必左握刀右屬弓矢上為朝陽桐下為澗溪毛言必為世用隨所遇何如耳朝陽桐謂可作琴瑟以薦清廟卷阿詩曰梧桐生矣于彼朝陽注曰梧桐本生山岡太平而後生朝陽左傳曰澗溪沼沚之毛可薦于鬼神可羞于王公囊中有美實期子種蟠桃期之以逺大不欲其汲汲于人知也東坡和山谷詩蓋云期君蟠桃枝千嵗終一嘗山海經曰東海有度索山上有大桃樹屈蟠三千里曰蟠桃漢武帝故事西王母以桃七枚獻帝帝欲留核種之王母笑曰此桃三千年生華三千年結實浮陽愧嘉魚荀子曰魚䱣者浮陽之魚也胠于沙而思水則無逮矣注云謂此魚好浮于水上就陽也説苑宓子賤為單父宰陽畫謂之曰夫扱綸錯餌迎而吸之者陽橋也其為魚薄而不美若存若亡若食若不食者魴也其為魚也博而厚味子賤曰善于是未至單父冠蓋迎之者交接于道子賤曰車驅之車驅之夫陽畫之所謂陽橋者至矣詩曰南有嘉魚蒸然罩罩道傍多苦李晉書王戎傳戌與羣兒戲于道側見李樹多實等輩競取戎獨不往曰樹在道邉而多子必苦李也世説以道邉為道傍古來賢達人不爭咸陽市老杜詩古來賢達士寧受外物牽咸陽市用秦呂不韋著呂氏春秋事見前注吾子富春秋儀禮冠禮曰願吾子之教之也注云吾子相親之辭子男子之美稱漢書齊襄王傳曰皇帝春秋富注云比之於財方未匱竭日月東趨水言年少當惜日也孔文舉論盛孝章書曰歲月不居時節如流尚書大傳曰百川趨于東海一本作東逝水接老杜詩不見堂前東逝波蓋用魯論逝川意潛聖有玉音聞道而巳矣潛聖謂孔子易曰潛龍勿用下也王弼注云龍潛而勿用必窮處于下也文王明夷則主可知矣仲尼旅人則國可知矣正義亦曰言聖人于此潛龍之時在卑下也孟子曰孔子之謂集大成金聲而玉振之司馬相如長門賦曰得尚君之玉音魯論曰朝聞道夕死可矣詩曰無金玉爾音而有遐心霜威能折綿風力欲冰酒太白詩天霜下嚴威醫書謂大寒惟酒不冰西京雜記曰漢天子以酒為書滴取其不冰此詩用綿可折而酒可冰霜風之慘可知也勤子來訪道枵然我何有勤謂勞煩左傳曰子母勤姑歸惠子謂莊子曰剖之以為瓢則瓠落無所客非不呺然大也吾為其無用而剖之寢興與時俱由我屈伸肘詩曰載寢載興傳燈録大寂禪師曰只如今行住坐卧應機椄物盡是道又法眼禪師曰出家人但隨時及節便得寒即寒熱即熱欲知佛性義當觀時節因緣又僧問棗山請師間直師乃垂足曰舒縮一任老僧此詩皆采其意飯羮自知味如此是道不中庸曰人莫不飲食也鮮能知味也傳燈録道明禪師曰如人飲水冷暖自知任世萬鈞重載言以為軒魯論曰任重而道逺漢書司馬傳傳子曰吾欲載之空言不如見之行事之深切著明也揚子曰天之道不在仲尼乎仲尼駕説者也左傳注曰軒大夫車空文誤來世聖達欲無言左傳聖達節魯論子曰豫欲無言咸池浴日月深宅養靈根淮南子曰日出于暘谷浴于咸池黃庭曰後有蜜戶前生門出日入月呼吸存濯溉玉華植靈根七液洞流衝廬間胸中浩然氣一家同化元浩然氣見孟子張拙悟道于石霜作頌曰光明寂照遍河沙凡聖含靈共我家莊子曰同與大通此謂坐忘注云與變化為體而無不通也太白詩心將元化并盧同詩盤礴化元搜萬類按楞嚴經曰研究化元陸沈百世師寄食魯栁下莊子曰方且與世違而心不屑與之俱是陸沈者也注云人中隱者是無水而沈也孟子曰聖人百世之師也伯夷栁下惠是也唐書宰相世系表曰栁氏出自姬姓魯孝公子夷伯展無駭生禽字季為魯士師諡曰惠食采于桞下遂姓栁氏我今見諸孫風味窺大雅老杜詩且復尋諸孫穀梁僖元年傳注江熙曰風味之所期古猶今也又世説注髙逸沙門傳曰支遁居會稽晉哀帝欽其風味大雅見前注大雅久不作圖王忽成霸太白詩大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛桓談新論曰圖王不成亦可以霸偉哉居移氣蘭鮑在所化莊子曰偉哉夫造物者將以子為此拘拘也居移氣見孟子家語子曰與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣聖學魯東家恭惟同出自邴原别傳曰原遊學詣孫嵩嵩曰君捨鄭君所謂以鄭為東家丘也原曰君謂僕以鄭為東家丘必以為西家愚夫耶左傳曰則我周之自出老杜贈盧五丈詩恭惟同自出妙選異髙標此借用乘流去本逺遂有作書肆賈誼鵩鳥賦曰乘流則逝莊子曰悲夫百家往而不反必不合矣揚子曰好書而不要諸仲尼書肆也日中駕肩來薄晚常掉臂記史孟嘗君傳馮灌曰朝趨市者平旦側肩爭門而入日暮之後掉臂而不顧所期物忘其中文選鮑照蕪城賦曰車挂轊人駕肩徒囂終無贏歸矣求巳事後句言奔走勢利之途終無所得不如講求為巳之學也左傳曰賈而欲贏而惡囂乎孟子曰子歸而求之有餘師傳大士十勸曰生死巳事須汲汲傳燈録僧問道吾已事未明乞尚尚指示師良久曰不且且各合尸免相纍及清潤玉泉冰選詩清如玉壺冰晉書衛玠傳曰婦翁冰清女壻玉潤十洲記瀛洲有玉膏山出泉如酒味髙明秋景晴宋玉九辨曰泬寥兮天髙而氣清李善注云秋天髙朗體清明也妙年勤翰墨銀鈎爛縱橫晉書索靖草書狀曰草書之為狀也婉若銀鈎漂若驚鸞藍田生美璞未琢價連城思為萬乘器柱下貴晚成京兆記曰藍田由美玉如藍田曰藍田江表傳孫灌見諸葛恪竒之謂其父瑾曰藍田生玉真不虛也連城見前注漢書鄒陽傳曰蟠木根祇輪囷離竒而為萬乘器者以左右先為之容也老子曰大器晚成按神仙傳老子周武王時為柱下史八方去求道渺渺困多蹊淮南子曰天地之間九州八極注云八方之極也列子曰大道以多歧亡羊學者以多方喪生歸來坐虛室夕陽在吾西莊子曰虛室生白此借用其字法賑禪師金剛經四時般若頌曰理極忘情謂如何有喻其到頭霜夜月任運落前溪果熟兼猿重山長似路迷舉頭殘照在原是住居西此用其意謂道在邇而求之逺也君今秣髙馬夙駕先鳴雞漢廣詩言秣其馬退之盤谷序曰膏吾車兮秣吾馬老杜詩髙馬勿捶靣定之方中詩星言夙駕箋云夙早也慎勿取我語親行乃不迷趙州語曰自作活計莫取我語陶淵明詩曰願君取我言此反而言之欲其躬行而允蹈也退之祭田橫文曰茍余行之不迷戲詠蠟梅二首山谷書此詩後云京洛間有一種花香氣似梅花亦五出而不能晶明類女功撚蠟所成京洛人因謂蠟梅木身與葉乃類蒴藋竇髙州家有灌叢能杳一園也王立之詩話云蠟梅山谷初見之戲作二絶緣此盛于京師金蓓鎖春寒惱人香未展雖無桃李顔風味極不淺集韻曰蓓蕾始華也蓓音倍蕾音磊樂天詩愁鎖鄉心掣不開老杜詩韋曲華無賴家家惱殺人桃李顔本作桃杏紅後改之太白詩松柏本孤直難為桃李顔風味見前注晉書庾亮曰老子于此處興復不淺體薰山麝臍色染薔薇露披拂不滿襟時有暗香度林逋梅詩小圍煙景正凄迷陳陳寒香壓麝臍陶隱居注本草云麝形似麞食柏葉或有夏食蛇蟲多至寒香滿入春患急痛自以腳剔出人有得之者此香絶勝雷公云用蹄尖彈臍此香價與明珠同楊文公談苑云金陵宮中人挼薔薇水染生帛一夕忘收為濃露所漬色倍鮮翠按今嶺南薔薇露染衣輒黃莊子曰風起北方一西一東孰居無事而披拂是文選陸士衡詩循形不盈襟林逋梅花詩暗香浮動月黃昏披拂不滿襟一本作不盈懷文選古詩云馨香盈懷袖路逺莫致之蠟梅天工戲剪百花房奪盡人工更有香埋玉地中成故物折枝鏡裏憶新妝剪花房謂其作蠟樂天詩點綴花房小樹頭未句蓋有所寄駙馬都尉王詵晉卿尚蜀國公主主巳下世故有埋玉之句新妝用夀陽公主梅花妝之意風俗通云張伯偕仲偕兄弟形貌相類仲偕妻新妝鏡中忽見伯偕問曰今日妝飾好否此略采其意從張仲謀乞蠟梅聞君寺後野梅發香蜜染成宮樣黃不擬折來遮老眼欲知春色到池塘寺未官寺老杜詩江路野梅香傳燈録僧問藥山為什麼看經師曰我只圖遮眼老杜詩皇天無老眼謝靈運詩池塘生春草此引用言仲謀當有詩興賈天錫惠寶薰乞詩豫以兵衛森畫戟燕寢凝清香十字作詩報之十字蓋韋應物詩山谷云天錫作意和香自然有富貴氣覺諸人家香殊寒乞也險心遊萬仞躁玉生五兵隱几香一炷靈臺湛空明莊子曰人心險于山川陸士衡文賦曰精騖八極心遊萬仞詩意謂躁欲之害攻伐正性故曰生五兵周禮夏官司兵掌五兵五盾注謂戈殳戟酋矛夷矛莊子曰南郭子綦隱几而坐又曰不可內于靈臺注云心也陶淵明詩云夜景湛虗明退之祭文云航北湖之空明晝食鳥窺臺晏坐日過砌俗氛無因來煙霏作輿衛鳥窺臺謂作生臺以施食日過砌謂僧律過中即不食也文選謝靈運詩兼抱濟物性而不纓垢氛李善注謂世事呰惡不相纓繞不雜塵霧劉孝標廣絶交論曰煙霏雨散注引陸機賦騰煙霧之霏霏易大畜之九三曰閈輿衛利有攸往山谷意謂香煙隔去俗氛便足以當兵衛耳輿猶衆也不用古易師説石蜜化螺甲榠樝煮水沈博山孤煙起對此作森森山谷有此十詩跋云賈天錫意和香其法研沈水如小榑投取榠樝液漬之三日乃煮去其液溫水浴之螺甲磨去齟齬以胡麻膏熬之色正黃則以蜜湯劇洗又屑紫檀青木香稍入婆律膏及麝以棗肉合之作摹如龍涎香狀按本草石蜜條陶隱居注云即崖蜜也唐本草云蠡類生雲南者大如掌青黃色取黶燒灰用之今合香多用謂能發香復來香煙須酒蜜漬方可用本草木瓜條陶隱居注曰榠樝大而黃可進酒圖經云道家生壓汁和甘松等作詩香唐本草注曰沈水香出天竺單于二國與青桂雞骨馢香同是一樹葉似橘經霜不凋木似櫸柳重實黑色沈水者是漢故事曰諸王出閣則賜博山香爐呂大臨考古圖云爐象海中博山下盤貯易使潤氣蒸香以象海之四瓖古詩云博山爐中百合香鬱金蘇合與都梁對此作森森謂博山百合之香與此寶薰對燒有森然畏敬之意歐陽公詩孤煙起晴嵐文選懷舊賦柏森森以攢植輪囷香事巳郁郁蓍書畫誰能入吾室脫汝世俗械漢書天文志曰若煙非煙若雲非雲郁郁芬芬蕭索輪囷是謂慶雲此借用以言香之煙莊子大宗師篇子桑户死孔子曰彼又烏能憤憤然為世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依孔子曰吾天之戮民也注云以方內為桎梏韻書云械桎梏也賈侯懷六韜家有十二戟天資喜文事如我有香癖賈侯當是將家子按太公兵法有六韜凡戟天子二十四諸侯十二唐制三品巳上門列棨戟史記商君贊曰天資刻薄人也穀梁曰有文事者必有武備晉杜預有左傳癖林花飛片片香歸銜泥燕閉閣和春風還尋蔚宗傳老杜詩林花著雨燕支落又詩風吹花片片鄭谷燕詩間几硯中窺水淺落花徑裏得泥香選詩曰思為雙飛燕銜泥巢君室山谷書小宗香云南陽宗茂深閉閣焚香蔚宗傳見前注公虛采蘋宮行樂在小寢香光當發聞色敗不可稔上句言其悼亡采蘋詩序曰大夫妻能循法度也禮記玉藻曰大夫退然後適小寢釋服注云小寢燕寢也公羊注亦云諸侯皆有三寢一曰髙寢二曰路寢三曰小寢漢書楊惲傳曰人生行樂耳楞嚴經大勢至法王子云如染香人身有香氣此則名曰香光莊嚴我本因地發聞字見書呂刑左傳是昆吾稔之日也注云稔熟也惡積與桀同誅此備用以言聲色之禍牀帷夜氣馥衣桁晚煙凝瓦溝鳴急雪睡鴨照華燈孫子曰夜氣歸此借用老杜詩翡翠鳴衣桁樂天詩倏如瓦溝霜李啇隱詩睡鴨香爐換夕薰楚辭華燈錯些雉尾映鞭聲金爐拂太清班近聞香早歸來學得成退之元日朝回詩曰金爐香動螭頭暗玉珮聲來雉尾髙古今注曰殷髙宗有雉雊之徵服飾多用翟尾故有雉尾扇鞭聲謂警蹕道家有三清太清其一也老杜詩朝罷香煙攜滿袖樂天詩十三學得琵琶成衣篝麗紈綺有待乃芬芳當念真富貴自薰知見香説文曰篝笿也可薰衣樂府梁王笍行路難曰巳繅一繭催夜縷復搗百和薰衣香漢書班固自敘曰在于綺𥜗紈袴之間麗謂香氣附著之莊子曰列子御風此雖免乎行猶有所待者也選詩云言笑吐芬芳樂天詩為報髙蓋車恐非真富貴圓覺經曰自薰成種佛書有解脫知見香次韻張仲謀過酺池寺齋十年醉錦幄酴醿照金沙攲眠春風底不去留君家王介甫詩云酴醿一架最先來夾水金沙次第裁濃緑扶疏雲對起酴紅撩亂雪中開是時應門兒紫蘭茁其芽只今將弟妹嬉戲牽羊車應門兒見前注退之馬少監志曰幼子娟好靜秀瑤環瑜珥蘭茁其芽退之詩少長聚嬉戲不殊同隊魚普書衛玠傳總角乘羊車入市忽書滿窗紙整整復斜斜劉禹錫詩小兒弄筆不能嗔涴壁書窗且賞勤盧同添丁詩聞來案上翻墨汁塗抹詩書如老鴉杜牧之臺城曲云整整復斜斜隨旗簇晚沙平生悲歡事頭緒亂如麻太白詩繅絲憶君頭緒多漢書天文志死人如亂麻茍祿無補報幾成來食嗟荀子曰偷合茍容以持祿養交漢書貢禹傳曰非復能有補益所謂素餐尸祿之臣也禮記檀弓曰齊大飢黔敖為食于路以待餓者而食之有餓者蒙𬒮輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而祝之曰豫惟不食嗟來之食以至于斯也從而謝馬終不食而死喜君崇名節青雲似有涯漢書樓護傳諭議常依名節又後漢書許劭傳少峻名節選詩努力崇明德史記范睢傳須賈曰賈不欲君能自致于青雲之上莊子曰吾生也有涯我夢江湖去釣魚刺蘆花莊子曰漁刺釣船而去延緣葦間江濵開園宅畦蔗蒔梨柤周禮載師曰以場圃任園地以宅田任近郊之地張平子南都賦曰其園圃則有薯蔗薑䪤莊子曰柤梨橘柚皆可于口夢驚如昨日炊玉困京華文選潘安仁詩念此如昨日郭璞詩京華遊俠窟炊玉見前注公來或藜羮愛我不疵瑕莊子曰孔子窮于陳蔡之間藜羮不糝左傳曰豫取豫求不汝疵瑕深念煩鄉里忍窮禁貸賖言不欲稱貸以治具退之詩枚皋即召窮且忍周禮泉府曰凡賖者祭祀無過旬日喪紀無過三月凡民之貸者以國服為之息夜談簾幕冷霜月動金蛇東坡詩夜談空説劒張璠漢紀曰永昌太守鑄黃金為蛇獻梁冀此借用以形容簾之篩月也即是桃李月春蟲語交加言談笑之歡溫然似春選詩艷陽桃李節退之送鄭校理詩曰鳥哢正交加楊花共紛泊我亦無酒飲一室可盤蝸魏志邴原傳注魏略曰焦先自作一瓜牛廬淨掃其中營木為牀布草蓐其上裴松之云瓜當作蝸蝸牛螺蟲之有角者也俗或呼為黃犢要公共文字朱墨勘舛差退之詩不如覷文字丹鉛事點勘按北史蘇綽制文案程式朱出墨入之法此借用文選蜀都賦舛錯縱橫非復少年舊聲名取嫮姱漢書韓安國傳嫮鄙小縣注曰嫮姱姹也諸阮有二妙能詩定自嘉何時來煮餅蟹眼試官茶晉書阮咸傳曰諸阮居道北此詩用其字二妙謂阮渾阮咸以比仲謀子姪也按阮籍之子渾少慕通達籍曰仲容以豫此流汝不得復爾咸子仲容稱之兄子也又衛瓘傳云與索靖俱善草書時號一臺二妙此借用世説王含作廬江王教曰家兄在郡定嘉又謝太傅舉酒謝景景重曰故自佳故自佳東坡煎茶詩蟹眼已過魚眼生山谷內集詩注卷五
