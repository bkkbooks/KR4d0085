body:
  text: 山谷內集詩注卷二宋黃庭堅撰任淵注寄裴仲謨交遊二十年義等親骨肉禮記曰交遊稱其信也退之詩譬如親骨肉寧免相可否按吕氏春秋曰父母之于子也此之謂骨肉之親老杜詩義均骨肉地風雨漂我巢公亦未有屋鴟梟詩子室翹翹風雨所漂搖箋云巢之翹翹而危其以所杖條條弱也寄聲來問安足音到空谷漢書趙廣漢傳曰寄聲謝我禮記文王世子問內豎之御者曰今日安否何如莊子曰逃虛空者聞人足音跫然而喜詩曰在彼空谷我家輦轂下薪桂炊白玉司馬遷曰侍罪輦轂下戰國䇿蘇秦曰使臣食玉炊桂張志和曰樵青薪蘭蘇竹裏煎茶在官與影俱衣綻髮曲局曹子建上責躬詩哀曰形影相弔綻音犬莧切衣縫解也采緑詩曰豫髮曲局天機行日月春事勤草木文選潘安仁詩曰曜靈速天機四節代逐浙注云曜靈曰也故莊子曰天其運乎地其處乎日月其爭于所乎孰主張是孰維綱是孰居無事而推行是意者有機緘而不得巳耶意者其運轉而不能自止耶老杜詩溪邊春事幽念公駕行李野飯中道宿説文云馬行頓遲左傳曰亦不使一介行李告于寡君注云行李行人也又曰行李之往來供其乏困驚沙卷旍旗烏尾城角謖一作烏尾訛蜮角文選王子淵四子講德論曰甲士寢而旍旗仆又魏都賦曰旍旗莖按旍輿旍同後漢靈帝紀注云恆帝之初京都童謡曰城上烏尾畢逋儀禮士虞曰祝入口殺注云起也音老杜詩城頭烏尾訛騷騷家治具夫子且歸沐言治之勿也禮記檀弓曰騷則注謂太疾漢書灌夫傳曰魏其夫妻治具注謂辨具酒食萬石君傳曰五曰洗木歸作書寄後乘為我遣臣僕孟子曰後車數千乘書曰我罔為臣僕起居太夫人并問相與睦元注云相睦兒女名老杜詩起居八座太夫人按後漢書岑彭傳曰大長稱以朔望問太夫人起居漢書文帝紀注云列侯妻稱夫人列侯死子復為列侯乃得稱太夫人相字然小字小睦行第三十三後嫁舒城李文伯寄黃幾復元注云乙丑年德平鎮作我居北海君南海寄鴈傳書謝不能山谷嘗有跋云幾復在廣州四會子在德州平鎮皆海濵也按輿地廣記四會屬廣州熙寧六年割隸端州此詩元豐末所作猶云廣州欲表見南海之意爾山谷古詩亦云四會有黃今左傳曰君處北海寡人處南海惟此風馬牛不相及也劉禹錫詩謫在三湘最逺州邊鴻不到水南流按楚辭招鬼巫陽曰謝不能王逸注頗失其義若漢書項籍傳陳嬰謝不能則此詩所用之意桃李春風一杯酒江湖夜雨十年燈兩句皆記憶往時遊居之樂今既十年矣晉書張翰傳曰使我有身後名不如即時一杯酒持家但有四立壁治病不鄿三折肱漢書司馬相如傳曰家徒四壁立左傳齊髙疆日三折肱知為良醫此用言其諫世故不待困而後知也想得讀書頭已白隔溪猿哭瘴溪藤東坡詩讀書頭欲白相對眼終青老杜詩殊方日玄猿哭故國霜前白鴈來四會在廣東故云瘴溪神宗皇帝挽詞三首文思昭日月神武用雷霆堯典曰欽明文思易曰神武而不殺制作深垂統憂勤減夢齡禮記曰周公制禮作樂孟子曰君子創業垂統為可繼也禮記文王世子篇武王曰夢帝與我九齡文王曰我百爾九十吾與爾三馬注云文王以憂勤損毒孫謀問二聖末命對三靈詩曰詒厥孫謀以燕翼子二聖謂宣仁太后哲宗皇啼無結中興頌曰二聖重歡書顧命日導揚木命文選班固典引日答三靈之社李善注三靈謂天地人出春秋元命苞今代誰班馬能書漢簡青班馬謂遷固樂天行韓愈制曰立詞有班馬之風後漢吳祐傳注曰殺青者以火炙簡令汗取其青易書後不蠧謂之殺青亦謂之汗簡釣築收賢輔天人與聖能釣築謂起王介甫于金陵如得吕望傅説杜收華清宫詩臼築乘時用易曰人詘鬼謀百姓與能釣築用太公釣傅説築傅巖事蓋言帝用人如商高宗周文王也輝光唐六典度越漢中興百世神宗廟千秋永裕陵元豐三年初改官制至五年頒行上句謂官制一新有光于唐之六典下句言政事法度過于漢宜帝中興也大典唐明皇時所撰李林甫等所注蓋一代官制也書酋載明皇敕曰法以周令作為唐典取諸簡昜所貴易後漢書宣帝贊曰功光袓宗業垂後嗣可謂中興侔德商宗周宣矣揚雄傳贊曰則必度起諸子矣永裕神宗陵名帝鄉無馬迹空望白雲乘左傳曰周穆王周行天下將必有車轍馬迹莊子曰千嵗厭世去而上仙乘彼白雪至于帝鄉昔在基皇極師臣論九疇師臣亦謂王介甫以武王訪箕子比之也洪範曰皇建其有極又曰天乃鍚禹洪範九疇丘陵忽為谷天地不藏舟上句言丘山之頽人將安仰下句言大化推移有形者所不得遁然聖人末嘗其存也詩曰髙岸為谷深谷為陵莊子曰藏舟于壑藏山于澤謂之固矣然而夜有力者負子而走昧者不知也藏小大有宜猶有所遁若夫藏天下于天下而不得所遁是恆物之大也故聖人將遊于物之所不得遁而皆存河洛功無憾幽燕䇿末收神廟元豐二年四月命宋用臣導洛通汴以代河渠謂之清汴漕挽遂無留滯嘗有敢復幽燕之謀既開端緒而未收功也張舜民小説云神廟于崇政殿後説二十四庫以儲金帛諸路分將置都作院河北設五都倉講好高麗然功未施而上賔是天未欲幽薊之民歸中國乎嗣皇朝萬國任姒正興周嗣皇謂哲宗初立任姒謂宣仁太后垂簾聽政思齊詩曰思齊太任文王之母思媚周薑京室之婦太如嗣徽音則百斯男王文恭公挽詞二首王圭字玉實録有傳先皇慿玉几末命寄元勳謂神廟顧託書顧命曰皇后慿玉几導揚末命後漢書陳俊傳注賜璽書曰將軍元勳大著元豐八年春神廟寢疾二月圭于御榻前請建東宫三月甲午立哲宗為皇太子戊戌圭宣遺制皇太子郎皇帝位事具實録賔日行黃道攀髯上白雲上句謂䇿立哲宗下句謂未幾而公亦薨也克典曰賔出日注云賔道也晉天文志曰黃道日之所行王介甫作公晚詩云扶曰轂上天衢漢郊祀志曰黃帝鑄鼎于荆山下既成有龍垂胡髯下迎黃帝黃帝上騎羣臣後宫後上龍七十餘人小臣不得上乃思持龍髯白雲見前注四時成歲律五色補天文上句書藏用下句言補衮莊子曰四時殊氣天不私故歲成五官殊職君不私故國治此備用列子曰女媧鍊五色石以補其闕不謂堂堂去今為馬鬛墳堂堂見魯論薛能詩靑春背我堂堂去禮記檀弓曰從若斧者焉馬鬛封之謂也注云封築土為壟宥密深黃閣光輝極上台昊天有成命詩曰夙夜基命宥密注云宥寬密寧也行寬仁安靜之政然前華多作機密用之沈約宋書曰朱門洞啓當陽之正色三公與天子禮秩相亞故黃閣以示謙晉書天文志西近文昌三星曰上台藏舟移夜壑華屋落泉臺舟見注曹子建詩生存華屋處零落歸山丘劉禹錫酬樂天詩曰華屋坐來能幾日夜臺歸去便千秋李臺祐哭韋給事詩仁兄與思舊想爾泣泉臺雨紼誰為挽寒笳故作哀儀禮曰弔于葬者必執引若從柩及皆執注云廟中曰紼在塗曰引庾中丞昭君詞曰朔障裂笳韓退之詩逾染下坂笳鼓咽老杜吹笛詩故作發聲微傷心具瞻地無復衮衣來節南山詩赫赫師尹民其爾瞻九詩曰是以有衮衣兮無以我公歸兮注云謂成王所來衮衣謝送碾壑源揀芽矞雲從龍小蒼璧元豐至今人未識西京雜記曰雲外赤內青謂之矞雲雲二色曰矞亦瑞雲也矞音以律反易曰雲從龍按張舜民小説云熙寧末神廟有旨下建州製密雲龍其品又高于小圑壑源包貢第一春緗奩碾香供玉食第一春謂元豐元年建州茶以北苑壑源為上沙溪為下書曰厥色橘柚錫貢洪範惟碎玉食睿思殿東金井欄甘露薦碗天開顔睿思蓋神宗便殿有垂拱殿後太白詩絡緯秋啼金井欄按載延之西征記曰太極殿上有金井欄金博山鹿廬蛟龍負山于井上陸羽顧睂山記載王智深宋録曰王子尚訪曇濟道人于八公山道人授茶茗子尚味之曰此甘露也何言茶茗曰老杜詩天顔有喜近臣知選詩開顔披心胸橋山事嚴庀百局補袞諸公省中宿史記黃帝葬橋山注曰橋山在上郡此句謂作神宗裕陵也孟子注曰事嚴喪事急左傳曰官它其司補袞見前注老杜詩諸公衮衮登臺省魏都賦曰禁臺省中連闥對廊中人傳賜夜未央雨露恩光照宫燭庭燎詩曰夜如何其夜未央蓼蕭箋曰露者天所以潤萬物喻王者恩澤不為逺則不及也老杜詩氣得神仙逈恩承雨露低退之詩宫燭驪山醒按周禮官正日宫中廟中則執燭右丞似是李元禮好事風流有涇渭右丞謂李浦臣後漢書黨錮傳序學中語曰天下模楷李元禮元禮名膺事具本傳留書王微之傳曰似是馬曹老杜詩偶坐似是商山翁好事見孟子及漢書掦雄傳風流謂得前賢之流風遣俗故前漢書趙充爾傳贊曰風聲氣俗自古而然今之歌謡慷慨風流猶存耳嵇康琴賦亦曰體制風流莫不相襲而李善注引淮南子及仲長統昌言似非佳語善又注沈休文所作謝靈運傳論曰在下祖習如風之散如水之流盡此兩字或美或惡隨所用之意何如耳任彥升詩伊人有涇非余揚濁清按谷風風谷注曰涇渭相入而清濁異肯憐天祿校書郎親敕家庭遣分似漢書揚雄傳校書天䘵閣上敕武敕也退之詩曰寫吾此詩持送似春風飽識大官羊不慣鷹儒湯餅腸春風謂茶團史職官志大官令屬光䘵寺掌膳羞割烹之事老杜詩百年粗糲腐儒餐又云老樹飽經霜漢紀高祖曰腐儒幾敗乃公事搜攪十年燈火讀令我胸中書傳香盧同茶歌曰三碗搜枯腸惟有文字五千卷退之詩曰炎風曰搜攪南史沈攸之傳曰早知窮達有命恨不十年讀書退之詩燈火稍可親簡編可卷舒北史崔㥄傳鄭伯猷歎曰芻中貯千卷書使人那得不畏服史記趙奢傳曰括徒能讀其父書傳巳戒應門老馬走客來問字莫載酒莊子曰杖藜而應門晉李密陳情表曰內無應門五尺之童文選司馬遷書曰太史公牛馬走李善濁曰走猶僕也言為太史公掌牛馬之僕漢書揚雄傳劉嘗從雄學作竒字又曰時有好事者載酒肴從遊學業以小團龍及半挺贈無咎并詩用前韻為戲談苑曰建州茶氏氏别令取其乳作片或别曰挺我持玄圭與蒼璧以暗投人渠不識書日禹錫玄圭周禮日以蒼壁禮天柳子原新茶詩圓方麗竒色圭壁無瑕暗投見鄒陽傳具前注渠猶胥人言供蕪梁陳以來語庾信時有無事教渠更相失之句老杜憶弟詩亦云吟詩正渠城南窮巷有佳人不索賔郎常晏食佳人謂無咎山谷後詩有云城南朝正字南史劉穆之少貧好往妻兄江氏家乞食食卑求賓郎江氏戲之曰賔郎消食君乃常飢何忽須此穆之為丹陽令乃令厨人以金拌貯賓郎一斛以進妻兄弟戰國䇿顔斶曰晚食以當肉赤銅茗碗雨班班銀栗翎光解破顔韓孟聨句曰茗碗纎纖捧歐陽公詩輕寒漠漠侵駝褐小雨斑斑作燕泥銀栗謂苕花老杜詩將軍且莫破愁顔樂天詩一放狂歌一破顔上有龍文下碁局探囊贈君諾已宿碁局謂團茶下隱隱有此文蓋篾痕也莊子曰肱篋探橐此借用其字魯論曰子路無宿諾此物已是元豐春先皇聖功調玉燭易蒙卦曰蒙以養正聖功也爾雅曰四時和謂之玉燭注云道光照朝子胸中開典禮平生自期莘與渭易繫辭曰觀其會通以行其典禮此借用言典章文物開陳于胸次也孟子日伊尹耕于有莘之野史記齊世家西伯遇太公于渭之陽老杜詩自比稷與輿故用澆君磊隗胸莫令鬢毛雪相似澆胸見前注老杜詩更憶鬢毛斑退之詩兩鬢白趨埃塵割鬢禹錫詩今宵帝城月一望雪相似曲几團蒲聽煮湯煎成車聲繞羊腸柳子厚有斬曲几文王介甫詩獨坐隱團蒲文選魏武苦寒行曰羊腸阪詰曲車輪為之摧注引吕氏春秋九山曰太行羊腸其山盤紆如羊腸在太原晉陽北樂天詩夢尋來路繞羊腸王立之詩話曰東放見山谷此句云黃九恁地怎得不窮故朝無咎復和云車聲出鼎統九盤如此佳句誰能識雞蘇胡麻留渴羌不應亂我官焙香本草水蘇一名雞蘇胡麻一名巨勝東坡云即今油麻也俗人煮茶多以此二物雜之拾遺記曰晉有羌人姚馥但言渴于酒羣輩呼為渴冕肥如瓠壺鼻雷吼幸君飲此勿飲酒蜀志張裔傳雍聞假鬼教曰張府君如瓠壺外雖澤而內實粗退之石鼎聨句序曰道士倚牆鼻息如雷鳴元稹詩鼻息吼春雷和答外舅孫莘老西風挽不來殘暑推不去晉書鄧攸傳吳人歌曰紞如打五鼓雞鳴夭欲睹鄧侯挽不留謝令推不去出門厭鞾帽稅駕喜巾履史記李斯曰吾未知所稅駕方言曰倉車曰稅老松詩松下丈人巾履間偶坐似是商山翁柳子厚詩室空無侍者巾履喜挂壁道山鄰日月清樾深牖户道山見前注鄰日月謂在天上字林曰樾樹陰也淮南子曰盥汗交流喘息薄喉當此之時休樾下則脫然而喜矣注云楚人樹上大本上如車蓋狀為樾言多蔭也詩曰綢繆牖戶同舍多望郎間官無窘步漢書直不疑傳誤持同舍郎金去作康郎中志曰鴛行望郎錦川星使離日何桀紂之披褐兮夫唯捷經以窘步注云窘急也劉禹錫詩悠悠關塞內來往無間步此反而用之少監巖壑姿宿昔廊廟具晉書謝緄傳曰或問論者以君方庾亮何如答曰端委廟堂使百僚凖則緄不如亮一丘一壑自謂過之謝靈運詩巖壑宇耳目阮嗣宗詩宿昔同衣裳老杜詩當今廊廟具創夏豈云缺行趨補衮職黼黻我王度補衮見後注謂作諫議黼黻蓋衮衣之章王度亦見後注歸休飲熱客觴豆愆調護莊子許由曰歸休乎君子無所用天下為此借用以言休假啓顔録程季明有嘲熱客詩曰今代癡隱子觸熱到人家禮記曰七十觴酒豆肉漢書張良傳曰煩公幸卒調護太子此亦借用浩然養靈根勿藥有神助孟子臼我善養吾浩然之氣太玄經日藏心于淵厥靈恨易曰無妄之疾勿藥有喜老杜詩詩應有神助寄聲舊僚屬訓詁及七箸如古詩上有加餐食之意漢書趙廣漢傳曰界上亭長寄聲謝我蜀志先主傳曰先主方食失匕箸尚憐費諫紙玉唾灑新句樂天詩月慙諫紙二百張嵗愧俸錢三十萬玉唾見前注北焙碾玄璧谷簾煮甘露北焙即建溪高品文選劉越石詩握中有玄璧乃自荆山璆張又新煎茶水記云陸羽以廬山康王谷水第一陳舜俞廬山記曰康王谷有水簾飛泉被巖而下甘露見前注何時臨書几剝芡談至暮韓信傳大王乃肯臨臣退之詩水果剝菱芡東觀漢記曰尹敏輿班彪相厚每相與談常晏暮不食晝即至冥夜徹旦世説孫安國往殷中軍許共論往反精苦賔主遂至暮忘食次韻定國聞子由卧病績溪炎洲冬無氷十月雷虺虺東方朔十洲記曰炎洲在南海中此借用績溪𨽻歙州蓋江南之地左傳襄公二十八年春無氷梓慎曰今兹宋鄭其飢乎終風詩曰虺虺其雷注曰暴若震雷之聲虺虺然及春瘧癘行用人祭非鬼老杜詩瘧癘三秋孰可忍按周禮疾醫曰四時皆有癘疾注謂氣不和之疾用人蓋楚俗如此左傳所謂宋公使邾文公用􅤂子于次睢之社注謂殺人而用祭也魯論曰非其鬼而祭之諂也巫師司民命藥石不入市退之遣瘧鬼詩詛師毒口牙古作霹靂飛符師弄刀筆丹墨交橫揮史記扁鵲傳曰其在骨髓雖司命無奈之何此借用周禮曰髻墾薛暴不入市溪弩潛發機土風甚不美博物志曰江南山溪水中有射工蟲長一二寸口中有弩形氣射人影不治則殺人傳曰千鈞之弩不為鼷鼠而發機左傳鍾儀樂操土風荀子曰人情甚不美蘇子卧江南感歎中夜起聞道病在牀食魚不知旨陸士衡詩中夜起歎息老杜詩中夜起坐萬感集又詩身欲奮飛病在牀按李令伯表曰劉夙嬰疾病常在牀蓐劉子曰人之將疾者必不甘魚肉之味學記曰雖有嘉肴弗食不知其旨也寒暑戰胸中士窮有如此老杜詩寒熱百日相交戰韓非子喻老篇子夏曰兩者戰于胸中未知勝負故臞此借用禮記儒行曰其特立有如此者此公天機深爵祿心已死莊子曰嗜欲深者天機淺此反而用之列子曰黃帝與容成子居空桐之上同齋三月心死形廢養生遺形骸觀妙得骨髓莊子曰外其形骸文選何敬祖詩曰奚用遺形骸忘筌在得魚老子曰常無欲以觀其妙傳燈録逹磨傳謂門人道育得吾骨慧可得吾髓后皇蒔嘉橘中嵗多成枳士不變于熙豐者鮮矣楚辭橘頌曰后皇嘉樹橘徠服兮受命不遷生南國兮注言橘受命于江南不可移徙種于北地則化而為枳也考工記曰橘踰淮而北為枳東京賦曰蓂莢為難蒔也故曠世而不覿佳人何時來為天啓玉齒楚辭曰聞佳人兮召豫神異經日玉女投壺天為之笑則電故老杜詩曰每蒙天一笑長使物皆春郭璞遊仙詩曰靈妃顧我笑粲然啓玉齒湔祓瘴霧姿朝趨去天咫戰國策汗明説春申君曰今僕居鄙俗之日久矣君獨無湔祓僕也退之詩才開還落瘴霧中左傳曰天威不違顔咫尺唐書城南韋杜去天尺五諸公轉洪鈞國器方薦砥老杜謂八荒開壽域一氣轉洪鈞漢書王褒頌曰賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革忽若􅭌汜畫塗矢詩寫豫心莊語不加綺詩云矢詩不多維以遂歌文選張茂先詩寫心出中誠莊子曰以天下謂沈濁不可與莊語佛氏口之四業有所謂妄言綺語退之城南聫句亦云綺語洗晴雪次韻子由績溪病起被召寄王定國蘇子由樂城集中有答王定國問疾詩云五年竄南荒頑質不伏病即此韻也種萱盈九畹蘇子憂國病嵇叔夜養生論曰合歡蠲忿萱草忘憂離騷曰豫既滋蘭之九畹注云十二畝為畹此句言種萱雖不多足以解蘇子之憂蓋所憂在天下也文選江淹擬潘嶽詩曰消憂非萱草永懷寧夢寐炎蒸卧百戰山立有餘徑老杜詩吾曰抱疾病家貧卧炎蒸又詩瘧癘三秋孰可忍寒熱百日相交戰孫子曰百戰百勝非善之善者也禮記玉藻曰山立時行選詩曰石梁有餘徑斯人廊廟器不合從逺屏蜀志許靖傳評日蔣濟以為大較廊廟器也禮記曰屛之逺方毆陽公表曰亂國之讒已蒙于逺屏江湖搖歸心毛鬢侵老境左傳曰三國敗諸侯之師乃搖心矣又史記蘇秦傳曰心搖搖然如縣旌而無所終薄禮記曰六十耆指使疏引賀埸云耆至也至老之境也杜詩人生五馬貴莫受二毛侵艱難喜歸來如晴月生嶺春秋閣公元年書季子來歸公羊傳云其曰來歸何喜之也初晴之月人所喜見淵明詩素月出東嶺禮記日月生于西仍懷阻歸舟風水蛟鰐橫選詩天際識歸舟老杜詩云蛟橫出清泚又詩蛟蠄深作橫補衮諫官能用儒吾道盛詩曰衮職有闕維仲山甫補之唐垂拱二年置補衮二員掌供奉諷揀揚子曰如用真儒無敵于天下論語曰參乎吾道一以貫之上書詆平津蠧藁初記省漢書汲黯傳面觸公孫𢎞徒懷詐􅎖智以阿人主取容按𢎞封平津侯又息夫躬傳上疏厯詆公卿大臣王介甫執政領三司條例上以子由為之屬介甫欲遣八使子由以書抵介甫及陳楊叔指陳其決不可者且請補外介甫大怒將加以罪陽叔止之奏除河南推官會張文定知淮陽以學官辟云事見頴濵遺老傳至今民社計非事頰舌競魯論曰有民人焉有社稷焉易咸卦之上六曰咸其輔頰舌象曰滕口説也漢書張良傳曰此難以口舌爭方來立本朝獻納繼晨暝易困卦曰朱紱方來注謂能招異方此用其字言自逺方來也孟子曰立乎人之本朝班固兩都賦序曰日月獻納人材包新舊王度濟寬猛新舊謂欲兼用熙豐人材也嘉祐治平之政近于寬熙寧元豐之政近於猛要當相濟易泰卦曰包荒用馮河左傳曰思我王度式如玉式如金又曰寬以濟猛猛以濟寬政是以和王直方詩話云先生嘗有詩云人材包新舊王度濟寬猛建中初又曰閉姦有要道新舊隨宜收又云不須要出我門下實用人材是至公大抵言朝廷用人也必開曲突謀滿慰傾耳聽漢書霍光傳人為徐生上書曰客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患漢書伍被傳曰天下引領而望傾耳而聽斯文呂與張泉下亦蘇醒吕謂中丞吕誨獻可張謂監察御史裏行張戬天祺按實録王安石傳吕誨劉述劉琦錢顓孫昌齡范純仁吕公著孫覺李常胡宗愈張戬王子韻陳襄程皓皆論列變法非是以次罷去山谷詩意謂元祐初召用諸人而獻可天祺皆前死矣然朝廷選用諌官時政一新亦可伸其憤悶之氣于泉下也獻可熙寧四年五月卒天祺亦相繼亡老杜詩斯文崔魏徒以我似班揚淮南子注云泉下有黃壚山退之作王適墓志曰櫛垢爬癢民穫蘇醒天聰四門闢國勢九鼎定書説命曰惟天聰明惟聖時憲舜典曰闢四門逹四聰史記周紀太史公曰武王營洛邑成王使召公卜居居九鼎焉左傳曰武王定鼎于洛邑身得遭太平分甘守間冷山谷自記也退之詩太平時節身難遇孟子曰分定故也晉書謝道輼曰為天分有恨耶分字蓋如此天津十年面想見頎而整謂子由也劇談録裴晉公度微時羇寓洛中嘗乘蹇驢入皇城方上天津橋時淮西不庭已數年矣有二老人傍橋柱而立云適憂蔡州未平須待此人為將僕者聞之具述其事裴公曰見我龍鍾相戲耳其後竟平淮西詩曰猗嗟昌兮頎而長兮注云頎長貌整謂秀整見後注何時及國門休暇過􅀢茗屈原九章哀郢曰出國門而軫懷其字本出周禮元結醉歌序曰因休暇則載酒于湖上燒燈留夜語鴻鴈看對影對影謂東坡老杜詩鴻鴈影來連峽內太白詩對影成三人此借用但恐張羅地頗復多造請漢書鄭當時傳曰先是下邽翟公為廷尉賔客亦填門及廢門外可設雀羅張湯傳造請諸公不避寒暑維此禮部公寒泉甃舊井謫去久羸瓶召還汲修綆東坡元豐八年秋召為禮部郎中易井卦曰汔至亦未繘井羸其瓶凶初六曰井泥不食舊井無禽九五曰井冽寒泉食太史公屈原傳亦引此説退之詩曰汲古得修緶太任決齋宫陛下天統慶太任謂宣仁思齊詩曰思齊太任文王之母漢書刑法志曰宣帝常幸宣室齋居而決事陛下謂哲廟漢書髙帝紀贊曰協于火德自然之應得天統矣蔡雍曰羣臣與天子言不敢指斥呼陛下者言因卑逹尊之息也日月進亨衢經緯寒耿耿日月以言二聖易曰何天之衢亨老杜詩曰日月繼髙衢單襄公曰經緯不爽文之象也選詩云秋河曙耿耿西走巳和戎南遷無哀郢和戎謂不用兵于西夏左傳魏綘曰和戎有五利無哀郢謂遷客皆還也楚辭屈原九章有哀郢曰去故鄉而孰逺兮遵江夏以流亡又曰楫齊掦以容與兮哀見君而不再得郢蓋楚所都也誰言兩逐臣朝轡天街並文選君子行曰逐臣尚何有字本出法言晉書天文志曰昴曅之間為天街按實録元豐八年子由自績溪召還為右司諫而東坡亦以是時被召此句蓋喜二年得還朝王子竄炎洲萬死保軀命王子謂定國炎洲謂嶺表東方朔十洲記曰炎洲在南海中此借用言定國嘗謫賔州柳子厚詩萬死投荒十二年還家頰故紅信亦抱淵靜東坡與定國書曰君實嘗云王定國瘴煙窟裏五年靣如紅玉不知道能如此乎山谷後詩有遙憐鬚鬢緑之句亦同此意文選謝靈運詩曰兼抱濟物性莊子曰抱神以靜形將自正又曰其居也淵而靜稅屋待車音掃門親帚柄文選曹子建應詔書曰爰暨帝室稅此西墉李善注曰稅猶舍也孟子曰百姓聞王車馬之音掃門用漢書魏勃事淮南子曰慧出而授殷人其柄行當懷書傳載酒求是正載酒見前注後漢安帝紀詔五經博士是正文字端如嘗橄欖苦過味方永毆陽公詩又如食橄欖真味久愈在王立之詩話曰毆陽公謂梅聖俞詩始讀之則嘆莫能及後數日乃漸有味何止橄欖回味久方覺永按陸羽茶經注曰味長謂之雋永雋味也永長也次韻李之純少監惠硯黃公山下黃雞秋持節恤刑會少休寰宇記曰汝州葉縣有黃公山太白詩黃雞啄黍秋正肥書曰惟刑之恤哉小人負弩得開道掃葉張飮林巖幽山谷熙寧間嘗為葉縣尉漢書司馬相如傳縣令負弩矢先驅又曹參傳曰乃取酒張坐飲相傳有石非地産列仙持來自羅浮周禮曰以地産作隂德此借用漢書司馬相如傳曰列仙之儒羅浮山記曰羅浮二山合體在增盛博羅二縣之境茅君內傳曰羅浮山之洞周回五里名曰朱明曜真天酒酣步出雲雨上南撫方城西嵩丘史記藺相如傳秦王飲酒酒酣孟郊遊終南龍池寺詩曰步出白日上坐依清溪邉列子曰化人之宫出雲雨之上而不知下之據寰宇記葉縣有山城山左傳所謂楚國方城以為城即此也嵩山在西京與汝州西北之境相連林端乃見石空洞猛獸贔屭踞上頭晉書周顗傳曰此中空洞無物吳都賦曰巨鼇贔屭首冠靈山此借用以言石之狀古樂府陌上桑曰東方千餘騎夫壻居上頭老杜詩云東山氣濛鴻宫殿居上頭鳥道兔迒謀挽致萬牛不動五丁愁南中八志云交趾郡治龍編縣自興古烏道四百里李白蜀道難日西當太白有烏道爾雅曰子嬎其迹迒迒音罔兔迹也萬牛見前注蜀王本紀曰秦王欲伐蜀以路不通乃刻五石牛置金其後蜀人以為便金使五丁力士拖牛成道道家蓬萊見仙伯我亦洗湔與清流蓬萊見前注仙伯謂之鈍老杜詩諸公乃仙伯漢書昌邑王賀傳曰以湔灑大王退之詩懼終莫洗湔吳志賀卲傳曰遂使清流變濁北夢瑣言朱全忠賜裴樞等自盡李振曰此輩自謂清流宜投黃河永為濁流探囊贈研頗宜墨近出黃山非逺求乃知此山自才美物欲致用當窮搜魯論曰如有周公之才之美易曰備物致用立成器以為天下利莫大乎聖人迷邦故令成器晚不琢元非匠石羞魯論曰懷其寶而迷其邦老子曰大器晚成莊子曰匠石之齊至乎曲轉送舅氏野夫之宣城二首藉甚宣城郡風流數貢老寰宇記曰宣城本漢舊縣漢順帝立宣城郡即今宣州漢書陸賈傳名聲藉甚注云狼藉甚盛左傳芉尹無宇曰食土之毛謂非君臣霜林收鴨腳春綱薦琴髙毆陽公有謝梅聖俞寄銀杏詩曰鴨腳雖百箇得之城可珍又云霜野摘林實京師寄時新聖俞即宣州人琴髙鯉魚也列山傳琴髙為宋舍人後乘出鯉見其弟子毆陽公亦有琴髙魚詩後山嘗有句云霜林堆鴨腳春味薦貓頭今山谷乃有此句雖各極其妙豈非效此耶其理須良守今年輟省曹漢書循吏傳宣帝曰庶民所以安其田里而亡嘆息愁恨之心者政平訟理也與我共此者其唯良二千石乎後漢志曰世祖分尚書凡六曹平生割雞手聊試發硎刀魯論曰割雞焉用牛刀莊子曰刀刃若新發于硎試説宣城郡亭杯且細聽晚樓明宛水春騎簇昭亭寰宇記宣州漢為宛陵縣按地理今有宛溪水䆉稏豐墟戶桁楊臥訟庭杜牧之詩罷亞百傾稻西風吹半黃自注云罷亞稻名按切韻兩字皆從禾東坡録奏單鍔吳中水利狀曰諸縣髙原陸野之鄉皆有塘垿或三百畝五百畝為一垿蓋古人停蓄水以灌民田按今宣州有化或惠民垿等人戶莊子曰桁楊接槢音義云械夾頸及脛者謝靈運詩虛館絶諍訟空庭來鳥雀謝朓詩髙閣常晝掩荒階少諍詞按朓嘗守宣城故山谷用此事謝公歌舞處時對換鵝經言以燕處易榮觀之樂齊書謝朓為宣城郡太守太白廬山謠曰謝公行處蒼苔沒老杜詩回首可憐歌舞地秦中自古帝王州按文選鮑照燕城賦曰歌堂舞閣之基晉書王羲之傳山隂有道士好養鵝云為寫道德經當舉羣相贈耳送范德孺知慶州乃翁知國如知兵塞垣草木識威名乃翁見漢書頃羽傳謂文正公仲淹仁廟時趙元昊反公自請守鄜延徒知慶州又為環慶路經略安撫使決䇿取橫山彼靈武而元昊稱臣請和慶歷中為參知政事楊子法言曰使知國如知葬則吾以樗里疾為蓍龜漢書陳勝傳曰今假王驕不知兵權老杜詩一寄塞垣深唐書張萬福傳德宗曰朕謂江淹草木亦知爾威名敵人開戶玩處女掩耳不及雷驚霆孫子曰始如處女敵人開戶後如脫敵不及拒唐書李靖傳兵機事以速為神雷霆不及掩耳平生端有活國計百不一試薶九京文選孫楚與孫皓書曰愛民活國俗作多作治國非是又按南史王廣之子珍國為南譙太守髙宗手敕云卿愛人活國甚副吾意柳子原作吕衡州誄曰萬不試而一出焉猶為當世甚重禮記晉獻文子曰從先大夫于九京注謂晉卿大夫之墓地在九京京蓋字之誤阿兄兩持慶州節十年騏驎地上行阿兄謂文正仲子宣忠公也忠宣名純仁字堯夫神宗熙寧七年十月知慶州元豐八年哲宗即位又自河中徙慶州事具實録及會子開所作公墓志南史張融哭張緒曰阿兄風流頓盡老杜詩近聞下詔喧都邑肯使麒麟地上行潭潭大度如臥虎邉頭耕桑長兒女後漢書鄧禹傳沈深有大度退之詩潭潭府中居此借用臥虎言不動聲色為敵人所畏如此北史王羆傳所為老羆當道臥貂子安得過者也後漢書董宣傳曰京師號為臥虎此借用老杜詩邉頭公卿仍獨驕尺詩别家長兒女前漢書藝文志曰勸耕桑以足衣食食貨志曰為吏者長子孫髙帝紀吕公曰此非兒女子所知折衝千里雖有餘論道經邦正要渠晏子春秋范昭謂晉平公曰齊未可并吾欲試其君晏子知之吾欲犯其樂太師知之於是輟伐齊謀孔子聞之曰不出樽爼之間而折衝千里之外晏子之謂也書曰兹惟三公論道經邦老杜憶弟詩吟詩正憶渠妙年出輔父兄處公自才力應時須後漢朱穆傳更選海內清淳之士明達國體者以補其處文選曹植求自試表曰終軍以妙年使越楞嚴經彌勒菩薩言今得授記次補佛處漢書司馬遷傳曰願竭其不肖之才力老杜詩竇氏檢察應時須春風旍旗擁萬夫幕下諸將思草枯旍與旌同文選王子淵四子講德論曰甲士寢而冷旗仆文選李陵書曰涼秋九月塞外草衰王維詩草枯鷹眼疾按禮記月令孟夏行冬令則草木早枯智名勇功不入眼可用折箠笞羌胡孫子曰善戰者無智名無勇功世説謝安問殷浩眼往屬萬形萬形入眼否後漢書鄧禹傳光武曰赤眉來東吾折箠笞之竇融傳曰河西斗絶在羌胡中題王黃州墨迹後王禹稱字元之咸平中自西掖謫知黃州掘地與斷木智不如機春聖人懷餘巧故為萬物宗易繫詞曰斷木為杵掘地為臼臼杵之利萬民以濟傅暢晉諸公贊曰杜預作連機水磑由此洛中榖米豐賤孟郊城南聨句曰機春潺湲力考工記曰智者創物巧者述之老子曰淵乎以萬物之宗世有斫泥手或不待郢工言匠手雖巧亦必待能受之質也莊子曰莊子過惠子之墓謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而傷郢人立不失容宋元君聞之召匠石匠石曰嘗試為我為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣此篇上六句蓋言黃州鋒穎太甚惜其不能藏用也郢人漢書音義作懮人服虔云懮人占之善塗暨者往時王黃州謀國極匪躬朝聞不及夕百壬避其鋒漢書昭帝紀詔日往時令民共出焉禮記四郊多壘注日辱其謀人之國不能安也易曰王臣蹇蹇匪躬之故晉書傅休奕天性峻急每有奏劾或值日暮捧白簡整𢃄竦踊不寐坐而待旦于是貴遊懾氣臺閣生風此句頗采其意書曰何畏乎巧言令色孔壬注謂甚佞也漢書王啇傳張匡曰百姦之路塞梅福傳曰莫敢觸其鋒九鼎定盤石一身轉孤蓬謂國安而身危九鼎見前注荀子富國篇曰國安于盤石夀于箕翼注云盤石盤薄大石也文選曹子建詩轉蓬離本根飄飄隨長風又鮑照蕪城賦曰孤蓬自振元之嘗作三黜賦謂貶啇滁黃也在黃州作竹樓記曰四年之間奔走不暇未知明年又在何處東坡作元之豐像贊亦曰元之以雄文直道獨立當世方是時朝廷清明無大姦慝然公猶不容于中耿然如秋霜夏日不可玩狎至于三黜以死蓋元之初為司諫知制誥疏雪徐鉉貶啇州副團召歸為翰林學士孝章后崩不成服元之以為非坐訕謗出守滁州召還知制誥撰太祖徽號玉册語涉輕詆時相不悅奏黜黃州未幾徙州遂卒浮雲當日月白髮昭秋空淮南子曰日月欲明而浮雲蓋之蘭芝欲修而秋風敗之文選古詩浮雲蔽曰日遊子不顧反諸君發蒙耳汲直與臣同漢書汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至説公孫𢎞等如發蒙耳賈捐之傳曰置之爭臣則汲直注云汲黯方直故世謂之汲直東坡畫贊亦引汲黯公孫𢎞事太宗嘗面戒元之曰卿文章不下韓桞但剛不容物人多沮卿使朕難芘題王仲弓兄弟巽亭大隗七聖迷莊子曰黃帝將見大隗乎具茨之山方明為御昌寓驂乘張若謵朋前馬昆暗滑稽後車至于襄城之野七聖皆迷無所問途疏云大隗至人也按寰宇記隗山在許州長社縣具茨山在許宇州陽翟縣北仲弓蓋許州許田連城皇春秋鄭伯以璧假許田文選魏文帝與鐘大理送玉玦書曰價越萬金貴重連城寰宇記魯城在許州長社縣鄭伯請以太山之祊易許田即此城也里中多佳樹與世作梁棟漢書陳平傳曰里中社平為宰左傳曰季孫氏有嘉樹老杜古柏行大厦如傾要梁棟市門行清渠潩水可抱甕史記貨殖傳刺繡文不如倚市門老杜詩清渠一邑傳按文選蜀都賦曰哢吭清渠水經曰潩水出河南密縣大騩山東南入于潁説文注潩音與職反玉篇潩音夷記反莊子曰漢隂文人抱甕灌畦翬飛城東南隱几撫羣動斯干詩如翬斯飛莊子曰南郭子綦隱几而坐又曰俯仰之間而再撫宇宙淵明詩曰入羣動息人境要俱爾我乃得大用傳燈録涿州紙衣和尚問臨濟如何是人境俱不奪曰王登寶殿野老唱歌師曰如何是人境俱奪曰井已信獨處一方師于言下領旨深入三玄三要之門又仰山云百文得大用黃蘖得大機烏衣之雲孫昆弟不好弄世説王導曰元規若來魯角巾還烏衣注引丹陽記曰烏衣之起吳時烏衣營處所也江左初立琅邪諸王所住按寰記烏衣巷在今建康上元縣爾雅宇日仍孫之子為雲孫注云言輕逺如浮雲左傳曰夷吾弱不好弄木末風雨來卷箔醉賔從離騷曰塞芙蓉于木末王勃滕王閣序珠簾暮捲兩山而事常超然觀樂與賢者共老子曰雖有榮觀燕處超然南有嘉魚詩序曰太平之君子至誠樂與賢者共之此借用人登斷龍求我自歸鴻送孟子曰有賤大夫焉必求龍斷而登之以左右望而罔市利注云龍斷謂堁斷而髙者也文選嵇康詩曰目送歸鴻手揮五絃溪毛亂錦纈候蟲響機綜左傳曰澗溪沼沚之毛退之詩風蟬碎錦纈鮑照白紵曲曰寒光瀟條候蟲急劉禹錫秋聲賦曰夜蟲鳴兮機杼促韻書曰綜機縷也世紛甚峥嶸胸次欲空洞文選顔延年作陶淵明誄云遂乃解體世紛結志區外李善注引嵇康詩曰世務紛紜廣雅曰峥嶸髙貌楚詞曰下峥嶸兮無地莊子曰喜怒哀樂不入于胸次晉書周顗傳王導嘗枕顗膝而指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人讀書開萬卷謀國妙百中老杜詩讀書破萬卷史記養由基射楊葉百發百中儻無斫鼻工聊付曲肱夢斫鼻工見前注魯論曰曲肱而枕之樂亦在其中矣寄尉氏倉官王仲弓嘯臺有佳人玄髮鑑笄珥寰宇記阮籍臺在開封陳留縣東南籍每追名賢擕酌長嘯登此左傳曰昔有仍氏女生鬒黑而甚美光可以鑑名曰玄妻樂正后夔取之列子曰正蛾眉設笄珥登髙歌一曲聽者傾城市漢書李夫人傳李延年歌北方有佳人絶世而獨立一顧傾人城再顧傾人國門無行媒迹草木倚憔悴禮曰男女非有行媒不相知名老杜詩絶代有佳人幽居在空谷自云良家子零落依草木又云天寒翠袖薄曰暮倚修竹史記屈原傳顔色憔悴人物方眇然誰能委圭幣王羲之帖云蔡公遂委篤深可憂當今人物眇然而艱疾若此令人短氣左傳曰鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉晉禮志太康八年有司奏大婚古者以皮馬為庭實天子加以轂圭諸候加大璋漢書文帝詔曰朕獲執犧牲圭幣此借用其字山谷內集詩注卷二
