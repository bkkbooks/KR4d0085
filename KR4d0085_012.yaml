body:
  text: 山谷內集詩注卷十二宋黃庭堅撰任淵注竹枝詞二首并跋撑崖拄谷蝮蛇愁入箐攀天猿掉頭言山路險絶如此即後詩所謂蛇倒退胡孫愁也郭璞注爾雅云蝮蛇細頸大頭焦尾一名返鼻楚辭曰攀天階而下視元稹樂府有夢上天詩曰攀天上天攀未得太白蜀道難曰黃鶴之飛尚不得過猿猱欲度愁攀緣老杜詩巢父掉頭不肯住鬼門關外莫言逺五十三驛是皇州鬼門關在峽州路寰宇記曰黔州東北至東京三千八百六十五里杜牧之詩故鄉七十五長亭謝晀詩春色滿皇州浮雲一百八盤縈落日四十八渡明一百八盤及四十八渡皆自峽中行黔中路名山谷書萍鄉縣廳亦曰略江陵上夔峽過一百八盤涉四十八渡詩本或作四十九渡非是鬼門關外莫言逺四海一家皆弟兄子夏曰君子敬而無失與人恭而有禮四海之內皆兄弟也荀子四海之內若一家古樂府有巴東三峽巫峽長猿鳴三聲淚霑裳但以抑怨之音和為數疊惜其聲今不傳豫自荆州上峽入黔中備嘗山川險要因作二疊與巴娘令以竹枝歌之前一疊可和云鬼門關外莫言逺五十三驛是皇州後一疊可和云鬼門關外莫言逺四海一家皆弟兄或各用四句入陽關小秦王亦可歌也紹聖二年四月甲申夢李白誦竹枝詞三疊余既作竹枝詞夜宿歌羅驛夢李白相見於山間曰豫往謫夜郎於此聞杜鵑作竹枝詞三疊世傳之不子細憶集中無有請三誦乃得之一聲望帝花片飛萬里明妃雪打圍蜀記曰昔人有姓杜名宇號曰望帝宇死俗説云化為子規子規鳥名也又謂之杜鵑李商隱詩莊生曉夢迷胡蝶望帝春心托杜鵑楚騷曰恐鷤鴂之先鳴兮使百草為之不芳顔師古注揚雄反離騷云一名子規一名杜鵑花片飛見前注明妃即王昭君避晉氏諱後人因改焉亦見前注五代史四夷附録耶律德光言我在上國以打圍食肉為樂接北人以遊獵為打圍馬上征人那解聽琵琶應道不如歸劉熙釋名云琵琶北方馬上之所鼓推手前曰琵引手却曰琶因以為名也傅奕琵琶賦序曰故老云漢烏孫公主念其行道思慕使知音者于馬上奏琵琶以慰之此詩以琵琶為明妃事蓋承前人之誤子規聲若云不如歸去此引用以終上句之意竹竿坡面蛇倒退摩圍山腰胡孫愁蛇倒退胡孫愁皆峽路地名摩圍山屬黔中杜鵑無血可續淚何日金雞赦九州老杜杜鵑行曰其聲哀痛口流血所訴何事常區區李賀詩亦曰杜鵑口血老夫淚韓非子曰卞和泣盡繼之以血太白詩我愁逺謫夜郎去何日金雞放赦回談苑曰杜鎬言肆赦樹金雞不知起于何代關東風俗傳云司馬膺之曰接海中星占天雞星動為有赦蓋王者以天雞為度隋書刑法志北齊肆赦日令武軍設金雞及鼓于闕門或云起于西涼吕光未知孰是究其旨西方主兑兌為澤雞者巽之神巽為號令故合是二物制其形揭于長竿使衆人覩之也命輕人鮓甕頭船日瘦鬼門關外天北人墮淚南人笑青壁無梯聞杜鵑人鮓甕在歸州岸下老杜無家別云久行見空巷日瘦氣慘悽文選琴賦曰青壁萬尋張湛列子注曰班輸為梯可以凌虛和答元明黔南贈別山谷書萍鄉縣廳曰初元明自陳留出尉氏許昌渡漢沔略江陵上夔峽過一百八盤涉四十八渡送余安置于摩圍山之下淹留數月不忍別士大夫共慰勉之乃肯行掩淚握手為萬里無相見期之别萬里相看忘逆旅三聲清淚落離觴老杜詩相看俱衰年左氏僖二年傳曰保于逆旅注云客舍也古樂府曰巴東三峽巫峽長猿鳴三聲淚沾裳朝雲往日攀天夢夜雨何時對榻涼上句謂與元明同來巫峽也朝雲夢見前注元稹樂府有夢上天詞曰攀天上天攀未得韋應物詩寧知風雨夜復此對牀眠東坡詩夜雨何時聽蕭瑟急雪脊令相並影驚風鴻鴈不成行上句謂元明同憂患下句言其別去詩曰脊令在原兄弟急難老杜詩急雪舞回風又詩沙晚脊令寒選詩云驚風扶輪轂又沈休文詠湖中鴈詩曰亂起未成行唐宋遺史有女子作詩送兄云所嗟人異鴈不作一行歸歸舟天際常回首從此頻書慰斷腸謝朓詩天際識歸舟王仲宣詩回首望長安蔡琰胡笳曰日東月西兮徒相望不得相隨兮空斷腸文選魏文帝燕歌行曰念君客遊思斷腸題驢瘦嶺馬鋪知命卷此下十九詩皆黃知命作附録內知命山谷之弟詳具目録注老馬飢嘶驢瘦嶺病人生入鬼門關後漢書班超傳上疏曰但願生入玉門關此借用病人甘作五溪卧老馬猶思十二間五溪見前注魏武帝歌曰老驥伏櫪志在千里同禮校人曰天子有十二間馬六種行次巫山宋懋宗遣騎送折花厨醖知命攻許愁城終不開青州從事斬關來庾信愁賦曰攻許愁愁城終不破蕩許門終不開青州從事見前注左傳曰犯門斬關喚得巫山強項令插花傾酒對陽臺後漢董宣傳曰敕強項令出宋玉高唐賦曰朝朝暮暮陽臺之下謂巫山神女也次韻懋宗送別二首知命一百八盤天上路去年明日送流人小詩話別堪垂淚却道情親不得親一百八盤見前注盧全寄外兄詩云何處堪惆悵情親不得親別駕柴門閉一春艱難顛沛不忘君何時幽谷回天日教保餘生出瘴雲山谷謫涪州別駕唐書杜甫傳當冦亂挺莭無所汙為歌詩傷時撓弱情不忘君魯論曰顛沛必于是易曰入于幽谷老杜詩願枉長安日光耀照北原文選嵇康書欲離事自全以保餘年老杜詩瘴雲紅不滅戲答劉文學知命人鮓甕中危萬死鬼門關外更千岑人鮓甕鬼門關見前注漢書趙后傳曰今兒安在危殺之矣注云猶今人言險不殺爾問君底事向前去要試平生鐵石心顔師古匡謬正俗云問曰謂何物為底丁兒反底義何訓答曰此本言何等物其後遂省促言直云等物爾音都禮反又轉音丁兒反應璩百一詩云用等稱才學以是知去何而稱等其來已久今人不詳根本乃作底字非也老杜詩生死向前去魏武帝令長史王必曰忠能勤事心如鐵石國之良吏也外姪李光祖往見尚垂髫今觀寄嗣直小詩已可愛因次韻知命昔別長安未裹頭如今詩句可消愁老杜詩昔別君未婚又詩去時里正與裹頭又詩云更有澄江消客愁外家未覺風流逺他日相期到益州李公擇終于益州帥言異時當造益州之閫域老杜詩習池未覺風流盡上南陵坡知命風飱水宿六十里蛇退猿啼百八盤選詩風餐委松柏又詩水宿淹晨昏上得坡來總歡喜摩圍依約見峯巒摩圍山在黔州老杜詩青惜峯巒過題小猿呌驛知命大猿呌罷小猿啼箐裡行人白晝迷惡藤牽頭石齧足嫗牽兒隨淚録續我亦下行莫啼哭退之琴操曰涉其淺兮石齧我足元稹連昌宫詞曰色管龜兹轟録續馬上口號呈建始李令知命驛亭新似眼波明箐路開如掌樣平誰與長官歌美政風搖松竹是歡聲老杜詩今日明人眼臨池好驛亭宋玉招魂曰娛光眇視目曾波些王逸注云目采聁然若水波而重華老杜詩秦川對酒平如掌次浮塘驛見張施州小詩次其韻知命歎息施州成老醜當年玉雪瑩相照退之馬少監墓志曰姆抱幼子立側肌肉王雪可念舊時去天一尺五今日萬里聽猿呌老杜詩自注云城南韋杜去天尺五將次施州先寄張十九使君三首知命書來日日覺情親今信施州是故人許我投名重入社放狂作惱未應嗔老杜詩情親獨有君東坡詩投名入杜有新詩收拾從來古錦囊今知老將敵難當唐書李賀傳從小奚奴背古錦囊遇所得投書囊中漢書韓信傳曰其鋒不可當囊中尚有毛錐子花底樽前作戰場五代史𢎞肇傳恨蘇逄吉等因曰安朝廷定禍亂直須長槍大劍若毛錐子安足用哉史記平原君傳曰賢之處世譬若錐之處囊中其末立見老杜詩花底山蜂逺趁人又詩下馬古戰場丁晉公有詩戰詩云物華如陳筆如鋒沈謝曺劉是七雄一别施州向十霜傳聞佳句望風降空弮不易當堅敵振臂猶思起病創老杜詩十暑岷山䓪三霜楚户砧漢書李陵傳矢盡道窮士張空弮注云弓弩弮也又丐奴傳曰真中國之堅敵按孫子曰小敵之堅大敵之禽也李陵書振臂一呼創病皆起和張仲謀送別二首知命夜郎自古流遷客聖世初投第一人不是施州肯回首五溪三峽更誰親唐書李白傳長流夜郎夜郎即今之珍州其地與黔中相接江淹恨賦曰遷客海上流戍隴隂五溪見前注峽程記曰三峽者即明月峽巫山峽廣澤峽其瞿唐灔澦燕子屏風之類皆不係三峽數五溪三峽漫經春百病千愁逢故人何處看君嵗寒後欲將兒女更論親肯與黨錮連姻其氣節亦可尚矣次韻答清江主簿趙彥成知命日轉溪山幾百遭厭聞虎嘯與猿號劉禹錫詩百匝千遭繞郡城此用其字老杜詩熊羆咆我東虎豹號我西淮南子虎嘯而谷風至又曰白猿擁樹而號笙歌忽抱二天酒風雨猶驚三峽濤後漢蘇章傳遷冀州刺史故人為清河太守為設酒肴甚歡太守喜曰人皆有一天我獨有二天已作齊民尋要術安能痛飲讀離騷後魏賈思協作齊民要術言田家種植之事世説王孝伯言痛飲讀離騷自可稱名士看君自是青田質清淚猶堪徹九皋永嘉郡記沭溪去青田九里中有一雙白鶴多云神所養晉書陸機傳曰華亭鶴唳豈可復聞乎詩云鶴鳴于九皋宋懋宗寄夔州五十詩三首知命五十清詩是碎金試教擲地有餘音方今臺閣稱多士且傍江山好處吟老杜詩云清詩近道要晉書謝安傳桓溫以安所作簡文諡議示坐賓曰此謝安石碎金也又孫綽傳作天台山賦以示范榮期云卿試擲地當作金石聲通典曰後漢事歸臺閣史記屈原傳曰行吟澤畔五十清詩一假冰持來却得慰愁生自張壁間行坐看更教兒誦醉時聽老杜詩炯如一假清冰出萬壑又詩江草日日喚愁生又詩行坐白頭吟又有醉時歌碑同峴首千年石詩到英州十絶歌他日巴人懷叔子時時解著手摩挲晉書羊祜傳祜字叔子襄陽百姓于峴建此碑望者草不流涕杜預因名為墮淚碑老杜有夔州歌十絶句退之石鼓歌曰誰復著手為摩挲題蘇若蘭回文錦詩圖千詩織就回文錦如此陽臺暮雨何亦有英靈蘇蕙手只無悔過竇連波晉書竇淹妻蘇氏名蕙字若蘭淹苻堅時為秦州刺史被徙流沙蘇氏思之織錦為回文旋圖詩以贈淹宛轉循環以讀詞甚悽惋次韻楊明叔四首并序楊明叔惠詩格律詞意皆薰沐去其舊習豫為之喜而不寐文章者道之器也言者行之枝葉也故次韻作四詩報之耕禮義之田而深其耒明叔言行有法當官又敏于事而恤民故豫期之以逺者大者魚去遊濠上鶚來止坐隅濠梁見前注漢書賈誼傳曰誼為長沙傅三年有鵩飛入誼舍止于坐隅鵩似梟不祥鳥也誼乃為賦以自廣吉凶終我在憂樂與生俱上句終梟來之意下句終魚樂之意鵩賦曰禍兮福所倚福兮禍所伏憂喜聚門吉凶同域書曰惟吉凶不愆在人莊子至樂篇曰人之生也與憂俱生夀者惛惛久憂不死何之苦也涅槃經摩那臨終佛至其所慰諭曰身所經處與苦樂俱當修涅槃永離苦樂詩意謂吉凶憂樂皆因我有茍能無我彼何從生山谷與王子飛書曰人固與憂樂俱生者也于其中有簡擇取捨以至于六鑿相攘日尋干戈古之學道者深探其本以無諍三昧治之所以萬事隨緣是安樂法決定不是物方名大丈夫圓覺經曰生決定信傳燈録南泉廣語云大德莫認心認佛設得認是境被他喚作所知愚故江西大師云不是心不是佛不是物且教你後人恁麼行履孟子曰此之謂大丈夫同安禪師十玄談曰丈夫皆有衝天氣不向如來行處行今觀由也果老子欲乘桴並見魯論由也以比明叔老子山谷自謂言明叔志趣勇決必能相從浮于東海也後漢馬援傳云頗哀老子使得遨遊山谷和楊明叔隅字韻七詩皆謂之頌今彭山黃氏有此真迹二頌此集所無當是晚年刪去道常無一物學要反三隅老子曰道常無名傳燈録六祖偈曰菩提本非樹明鏡亦非臺本來無一物何假拂塵埃反三隅見魯論喜與嗔同本嗔時喜自俱嗔喜雖殊本同一性衆狙喜怒即可見矣傳燈録龍樹偈曰于法心不澄無嗔亦無喜心隨物作宰人謂我非夫心隨物轉物反為主非大丈夫事也楞嚴曰一切衆生從無始來迷已為物失于本心為物所轉傳燈録第二十一祖付法偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂圓覺經曰由有無始本起無明為已主宰傳燈録元沙廣語曰如許多田地教誰作主宰左傳彘子曰命為軍帥而卒以非夫注云非丈夫也利用兼精義還成到岸桴易曰精義入神以致用也利用安身以崇德也佛書以波羅密為到彼岸全德備萬物大方無四隅莊子曰而況全德之人也孟子曰萬物皆備于我矣反身而誠樂莫大焉老子曰大方無隅淮南子曰經營四隅髙誘注云隅方也身隨腐草化名與太山俱謂聞道而死雖與草木俱腐固有不亡者存謝靈運詩一隨往化滅安用空名揚此反而用之禮記月令季夏腐草為螢此借用史記藺相如傳太史公曰相如名重太山選詩曰名與天壤俱道學歸吾子言詩起老夫禮記中庸曰尊德性而道問學注云道猶由也問學學誠者也魯論曰起豫者商也始可與言詩巳矣無為蹈東海留作濟川桴史記魯連傳曰則連有蹈東海而死爾此借用言不必乘此桴以浮于海留為濟川之具可也書説命曰若濟巨川用汝作舟楫匹士能光國三孱不滿隅彭山黃氏本此詩蓋再次韻之第二章禮記曰匹士大牢而祭謂之攘文選辨亡論曰風雅則諸葛瑾張承步隲以名聲光國晏子春秋曰五子不滿隅一子滿朝按黃氏本有山谷自注亦引此語但以五為三爾詩意謂豪傑之士雖少足以為邦家之光孱懦之夫雖衆曽不足充滿一隅也竊觀今日事君與古人俱黃氏本作今者事此云今日當是晚年所改言士之可以光國者今世未見獨明叔可期以古人也左傳曰今日之事我為政此借用老杜詩生還今日事莊子曰成而上比者與古為徒氣類鶯求友精誠石望夫文選任彥升作王文憲集序曰許與氣類伐木詩曰嚶其鳴矣求其友聲詩人相承以嚶為鶯莊子曰真者精誠之至也不精不誠不能動人又注曰鄭人緩精誠之至故死為秋柏之實劉義慶幽明録曰武昌北山上有望夫石狀若人立古傳云昔有貞婦其夫從役攜弱于餞送此立山望夫而化為石因以名焉雷門震驚手待汝一援桴黃氏本山谷自注曰禮運云蕢桴而土鼓説者曰桴鼓椎也然則枹亦通于桴望其振發聲名于當時也荀子曰聲名之剖發于天地之間豈不如日月雷霆然哉漢書王尊傳曰母持布鼓過雷門注云雷門會稽城門也有大鼓越擊此鼓聲聞洛陽易曰震驚百里史記司馬穰苴傳曰援枹鼓之急則忘其身枹亦作桴按禮運疏引皇氏云桴謂擊鼓之物左傳曰右援枹而鼓音義云枹鼓椎也再次韻并序庭堅老懶衰惰多年不作詩已忘其體律因明叔有意于斯文試舉一綱而張萬目蓋以俗為雅以故為新百戰百勝如孫吳之兵棘端可以破鏃如甘蠅飛衛之射此詩人之竒也明叔當自得之公眉人鄉先生之妙語震耀一世我昔從公得之為多故今以此事相付窮竒投有北鴻鵠止丘隅我已魑魅禦君方燕雀俱窮竒魑魅之語山谷以自況鴻鵠燕雀之語以屬明叔退之詩我來禦魑魅自宜味南烹按左傳太史克曰少皡氏有不才子謂之窮竒舜臣堯流四凶族渾敦窮竒搗杌叨餮投諸四裔以禦魑魅巷伯詩曰取彼譖人投畀豺虎豺虎不食投畀有北綿蠻詩曰綿蠻黃鳥止于丘隅注云綿蠻小鳥貌此借用言丘隅非鴻鵠所宜止也漢書陳勝傳曰燕雀焉知鴻鵠之志道應無蒂芥學要盡工夫漢書賈誼鵩鳥賦曰德人無纍知命不憂細故蒂芥何足以疑子虛賦注曰蒂芥刺鯁也南史王僧虔云宋文帝書天然勝羊欣工夫少于欣此並借用孔毅甫雜録曰工夫或作功夫魏志王肅傳泰極已前工夫尚大莫斬猿狙杙明堂待棟桴黃氏本山谷自注曰靈光殿賦曰荷棟桴而髙驤詩言當養成其材勿小用之也莊子曰宋有荆氏者宜楸柏桑其拱把而上者求狙猴之杙者斬之音義云杙音以職反欲以栖戲狙猴也班因西都賦曰列棼橑以布翼荷棟桴而髙驤注引爾雅棟謂之桴山谷以西都為靈光誤謫居黔南十首摘樂天句近世曾慥端伯作詩選載潘邠老事云張文潛晚喜樂天詩邠老聞其稱美輒不樂嘗誦山谷十絶句以為不可跂及其一云老色日上面歡悰日去心今既不如昔後當不如今文潛一日召邠老飲預設樂天詩一帙置書室牀枕間邠老少焉假榻翻閲良久才悟山谷十絶詩蓋用樂天大篇裁為絶句蓋樂天長于敷衍而山谷巧于翦裁自是不敢復言端伯所載如此必有依據然敷衍翦裁之説非是蓋山谷謫居黔南是取樂天江州忠州等詩偶有會于心者摘其數語寫置齋閣或嘗為人書世因傳以為山谷自作然亦非有意與樂天較工拙也詩中改易數字可為作詩之法故因附見于此前五篇今豫章集有之後五篇得之修水集相望六千里天地隔江山十書九不到何用一開顏此樂天集第十卷中寄行簡詩原作相去六千里地絶天邈然十書九不達何以開憂顏霜降水反壑風落木歸山冉冉歲華晚昆蟲皆閔關此十一卷中歲晚詩後兩句原作冉冉歲將晏物皆復本源泠淡病心情暄和好時節故園音信斷逺郡親賓絶此十一卷中花下對酒詩山郭燈火稀峽天星漢少年光東流水生計南枝鳥此十一卷中西樓夜詩冥懷齊逺近委順隨南北歸去誠可憐天涯住亦得此十一卷中委順詩老色日上面歡悰日去心今既不如昔後當不如今此十一卷中東城尋春詩歡悰原作歡情嘖嘖雀引雛梢梢笋成竹時物感人情憶我故鄉曲此第十卷中盂夏思渭村舊居詩苦雨初入梅瘴雲稍含毒泥秧水畦稻灰種畬田粟與前篇同輕紗一幅巾小簟六尺牀無客盡日靜有風終夜涼此十一卷中竹窗詩病人多夢醫囚人多夢赦如何春來夢合眼在鄉社一本作秋來何所夢合眼見鄉社樂天集第十卷寄行簡詩原作渴人多夢飲飢人多夢餐春夢夢何處合眼到東川贈黔南賈使君緑髮將軍領百蠻橫戈得句一開顔孟郊詩酒人皆倚春髮緑病叟獨藏秋髮白通典曰後漢有領烏桓校尉詩曰因時百蠻南史垣榮祖傳曰曹操曹丕上馬橫槊下馬談論元稹作老杜墓銘敘曰曹操父子往往橫槊賦詩戰國䇿曰衛行人燭過免胄橫戈而進老杜詩今代橫戈矛謝靈運詩開顔披心胸少年圯下傳書客老去空同問道山别本注云信臣家世有北園在崆洞山下氣象雄壯花木茂密漢書張良傳遊下邳圯上有一老父出一編書曰讀是則為王者師旦日視其書乃太公兵法莊子曰黃帝問廣成子在于空同之上往見之曰敢問至道之精按寰宇記云禹迹之內山名空同者三其一在臨洮其一在安定其一在汝州黃帝問道之山專指汝州然此詩所用未必汝州也春入鶯花空自笑秋成梨棗為誰攀兩句皆言故園無主之意老杜詩鶯花隨世界又詩庭前八月梨棗熟文選謝靈運詩攀林摘葉倦鮑明逺詩端為誰辛苦何時定作風光主待得征西鼓吹還言使君平定西夏功名巳立始歸故園也老杜詩傳語風光共流轉暫時相賞莫相違退之詩山公自是園林主魏志注曹公令曰欲望封侯作征西將軍南史曹景宗傳破魏師振旅凱入賦詩曰去時兒女悲歸來笳鼓競借問行路人何如霍去病吳志諸葛恪傳孫權令恪備威儀作鼓吹導從歸來次韻雨絲雲鶴二首晉張協詩騰空似湧煙密雨如散絲煙雲杳藹合中稀霧雨空濛密更微舊作隔雲朝日看餘輝六合空濛密更微歐陽公峴山亭記草水雲煙之杳靄出沒于空曠有無之間退之詩杳靄深谷攢青楓楚詞曰霧雨淫淫選詩空濛如薄霧園客繭絲抽萬緒蛛蝥網面罩羣飛繭絲舊作繭盆神仙傳曰園客者種五色香草忽有五色蛾集其上有一女自來助客養繭得繭大如甕繅訖此女子與客俱仙去文選張茂先詩將抽厥緒列子曰擾擾萬緒起矣蛛蝥見演雅注論衡曰蜘蛛細絲以網飛蟲退之祭桞子厚文曰羣飛刺天罩字如詩所謂蒸然罩罩風光錯綜天經緯草木文章帝杼機謝朓詩風光草際浮錯綜見易繫詞又左傳序曰進不成為錯綜經文以盡其變國語曰經緯不爽文之象也北史祖瑩傳曰文章須自出機杼成一家風骨文選郭泰機詩曰不得秉杼機願染朝霞成五色為君王補坐朝衣杜牧之詩曰平生五色線願補舜衣裳詩曰衮職有闕維仲山甫補之幾片雲如薛公鶴精神態度不曽齊老杜詩洮雲片片黃又詩薛公十二鶴皆寫青田真低昻各有意磊落如長人按張彥逺名畫記薛稷字嗣通善花鳥人物雜畫畫鶴知名孟子曰物之不齊物之情也安知隴鳥樊籠密便覺南鵬羽翼低禰衡鸚鵡賦曰閉以雕籠注云隴坻出此鳥淵明詩久在樊籠裏復得反自然莊子曰鵬翼若垂天之雲海運則將徙于南冥風散又成千里去夜寒應上九天栖相鶴經曰飛則一舉千里唐托言楊衡詩一一鶴聲飛上天孫子曰善攻者動于九天之上廣雅有九天名亦曰九野坐來改變如蒼狗試欲揮毫意自迷老杜詩天上浮雲似白衣須臾改變如蒼狗又曰危時暫相見衰白意都迷按列子曰穆王意迷心喪從斌老乞苦筍黃斌老文湖州之妻姪見于山谷題跋南園苦笋味勝肉籜龍稱寃莫采録盧同寄男詩曰籜龍正稱寃莫殺入汝口丁寧囑託汝汝活籜龍不煩君更致蒼玉束明日風雨皆成竹禮記玉藻曰大夫佩水蒼玉樂天食笋詩且食勿踟蹰南風吹作竹吹韻黃斌老所畫橫竹酒澆胸次不能平吐出蒼竹嵗崢嶸酒澆胸中見前注退之送髙間序曰酣醉無聊不平有動于心于草書發之鮑明逺舞鶴賦曰嵗崢嶸而愁暮注云嵗之將暮猶物之髙此引用以言嵗寒卧龍偃蹇雷不驚石與此君俱忘形蜀志諸葛亮傳徐庶謂先主曰孔明卧龍也此引用以比竹偃蹇見前注莊子曰疾雷破山風振海而不能驚晉露王徽之傳居空宅便令種竹曰何可一日無此君耶老杜詩忘形到爾汝痛飲真吾師按莊子曰養志者忘形晴􅑵影落石泓處松煤淺染飽霜兔退之毛穎傳以瓦硯為恆農陶泓此云石泓即石硯可知歐陽公詩谷泉含石泓飽霜兔見前注中安三石使屈蟠亦恐形全便飛去名畫記云張僧繇于金陵安樂寺畫四龍不點眼睛每云點之即飛去人以為誕妄因請點之須臾雷霆破壁二龍上天二龍不點睛者見在此借用以終卧龍之意南史卞彬傳曰我詩須大才迮之不爾便飛去此云三石即用大材之意杜詩沈吟屈蟠樹莊子曰形全精復與天為一次韻謝黃斌老送墨竹十二韻古今作生竹能者未十輩東坡先生作文與可畫偃竹記曰竹之始生一寸之萌耳而節葉具焉自蜩腹蛇蚹以至于劍拔十尋者生而有之也今畫者乃節節而為之葉葉而纍之豈復有竹乎漢書婁敬傳曰使者十輩來吳生勒枝葉筌宷逺不逮山谷有道臻師畫墨竹序曰墨竹出于近世不知其所師承吳道子作畫其運筆作弮不加丹青已極形似故世之精識博物之士多藏吳生墨本至俗子乃衒丹青耳意墨竹之師近出于此山谷又跋臻師墨竹云嫩篁翠篠極難為工能妙者惟吳生耳所以文與可多作老竹枯木霜風寒雀挾帶煙雨以助其筆勢江南李氏勒圈作竹葉其畫與褚栁正書同法劉道醇名畫評曰黃筌字要叔蜀中人善丹青尤好花竹翎毛凡所操筆皆迫于真與其子居寀從孟昶歸朝居宷字伯鸞亦善畫竹有父風蘇易簡得筌墨竹圖李宗諤作賀其序曰工丹青花竹者必用五色惟筌以墨染竹獨得意于寂寞間魯論曰恥躬之不逮也江南鐵鉤鎖最許誠懸會山谷自注曰世傳江南李主作竹自根至梢極小者二鈎勒成謂之鐵鈎鎖自云惟栁公權有此筆法按唐書公權字誠懸劉道醇名畫評曰南唐後主李煜好金索書有唐希雅者嘗學之乘興縱竒因其戰掣之勢以為竹樹與山谷之説小異今因附見燕公灑墨成落落與時背國朝燕肅侍郎雅善墨竹米芾畫史曰肅字穆之師李成後漢耿弇傳光武曰將軍前在南陽建此大䇿嘗以為落落難合班固答賓戲曰功不得背時而獨彰樂天詩性將時共背譬如刳心松中有嵗寒在寒山子詩曰有樹先林生計年逾一倍根遭陵谷變葉為風霜改咸笑外凋殘不憐內文彩皮膚既脫落惟有真心在蓋用涅槃經語也此句頗采其意嵗寒見魯論湖州三百年筆與前哲配文同字與可元豐二年出守湖州未至而卒詩言與可追配桞誠懸于三百年也退之感二鳥賦曰盍求配于古人規模轉銀鉤幽賞非俗愛言與可以褚栁正書之法變而作竹銀鉤見前注披圖風雨入咫尺莽蒼外漢志芝房歌曰披圖按諜南史齊竟陵王子良孫賁常于扇上圖山水咫尺之內便覺萬里為遙老杜詩咫尺應須論萬里莊子音義曰莽蒼草野色也上莫浪反下七蕩反吾宗學湖州師逸功巳倍李雍詩吾宗固神秀禮記學記曰善學者師逸而功倍有來竹四幅冬夏生變態雍詩曰有來雍雍司馬相如子虗賦曰殫觀衆物之變態張衡西京賦曰命般爾之巧匠盡變態乎其中李善注曰變竒也態巧也須知更入神後出遂無對畫品曰吳道子才通思逺下筆如有神助易曰精義入神世説習鑿齒曰樂令無對于晉世吾詩被壓倒物固不兩大托言曰楊汝士于楊嗣復坐上詩後成而最佳元白歎服汝士醉歸語其子弟白吾今日壓倒元白左傳周史曰物莫能兩大用前韻謝子舟為豫作風雨竹子舟詩書客畫手睨前輩退之詩借問讀書客胡為在京師老杜詩畫手看前輩吳生逺擅埸挹袂拍其肩餘力左右逮山谷自注引郭璞詩云左挹浮丘袖右拍洪崖肩論語行有餘力漢志民有餘力摩拂造化爐經營鬼神會造化爐見前注謝赫畫品謂畫有六法五曰經營位置老杜詩意匠慘淡經營中老杜閬山歌曰那知根無鬼神會巳覺氣與嵩華敵光煤疊亂葉世與作者背謂俗工如此看君回腕筆猶喜漢儀在言得前輩筆法也墨藪載筆髓云須手腕輕虗索靖敘草書曰命杜度運其指使伯英回其腕後漢光武紀曰不圖今曰復見漢官威儀嵗寒十三本與可可追配東坡王元之畫像贊引曰足以追配此六君子者小山蒼苔面突兀謝憎愛小山謂竹下山石也盧同石請客詩曰竹弟雖讓客不敢當客思自慙埋沒久滿面蒼苔痕又石答竹曰蒼蘚印我面雨露􅀈我皮此故不嫌我突兀蒙相知文選嵇康養生論曰愛憎不施于情風斜兼雨重意出筆墨外謂絶去翰墨畦徑也老杜詩曰輕燕受風斜又雨詩曉看紅濕處花重錦官城畫斷曰王宰畫山水樹石出于象外吾聞絶一源戰勝自十倍此句以下言胸中髙勝則遊戲筆墨自當不凡陰符經曰絶利一源用師十倍説者謂至靜之極不為死生所亂故戰則必勝也榮枯轉時機生死付交態選詩曰俯仰見榮枯山谷此句言轉時機謂視窮達若物之榮枯各隨時盛衰任天機自運爾漢書鄭當時傳翟公曰一死一生乃知交情一貧一富乃知交態山谷此句言處死生之變我初無心從彼世情自作異見狙公倒七芧勿用嗔喜對莊子狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅名實未虧而喜怒為用亦因是也嗔喜見前注髙僧支遁傳喻道論曰道林識清體順而不對于物此物當更工請以小喻大漢書司馬相如上書諫獵云鄙諺曰家有千金坐不垂堂此言雖小可以喻大再用前韻詠子舟所作竹森萷一山竹壯士十三輩元次山訟木魅曰見榛梗之哀森梢楚辭曰一萷櫹槮之可集韻萷音宵萷槮草木茂貌壯士用杜牧之十萬丈夫意熟觀此詩子舟所作竹必十三枝故前篇有嵗寒十三本今又有壯士十三輩之語自干雲天去草芥肯下逮司馬相如子虗賦曰交錯糾紛上干青雲樛木詩注曰木枝以下垂故葛藟得纍而蔓之喻后妃能以恩下逮衆妾虗心聽造物顛沛風雨會詩意謂竹君無心但聽命于造物雖風雨之變顛沛偃仆亦任其自然爾莊子子輿曰其心間而無事跰􅓷而鑑于井曰嗟乎造物者又將以豫為此拘拘也詩曰顛沛之揭班固答賓戲曰彼皆躡風麈之會履顛沛之勢文選季重箋曰值風雲之會又選詩曰藹藹風雲會此並借用榮枯偶同時終不相棄背榮枯見前注氓詩序曰華落色衰復相棄背誰云湖州沒筆力今尚在老杜詩溟漲與筆力阿筌雖墨妙好以桃李配黃筌多作夾竹桃李文選别賦曰淵雲之墨妙國工裁主意冷淡恐不愛黃筌蓋孟蜀時待詔國工見前注裁謂量度托言曰裴度夜宴聮句白樂天曰笙歌鼎沸勿作此冷淡生活子舟落心畫榮觀不在外落謂落筆法言曰書心畫也老子曰雖有榮觀燕處超然耆年道機熟增勝當倍倍維摩經天女答舍利佛曰我止此室如耆年解脫栁子厚詩老僧道機熟李通玄華嚴論多有倍倍增廣之語祖述今百家小紙弄姿態禮記曰仲尼祖述堯舜小紙見何曽傳具前注後漢李固傳曰固獨胡粉飾貌搔頭弄姿槃旋偃仰從容冶步宋玉神女賦曰瑰姿瑋態世説注文士傳曰張華為人少威儀多姿態雖云出湖州卷置懶開對謂失與可本意非公筆如椽孰能為之大晉書王恂傳曰夢人以大筆如椽與之既覺語人云此當有大手筆事魯語曰赤也為之小孰能為之大此借用戲詠子舟畫兩竹兩鸜鵒風晴日暖搖雙竹竹間相語兩鸜鵒鸜鵒之肉不可肴人生不材果為福老杜冬狩行有鳥名鸜鵒力不能髙飛逐走蓬肉味不足登鼎爼胡為見羈虞羅中莊子山木篇弟子問于莊子曰昨日山中之木以不材得終其天年淮南子曰塞上之人馬無故亡而入胡人皆弔之其父曰此何遽不為福乎子舟之筆利如錐千變萬化皆天機樂天詩曰紫毫筆尖如錐兮利如刀晉書祖納傳曰汝潁之士利如錐列子千變萬化老杜歌曰劉侯天機精愛畫入骨髓未知筆下鸜鵒語何似夢中胡蝶飛真假夢覺為一為二達者必能辨之莊子曰昔者莊周夢為胡蝶栩栩然胡蝶也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與山谷內集詩注卷十二
