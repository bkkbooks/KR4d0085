body:
  text: 山谷內集詩注卷六宋黃庭堅撰任淵注常父惠示丁卯雪十四韻謹同韻賦之春皇賦上瑞來寧黃屋憂王子年拾遺記曰伏羲以木德稱王故曰春皇是謂太昊文選謝惠連雪賦曰盈尺則呈瑞于豐年漢書髙帝紀曰紀信乘王車黃屋左纛注謂天子車以黃繒為蓋裏文選范蔚宗詩黃屋非堯心又漢書堯以天下為憂下令走百神大雲庇九丘史記管仲傳曰下令如流水之原周頌曰懷柔百神佛經曰慈意妙大雲又京房易飛侯曰視西方有大雲五色其下賢人隱也書序曰九州之志謂之九丘丘聚也風聲將仁氣艷艷生瓦溝仁氣見禮記退之詩威風挾惠氣又詩屋角月艷艷樂天詩富貴來不久倏如瓦溝霜寒花舞零亂表裏照皇州韓詩外傳曰凡草木花多五出雪花獨六出宋書曰大明中元日雪花降殿庭上以為嘉瑞太白詩我舞影零亂選詩曰春色滿皇州千門委圭璧曉日不肯收文選謝惠連雪賦曰既因方而為圭亦遇圓而成璧元年冬無澤穴處長螟蟊後漢明帝詔曰冬無宿雪春不燠沐桓帝詔曰頃兩澤不沾漢書五行志曰辟不思導利兹謂無澤此借用其字翼奉傳曰巢居知風穴處知雨爾雅釋蟲曰食心曰螟食根曰蠡食葉曰食節曰兩宮初旰食補袞獻良籌雨宮謂宣仁太后及哲廟漢書灌夫傳曰辟晲兩宮間左傳伍員曰楚君大夫其旰食乎詩曰衮職有闕維仲山甫補之有道四夷守無征萬邦休左傳曰天子有道守在四夷書曰萬邦咸休耆年秉國論涇渭極分流書文侯之命曰罔或耆夀俊在厥服子則岡克文選王元長曲水序曰耆年闕市井之遊此借用漢書薛宣傳曰謀王體斷國論元祐初宰輔多老成故云爾涇渭分流言流品不雜也己見前注老杜詩濁涇清渭何當分輟耒入班品逸民盡歸周輟耒謂起自田里如莘野之事楚辭九辨曰農夫輟耕而容與皇甫湜祭柳子厚文云驟閲班品按通典自魏以下官有九品而染又更定十八班歸周用伯夷太公事見孟子股肱共一體間不容戈矛文選王褒四子講德論曰君為元首臣為股肱明其一體相須而成漢枚乘書曰間不容髮晉書閏讃傳曰一日不朝其間容刀書費誓曰鍛乃戈矛人材如金玉同美異剛柔金柔玉剛要皆美材當兼收而並用也正須衆賢和乃可疏共吺漢書劉白曰衆賢和于朝則萬物和于野共謂共工吺謂歡兜古文歡作兜作吺書舜典曰流共工于幽州放歡兜于崇山改絃張敝法病十九已瘳漢書董仲舒曰琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也退之詩癘疫忽潛遘十家無一瘳王指要不匿蝕非日月羞盤庚曰王播告之修不匿厥指孟子曰古之君子其過也如日月之食民皆見之及其更也民皆仰之桑林請六事河水問九疇呂氏春秋曰昔殷湯尅夏而大旱湯乃身禱于桑林剪其髮劘其手自以為犧用求福于上帝淮南子注曰桑山之林能興雲致雨故祝之後漢書周舉傳曰成湯遭災以六事尅已注引帝王紀曰湯伐桀後大旱七年使人持三足鼎祝于山川曰政不節耶使人疾耶苞苴行耶讒夫昌耶官室營耶女謁盛耶何不雨之極也書洪範王訪于箕子箕子乃言曰我聞在背鯀湮洪水泊陳其五行鯀則死禹乃嗣興天乃錫禹洪範九疇天意果然得玄功與吾謀漢書息天躬傳曰民心悅而天意得矣吳融雪詩曰自憐曽末至聊復賦玄功此物有嘉德占年在麥秋左傳曰謂其上下皆有嘉德無羊詩曰大人占之衆維魚矣實維豐年月今盂夏麥秋至近臣知天喜玉色動冕旒儒館無他事作詩配崇丘老杜詩天顔有喜近臣知玉色見禮記玉藻詩小雅曰崇丘萬物得極其髙大也有其義而亡其辭文選束晳有補亡崇丘詩詠雪奉呈廣平公宋盈柤連空春雪明如洗忽憶江清水見沙上句舊作春空晴碧來飛雪沙以喻雪劉禹錫浪淘沙詞曰卷起沙堆似雪堆退之詩山淨江空水見沙夜聽疏疏還密密曉看整整復斜斜淵明詩密密堂前桞杜牧之栽竹詩歷歷羽林影疏疏煙露姿又台城曲云整整復斜斜隨旗簇晚沙風回共作婆娑舞天巧能開頃刻花共字舊作解又作乍曺子建洛神賦曰飄颻兮若流風之回雪老杜詩急雪舞回風詩東門之枌注云婆娑舞也本事詩陸暢雪詩曰天人寧底巧翦水作飛花沈玢續仙傳殷七七詩云解醖逡巡酒能開頃刻花正使盡情寒至骨不妨姚李用年華退之詩無心花裏鳥更與盡情啼又詩感謝情至骨毆陽公詩應憐鐵甲冷徹骨四十餘萬屯邉兵次韻宋懋宗僦居甘泉坊雪後書懷漢家太史宋公孫漫逐班行謁帝閽揚雄甘泉賦曰選巫咸兮呌帝閽燕頷封侯空有相蛾眉傾國自難昏後漢班超傳相者曰生燕頷虎頸飛而食肉萬里侯相也離騷曰衆女嫉余之蛾眉兮謠諑謂余以善涇漢書李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國家徒四壁書侵坐馬瘦三山葉擁門漢書司馬相如傳曰家徒四壁立元稹望雲騅歌曰胯聳三山尾株直山谷此句用官清馬骨髙之意僧無可詩開門落葉深劉禹錫詩風驅葉擁階安得風帆隨雪水江南石上對窪尊老杜詩一日過海收風帆雲浪見前雪水注元結有窪尊銘今在武昌其詳具前注和答子瞻和子由常父憶館中故事東坡詩序大抵謂近嵗館中同舍不復飲酒賦詩之樂詩用古字韻二蘇上連璧三孔立分鼎二蘇時分掌內外制連璧見前注三孔謂文仲經父武仲常父平仲毅父元祐間俱進用三孔新淦人兄弟皆有名當世漢書蒯通傳曰三分天下鼎足而立此借用東坡詩蓋云自君兄弟還鼎立知有補柳子厚文叔仲鼎列天下少小看飛騰中年嗟逺屏選詩曰少小嬰憂患老杜詩飛騰無那故人何逺屏見前注風撼􅜇鴒枝波寒鴻鴈影常棣詩曰鶺鴒在原兄弟急難禮記兄弟之齒鴈行老杜詩鴻鴈影連來峽內􅜇鴒聲急到沙頭天不椓斯文俱來集臺省魯論曰天之未喪斯文也正月詩曰天夭是椓注謂椓破之老杜詩諸公衮衮登台省日月黃道明桃李春晝永晉天文志云黃道日之所行老杜詩詩閶闔開黃道衣冠拜紫宸時平少犴獄地禁絶蛙黽晉書張載𣙜論曰時平則才伏韓詩外傳曰鄉亭之獄曰犴朝廷之獄曰獄退之釋言曰職親而地禁國語范蠡對王孫曰吾蛙黽之與同渚周禮蟈氏掌去蛙黽頗懷修故事文會陳果茗漢書魏相傳曰好觀漢故事魯論曰以文會友晉書陸納傳謝安詣納納所設惟茶果而已當時羣玉府人物殊秀整穆天子傳曰羣玉山先王之所謂䇿府柳子厚丈森然炳然若開羣玉之府世説曰李元禮風格秀整髙自標持下直馬闐闐杯盤具俄頃下直見後注蜀都賦曰車馬雷駭轟轟闐闐老杜送王評事詩曰家貧無供給客位但箕帚俄頃羞頗珍寂寥人散後共醉凌波襪誰窺投轄井凌波襪見前注漢書陳遵傳每大飲賔客滿堂輒開門取客轄投井中天綱極恢疏道山非簿領何曽歸閉門燈火生寒冷老子曰天綱恢恢疏而不失文選劉公翰詩曰沉迷簿領書回回自昏亂蓬萊道山天帝圖書之府也欲觀太平象復古望公等唐書牛僧孺傳曰太平無象詩曰車攻宣王復古也史記平原君傳曰公等録録老杜詩致君堯舜付公等賤子託後車當煩煮湯餅漢書樓護傳王邑稱賤子上夀文選魏文帝與吳質書曰文學託乘于後車雙井茶送子瞻雙井在洪州分寧縣山谷所居也人間風日不到處天上玉堂森寶書梁四公記曰羅子春為梁武帝入龍洞求珠得食如花藥膏飴食之香美齎食至京師得人間風日乃堅如石不可食此句全用其字龍濟頌云日月不到處特地好乾坤玉堂見前注文選江淹擬休上人詩曰寶書為君掩李善注引道學傳曰夏禹撰真靈之玄要集天官之寶書想見東坡舊居士揮毫百斛㵼明珠蘇公元豐二年時謫黃州築室于東坡自號東坡居士老杜八仙歌曰揮毫落紙如雲煙盧綝晉八王故事曰張方劫晉帝西遷輩真珠百餘斛我家江南摘雲腴落磑霏霏雪不如神仙傳太真夫人曰九轉丹四名朱光雲碧之腴文選苦寒行雪落何霏霏李善注引詩曰雨雪霏霏老杜詩新詩錦不如為君喚起黃州夢獨載扁舟向五湖老杜詩衆雛爛漫睡喚起霑盤餐杜牧詩三年一覺楊州夢贏得青樓薄幸名越語曰范蠡乘輕舟以浮于五湖此云獨載言不與西子俱也和答子瞻一月空回長者車報人問疾遣兒書文選陶淵明詩窮巷隔深轍頗回故人車顔延年詩林閭時晏開亟回長者轍按漢書陳平傳曰門多長者車轍山谷以病目不出故云維摩經曰佛告文殊師利汝行詣維摩問疾老杜詩愛竹遣兒書翰林貽我東南句窗間默坐得玄珠靜女詩云貽我彤管玄珠以比東坡之詩東坡謝山谷餽雙井茶詩末句云明年多欲東南去畫舸何時宿太湖莊子曰黃帝遊乎赤水之北還歸遺其玄珠使知索之而不得使離朱􅀈詬索之而不得也乃使象罔象罔得之故園溪友膾腹腴遠包春茗問何如禮記少儀曰􅀈濡魚者進尾冬右腴注曰腴腹下也老杜設膾歌曰偏勸腹腴愧年少玉堂下直長廊靜為君滿意説江湖翰林志曰每下值出門相謔謂之小三昧出銀台乘馬謂之大三昧西京賦曰長廊廣廡退之書云敢避其煩瀆懷不滿之意于受恩之地哉子瞻以子夏丘明見戲聊復戲答于曕詩云誦詩得非子夏學紬史正作丘明書天公戲人亦薄相故遣幻醫生明珠化功見彈太早計端為失明能著書史記賈誼傳曰造化為工莊子曰且汝亦太早計見卵而求時夜見彈而求梟炙漢書司馬遷書曰左氏失明厥有國語史記曰虞卿非窮愁亦不能著書邇來似天會時發淚睫見光能隕珠盧同月蝕詩曰蝦蟆敢將天眼瞎又云當時常星沒星雨如迸漿似天會事發叱喝誅姦強桓子新論曰孟嘗君淚不承睫博物志曰鮫人泣而成珠老杜詩目眩隕雜花喜公新賜紫琳腴上清虛皇對久如真誥詩曰潄此紫瓊腴又曰玉華餞琳腴黃庭內景經曰上清紫霞虛皇前太上大道玉晨君務成子注云虛皇者紫清太素髙虛洞曜三光元道君內號也對久如謂奏對久之南有嘉魚詩箋曰蒸然猶言久如也維摩經曰舍利弗言天止此室其巳久如王介甫詩看雲坐久如請天還我讀書眼願載軒轅訖鼎湖雲溪友議載王梵志詩曰還爾天公我還我未生時東坡詩讀書眼如月罅隙靡不照軒轅謂神宗時山谷修實録史記封禪書曰黃帝鑄鼎于荆山之上鼎既成有龍垂胡髯下迎黃帝後代因名其處曰鼎湖漢書司馬遷傳贊曰接其後事訖于大漢揚雄傳曰太史公記六國歷楚漢訖麟止省中烹茶懷子瞻用前韻閣門井不落第二竟陵谷簾定誤書舊本云閣門井似谷簾水可憐不載竟陵書東京記曰文德殿兩挾有東西上閣門豫嘗聞故老云東上閣門之東有井絶佳傳燈録為山曰思而知之落在第二頭唐書陸羽傳羽字鴻漸復州竟陵人羽嗜茶著經三篇陳舜俞廬山記曰康王谷有水簾飛泉被巖而下者二三十𣲖其髙不可計其廣七十餘尺陸鴻漸茶經嘗第其水為天下第一按張又新煎茶水記載為李季卿論水次第有二十種以廬山康王谷水第一歐陽公作大明水記頗疑其與羽經相反思公煮茗共湯鼎蚯蚓竅生魚眼珠退之集彌明石鼎辭句曰時于蚯蚓竅微作蒼蠅鳴茶經候湯有三沸如魚目微有聲為一沸選詩魚目笑明月李善注引雒書曰秦失金鏡魚目混珠置身九州之上腴爭名焰中沃焚如上腴謂京師班固西都賦曰華實之毛則九州之上腴法華經曰澍甘露法兩滅除煩惱焰夫朝市爭名之士肝肺內熱何異為烈焰焚炙哉易離卦之九四曰突如其來如焚如但恐次山胸壘塊終便酒舫石魚湖元注云元次山石魚湖歌曰石魚湖似洞庭夏水欲滿君山青疾風三日作大浪不能廢人運酒舫詩意謂東坡無爭名之病不用飲茶而胸中壘塊正須酒以澆之耳壘塊用阮籍事見前注便字作平聲讀以雙井茶送孔常父校經同省並同居無日不聞公讀書故持茗碗澆舌本要聽六經如貫珠按實録元祐元年五月以祕書省正字孔武仲為校書郎古樂府東飛伯勞歌曰誰家女兒對門居晉書殷仲堪傳曰三日不讀道德經便覺舌本間強樂記曰歌者纍纍乎端如貫珠心知韻勝舌知腴何似寶雲與真如史記吕不韋傳曰子楚心知所謂文選頭陀寺碑曰道勝之韻虛往實歸歐陽公雙井茶詩曰寶雲日注非不精爭新棄舊世人情栁文脫細故于胸中味道腴于舌端湯餅作魔應午寢尉公渴夢吞江湖作魔謂睡魔也傳燈録降魔藏禪師傳秀師曰此無山精木怪汝翻作魔耶唐文粹有何諷夢渴賦曰奔九江走五湖末句曰以吾此夕之一夢見自古不足者之心左太沖吳都賦曰或吞江而納漢常父答詩有煎點徑須煩緑珠之句復次韻戲答小鬟雖醜巧妝梳掃地如鏡能檢書老杜詩檢書燒燭短欲買娉婷供煮茗我無一斛明月珠老杜詩喚人看騕裊不嫁惜娉婷嶺表録異曰昔梁氏女有容貌石季倫為交趾採訪使以真珠三斛買之即緑珠也此句以答緑珠之戲用韻極工知公家亦闕掃除但有文君對相如掃除謂箕帚妾漢書司馬遷書曰為掃除之𨽻樂府題解云司馬相如將聘茂陵人女為妾文君作白頭吟以自絶相如乃止正當為公乞如願作箋逺寄宫亭湖戲謂當求之于神録異傳廬陵歐陽明從賈客道經彭蠡湖每以船中所有投湖中後忽見一人來候明云是青洪君明甚怖使曰無可怖青洪君感君前後有禮故要君必有重遺君勿取獨求如願爾明既見青洪君乃求如願使逐明去如願者青洪君婢也明將歸所願輒得數十年大富荆州記曰宫亭即彭蠡澤也謂之彭澤湖初學記載查道元與天公箋言其奴髙安云云此借用祕閣王獻之帖云正當隨事豁之戲呈孔毅父管城子無肉食相孔方兄有絶交書退之毛潁傳曰秦皇帝使蒙恬賜之湯沐而封諸管城號管城子後漢班超傳相者曰飛而食肉萬里侯相晉書魯褒錢神論曰親之如兄字曰孔方文選有嵇康與山濤絶交書文章功用不經世何異絲窠綴露珠文選應璩百一詩曰文章不經國史記伯夷傳曰功用既興然後授政莊子曰其不可與經于世亦逺矣退之聫句云絲窠掃還成文選别賦曰秋露如珠校書著作頻詔除猶能上車問何如忽憶僧牀同野飯夢隨秋鴈到東湖按實録山谷元豐八年四月為校書郎元祐二年正月為著作佐郎漢書谷永傳曰免不正之詔除上車何如見前注曽子固徐儒子祠堂記曰按豫章圖記章水北歷南塘其東為東湖豫章蓋山谷鄉里謝黃從善司業寄惠山泉從善名降一名隱錫谷寒泉撱石俱并得新詩蠆尾書張又新煎茶水記載劉伯芻較水之與茶宜者凡七等以無錫惠山寺石泉為第二法書苑索靖草書絶代名曰銀鉤蠆尾撱音妥圓而長曰撱撱石所以澄水也山谷有從人乞楊華店井水帖云取井傍十數石置瓶中令水不濁急呼烹鼎供茗事晴江急雨看跳珠晉書孔羣曰今年田得七百石米不足了麴蘖事此云茗事亦其比也東坡詩曰白雨跳珠亂入船是功與世滌羶腴令我屢空常晏如唐常景使西蕃烹茶帳中謂蕃人曰滌煩療渴所謂茶也屢空見魯論漢書揚雄傳無儋石之儲晏如也安得左轓清潁尾風爐煮茗卧西湖漢書景帝紀長吏千石至六百石朱左轓注云轓車之蔽也灌夫傳潁水清灌氏寧左傳楚子次于潁尾杜預注云潁水之尾按今潁州有西湖陸羽茶經曰風爐以銅鑄之如古鼎形凡四窗以備通颷漏燼之所次韻奉酬劉景文河上見寄省中岑寂坐雲窗忽有歸鴻拂建章省中謂祕書退之詩雲窗霧閣事恍惚建章漢宮名選詩曰玉繩低建章珍重多情惟石友琢磨佳句問潛郎杜詩領客珍重意文選潘嶽詩投分寄石友淇澳詩注云如玉石之見琢磨張平子思玄賦曰尉龎眉而郎潛遙憐部曲風沙裏不廢平生翰墨埸部曲翰墨埸並見後注杜詩縞素漠漠開風沙相見哦詩煮春茗向人懷抱絶關防晉書劉惔傳曰今日作叱面向人耶劉禹錫詩曰心術去機關老杜詩延州秦北戶關防猶未巳見諸人唱和酴醿詩輒次韻戲詠梅殘紅藥遲此物共春歸謝朓詩紅藥當階翻名字因壺酒風流付枕幃王立之詩話云酴醿本酒名也世所開花本以其顔色似之故取其名按唐書百官志良醖署令進御則供酴醿桑落之酒韻書曰幃囊也今人或取落花以為枕囊墜鈿香徑草飄雪淨垣衣玉臺新詠吳均採蓮詩錦帶雜花鈿酉陽雜俎辨瓦松曰博雅云在屋曰昔耶在垣曰垣衣玉氣晴虹發沉材鋸屑霏虹氣及沈香皆見前注晉書胡母輔之傳曰彥國吐佳言如鋸木屑霏霏不絶直知多不厭何忍摘令稀老杜詩不厭傷多酒入脣又詩可忍醒時雨打稀唐書承天皇帝倓傳曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀摘稀字取此也常恨金沙學顰時正可揮謂金沙俗惡如里人效西施之顰也王介甫詩故作酴醿架金沙秖漫栽似矜顔色好飛度雪前開掦子曰倚門墻則麾之揮與麾同次韻秦覯過陳無已書院觀鄙句之作覯字少章即少遊之弟無巳蓋陳後山舊字陳侯大雅姿四壁不治第漢書司馬相如傳曰家徒四壁立霍去病傳曰上為治第令視之大雅見前注碌碌盆盎中見此古罍洗東坡詩碌碌盆盎間儀禮士冠禮注水洗承盥洗者棄水器也水器尊畀皆用金罍及大小異薄飯不能羮牆隂老春薺王介甫詩薄飯午不羮空爐夜無炭又詩獨飯墻隂轉本草薺味甘陶隱居注曰葉作葅羮亦佳詩云誰謂茶苦其甘如薺是也惟有文字性萬古抱根柢維摩經曰文字性離此借用言其天資能文蓋自夙世也漢書鄒陽傳曰蟠木根祗輪囷離竒我學少師承坎井可窺底後漢書儒林傳序曰若師資所承宜標名為證者乃著之云圭峯禪師作襌門師資承襲圖亦云若要辨諸宗師承須知有傍有正莊子曰子獨不聞夫塪井之蛙乎音義云塪音坎何因蒙賞味相享當牲醴言秦君賞味其詩如賞之以牲醴也南史謝覽傳武帝目送良久自此仍被賞味左傳曰王享有體薦又曰王享晉侯醴試問求志君文章自有體無巳有求志齊文選魏文帝與論曰文以氣為主氣之清濁有體不可以力強而致後漢書伏湛侯霸傳論曰誠知宰相自有體玄鑰顉靈臺渠當為君啓文選頭陀寺碑曰玄關幽揵感而遂通莊子曰不可內于靈臺注云靈臺者心也書金縢曰啓籥見書劉禹錫贈會禪師詩曰靜見玄關啓欣然與心會陳留市隱并序陳留江端禮季共曰陳留市上有刀鑷工年四十餘無室家子姓惟一女年七嵗矣日以刀鑷所得錢與女子醉飽醉則簪花吹長笛肩女而歸無一朝之憂而有終身之樂疑以為有道者也陳無已為賦詩庭堅亦擬作市井懷珠玉往來人未逢乘肩嬌小女邂逅此生同懷珠玉見後注往來一本作賈胡按後漢書馬援傳曰伏波類西域賈胡談苑曰江南掘得石記有詩云東鄰嬌小女騎虎踏河冰養性霜刀在閲人清鏡空時時能舉酒彈鑷送飛鴻漢書梅福傳常讀書養性為事又蓋寬饒傳仰視屋而歎曰此如傳舍所閲多矣陸士衡歎逝賦曰世閲人而為世又演連珠曰鏡無畜影故觸形則照清鏡見前注嵇康詩曰目送歸鴻手揮五絃朝張和答覯覯五言豫亦次韻山林與心違日月使鬢換文選沈休文詩江海事多違嵇叔夜幽憤詩事與願違遘兹淹留儒衣相詬病文字奉娛玩禮記儒行篇魯哀公問孔子曰天子之服其儒服歟云云孔子曰衆之命儒也妄常以儒相詬病漢書司馬遷書曰文史星歷近乎卜祝之問主上所戲弄俳優畜之自古非一秦六籍蓋多難見前六籍經幾秦注漢書陳勝傳曰秦未亡而誅趙王將相家屬此生一秦左傳司馬侯曰或多難以固其國詩書或發冢熟念令人惋莊子曰儒以詩禮發冢晉書王羲之傳遺殷浩書曰此可熟念後漢書馮衍傳曰愁令人不賴生王羲之帖亦云令人短氣韓非子曰外內悲惋老杜詩感時撫事增惋傷秦君鋭本學驥子已血汗山谷有答少章帖云學問之本以自見其性為難老杜詩别養驥子憐神俊又詩驊騮作駒己汗血按顔延平天馬狀曰降靈冀子又按漢書大宛國多善馬汗血言其先天馬子也相期驂天衢伯樂嘗一盼易曰何天之衢亨春秋後語曰蘇代欲見齊王謂淳于髠曰有駿馬欲賣者見伯樂曰比三旦立于市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而馬價十倍今臣欲以駿馬見于王莫臣先後足下有意為臣伯樂乎士為欲心縳寸勇輒尺懦魯論曰棖也欲焉得剛老子曰不敢進寸而退只要當觀此心日照雲霧散扶疏萬物影宇宙同璀璨楞嚴曰不知色身外洎山河虗空大地咸是妙明中所現物而圓覺經亦有六塵緣影之説司馬相如傳曰雲布霧散又曰垂條扶疏文選琦樹璀璨置規豈惟君亦自警弛慢楚語曰其以規為瑱也又曰吾憖置之于耳文選稽叔夜書曰吾自以不如嗣宗之賢而有慢弛之闕劉晦叔許洮河緑石硯晦叔名昱洮州唐臨洮郡後陷吐蕃熙寧中收復久聞岷石鴨頭緑可磨桂溪龍文刀莫嫌文吏不知武要試飽霜秋兔毫岷州夲臨洮縣地太白詩遙看漢水鴨頭緑桂溪在聞越境上曹毗魏都賦曰劒則龜文龍藻漢書曰可謂文吏老杜雕賦曰至如千年孽狐三窟狡兔恃古冢之荆棘飽荒城之霜露法書苑曰毆陽通以象牙犀角為筆管狸毫為心覆以秋兔翰鮑照飛白書銘曰秋毫精徑霜素凝鮮法書苑王羲之題筆陳圖後曰紙者陳也筆者刀矟也故此詩暗用以足上句之意以團茶洮州緑石硯贈旡咎文潛朝子智囊可以括四海張子筆端可以回萬牛漢書朝錯號智囊賈誼過秦論曰囊括四海韓詩外傳避文士之筆端老杜古柏行曰萬牛回首丘山重自我得二士意氣傾九州言足以強人意毆陽公詩自吾得二生粲粲獲雙珙史記晏嬰傳曰意氣揚揚甚自得也此借用其字道山廷閣委竹帛清都太微望冕旒道山見前注劉歆七略曰武帝廣獻書之路百年之間書積如丘山故外有太常博士之藏內則延閣廣內祕室之府列子曰穆王以為清都紫微鈞天廣樂帝王之居史記天官書曰太微三光之廷其內五星五帝座貝宮胎寒弄明月天網下罩一日收楚辭九歌曰貝闕兮珠宫左思吳都賦曰蚌蛤珠胎與月虧全太平廣記鬼詩還山㺯明月文選曹子建與楊德祖書曰人人自謂握靈蛇之珠家家自謂抱荆山之玉又曰吾王設天網以該之頓八絃以掩之老子曰天網恢恢疏而不失詩曰蒸然罩罩此地要須無不有紫皇訪問富春秋此地謂館閣晉書杜預傳朝野稱美號曰杜武庫言其無所不有也紫皇謂哲廟晉書天文志曰紫微宫鈎陳口中一星曰天皇大帝漢書齊襄王傳曰皇帝春秋富注云比之于財方未匱竭朝旡咎贈君越侯所貢蒼玉璧可烹玉塵試春色澆君胸中過秦論斟酌古今來活國越侯謂建州守臣建州即閩越之地蒼璧謂團茶周禮春官曰以蒼璧禮天樂天詩曰新茶碾玉塵澆君胸中見前注過秦論見賈誼新書詩序酌先祖之道以養天下周語曰而後王斟酌焉班固典引曰斟酌道德之淵源活國見前注張文潛贈君洮州碌石含風猗能淬筆鋒利如錐請書元祐開皇極第入思齊訪落詩退之簟詩曰卷送八只含風漪此借用言洮研之溫潤樂天詩曰紫毫筆尖如錐兮利如刀晉書袓納傳曰汝潁之士利如錐山谷作溫公挽詞云元祐開皇極功歸用老成思齊以比宣仁太后訪落以比哲宗按思齊詩曰思齊太任文王之母訪落序曰嗣王謀于廟也箋謂成王始即政故于廟中與羣臣謀政事班固西都賦曰第從臣之嘉頌謝王仲至惠洮州礪石黃玉印材仲至名欽臣洮礪發劒虹貫日印章不琢色蒸栗莊子曰刀刃若新發于硎漢書鄒陽傳曰荆軻慕燕丹之義白虹貫日禮記曰大圭不琢魏文帝與鍾繇書曰玉書稱美玉黃侔蒸栗磨礱頑鈍印此心佳人持贈意堅密漢書梅福傳曰爵祿者天下之底石髙帝所以厲世磨鈍也此借用觀佛三昧海經曰住念佛者心印不懷傳燈録曰馬祖密受心印漢書朝錯傳曰甲不堅密與裼同佳人鬢雕文字工藏書萬卷胸次同日臨天間豢真龍新詩得意挾雷風毆陽公表曰風霜所迫鬢髮雕殘劉禹錫詩會書團扇上知君文字工周禮校人天子有十二間馬六種國語史墨曰古有豢龍氏此借用以言羣牧老杜驄馬行曰天廏真龍此其亞西京雜記淮南王著鴻烈傳自云字中皆挾風霜我貧無句當二物看公倒海取明月太白詩回山倒海不作難退之詩婆娑海水南簸弄明月珠次韻文潛同遊王舍人園王舍人名棫字才元移竹淇園下買花洛水陽漢書溝洫志曰下淇園之竹以為楗按淇澳詩曰緑竹猗猗説詩者以為王芻非今竹蘇子田作詩傳從漢書説毆陽公有洛陽風俗記載牡丹事甚詳風煙二十年花竹可迷藏樂天詩等間栽樹木隨分占風煙老杜詩山扉花竹幽樂天又有詩云十三行坐事調品不肯迷頭白地藏玉溪生有美一人賦曰豈不美于羞澀恐致恨于迷藏九衢流車馬相值各匆忙樂天詩舟亂三峽雨馬入九衢塵後漢馬后傳曰車如流水馬如遊龍老杜詩無乃太匆忙豈有道邊宅靜居如寶坊後漢曹褒傳明帝曰諺言作舍道邉三年不成楞嚴經曰譬如人靜居華嚴合論云大集經在于欲界上色界下安立寶坊集諸人天幅巾延客酒妙歌小紅裳後漢符融傳幅巾奮褒談辭如雲主人有班綴衣拂御爐香班綴猶班列謂升朝官也賈至詩衣冠身惹御爐香堂恐鷤鴂鳴百草為不芳離騷曰使鷤鴂之先鳴兮百草為之不芳故作龜曵尾頗深漆園方莊子曰莊子釣于濮水楚王使大夫二人往先焉曰願以境內纍子矣莊子曰楚有神龜死已三千嵗矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾于塗中二大夫曰寧生而曳尾塗中莊子曰往矣吾將曵尾于塗中按史記莊子傳嘗為蒙漆園吏莊子雜篇曰天下之治方術者多矣初開蝸牛廬中置師子牀蝸牛廬用焦先事智度論云佛為人中師子凡佛所坐若牀若地皆名師子座楞嚴經曰即時如來將罷法座于師子牀攬七寶几維摩經云其室廣博悉皆包容三萬二千師子座舍剎佛言如是小室乃容受此髙廣之座買田宛丘間江漢起濫觴宛丘今陳州濫觴見前注言為歸老之漸也今此百畝宮冬溫夏清涼記曰儒有一畝之宫東坡超然臺記夏涼而冬溫身間閲世故宇靜發天光漢書蓋寬饒仰視歎曰此如傳舍所閲多矣文選潘正叔迎大駕詩云世故尚未夷莊子曰宇泰定者發乎天光安肯聲利埸牽黃臂老蒼言不獵取其利也文選鮑明逺詩五都矜財雄三川養聲利南史張充方出獵左臂鷹右牽𧾱遇張緒船至便放紲脫韝東坡樂府老夫聊發少年狂左牽黃右擎蒼史記李斯謂子曰牽黃犬出上蔡東門張侯筆瑞世三秀麗齋房作詩盛推賞明珠計斛量掃花坐晚吹妙語益難忘楚辭九歌曰采三秀于山間注云芝也漢志芝房歌曰齋房産草九莖連葉王立之詩話云張文潛先與李公擇輩來豫家作長句後數日再同東坡來東坡讀其詩歎息云此不是喫煙火食人道底言語蓋其間有汲井消午醉掃花坐晚涼衆緑結夏帳老紅駐春妝之句也故山谷內韻亦云掃花坐晚吹妙語益難忘立之名直方棫之子也文選劉公幹詩投翰長歎息綺麗不可忘玉臺新詠相逢狹路問易知復難忘重遊樊素病捧心不能妝朝無咎謝王立之送蠟梅詩芳菲意淺姿容淡憶得素貌如此梅自注王立之家小鬟雲溪友議云白居易有妓樊素善歌小蠁善舞為詩曰櫻桃樊素口楊柳小蠻腰此借用以比素貌捧心見前注曽端伯詩選載李商老云王直方髙資有在城南事諸名流具杯盤出聲妓以娛客故山谷詩云重來樊素病捧心不能妝張文潛云執板歌一聲坐客無留觴皆為皓齒蛾眉設來日猶可追聽我歌楚狂楚狂接輿歌曰往者不可諌來者猶可追此特借用其語卧陶軒元注云為朝無咎作陶公白頭卧宇宙一北窗但聞窗風雨平陸漫成江淵明與子儼等疏曰吾年過五十少而窮苦又曰五六月中北窗下卧遇涼風暫至自謂是羲皇上人平陸成江謂陵谷變遷當晉宋之際乎淵明停雲詩曰八表同昏平陸成江卯金扛九鼎把菊醉胡牀劉裕盜晉之神器故曰扛九鼎左傳楚子問鼎大小輕重漢書曰項羽力能扛鼎昭明太子作淵明傳曰嘗九月九日出宅邉菊叢中坐久之滿手把菊忽值王𢎞送酒至即便就酌醉而歸晉書桓伊傳下車踞胡牀城南朝正字國器無等雙漢書韓安國傳曰天子以為國器史遊急就章曰襐飾刻畫無等雙日月麗宸極大明朝萬邦易曰日月麗乎天文選劉越石勸進表曰宸極失御禮記曰大明生于東書曰協和萬邦假版未通班曉嚴夢逢逢晉書華談傳曰謹奉還所假左丞相軍咨祭酒版文選陸機有謝內史表李善注云凡王封拜謂之板官又按隋百官志陳有板咨議參軍板長史之類假板蓋班品之卑者隋志又言梁武帝定九品十八班此詩言禾通班蓋列于隔品也老杜詩通籍微班沗劉知幾史通忤時篇曰僕少小從仕早躡通班曉嚴謂戒曉嚴警之鼓樂天詩曰閶門曉嚴旗鼓出退之詩不踏曉鼓朝安眠聽逢逢萬卷曲肱裏胸中湛秋霜文選袁陽源詩云義分明于霜李善注引仲長子昌言曰潔若清冰嚴若秋霜亦有好事人叩門提酒缸用揚雄事見前注欲眠不遣客佳處更難忘南史淵明曰我醉欲眠卿可去東坡作醉眠亭詩曰醉中有客眠何害須信淵明苦未賢次韻寄朝以道以道名説之濟北人河漢牛與女咫尺不得語歡然共秋盤以兹不忘故文選古詩云迢迢牽牛星皎皎河漢女又云盈盈一水間脈脈不得語左傳天威不違顔咫尺前漢董仲舒傳歡然有恩以相愛北史楊椿傳曰吾兄弟同盤而食我友在天末問天許見否雲雨隔九關日月不我與上八句言以道流落于外相望不啻牛女之遠安得見之也文選陸士衡詩曰借問歎何為佳人眇天末楚辭招魂曰虎豹九關啄害下人些盧同茶歌日天上羣仙司下土地位清髙隔風雨魯論陽虎曰日月逝矣嵗不我與注謂年老嵗月巳往念公坐臞禪守心如縛虎此以下言以道從事禪學未能超脫也魏志吕布傳縛虎不得不急老杜詩身猶縛禪寂遺教經心之可畏甚于惡獸頗思攜法喜舉案饁南畝維摩經曰有菩薩問維摩詰言居士父母妻子親戚春屬為是誰維摩詰以偈答日智度菩薩母方便以為父一切衆𨗳師無不由是生法喜以為要慈悲心為女善心成實男畢竟空寂舍肇法師注云法喜謂見法生內喜也世人以妻色為悅菩薩以法喜為悅後漢梁鴻傳妻子為具食不敢仰視舉案齊眉左傳曰冀缺耨其妻饁之相敬如賔詩曰同我婦子饁彼南畝不聞犯齋收猶聞畫眉詡後漢周澤字稚都為太常卧疾齋宫其妻哀澤老病窺問所苦澤大怒以為于犯齋禁收送詔獄漢書張敞傳為婦畫睂長安中傳張京兆眉憮孟康注云憮音詡北方人謂媚好為詡良為鼻祖來渠伊為伴侶漢書揚雄傳反離騷曰有周氏之蟬媯兮或鼻祖于汾隅注云鼻始也此句借用言心為萬法之祖而以道于法喜愛著之深若曰與心俱生不可棄去然不知為法所縳則有人有法二見未忘未免于封執之病故末句為破除之使超然獨立不與萬法為侣也玠唐宋遺史曰張崇帥廬州計口率渠伊錢楞伽經偈曰心如工技兒意如和技者五識為伴侣妄想觀技衆按寒山子詩云我貴天然物獨一無伴侶覔他不可見出入無門户故學道者要當不存一法乃可我有桂溪刀聊憑東風去斷其法執故以刀為喻婆娑論曰佛言我聖弟子能以慧刀斷諸結縳文選李陵書曰時因北風復惠德音樂天枯樹詩幸有西風易慿仗次以道韻寄范子夷子默正平正思二范蓋文正公諸孫鼓缶多秦聲琵琶作胡語是中非神竒根器如此故言范君根器不同有所從來也史記藺相如傳曰趙王聞秦王善為秦聲請奉盆缶秦王以相娛樂又漢書楊惲傳曰家本秦也能為秦聲仰天拊缶而歌烏烏劉熙釋名曰琵琶本胡中馬上所鼓老杜古迹詩曰千嵗琵琶作胡語分明怨恨曲中論莊子曰神竒化為臭腐臭腐復化為神竒根器字出釋氏書如守護國界主陀羅尼經云如來悉知彼衆生褈種根器范公秉文德斷國極可否范公謂文正公詩曰濟濟多士秉文之德漢書薛宣傳曰謀王體斷國論極可否謂獻可替否不詭隨也至令管樞機大度而少與此句當屬忠宣公按實録元祜元年二月范純仁同知密院少與言其不黨漢書蓋寬饒傳曰多仇少與蟬嫣世有人風壑嘯兩虎兩虎謂二范君蟬嫣見前篇注應劭曰蟬嫣連也楚辭曰虎嘯而谷風至歐陽公避暑賦隂壑慘慘多悲風史記陳軫傳兩虎方且食牛小心學忠孝鄙事能壠畝魯論曰吾少也故多能鄙事持論不籧篨奉身謝誇詡漢書嚴助傳曰朔臯持論不根新臺詩箋云籧篨口柔常觀人顔色而為之詞故不能俯左傳曰臣之祿君實有之義則進否則奉身而退漢書揚雄傳曰尚奉奢麗誇詡頗知城南園文會英俊侶何當休沐歸懷茗就煎去魯論曰以文會友漢書枚臯傳曰與英俊並逰又張安世傳曰休沐未嘗出老杜詩強飯尊添滑端居茗續煎僧景宗相訪寄法王航禪師景宗蓋法王化主抱牘稍退鳧騖行倦禪時作槖駝坐退之藍田丞廳壁記曰文書行吏抱成案詣丞鴈騖行以進東陽夜怪録曰王洙避雪佛廟見一老僧著皂裘背及肋有搭白補處明日視之乃槖駝也忽憶頭陀雲外人閉門作夏與僧過文選王簡棲有頭陀寺碑李善注云頭陀斗藪也言斗藪煩惱也前人詩云頭陀雲外僧氣多圓覺經曰若經夏者三月安居一絲不挂魚脫淵萬古同歸蟻旋磨傳燈録南泉問陸亘十二時中作麼生陸云寸絲不挂師云猶是階下淇老子曰魚不可脫于淵此特借用其語以言航遊戲自在如魚之脫于釣絲也晉書天文志周髀家云天傍轉如推磨而左行故日月實東行而天牽之從西沒譬之于蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左回焉山谷借用意謂沈迷世故隨物所牽如蟻之旋磨今古皆然視雲外超脫之人良可歎也山中雨熟瓜芋田喚取小僧休乞錢張方回家本山谷自注云智航道人住嵩山法王寺數遣小僧景宗到都城因宗還寄之蜀都賦瓜疇芋區杜詩徑轉山田熟又詩楊枝晨在手豆子雨巳熟言贊公道力深妙楊枝揮酒便能致雨以熟豆田山谷意謂法王亦當如是不必遣化也次韻子瞻送顧子敦河北都運二首儒者給事中顧公甚魁偉漢書百官表曰給事中亦加宦所加或大夫博士議郎掌顧問應對史記張良世家太史公日豫以為其人計魁梧竒偉經明往行河商略頗應史漢書平當傳曰以經明禹貢使行河又薛宣傳曰湛自知罪臧皆應記世説孫綽許詢共商略先往名達勞人又費乏國計安能巳元豐中河決大吳神宗知故道不可復因道之北流水性巳順至元祐初文潞公呂汲公回河之議勞民費財竟無益也事具蘇子由潁濵遺老傳茍子富國篇曰上下俱富交無所藏之是知國計之極也成功渠有命得人斯可喜孟子曰若夫成功則天也似聞阻飢餘惡少驚邑里書曰黎民阻飢漢書尹賞傳曰舉雜長安中輕薄少年惡子退之詩隔牆惡少惡難似南史陳方泰與諸惡少年羣聚遊逸無度云啓鑰採珠金奪懷取姝美啓鑰見前注莊子曰將為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍穀梁傳云猶曰取之其母之懷中而殺之云爾詩曰靜女其姝注云姝美色也部中十盜發一二書奏紙漢書咸宣傳曰盜發覺而弗捕吏恐不能得坐課纍府府亦使不言西連魏三河東盡齊四履史記貨殖傳曰昔唐人都河東殷人都河內周人都河南夫三河在天下之中若鼎足王者所更居也文選宣德皇后令曰地狹乎四履李善注引左傳管仲曰賜我先君履東至于海西至于河南至于穆陵北至于無棣此豈小事哉何但行治水使民皆農桑乃是真儒耳魏志荀彧傳注引獻帝春秋太祖曰此豈小事而吾忘之前漢書地理志曰豳詩言農柔衣食之本甚備掦子曰用真儒無敵于天下今代顧虎頭骨相自雄偉顧虎頭見前注退之詩自歎虞翻骨相屯不令長天官亦合丞御史唐光宅元年改吏部為天官漢書百官表日御史有雨丞秩千石一曰中丞能貧安四壁無愠可三已左傳曰貴而能貧四壁見前注魯論曰令尹子文三仕為令尹無喜色三巳之無愠色昨來立清班國士相顧喜樂之詩早接清班登玉陛左傳曰國士在且厚不可當也何因將使節風日按千里周禮掌節曰凡邦國之使節老杜詩六月風日冷漢書魏相傳曰按治郡國汲黯不居中似非朝廷美漢書汲黯傳曰以數直諌不得久留內又日臣願為中郎出入禁闥補過拾遺臣之願也太任録萬事御坐留諫紙太任見前注舜典曰納于大麓注云麓録也納舜使大録萬幾之政樂天詩諌紙忽盈箱對之終自愧發政恐傷民天步薄冰履盂子曰今王發政施仁又曰文王視民如傷天步履冰並見毛詩蒼生憂其魚南畝多被水左傳曰微禹吾其魚乎詩曰饁彼南畝公行圖安集信目勿信耳鴻鴈詩序曰萬民離散不安其居而能勞來還定安集之髙士傳孔子曰吾之信顔回非獨今日所信者目日猶不可信漢書趙充國傳日百聞不如一見慈孝寺餞子敦席上奉同孔經父八韻日永知槐夏雲黃喜麥秋歐陽公詩話載趙師民詩云麥天晨氣潤槐夏午隂清王介甫詩繅成白雪桑重緑割盡黃雲稻正青禮託月令麥秋至同朝國士集賜沐吏功休孟子曰得侍同朝甚喜漢書薛宣傳曰日至吏以令休祇園冠蓋地清與耳目謀梵云祇園此言勝氏梵云僧伽藍摩此云衆園由祇陀太子園造佛精舍因以為名栁子厚小丘記日清泠之肰與目謀瀯瀯之聲與耳謀晴雲浮茗碗飛雹落文楸陸羽茶經曰沫餑者湯之華也如晴天爽朗有浮雲鱗鱗然茗碗見前注飛雹謂棊聲文楸謂棊局北夢􅖰言日本國王子入貢出本國如楸玉局冷暖棊子蓋王之蒼者如楸木色一客衆主人醉此顧虎頭虎頭持龍節排河使東流體記曽子問曰衆主人卿大夫士房中皆哭不踊此借用其字周禮掌節曰滭國用龍節孟子曰排淮泗而注之江厥田惟上上桑麻十數州計功不汗馬可致萬戶侯禹貢雍州厥田惟上上左傳曰諸侯言時計功漢書蕭何傳曰上以何功最盛先封為鄼侯食邑八千戶功臣皆曰蕭何未有汗馬之勞顧居臣等上何也李廣傳曰令當髙祖世萬户侯豈足道哉次韻張昌言給事喜雨三雨全清六合塵詩翁喜雨句凌雲爾雅注曰雨三日巳上為霖文選潘嶽間居賦曰微雨新晴六合清郎東都賦曰雨師泛灑風伯清塵司馬相如賦飄飄然有凌雲之氣垤漂戰蟻餘追北柱擊乖龍有裂文學記曰蛾子時術之注云蛾蚍蜉也微蟲爾時術其功乃成大垤也東觀漢記曰沛獻王輔善易永平五年少雨上以易林占之其繇曰蟻穴封户大雨將至上以問輔云云古今五行記曰後魏顯宗天安元年兖州有黑赤蟻鬪赤蟻斷頭而死時齊明帝自立大為魏軍所破賈誼過秦論曰追亡逐北世説夏侯太初倚柱作書霹靂破柱神色無變退之樹雞詩云割取乖龍左耳來北夢瑣言曰世言乖龍苦于行雨而多竄匿為雷神捕之或在古木及簷楹之內孟郊詩厚冰無裂文減去鮮肥憂玉食遍宗河嶽起爐薰上句謂朝廷以旱故減常膳孟郊詩豪人飫鮮肥書曰惟辟王食下句謂遍走羣望以禱雨雲漢詩曰靡神不宗聖功惠我豐年食未有涓埃可報君老杜詩末有涓埃答聖朝山谷內集詩注卷六
