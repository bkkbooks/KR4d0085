body:
  text: 山谷內集詩注卷十三宋黃庭堅撰任淵注次韻答斌老病起獨游東園二首萬事同一機多慮乃禪病楞嚴曰雖見諸根動要以一機抽傳燈録僧亡名息心銘曰無多慮無多知多知多事不如息意多慮多失不如守一圓覺經曰大悲世尊快說禪病排悶有新詩忘蹄出兔徑老杜詩云排悶强裁詩莊子曰蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言僧肇注維摩經曰曷謂回龍象于兔徑又傳燈録永嘉證道歌曰大象不遊于兔徑蓮花生淤泥可見嗔喜性維摩經曰譬如髙原陸地不生此花卑濕淤泥乃生此花山谷此句意謂花與泥俱出於一池非泥外有花喜與嗔俱出于一性非嗔外有喜因所見以示人蓋得夫觀物之妙也小立近幽香心與晚色靜王立之詩話曰山谷詩云小立佇幽香儂家能有幾絇絲韻聮與荆公頗相同當時暗合耳按介夫詩云月映林塘淡空涵笑語凉俯窺憐緑淨小立佇幽香然亦本于老杜稀疏小紅翠駐屐近微香之句老杜詩又曰水花晚色靜庶足充淹留主人心安樂花竹有和氣時從物外賞自益酒中味國語晉文公曰人生安樂孰知其他張平子歸田賦曰苟縱心于外物淵明詩酒中固多味斸枯蟻改穴掃籜筍迸地斸音株玉切斫也老杜詩藥任鄰人斸樂天笋詩曰穿牆迸路不依行萬籟寂中生乃知風雨至萬籟見前注又和二首西風鏖殘暑如用霍去病漢書霍去病傳曰合短兵鏖臯蘭下疏溝滿蓮塘掃葉明竹徑魏都賦曰疏通溝以濱路疏云疏通也中有寂寞人自知圓覺性圓覺經曰無上法王有大陀羅尼門名為圓覺心猿方睡起一笑六􅑵靜髙僧求郡跋摩傳曰知彼所依處從心猿猴起業及業報果依緣念念滅按遺教經曰此五根者心為其主譬如猿猴得樹難可禁制傳燈録中邑禪師傳仰山問如何見得性師云譬如有屋屋有六窗內有一獼猴東邊喚山山山山應如是六窗俱喚俱應仰山云只如內獮猴困睡外獮猴欲與相見如何師即下繩牀執仰山手作舞云山山與汝相見了外物攻伐人鐘鼓作聲氣莊子曰外物不可必劉子曰目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓左傳曰凡師有鐘鼓曰伐無曰侵又曰金鼓以聲氣也又曰一鼓作氣待渠弓箭盡我自味無味傳燈録僧問巖頭弓折箭盡如何師曰去老子曰為無為事無事味無味宴安衽席間蛟鰐垂涎地左傳曰宴安鴆毒不可懷也莊子曰夫畏途者十殺一人則父子兄弟相戒也人之所取畏者枉席之上飲食之間而不知為之戒者過也歐陽公乞致仕表曰不虞暗禍陷臣于風波必死之淵上賴至仁脫臣于蛟鰐垂涎之口文選枚叔七發曰往來游宴縱姿乎曲房隱間之中此甘餐毒藥戲猛獸之爪牙也君子履微霜即知堅氷至言外物之當辨于早也東方朔七諫曰微霜下而夜降易坤卦曰履霜堅氷至又答斌老病愈遣悶二首百痾從中來悟罷本誰病黃庭經曰百痾所種存無英說文曰痾病也文選短歌曰憂從中來不可斷絶維摩經曰維摩詰言今我此病皆從前世妄想顛倒諸煩惱生無有實法誰受病者所以者何四大合故假名為身四大無主身亦無我西風將小雨凉入居士徑苦竹繞蓮堂自悅魚鳥性唐人常建詩曰山光悅鳥性潭影空人心紅荷倚翠蓋不㸃禪心靜青箱雜記曹修古詩云荷葉罩芙蓉圓青映嫩緑佳人南陌上翠蓋立春風太白詩花將色不染心與水俱閒風生髙竹凉雨送新荷氣老杜詩旁舍連髙竹韋應物詩雨微荷氣凉魚游悟世網鳥語入禪味栁子厚詩云世網難嬰每自珍南史虞寄云魚游拂鼎選詩曰世網嬰我身阿彌陀經云水鳥樹林及與諸佛所出音聲皆演妙法與十二部經合維摩經曰雖復飲食而以禪悅為味又按涅槃經有出家味讀誦味坐禪味一揮四百病智刃有餘地病來每厭客今乃思客至退之詩清琴試一揮維摩經曰是身為災百一病惱肇僧注曰一大增損則百一病生四大增損則四百四病同時俱作經又曰以智慧劍破煩惱賊文選頭陀寺碑曰智刃所游日新月故莊子曰恢恢乎其于游刃必有餘地矣次韻黃斌老晚遊池亭二首路入東園無俗駕忽逢佳士喜同遊緑荷菡萏稍覺晚黃菊拒霜殊未秋文選北山移文曰請回俗士駕為君謝逋客山有扶蘇詩注曰荷華扶渠也其花菡蓞陶嶽零陵記曰拒霜花樹叢生葉大而岐花甚紅九月霜降時開故謂之拒霜文選江文通詩曰佳人殊未來客位正須懸榻下主人自愛小塘幽禮記冠義曰醮于客位後漢書徐稚傳曰太守陳蕃不接賓客惟稚來特設一榻去則懸之文選沈休文詩賓至下塵榻老杜詩主人為卜林塘幽老夫多病蠻江上頗憶平生馬少游後漢馬援傳曰吾從弟少游常哀吾慷慨多大志曰致求盈餘但自苦耳當吾在浪泊西里間毒氣薰蒸仰視飛鳶跕跕墮水中卧念少游平生時語何可得也岑寂東園可散愁膠膠擾擾夢神遊岑寂見前注老杜詩暄和散旅愁莊子天道篇堯曰膠膠擾擾乎注云自嫌有事列子曰黃帝夢遊於華胥氏之國非舟車足力之所及神遊而巳萬竿苦竹旌旗卷一部鳴蛙鼓吹休南史孔圭傳門庭內草萊不剪中有蛙鳴曰我以此當兩部鼓吹雨後月前天欲冷身閒心逺地常幽淵明詩心逺地自偏杜門謝客恐生謗且作人間鵬鷃遊漢書申公傳終身不出門復謝賓客又按唐書陸贄傳既放荒逺常闔户人不識其面又避謗不著書此詩反其意世說注向子期郭子𤣥逍遙議曰夫大鵬之上九萬尺鷃之起枋榆小大雖殊各順其性茍當其分逍遙一也而山谷作莊子內篇解則曰鵾鵬之大鳩鷃之細均為有纍于物而不能逍遙惟體道者乃能逍遙耳然此詩用向郭意戲答史應之三首先生早擅屠龍學袖有新硎不試刀嵗晚亦無雞可割庖蛙煎鱔薦松醪嘗聞長老云應之眉山人落魄無檢喜作鄙語人以屠僧目之故此詩多用屠家事莊子曰朱泙漫學屠龍于支離益單千金之家三年技成而無所用其巧新硎割雞皆見前注前輩詩曰來朝為送先生飯一夜沿溪捉鱔魚應之受館于人為童子師故云爾舊本煎鱔作煼蜢蓋眉之野人或食虴蜢故鄉諺因以為戲唐人郭受詩松醪酒熟旁看醉又傅竒曰鄭德鄰居江上遇一賣菱叟每以佳酒松醪春與之老萊有婦懷髙義不厭夫家苜蓿盤列女傳老萊子逃世耕于䝉山之陽楚王駕至其門曰守國之孤願變先生老萊曰諾妻曰妾聞之居亂世為人所制能免于患乎妾不能為人所制者委畚而去老萊乃隨而隱閩川名士𫝊薛令之開元中為右庶子時官僚清冷令之為詩曰朝日上團團照見先生盤盤中無所有苜蓿長闌干收得千金不龜藥短裙漂絖暮江寒莊子曰宋人有不龜手之藥者世世以洴澼絖為事客聞之請買其方百金與越人水戰大敗越人吳王裂地而封之注云其藥能令手不拘拆故嘗漂絮于水中也甑有輕塵釡有魚漢庭日日召嚴徐後漢范丹傳所止單陋有時絶粒閭里歌之曰甑中有塵范史雲釡中生魚范萊蕪漢書主父偃傳曰是時徐樂嚴安亦俱上書言世務上召見三人謂曰公皆安在何相見之晚也田叔傳曰漢庭臣無能出其右者不嫌藜藿來同飯更展芭蕉看學書藜藿見前注法書苑陸羽作懷素傳曰貧無紙可書常于故里種芭蕉萬餘以供揮灑題也足軒并序簡州景德寺覺範道人種竹于所居之東軒使君楊夢貺題其軒曰也足取古人所謂但有嵗寒心兩三竿也足者也仍為之賦詩余輒次韻此詩以石本校遏正種愛若曇四字道人手種兩三竹使君忽來唾珠玉手種誤作手插太白詩咳唾落九天隨風生珠玉不須客賦千首詩若是賞音一䕫足杜牧之詩何人得似張公子千首詩輕萬户侯吳志周瑜傳注江表傳瑜謂蔣幹曰吾雖不及䕫曠聞絃賞音足知雅曲吕氏春秋魯哀公問于孔子曰樂正䕫一足矣此借用以屬楊使君世人愛處但同流一絲不掛似太俗愛處誤作同處傳燈録石頭和尚草庵歌曰世人住處我不住世人愛處我不愛又豐干告寒山子曰汝與我遊五臺即我同流若不與我去非我同流曰我不去豐干曰汝不是我同流又南泉問陸亘十二時中作麼生陸曰寸絲不掛師云猶是階下漢又南泉坐次一僧乂手而立南泉白太俗生僧合掌南泉曰太僧生詩意謂愛竹開軒聊同世好于佛法初無相妨也客來若問有何好道人優曇逺山緑若問誤作問我優曇誤作優波晉書孟嘉傳桓溫問酒有何好而卿嗜之貫休詩夜雨山草滋爽籟雜枯木閒吟竺仙偈清絶過于玉蟋蟀鳴壞牆苟免悲局促道人優曇華迢迢逺山緑按法華經曰佛告舍利弗如是妙法諸佛如來時乃說之如優曇鉢華時一現耳又偈曰是人甚稀有過于優曇華疏云優曇鉢名現應三千年一現現則金輪王出此詩引用言竹之所以可愛正由道人難得耳山谷與周元翁書曰範上坐是簡州人溈山哲老門久也其人聞道巳久多見前輩道機純熟知慮深逺于士大夫中求之未易得寄題榮州祖元大師此君軒王師學琴三十年響如清夜落澗泉琴曲有幽澗泉老杜詩藍水逺從千澗落滿堂洗盡筝琶耳請師停手恐斷絃東坡詩歸家且覓千斛水淨洗從前箏笛耳張籍詩為出二侍女合彈琵琶箏退之聽頴師琴詩曰推手據止之濕衣淚滂滂又詩杯行到君莫停手琴家有彈欲斷絃下指淺按欲入木力不見之語神人傳書道人命生死貴賤如看鏡道讀如樂道人之善之道史記龜䇿傳曰卜者虗髙人祿命以說人志退之作李墟中志曰最深于五行書以人之死生年月日所直日辰支干相生勝衰死王相斟酌推人夀夭貴賤利不利輒先處其年時百不失一二晚知直語觸憎嫌深藏幽寺聽鐘磬言不復以談天為事漢書谷永傳曰瞽言觸忌諱退之詩僻寺境還幽有酒如澠客滿門不可一日無此君左傳曰有酒如澠有肉如陵此君見前注當時手栽數寸碧聲挾風雨今連雲韓孟城南聮句云遙岑出寸碧此借用挾風雨見前注文選藩嶽秋興賦曰髙閣連雲此君傾蓋如故舊骨相竒怪清且秀漢書鄒陽傳語曰有白頭如新傾蓋如故按家語孔子遇程子傾蓋而語終曰甚相悅顧謂子路取束帛以贈之魯論曰故舊不遺則民不偷骨相見前注程嬰杵臼立孤難伯夷叔齊採薇瘦言竹之徑且秀如此史記趙世家屠岸賈殺趙朔朔妻成公姊有遺腹走公宫匿趙朔客曰公孫杵臼謂朔友人程嬰曰立孤與死孰難程嬰曰死易立孤難耳杵臼曰子强為其難者吾為其易者請先死伯夷傳曰伯夷叔齊義不食周粟隱于首陽山採薇而食之遂餓死于首陽霜鐘堂上弄秋月微風入絃此君悅霜鐘蓋蔡雍秋思琴曲之一也此僧因以名其堂公家周彥筆如椽此君語意當能傳王庠字周彥榮州人東坡嘗稱之筆如椽見前注答李任道謝分豆粥豆粥能驅晚瘴寒與公同味更同餐安知天上養賢鼎且作山中煮菜看後漢馮異傳光武曰昨得公孫豆粥饑寒俱解世說孫長樂作王長史誄云同此𤣥味易鼎卦曰聖人大烹以養聖賢贈知命弟離戎州道人終嵗學陶朱西子同舟泛五湖船窗卧讀書萬卷還有新詩來起豫知命頗落魄不羈此詩蓋遺識之也山谷嘗有書與人云知命不樂靜居數出又答宋子茂書云知命將一妾一子拒同來史記貨殖傳范蠡適齊為鴟夷子皮之陶為朱公國記曰范蠡遂乘輕舟以浮于五湖杜牧之詩云西子下姑蘇一舸逐鴟夷起豫見魯語姪耜隨知命舟行耜字維深小字韓十知命第二子莫去沙邊學釣魚莫將百丈作轆轤清江濯足窗下坐燕子日長宜讀書老杜詩百丈牽江色盧同詩轆轤無繩井百尺老杜又有燕子來舟中詩云湖南為客動經春燕子銜泥兩渡新暫語船檣還起去穿花落水益霑巾次韻奉答文少激推官紀贈二首請來清吹拂衣巾句法詞鋒覺有神詩云吉甫作誦穆如清風廬山記載王喬之詩曰常聞清吹空文選沈休文詩豈假濯衣巾晉書潘嶽讚曰詞鋒景絢老杜詩云詩成覺有神今日相看清眼舊他年肯作白頭新青箱雜記范諷詩惟有南山與君眼相逢不改舊時青漢書鄒陽傳曰白頭如新傾蓋如故文如霧豹容窺管氣似靈犀可避塵霧豹見前注晉書王獻之傳門生曰此郎管中窺豹時見一斑李商隱詩心有靈犀一㸃通述異記曰却塵西海獸也其角辟塵慙愧相期在臺省無心枯木豈能春老杜詩諸公衮衮登臺省劉禹錫詩病樹前頭萬木春文章藻鑑隨時去人物權衡逐勢低少激登元祐三年進士第時東坡知舉山谷為其屬故于此詩寄一歎之意藻鑑見前注後漢許劭傳核論鄉黨人物揚子墨池春草遍武侯祠廟曉鶯啼揚子雲墨池諸葛忠武廟皆在今成都老杜蜀相祠堂詩云映階碧草自春色隔葉黃鸝空好音山谷意謂東坡竄謫岷峨悽惶無復振起前人象氣也書帷寂寞知音少幕府留連要路迷漢書董仲舒傳下帷講誦知音少見前注漢書李廣傳曰幕府省文書注云幕府者以軍幕為義選詩云何不䇿髙足先據要路津顧我何人敢推挽看君桃李合成蹊並有前注次韻文少激祈雨有感少激名抗臨卭人時在戎州諸本或作少微誤豫嘗見其家藏此詩真本有序云竊聞太守齊潔奉祠當獲嘉應窮儒憂樂與民同何况朱輪職勸農終日虀鹽供一飯幾時膚寸冒千峯文氏真本民作人按晉書謝安傳簡文帝曰安石既與人同樂必不得不與人同憂退之送窮文曰太學四年朝虀暮鹽公羊曰觸石而出膚寸而合不崇朝而雨遍乎天下者唯泰山耳注云側手為膚按指為寸文選潘安仁詩川氣冒山嶺詩意謂少激之窮如此安能澤加于民未須丘垤占鳴鸛只要朝廷起卧龍言調燮陰陽在得人也東山詩鸛鳴于垤注云鸛水鳥也將陰雨則鳴丘垤見孟子蜀志諸葛亮傳徐庶謂先主曰諸葛孔明者卧龍也將軍豈願見之乎蘇黃門詩雷雨連年起卧龍從此滂沱遍枯槁愛民天子似仁宗文氏真本上句作從此滂沱三十六後改此字按春秋說題詞曰一嵗三十六雨天地之氣宣十日小雨應天文十五日大雨以斗運也又按京房易候云太平之時十日一雨凡嵗三十六雨此休徵時若之應次韻李任道晚飲鎖江亭此詩前有贈惠洪一篇編次不倫前輩以為非山谷所作曾慥詩選記俞秀老事亦嘗及之今刪去鎖江亭在戎州之東戎今為叙州山谷與王觀復書云有李仔任道本梓人而寓江津二十餘年其人言行有物參道得其要老成人也西來雪浪如炮烹兩涯一葦乃可橫東坡樂府曰江漢西來猶自帶岷峨雪浪錦江春色退之詩具此煎炮烹莊子秋水篇曰兩涘渚涯之間詩曰誰謂河廣一葦杭之楚辭曰橫大江兮楊䠲忽思鍾陵江十里白蘋風起縠紋生劉禹錫詩令人忽憶瀟相渚輿地廣記唐改豫章曰鍾陵又改曰南昌今屬洪州山谷鄉里也白蘋見前注宋玉風賦曰風起于青蘋之末劉禹錫竹枝歌曰瀼西春水縠紋生酒杯未覺浮蟻滑茶鼎已作蒼蠅鳴張平子南都賦曰酒則甘醴十旬兼清醪敷經寸浮蟻若萍退之集載彌明石鼎聮句曰時于蚯蚓竅微作蒼蠅鳴歸時共須落日盡亦嫌持蓋僕屢更老杜詩落盡髙天日幽人未遣回又云清江白日落欲盡禮記儒行曰遽數之不能終其物悉數之乃留更僕未可終也再次韻兼簡履中南玉三首李侯詩律嚴且清諸生賡載筆縱橫禮記緇衣篇曰昔吾有先正其言明且清東坡詩敢將詩律鬪清嚴書臯陶乃賡載歌注云賡續載成也續歌以成其義句中稍覺道戰勝胸次不使俗塵生淵明詩貧富常交戰道勝無戚顔按韓非子子夏曰今先王之義勝故肥其詳具前注楚辭屈平漁父曰安能以皓皓之白䝉世俗之塵埃乎山繞樓臺鐘鼓晚江觸石磯砧杵鳴退之詩青春白日映樓臺退之詩寒江觸石暄寰宇記曰鄂州江夏縣有驚磯山俯臨大江下有石磯波濤迅急商旅驚駭因以為名此用其字樂天詩月苦風清砧杵悲鎖江主人能致酒願渠久住莫終更李賀有致酒行曰零落棲遲一杯酒主人奉觴稱客夀漢書假㑹宗傳曰終更亟還亦足以復雁門之踦注云邊吏三嵗更江津道人心源清不繫虛舟盡日橫四十二章經曰佛言沙門者斷去愛欲識自心源莊子曰泛乎若不繫之舟虛而遨遊者也寇萊公詩野水無人渡孤舟盡日橫江津屬渝州渝今為恭道機禪觀轉萬物文采風流被諸生栁子厚贈江華長老詩老僧道機熟默語心皆寂圭峯禪源序曰至于念佛求生淨土亦須修三十六觀禪楞嚴曰若能轉佛即同如來杜詩文采風流今尚存前漢朱雲傳曰時出乘牛車從諸生與世浮沉惟酒可隨人憂樂以詩鳴老杜詩濁醪有妙理庶用慰沉浮史記游俠傳序曰豈若卑論儕俗與世浮沉而取榮名哉晉書顧榮傳曰惟酒可以忘憂蔡琰胡笳十八拍曰絲竹微妙兮均造化之功哀樂各遂人心兮有變則通退之送孟東野序曰東野始以其詩鳴引用之言隨其心之所感或憂或樂皆于詩焉發之江頭一醉豈易得事如浮雲多變更老杜詩每日江頭盡醉歸又詩天上浮雲似白衣須臾改變如蒼狗鎖江亭上一樽酒山自白雲江自橫文選沈休文詩勿言一樽酒明日難重持李侯短褐有長處不與俗物同條生左傳盧蒲嫳髮短而心甚長此句頗採其意短褐見前注漢書丙吉傳曰人各有所長浮杯和尚語曰别有長處不妨拈出晉書王戎傳阮籍曰俗物已復來敗人意傳燈録巖頭曰雪峯雖與我同條生不與我同條死要識末後句只這是經術貂蟬續狗尾文章瓦釡作雷鳴此句指當世之士晉書趙王倫傳每朝㑹貂蟬盈坐時人諺曰貂不足狗尾續史記屈原傳曰黃鐘毁棄瓦釡雷鳴古來寒士但守節夜夜抱關聽五更漢書汲黯傳曰守節死義又蕭望之傳署小苑東門候王仲翁顧謂望之曰不肯録録反抱關謂望之曰各從其志注云門候謂主候時而開門也孟子曰抱關擊柝夏竦詩卧聽元戎報五更次韻任道食荔枝有感三首一錢不直程衛尉萬事稱好司馬公兩句皆山谷自道漢書灌夫傳夫罵灌賢曰平生毁程不識不直一錢今乃效女曹兒呫囁耳語田蚡曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不為李將軍地乎世說載司馬徽别傳曰徽字德操括囊畏慎人有以人物問徽者初不辨其髙下每輒言佳其婦諫之徽曰如君所言亦復佳白髮永無懷橘日六年怊悵荔枝紅吳志陸績年六嵗于九江見袁術術出橘績懷三枚去拜辭墮地術謂曰陸郎作賓客而懷橘乎績跪答曰欲遺母術大竒之按山谷入蜀凡六見荔支宋玉髙堂賦曰怊悵自失怊恥驕反今年荔枝熟南風莫愁留滯太史公漢書司馬遷傳曰太史公留滯周南注云司馬談為太史令遷尊其父故謂之為公山谷嘗為神宗實録院檢討官云五月照江鴨頭緑六月連山柘枝紅太白詩遙看漢水鴨頭緑老杜詩連山晚照紅山谷與王觀復書云今年戎州荔支盛登一種柘枝頭出于遏臘平大如雞卵味極美舞女荔枝熟雖晚臨江照影自惱公天與蹙羅裝寶髻更挼猩血染殷紅舞女亦謂柘枝樂府雜録曰柘枝舞因曲為名用二女兒帽施金鈴抃轉有聲後漢書宦者傳論曰歌童舞女之玩李賀詩有惱公篇蓋艷體也其首章曰宋玉愁空斷嬌嬈粉自紅歌聲春草露門掩杏花叢腥血見前注老杜詩象牀玉手亂殷紅殷音烏間反廖致平送緑荔枝為戎州第一王公權荔枝緑酒亦為戎州第一王公權家荔枝緑廖致平家緑荔枝試傾一杯重碧色快剝千顆輕紅肌老杜宴戎州東樓詩曰重碧拈春酒輕紅擘荔支撥醅蒲萄未足數堆盤馬乳不同時太白詩遙看漢水鴨頭緑有似蒲萄新撥醅退之蒲萄詩曰若欲滿盤堆馬乳莫辭添竹引龍鬚漢武帝曰恨不得與此人同時誰能同此勝絶味唯有老杜東樓詩世說孫長樂作王長史誄曰豫與夫子交非勢利心猶澄水同此𤣥味老杜東樓詩首聮曰勝絶驚身老情忘發興竒謝楊履道送銀茄四首藜藿盤中生精神珍蔬長蒂色勝銀朝來鹽醯飽滋味巳覺瓜匏漫輪囷家語子路曰由也事二親之時嘗食藜藿之食老杜詩顔色白勝雪禮記月令曰薄滋味毋致和漢書鄒楊傳曰蟠木根柢輪囷離竒注云委曲盤戾也此借用君家水茄白銀色殊勝埧裏紫彭亨蜀人生疏不下箸吾與北人眼俱明玉篇云蜀人謂平川曰埧音必駕反彌明石鼎聮句曰豕腹漲膨脝黃庭經曰五嶽之雲氣彭亨生疏蓋用俗語晉書何曾傳曰日食萬錢猶曰無下箸處老杜詩吾與汝曹俱眼明白金作顆非堆成中有萬粟嚼輕氷戎州夏畦少蔬供感君來飯在家僧後漢韓稜傳肅宗賜三人以寶劍自手署其名曰韓稜楚龍淵郅夀蜀漢文陳寵濟南椎成以寵敦朴善不見外故得椎成此借用孟子曰病於夏畦集福德三昧經曰若有菩薩作是三昧雖在家當說是人名為出家山谷持律頗嚴故自謂在家僧東坡和食筍詩云一飯在家僧畦丁收盡垂露實葉底猶藏十二三待得銀包已成榖更當乞種過江南老杜摘蒼耳詩曰畦丁告勞苦莊子馬蹄篇曰馬之死者十二三矣茄子老者其子堅黑如榖北人謂之榖子茄送石長卿太學秋補長卿家亦但四壁文君窺之介如石借用司馬長卿事四壁見前注易豫卦之六二曰介于石不終日貞吉繫詞曰介如石焉寧用終日斷可識矣胸中巳無少年事骨氣乃有老松格晉書阮裕傳曰人云裕骨氣不及逸少而兼有諸人之美盧同詩曰此骨縱橫竒又竒千嵗萬嵗枯松枝漢文新覽天下圖詔山采玉淵獻珠徽宗時初即位東都賦曰天子受四海之圖籍膺萬國之貢珍再三可陳治安䇿第一莫上登封書漢書賈誼傳曰因陳治安之䇿試詳擇焉司馬相如傳長卿為一卷書言封禪事南史陳後主從隋文帝東巡賦詩曰太平無以報願上東封書樂天詩鴈鴈汝飛向何處第一莫飛西北去次韻少激甘露降太守居桃葉上金莖甘露薦齊房潤及邊城草木香漢武故事作承露盤以取雲表之露班固西都賦曰抗仙掌以承露擢雙立之金莖漢志郊廟歌曰齊房産草東坡詩十里南風草木香蕡實葉間天與味成蹊枝上月翻光蜀都賦曰蕡實時味王公羞焉按桃夭詩注云蕡實貌漢書李廣贊曰桃李不言下自成蹊劉禹錫棼絲瀑詩曰翻光破夕薰羣心愛戴葵傾日萬事驅除葉隕霜國語蔡公謀夫曰庶人不忍欣戴武王葵傾日見前注漢書王莽傳曰帝王之驅除云爾春秋僖公三十三年書隕霜不殺草公羊注曰陰假陽威之應山谷意謂徽宗踐祚羣心欣戴如日之方升姦回屏斥如霜之肅殺也玉燭時和君㑹否舊臣重疊起南荒時放臣皆得北還爾雅四時和謂之玉燭選詩慶泰欲重疊陸機辨亡論曰輶軒聘于南荒借景亭并序清神縣尉廰葺城頭舊屋作借景亭下瞰史家水竹終日寂然了無人迹又當大木緑陰之間戲作長句奉呈長孺明府介卿少府青神縣中得兩張愛民財力惟恐傷漢書賈山傳曰君有餘財民有餘力而頌聲作二公身安民乃樂勸葺城頭五月凉用孟子賢者而後樂此之意亭在縣牆上故曰城頭也竹鋪不涴吳綾襪東西開軒蔭清樾淮南子曰武王蔭暍人于樾下退之詩守縣坐深樾當官借景不傷民却似鑿池取明月月影分身何傷本體杜牧之盆池詩云鑿破蒼苔地留他一片天此用其意戲贈家安國安國眉山人字復禮家侯口吃善著書常願執戈王前驅史記韓非傳非為人口吃不能道說而善著書詩曰伯也執殳為王前驅山谷此詩皆舉實事按復禮上相府書云豫不侫後長卿子雲生千有五百年著書明道摛詞立論才得其緒餘而口吃之病同空之復禮初以武進士後入左選故東坡贈之詩云夜談說劍春夢猶橫經又云初聞編簡香稍覺鋒鏑腥而復禮謝改官啓云三陪籌幄笑談當十萬戎行兩席師筵排闥應三千門弟皆此意也朱紱蹉跎晚監郡吟弄風月思天衢易困卦曰朱紱方來利用享祀老杜寄髙適詩聞君巳朱紱且得慰蹉跎漢書百官表曰監御史秦官掌監郡樂天與元九書曰梁陳間率不過嘲風雪弄花草而巳天衢見前注二蘇平生親且舊少年筆硯老杯酒二蘇謂東坡黃門亦眉人漢書張安世小男彭祖又小與上同席研書司馬遷書曰未嘗銜杯酒接殷勤之歡東坡贈之曰吾儕便歸老亦足慰餘齡黃門則曰白髮弟兄驚我在喜君遊宦亦天倫清且舊之意概可見矣但使一氣轉洪鈞此老矍鑠還冠軍老杜詩一氣轉洪鈞按選詩洪鈞陶萬類後漢馬援傳曰矍鑠哉是翁也漢書項羽傳宋義號卿子冠軍次韻楊君全送酒扶衰却老世無方惟有君家酒未嘗漢書食貨志曰酒所以扶衰養疾史記漢武帝紀李少君以却老方見上退之詩斷送一生惟有酒左傳穎谷封人曰未嘗君之羹秋入園林花老眼茗搜文字響枯腸圓覺經曰譬彼病目見空中花老眼見前注盧同茶歌云三碗搜枯腸惟有文字五千卷醡頭夜雨排簷滴杯面春風繞鼻香不待澄清遣分送定知佳客對空觴玉篇醡與􅶻同側射反切韻云壓酒具也歐陽公詩寒醅美新醡老杜詩簷雨細隨風盧同詩一片新茶破鼻香次韻君全送春花化工能斡大鈞回不得東君花不開誰道纎纎緑忩手磨刀剪綵喚春來漢書賈誼賦曰造化為工又曰大鈞播物詩云摻摻汝手注云纎纎也景龍文館記曰景龍四年立春內出綵花樹人賜一枝杜牧之詩骰子逡巡裹手拈無因得見玉纎纎又樂天詩緑窗貧家女寂寞二十餘隋煬帝在江都宫時冬月翦綵為花唐人吳融嘗為作翦綵賦云此皆參而用之喚春來字亦老杜江雲日日喚愁生意也謝楊景山送酒器楊君喜我梨花盞却念初無注酒魁矲矮金壺肯持送挼莎殘菊更傳杯蜀之酒魁蓋詩人所謂酌以大斗之遺制象北斗有魁柄也許慎說文曰匜似羹魁柄中有道可以注水玉篇矲音蒲楷切短也矮音於解反不長也曲禮共飯不澤手注曰澤謂挼莎也老杜詩傳杯不放杯史彥升送春花彥升名㑹清神人乃紹封之子山谷有書柏學士山居詩跋云史紹封之子㑹與余外甥張協于蘇氏為友壻也千林搖落照秋空忽散穠花在眼中蝶繞蜂隨俱入座君家女手化春風宋玉九辨曰悲哉秋之為氣也蕭瑟兮草木搖落而變衰女手見前注又禮記曰執女手之卷然題石恪畫嘗醋翁名畫評曰石恪成都郫人性輕率嘗為嘲謔之句學張南本畫數年已出張右多為古僻人物詭形殊狀以蔑辱豪右石媪忍酸喙三尺石皤嘗味面百摺洪覺範僧寶傳載寶峰洪英禪師偈曰阿家嘗酸三尺喙新婦洗面摸著鼻按莊子徐無鬼篇仲尼曰吾願有喙三尺宋景文筆記曰蜀人謂老曰皤取皤皤黃髮義皤音波百摺言其面皺切韻云摺疊也音之涉反東坡外集記夢中見宫人裙帶聞有六言詩云百疊漪漪縠皺誰知聳膊寒至骨圖畫不減吳生筆國朝雜記長孫無忌嘲歐陽詢曰聳膊成山字埋肩不出頭王介甫詩北風蕭蕭寒到骨老杜詩畫手看前輩吳生逺擅場吳生謂道子也頃嘗見此圖益知此詩得游戲三昧曲盡其情狀云謝應之昨夜風雷震海隅天心急擬活焦枯去年席上蛟龍語未委先生記得無當是應之往在戎州謂山谷必非池中物至是復官有進用之漸其言頗有證也老杜詩未委適誰門山谷內集詩注卷十三
