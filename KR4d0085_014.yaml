body:
  text: 山谷內集詩注卷十四宋黃庭堅撰任淵注走筆謝王朴居士拄杖投我木瓜霜雪枝六年流落放歸時千巖萬壑須重到腳底危時幸見持詩曰投我以木瓜晉書顧愷之傳曰千巖競秀萬壑爭流魯論曰危而不持顛而不扶則將焉用彼相矣退之赤藤杖歌曰性命造次䝉扶持老杜詩氣味濃香幸見分陶隱居云俗人拄木瓜枝云利筋脛戲答王居士送文石南極一星天九秋自埋光景落江流是公至樂山中物乞與衰翁似暗投老杜詩南極一星朝北斗按晉書天文志曰老人一星在弧南一日南極常以秋分之旦見于丙春分之夕而沒于丁此借用以言星隕為石也文選謝靈運詩心契九秋幹李善注引古樂府有歷九秋妾薄命行莊子曰是自埋于民謝靈運詩日月垂光景至樂山在嘉州凌雲之側桞子厚詩看成古木對衰翁暗投見前注次韻楊明叔見餞十首並序楊明叔從豫學問甚有成當路無知音求為瀘州從事而不能得豫䝉恩東歸用蛟龍得雲雨鵬鶚在秋天作十詩見餞因用其韻以别山谷辭免吏部員外郎狀云元符三年十二月發戎州貶所建中靖國元年三月至峽又改知舒州四月至荆南又召以為吏部員外郎此詩未出蜀所作已有同安守吏部銓之語當是據邸報也山谷將發戎州時十二月癸卯有書梁甫吟跋語亦云時聞復朝奉郎知舒州而未被受平津善牧豕佽飛能斬蛟漢書公孫𢎞家貧收豕海上年四十餘乃學春秋雜說武帝以賢良徴後封平津侯宣帝紀發佽飛射士注引呂氏春秋曰荆有佽飛者得寶劔還涉江蛟夾繞其船佽飛拔劔赴江斬蛟殺之荆王聞之仕以執圭武帝改秦左弋官曰佽飛官蓋取古勇力人以名官也終藉一汲黯淮南解兵交平津之鄙佽飛之勇皆無益于漢家所可賴者汲黯輩爾漢書汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至說公孫𢎞等如發䝉耳左傳注曰兵交使在其間楊子有直氣未忍死草茅退之送張道士詩曰臣有膽與氣不忍死茅茨漢書朝錯傳曰昧死上狂感草茅之愚臣言云云引之入漢朝誰為續弦膠東方朔十洲記曰鳯麟洲仙家煮鳯喙及麟角合煎作膠名之為續弦膠或一名連金泥此膠屬弓弩已斷之弦連刀劔斷折之金山谷引用謂疏遠之于朝廷其合甚難必有為之固結于其間者楊君清渭水自流濁涇中涇渭見前注今年貧到骨毫氣似元龍老杜詩已欣徴求貧到骨元龍見前注男兒生世間筆端吐白虹言文章有光熖也鮑照行路難曰丈夫生世能幾時退之詩是夕吐熖如長虹禮記曰君子于玉比德焉氣如白虹天也何事與秋螢爭光蒲葦叢維摩經曰無以日光等彼螢火史記屈原傳曰雖與日月爭光可也事隨世滔滔心欲自得得魯論曰滔滔者天下皆是也注云滔滔周流之貌孟子曰君子深造之以道欲其自得之也莊子曰吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也楊君為己學度越流輩百魯論曰古之學者為己退之與崔羣書曰况足下度越此等百千輩按漢書揚雄傳日必度越諸子矣老杜詩清峻流輩百坐捫故衣蝨垢襪春汗黑晉書前秦載記王猛詣桓溫面談當世之事捫蝨而言旁若無人老杜詩垢膩腳不襪托言高逢休書云顧雲樹將一尺三寸汗腳踏他燒殘龍尾道嘗聞長老云山谷此句蓋譏明叔垢汗不濯足睥睨紈袴兒可飲三斗墨漢書灌夫傳注曰辟睨旁視也班固叙傳曰班伯在于綺𥜗紈襪之間非其好也通典日北齊策秀才書有濫劣者飲墨水一升此云三斗蓋甚言之猶唐詩謂寧食三斗葱寧食三斗艾爾清靜草𤣥學西京有子雲漢書揚雄傳解嘲曰爰清爰靜游神之廷惟寂惟寞守德之宅草𤣥見前注太尉死宗社太鳥泣其墳後漢楊震傳為樊豐等所譖䇿收震太尉印綬遣歸本郡行至城西慷慨謂諸子曰疾奸臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月遂飲鴆而卒先葬十餘日有大鳥髙丈餘集震喪前俯仰悲鳴淚下霑地葬畢乃飛去寂寞向千載風流被仍昆爾雅曰來孫之子為罤孫罤孫之子為仍孫富貴何足道聖處要策勳退之詩屈原離騷二十五不肯哺啜糟與醨惜哉此子巧言語不到聖處寧非癡左傳曰反行飲至舍爵策勳焉禮也注云書勳勞于册言速紀有功也桑輿金石交既别十日雨子輿裹飯來一笑相告語莊子日子輿與子桑友淋雨十日子輿裹飯而往食之至子桑之門則若歌若哭子輿入日子之歌詩何故若是曰吾思夫使我至此極者而弗得也漢書韓信傳武涉曰足下自以為與漢王為金石交注云取其堅固揚子困簞瓢諸公不能舉簞瓢見魯論又臧文仲知桞下惠之賢而不與立注謂知賢而不能舉按孟子曰悅賢不能舉儻可從我歸沙頭駐鳴櫓用乘桴之意明叔家真本作沙頭其家云山谷元約明叔同住荆南之沙頭故云爾今本作江頭非是韻書云櫓所以進舟也山圍少天日狐鬼能作妖睒閃載一車獵人用鳴梟劉禹錫詩山圍故國周遭在杜牧阿房宮賦覆壓三百餘里隔離天日說文曰狐妖獸鬼所乘退之詩狐鳴梟噪爭署置跳狼睒閃相嫵媚易睽卦曰見豕負塗載鬼一車梟亦妖鳥獵狐者當用鷹隼今乃用梟以言小知淺陋小智窘流俗蹇淺不能超莊子曰大智間間小智間間賈誼曰小智自私賤彼貴我孟子曰同乎俗流合乎汙世莊子又曰敝精神于蹇淺世說注曰時謂王戎未能超俗也安得萬里沙晴天看射鵰史記漢武帝紀乃禱萬里沙注曰沙徑三百餘里漢書李廣傳曰見胸奴三人與戰廣日是必射鵰者也注云鵰大鷙鳥故使善射者射之又北史斛律光傳邢子髙曰此射鵰手也此借用以言所見廣遠元之如砥柱大年若霜鶚王禹稱字元之見前注楊億字大年建安人年十一舉神童事真宗為內翰立朝蹇諤劉禹錫詩世道劇頺波我心如砥柱山谷為楊明叔書魏鄭公砥柱銘嘗引此語又有一跋遺王觀復曰余觀砥柱之峙中流閲頺波之東注有似乎君子士火夫立于世道之風波可以託六尺之孤寄百里之命不以千乘之利而奪其人節則可以不為此石羞矣按書禹貢注曰砥柱山名河水分流包山而過山見水中若柱然後漢孔融薦禰衡曰鷙鳥纍百不如一鶚使衡立朝必有可觀其語本出于史記趙簡子朝野僉載蘇味道髙爽張元一曰蘇如九月得霜鷹王楊立本朝與世作郛郭孟子曰立乎人之本朝法言曰虐政虐世然後知聖人之為郛郭此借用言其忠義為世大間隱然如城郭也觀公有膽氣自可繼前作退之送張道士詩曰臣有膽與氣又云自笑平生誇膽氣丈夫存遠大胸次要落落左傳曰君子務知遠者大者莊子曰喜怒哀樂不入于胸次後漢耿弇傳注曰落落猶疏闊也虛心觀萬物險易極變態非篤實之士鮮不以夷險而易操虛心者觀之真僞了然老子曰虛其心實其腹又曰萬物並作吾以觀其後繫辭曰卦有小大辭有險易變態見前注皮毛剝落盡惟有真實在馬祖問藥山子近日見處作麼生藥云皮膚脫落盡惟有一真實按涅槃經云如大村外有娑羅林中有一樹先林而生足一百年是時林主灌之以水隨時修治其樹陳朽皮膚枝葉悉皆脫落惟真實在山谷與王子飛書亦云老來枝葉皮膚枯朽剝落惟有心如鐵石益厭俗文密而意疏也侍中乃珥貂御史則冠豸應劭漢官儀云侍中冠武辨大冠加金璫附蟬為文貂尾為飾謂之貂蟬選詩云七葉珥漢貂胡廣漢官儀云御史四人持書皆法冠一名柱後一名獬豸冠照影或可羞短蓑釣寒瀨不稱其服則顧影自羞寧蓑笠而無愧也退之詩峩峩進賢冠耿耿水蒼佩服章豈不好不與德相對顧影聽其聲頳顔汗漸背太白詩三事或可羞胸奴哂千秋嚴陵瀨見前注私柏生澗壑坐閲草木秋選詩曰鬱鬱澗底私禮記季秋之月草木黃落金石在波中仰看萬物流金石見前注抗髒自抗髒伊優自伊優後漢趙一歌曰伊優北堂上抗髒倚門邉注云伊優屈曲佞媚之貌抗髒髙亢婞直之貌言佞媚者見親婞直者見棄但觀百嵗後傳者非公候夷齊景公是也老作同安守蹇足信所便同安郡即舒州山谷以足疾故便于外郡有辭免吏部員外郎狀曰重以纍年腳疾拜起艱難全不堪事文選謝宣遠詩四逹雖平直蹇步愧無良李善注引左傳曰孟縶之足不良于行又謝靈運詩曰拙疾相倚薄還得靜者便老杜詩遭亂到蜀江臥痾遣所便胸中無水鏡敢當吏部銓東坡詩道人胸中水鏡清按蜀志龎繞傳注司馬德操為水鏡晉書樂廣傳衛瓘曰此人之水鏡也見之瑩然唐書百官志曰吏部尚書以三銓之法官天下之材時山谷以疾辭吏部郎之召恨此虛名在未脫世紏纒文選古詩曰虛名復何益賈誼鵩賦曰禍之與福何異紏纒注云如紏絞繩索用附會也纒索也音墨此云紏纒特用其意耳夢作白鷗去江南水如天莊子曰且汝夢為鳥而厲乎天夢為魚而沒于淵南史梁忠烈世子方等傳嘗著論曰吾嘗夢為魚因化為鳥方其夢也何樂如之反其覺也何憂斯類桞子厚詩洞庭春盡水如天山谷舊有和謝師厚詩云夢作白鷗去江南水黏天又作演雅云江南春盡水如天中有白鷗間似我亦此意也次韻石七三六言七首從來不似一物妄欲貫穿九流傳燈録南嶽懷禪師傳六祖曰什麼物恁麼來師曰說似一物即不中後漢班彪傳曰司馬遷貫穿經傳至廣博也班固傳曰博貫載籍九流百家之言無不窮究漢書藝文志曰諸子十家其可觀者九家而已蓋不數小說家也謂儒道隂陽法名墨縱橫雜農凡九家穀梁序曰九流分而微言隱骨硬非黃閣相眼青見白蘋洲骨硬謂如虞翻骨體不媚也退之詩豈是虞翻骨相屯王介甫松詩天骨老硬無皮膚衛宏漢儀丞相聽事閣曰黃閣桞惲詩汀洲采白蘋日落江南春桞子厚寄盧衡州詩非是白蘋洲畔客還將遠意問瀟湘生涯一九節筇老境五十六翁不堪上補黼黻但可歸教兒童真誥曰楊羲夢蓬萊仙人拄赤九節校而視白龍元符三年山谷年五十六王羲之傳猶欲教子孫以敦厚退讓萬里草荒先壟六年蟲蠧羣經桞子厚謫永州與許孟容書曰先墓在城南無異子弟為主懼便毁傷松柏芻牧不禁以成大戾家有賜書三千卷尚在善和里舊宅宅今已三易主存亡不可知者老喜寬恩放去心似驚波不停言歸心如流也西京賦曰散似驚波劉禹錫詩流水淘沙不暫停前波未滅後波生為君試講古學此事可箋天公君看花梢朝露何如松上霜風魯論曰學之不講是吾憂也又曰古之學者為已蘇子美愛愛歌曰此樂亦可箋天公箋天公見前注謂可質諸天地下兩句言古學之有根本如經霜之松與浥露之花固自不同也謝靈運詩花上露猶泫幽州已投斧柯崇山更用憂何言大姧已誅餘黨不足憂時宰相章惇安置潭州書曰流共工于幽州放歡兜于崇山又曰何憂乎歡兜按後漢馮勤傳帝賜侯霸璽書曰崇山幽都何可偶黃鉞一下無處所注云鉞斧也所以戮人魏都賦曰蕭斧戢柯以柙刃蓋言不用也且喜龔鄒冠豸又聞張董上坡實録元符三年三月龔夬為殿中侍御史鄒浩為右正言四月張舜民為右諫議大夫董敦逸為左諫議大夫夬字彥和浩字志完舜民字耘叟皆著直聲冠豸見前注李宗諤先公談録云唐諫議大夫班在給舍上一遷為給事再遷為中書舍人有自他官為諫議者班給舍上故班中戲語曰饒他上坡却須下坡言遷給舍班復在下也看著莊周枯槁化為胡蝶翾輕人見穿花入桞誰知有體無情此篇山谷自道老杜詩穿花蛺蝶深深見韻書云翩翾小飛也荀子曰喜則輕而翾莊子曰有人之形無人之情有人之形故羣于人無人之情故是非不得于身欲行水繞山圍但聞鯤化鵬飛上句言未即出蜀下句言遷除者衆孟郊詩山水千萬繞中有君子行劉禹錫詩山圍故國周遭在女憂鬢髮盡白兄歎江船未歸山谷女嫁李德素之子去華文伯時在淮南舒州兄謂元明退之書曰兩鬢半白頭髮五分亦白其一老杜詩獨立見江船萬州太守髙仲本宿約遊岑公洞而夜雨連明戲作二首肩輿欲到岑公洞正怯衝泥傍險行老杜詩虛疑皓首衝泥怯定是岑公閟清境春江一夜雨連明桞子厚石潭記曰以其境過清不可久居乃記之而去劉禹錫含輝洞述曰先是斯境翳于榛薄閟其清光有待而發蓬蔥髙卧雨如繩恰似糟牀壓酒聲老杜詩賴知禾黍收已覺糟牀注今日岑公不能飲吾儕聞健且頻傾樂天詩聞健偷閒且勤飲又云園林亦要聞閒置其義猶今人言聞早也萬州下巖二首并序萬州之下巖唐末有劉道者定州無極人聞道于雲居膺禪師為開巖第一祖法號道微自鑿石龕曰死便藏龕中不用日時門人奉其命二百年矣來遊者題詩不可勝讀莫能起此開巖者故豫作二篇表見之其一用楊子安韻共一用王定國韻空巖靜發鐘磬響古木倒掛藤蘿昏老杜詩翠木蒼藤日月昏莫道蒼崖鎖靈骨時應持鉢到諸村言至人隱顯不可測傳燈録漸原在石霜覔先師靈骨金剛經曰世尊食時著衣持鉢入舍衛大城乞食寺古松楠老巖虛塔廟開法華經曰各起塔廟髙千由旬僧緣蠶麥去官數荔支來上句言僧徒趁熟乞食下句言寺有荔支為官所𣙜漢書昭帝紀詔曰往年災害多今年蠶麥傷石室無心骨金鋪稱意苔司馬相如長門賦曰擠玉戶以撼金鋪注云以金為門之鋪首王介甫詩荷花稱意紅若為劉道者拽得鼻頭回傳燈録石鞏禪師傳一日在㕑作務次馬祖問曰作什麼曰牧牛祖曰作麼生牧曰一回入草去便把鼻孔拽來祖曰子真牧牛師便休去山谷借用意謂山野殘僧不遵軌轍安得道者復生鞭繩之也若為猶言如何古樂府隔谷歌曰食糧乏盡若為活又戲題下巖往往攜家來託宿裙𥜗參錯佛衣巾未嫌滿院油頭臭踏破苔錢最惱人言兒女子混雜汚此淨坊也莊子曰未解裙𥜗文選謝靈運詩臨圻阻參錯東坡記公詩云滿院秋光濃欲滴老僧倚杖青松側只怪髙聲問不譍嗔余踏破蒼苔色文選沈休文詩賓階緑錢滿客位紫苔生按崔豹古今注苔蘚一名緑錢戲題巫山縣用杜子美韻老杜有巫山題壁詩即此韻所謂卧病巴東久今年强作歸是也巴俗深留客吳儂但憶歸直知難共語不是故相違老杜詩翠柏深留景類篇曰儂我也吳語東坡樂府曰語音猶自帶吳儂難其語謂夷俗之陋老杜亦有䕫州戲作云異俗可吁怪斯人難並居魯論曰互鄉難與言老杜詩杖藜妨躍馬不是故離羣又詩請公臨深莫相違按左傳曰非相違也而相從也按巫山石刻巴俗深留客作殊親我吳儂但憶歸但作暫字東縣聞銅臭江陵換祫衣舊見山谷跋云銅臭乃退之照壁喜見蝎之意蓋過巫山用銅錢也按巫山江上有二石俗謂之銅錢鐡錢堆蓋與歸州巴東縣相接荆䕫自此分界後漢崔實傳曰從見烈入錢五百萬得為司徒其子鉤曰論者嫌其銅臭江陵即荆南山谷度至此時已初夏矣潘嶽秋興賦曰藉莞蒻御祫衣注云祫衣無絮也音古洽反丁寧巫峽雨慎莫暗朝暉漢書谷永傳注云丁寧謂再三告示巫峽雨見前注老社詩久雨巫山暗朝暉謂神女宋玉神女賦曰其始來也耀乎若白日初出照屋梁文選日出東南隅行曰扶桑升朝暉和王觀復洪駒父謁陳無已長句王蕃字觀復沂公之裔官閬中時多以書從山谷問學至是自京師來會山谷于荆州洪芻字駒父山谷之甥也陳無已元符三年冬為祕書正字陳君今古焉不學清渭無心映涇濁魯論子貢曰夫子焉不學而亦何常師之有涇渭見前注退之詩清溝映汙渠漢官舊儀重九鼎集賢學士見一角上句並見前注意謂無已有前輩典刑足為士林之重下句言無已人中之瑞世所罕有老杜詩集賢學士如堵牆觀我落筆中書堂北史文苑傳序曰學者如牛毛成者如麟角春秋感精符曰麟一角明海內共一主也王侯文采似於搜洪甥人間汗血駒並見前注相將問道城南隅無屋正借船官居老杜詩仙老暫相將莊子黃帝見廣成子曰敢問至道之精南史張融傳武帝問融住在何處答曰陸處無屋舟居無水後融從兄緒言融未有居止權牽小船于岸上住帝大笑漢書地理志京兆有船司空注曰本主船之官遂以為縣世說陶公作荆州時敕船官悉録鋸木屑有書萬卷繞四壁樵蘇不爨談至夕文選應休璉書曰幸有遠生時步玉趾樵蘇不爨清談而已談至夕見前談至暮注主人自是文章伯鄰里頗怪有此客老杜詩海內文章伯湖邉意緒多晉書謝安傳桓溫問左右頗嘗見我有如此客不食貧各仕天一方佳人可思不可忘詩曰三嵗食貧選詩曰各在天一方按漢書西域傳烏孫公主歌曰吾家嫁我兮天一方世說謝太傅云安比見之乃不使人厭然出戶去不復使人思此反而用之詩曰有匪君子終不可諼兮注云諼忘也河從天來砥柱立愛莫助之涕淋浪言無已獨立于頺波之間惜其不能助之也漢張騫尋河源與銀河相連屬故曰河從天來王介甫詩老工取河天上落砥柱見前注蒸民詩曰維仲山甫舉之愛莫助之楚詞曰攬茹蕙以掩涕兮霑余襟之浪浪稽叔夜琴賦日紛淋浪以流離以古銅壼送王觀復隨俗是泪沒從公常紏紛子虛賦曰交錯紏紛我觀王隆化入蕕不改薰隆化𨽻南平軍左傳曰一薰一蕕十年尚猶有臭注云薰香草蕕臭草此引用言觀復不為從俗及作吏所移未見蛇起陸已看豹成文隂符經曰龍蛇起陸豹成文見前注愛君古人風古壺投贈君魏志毛玠傳太祖以素屏風素憑几賜玠曰君有古人之風故賜君古人之服酌酒時在傍可用弭楚氛楚氛喻俗惡之氣左傳曰楚氛甚惡周禮小祝彌烖兵注云彌讀日敉敉安也按弭與彌同問君何以報直諒與多聞文選四愁詩曰美人贈我金錯刀何以報之英瓊瑶魯論曰益者三友友直友諒友多聞病起荆江亭即事十首翰墨場中老伏波選詩云粲粲翰墨埸後漢劉尚擊五溪蠻伏波將軍馬援年六十二據鞍顧盼以示可用樂天詩曰政事堂中真宰相制科場裏舊將軍桞子厚獻𢎞農公詩鋒搖翰墨場菩提坊裏病維摩華巖經佛在菩提道場始成正覺涅槃經云造僧坊招提則生不動國維摩經曰毗耶離城中有長者名維摩詰其以方便現身有病兩句皆山谷自道近人積水無鷗鷺時有歸牛浮鼻過文選魏都賦曰回淵漼積水深老杜詩年衰鷗鷺羣北夢瑣言陳詠詩曰隔岸水牛浮鼻渡傍溪沙鳥㸃頭行此本陋句一經妙手神彩頓異山谷此句當有所指或云運判陳舉頗以為憾其後遂有宜州之行維摩老子五十七山谷生于慶歷五年乙酉逮建中靖國元年辛巳五十有七大聖天子初元年退之序天子大聖是嵗正月徽考初改元建中靖國宋庠紀年通譜于漢文帝後元元年注曰班固追書後字以别初元老杜詩云扈蹕上元初亦謂肅宗之初元年也傳聞有意用幽側病著不能朝日邉文選沈約思幸論曰明揚幽側唯才是與注引尚書曰明明揚側陋老杜詩朝覲從容問幽側勿云江漢有垂綸又云明光起草人所羡肺病幾時朝日邉日邉用幼童傳中晉明帝語晉書亦載其事具前注山谷辭免吏部員外郎狀曰臣到荆南即苦癰疽發于背脅今方少潰欲乞除臣江淮一合入差遣禁中夜半定天下元符三年正月已卯哲廟上升黎明欽聖太后石徽考自端邸入立大䇿先定于禁中矣後漢安帝紀曰太后定䇿禁中其夜使鄧隲迎帝蘇子由作宣仁諡冊文䇿自中定與天為謀大抵亦此類也仁風義氣徹修門後漢肅宗詔曰仁風翔于海表威霆行乎鬼區禮記鄉飲酒曰此天地之義氣也宋玉招魂曰魂兮歸來八修門些注修門謂郢城門也按今江陵縣故楚郢都之地山谷適寓此邦因以寄意遷客客皆得歸無復屈原沈湘之歎也十分整頓乾坤了老杜洗兵馬行整頓乾坤濟時了復辟歸來道更尊元符三年正月欽聖權同處分軍國事七月歸政下書曰皇帝聖智日躋萬幾益習况山陵營奉就緒引發有期或不知止則豈不蹈古人所戒而失復子明辟之義哉老子曰道之尊德之貴莫之爵而常自然成王小心似文武詩曰維此文王小心翼翼老杜洗兵馬行成王功大心轉小蓋指唐之成王非周成王山谷此句語同而意異專以成周比徽廟也周召何妨略不同漢書孫寶傳曰周公上聖召公大賢猶有不相說著于經典兩不相損今每有一事羣臣同聲得無非其美者不須要出我門下實用人材即至公意欲調停黨人也韓退之作桞子厚志曰諸公貴人爭欲令出我門下退之詩曰得就閒官即至公司馬丞相昔登庸詔用元老超羣公哲廟初溫公以知陳州過闕拜門下侍郎遂為右僕射書曰疇咨若時登庸詩曰羣公先正楊綰當朝天下喜唐書肅宗相楊綰制下士相賀于朝斷碑零落卧秋風溫公在政府一年而薨歸葬陜府夏縣賜碑額曰清忠粹德紹聖初以監察御史周秩言追所贈官及所賜神道碑額仍磨毁碑文事具實録死者已死黃霧中紹聖竄謫諸人如呂大防劉摯梁燾范祖禹皆前死于瘴霧之鄉矣老杜詩死者長已矣東漢馬后傳曰黃霧四塞三事不數兩蘇公微考初政相韓忠彥又相曽布于時蘇東坡歸自昌化子由歸自循州詩曰三事大夫注謂三公豈謂髙才難駕御空歸萬里白頭翁魏志劉表傳注零陵先賢傳曰周不疑有異才魏太祖心忌不疑欲除之文帝諫以為不可太祖曰此人非汝所能駕御也漢書車千秋傳曰臣嘗夢見一白頭翁文章韓杜無遺恨此篇屬東坡杜牧之詩曰杜詩韓集愁來讀似倩麻姑癢處􅎲謂子美退之也老杜詩毫髮無遺憾波瀾獨老成草詔陸贄傾諸公唐書陸贄為德宗學士從狩奉天書詔日數百他學士筆閣不得下而贄沛然有餘玉堂端要真學士一本作直學士須得儋州秃鬢翁昌化即漢儋耳郡唐嘗立儋州東坡舊有詩曰張顛醉素兩秃翁特用灌夫傳中語耳東坡歸自嶺海鬢髮盡脫閉門覓句陳無已對客揮毫秦少游二君實録也無已名師道少游名觀老杜詩云覔句新知律又云揮毫落紙如雲煙正字不知溫飽未西風吹淚古藤州無已坐黨廢錮既而自棣學除祕書省正字少游自雷州貶所北歸至藤州卒于光化亭上初少游夢中作長短句有醉卧古藤隂下之語殆若讖云後漢皇甫規傳曰退不得溫飽以全命張子耽酒語蹇吃聞道潁州又陳州張文潛素嗜酒晚有末疾建中靖國元年除祕書少監兼史職以御史陳次升言其疾病出知揚州尋改陳州又改潁州老杜詩平生老耽酒世說載頭責秦子羽云此數子者或蹇吃無宮商或尫陋希言語唐人薛能詩曰何處避煩憂徐州又許州形模彌勒一布袋文潛素肥晚益甚彌明聫句詩形模婦女笑傳燈録明州布袋和尚形栽腲脮蹙額皤腹蓋彌勒化身也文字江河萬古流老杜詩云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流魯中狂士邢尚書吏部尚書邢恕也孟子曰孔子在陳何思魯之狂士恕為人喜進取故云本意扶日上天衢王介甫作韓魏公挽詩曰親扶日轂上天衢言援立英廟恕附離蔡確妄以䇿立之功自任誣謗宣仁太后起黨錮禍至是以左正言陳瓘論列罷知荆南分司西京均州居住此意用取日虞淵洗光咸池惇夫若在鐫此老不令平地生﨑嶇恕于無事中造出許事可謂平地生﨑嶇矣恕之子居實字惇夫少有俊聲知所慕向計其人必不陷父于不義死時才二十七薛宣傳曰故使掾平鐫令注謂琢鑿也孟郊詩小人智慮險平地生太行文選張平子南都賦曰上平衍而曠蕩下䝉籠而﨑嶇李善注引廣雅曰﨑嶇傾側也鄒松滋寄苦竹泉橙麴蓮子湯三首鄒永年字天錫其名姓見于山谷所作江陵承天院浮圖記松滋縣𨽻江陵府松滋縣西竹林寺苦竹林中甘井泉巴人漫說蝦蟇培試裹春芽來就煎張又新水記曰扇子峽石中突而泄水獨清冷石狀如鱸頭俗謂之蝦蟆石其水煎茶為第一東坡詩忽憶尋蟆培方冬脫鹿裘天將金闕真黃色借與洞庭霜後橙史記曰燕昭王使人求蓬萊方丈瀛洲此三山黃金白銀為宮闕洞庭霜見前注老杜詩霜橙壓香橘松滋解作逡巡麴壓倒江南好事僧續仙傳殷七七詩曰解醖逡巡酒能開頃刻花江南僧當是山谷自謂壓倒見前注新收千百秋蓮菂剝盡紅衣搗玉霜蓮菂見前注唐人趙嘏詩曰紅衣落盡渚蓮愁裴鉶傳竒載樊夫人詩曰一飲瓊漿百感生𤣥霜杵盡見雲英黃庭內景經云子丹進饌肴正黃乃日琅膏及玉霜不假參同成氣味跳珠碗裏緑荷香後漢魏伯陽有周易參同契演丹經之奧㫖此借周言不雜以他物樂天詩露荷珠自傾風竹玉相憂晏元獻公雨後詩曰裛淚疑疏槿跳珠亂碧荷次韻答黃與迪和氏有尺璧楚國無人知青山抱國器嵗月忽如遺但使玉非石果有遭逢時韓非子曰楚人卞和得玉璞于楚山獻厲王使玉人相之曰石也王以和為謾刖右足及武王即位又獻之復相曰石也刖左足及文王即位和乃抱其璞而哭于楚山三日三夜淚盡繼之以血王使玉人治之得寶玉焉名曰和氏之璧漢書韓安國傳曰唯天子以為國器谷風詩棄豫如遺箋云如人行道遺忘物忽然不省存否吾宗固神秀天乃晚成之李雍歷下亭詩曰吾宗固神秀體物寫謀長老子曰大器晚成蘭芳深九畹露味挹三危家語曰芝蘭生于深林不以無人而不芳楚辭曰豫既滋蘭之九畹注云十二畝為畹呂氏春秋伊尹說湯曰水之美者有三危之露泂酌詩云挹彼注茲流俗不顧省古人可前追孟子曰同乎流俗退之韓府君墓志曰崔圓狎愛州民丁某至顧省其家蜀志呂凱傳曰古人不難追胸中凌雲賦自貴知音希漢書司馬相如傳曰相如既奏大人賦天子大悅飄飄有凌雲氣游天地之間意文選古詩曰不惜歌者苦但傷知音希淵源學未淺孝友家正肥漢書董仲舒贊曰考其師友淵源所漸猶未及乎游夏禮記禮運曰父子篤兄弟睦夫婦和家之肥也與世殊軌轍三黜理亦宜吳都賦曰茲乃顛覆之軌轍三黜見魯論退之詩殺却理亦宜吳溪浣紗女不用朱粉施寰宇記載越州㑹稽縣事曰按會稽記縣東六里有土城山勾踐索美女獻吳王得諸暨賣薪女鄭旦先習禮于土城山山邉有石是西施浣紗石宋玉登徒子好色賦曰東家之子著粉則太白施朱則太赤豈伊風塵子市門自夸毗史記貨殖傳曰刺繡文不如倚市門板詩曰天之方懠無為僰毗注云夸毗以體柔人也我作僰道囚三年始放歸夸道郎戎州戎今為敘邂逅終日語貽我五字詩詩曰邂逅相遇適我願兮句如秋雨晴遠峯抹修眉言其髙秀選詩曰遠峯隱半規退之南山詩天宇浮修眉按西京雜記文君眉色如望遠山曹子建洛神賦曰雲髻峩峩修眉連娟老馬甘伏櫪坐看天驥馳魏武帝歌曰老驥伏櫪志在千里顔延之赭白馬賦曰漢道亨而天驥呈才灑掃清樾下當為果茗期並見前注光隂去易失日月轉兩儀文選江文通别賦曰明月白露光隂往來漢書韓信傳曰時者難得而易失繫辭曰易有太極是生兩儀疏云不言天地而言兩儀指其物體仲氏有東園花竹深可依寸步不往來千里常夢思詩曰仲氏吹篪退之詩寸步難往始知命老杜詩雲雨荒臺豈夢思太白詩君留洛北方夢思幾時開後戶扶策方自兹劉禹錫詩見擬移居作鄰里不論時節請開開又連州謝表曰扶策在道不敢停留文選任彥升詩湍險方自茲次前韻謝與迪惠所作竹五幅吾宗墨修竹心手不自知枚乘兔園賦曰修竹檀欒夾池水莊子輪扁曰得之于手而應于心口不能言有數存焉于其間天公造化爐攬取如拾遺造化爐見前注漢書梅福傳曰舉秦如鴻毛取楚若拾遺風雪煙霧雨榮悴各一時此物抱晚節君又潤色之淵明詩草木有常理霜露榮悴之樂天栽松詩曰愛君抱晚節憐君含直文魯論曰東里子産潤色之抽萌或發石懸筆有阽危爾雅曰筍竹萌明彌石鼎聨句曰凍芋强抽萌懸箠謂引鞭也前漢食貨志賈誼曰安有為天下阽危者若是而上不驚者注云阽音閻欲墜之意林梢一片雨造次以筆追魯論注云造次急遽也東坡作文與可畫竹記曰振筆直遂以追其所見猛吹萬籟作微涼大音希老子曰大音希聲桞公權詩殿閣生微涼霜兔束毫健松煙泛硯肥法書苑鮑照飛白書銘曰秋毫精徑霜素凝鮮沾此瑶液染彼松煙盤桓未落筆落筆必中宜盤桓蓋用莊子畫史解衣槃礴裸之意易比卦曰盤桓利居貞今代捧心學取笑如東施捧心見前注雲溪友議朱擇嘲郭素詩曰借問東鄰效西子何如郭素擬王軒按寰宇記越州諸暨縣有西施家東施家或可遺巾幗選耎如辛毗漢書杜欽曰恐議者選耎復守和解注云選耎怯懦不前之意晉書宣帝紀帝與諸葛亮對壘朝廷命帝持重以候其變亮遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣辛毗仗節為軍師以制之生枝不應節亂葉無所歸東坡作文與可畫偃竹記曰竹之始生一寸之萌耳而節葉具也自蜩腹蛇蚹以至于劔拔十尋者生而有之也今畫者乃節節而為之葉葉而纍之豈復有竹哉非君一起豫衰病豈能詩起豫見前注老杜詩湯休起我病微笑索題詩憶君初解鞍新月挂彎眉夜來上金鏡坐歎光景馳鮑明遠玩月詩始見西南樓纖纎似玉鈎末映東北墀娟娟似蛾眉李賀詩長眉對月鬬彎環太白詩月上飛天鏡曹子建箜篌行曰光景馳西流我有好東絹晴明要會期老杜雙松圖歌曰我有一匹好東絹重之不減錦繡段已令拂拭光凌亂請公放筆為直幹樂天詩曰晴明好天氣後漢書蔡琰詩曰念别無㑹期按戰國策魏文候曰豈可不一會期哉猗猗淇園姿此君有威儀淇澳詩曰瞻彼淇澳緑竹猗猗又曰瑟兮僩兮赫兮咺兮注云咺威儀宣著也淇園見前注願作數百竿水石相因依選詩云蒲稗相因依他年風動壁洗我别後思唐人李益竹窗聞風寄司空曙詩開門風動竹疑是故人來此用其意文選阮嗣宗詩回風吹四壁淵明送龎參軍詩注曰且為别後相思之資退之詩勉率作歌詩慰子别後覽又云寧懷别時苦勿作别後思開圖慰滿眼何時遂臻兹老杜詩君來慰眼前漢書霍去病傳曰遂臻月氏司馬相如傳曰符瑞臻茲山谷內集詩注卷十四
