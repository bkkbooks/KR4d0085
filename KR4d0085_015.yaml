body:
  text: 山谷内集詩注巻十五宋黄庭堅撰任淵注戲簡朱公武劉邦直田子平五首不趨吏部曹中版且鱠髙沙湖裏魚山谷辭吏部郎之命故不持手版以趨省曹渚宫舊事曰王琳為鮪表以刺時有曰髙沙老女非有意于羅綺白鮪女児豈期心于珠翠注云江陵西二十里有髙沙湖其中多魚雖無季子六國印要讀田郎萬巻書史記蘓秦傳秦過洛陽其嫂謝曰見季子位髙金多也秦喟然歎曰使我有洛陽負郭田二頃吾豈能佩六國相印乎譙周注秦字季子三輔決録注曰田鳯為尚書郎容儀端正靈帝目送之回題柱曰堂堂乎張京兆田郎此借用以屬子平歡伯可解藜藿嘲孔方定非金石交歡伯藜藿皆見前注漢書掦雄有解嘲此借用晋書魯褒錢神論曰親之如兄字曰孔方金石交亦見前注君看劉郎最多智昨者火事幾焚巢言禍患之来非智慮所及况貧富有定数安可以智力求之耶劉郎謂邦直劉禹錫詩曰前度劉郎今又来此借用魏志武帝紀注魏書曰曹公非有四目兩口但多智耳維摩經曰火事如故而不為害易旅卦之上九鳥焚其巢旅人先笑後號咷劉郎好詩又能文方我奔竄義甚敦奔竄謂赴黔中時取道荆南此詩蓋追記徃事也文選曹子建詩曰親交義在敦退之江漢答孟郊詩云嗟我與夫子此義每所敦為親未葬走人門閉門却掃不足論為親之故未免俯仰世間此外皆不足道閉門却掃可也文選江文通恨賦曰至乃敬通見抵罷歸田里閉關却掃塞門不仕李善注引司馬彪續漢書曰趙壹閉門却掃非徳不交朱家塤篪好兄弟陋巷六經葵莧秋詩曰伯氏吹塤仲氏吹篪我卜荆州三畝宅讀田家書從之游楚詞屈原有卜居篇東坡詩勸我試尋三畝宅從公已恨十年遲王介甫作杜甫畫像詩云願起公死從之游按文選沈休文詩所願從之游寸心于此足退之送諸葛覺詩云今子從之游學問得所欲朱公趨朝瘦至骨歸來豪健踞胡牀日看省曹閽者面何如田家侍児妝列子曰子貢七日不食以至骨立晋書桓伊傳下車踞胡牀作三調田家侍見葢紀實事見下水仙花注次韻益修四弟黄友益字益修侍御史昭之第三子也霜晩菊未花節物亦可嘉文選陸士衡古詩踟久蹰感節物我行已永欣欣登髙侶畏雨占暮霞山谷自注諺云朝霞不出門暮霞行千里漢書登髙能賦可為大夫費長房九日登髙飲楚人醖菉豆輕碧自相誇山谷時在荆州荆州即楚地故後詩有渚宫之句謂以菉豆為麴而釀酒也其色清碧今人謂之竹光酒云老夫不舉酒嚥𠻳鳴兩車黄庭經曰口為玉池太和官𠻳咽靈液災不干兩車謂頰車也左傳曰輔車相依良辰與美景客至但成嗟文選詩靈運擬魏太子鄴中集詩序曰天下良辰美景賞心樂事四者難并淵明九日閒居詩序云余閒居爱重九之名秋菊盈園而特醪靡由空服九華寄懐于言以峽州酒遺益修復繼前韻令節不把酒新詩徒拜嘉退之聼彈琴詩序曰肇置三令節詔羣有司飲酒以樂按舊唐書貞元四年詔正月晦日三月三日九月九日三節日任百僚追賞為樂退之詩把酒對南山左傳曰敢不拜嘉頗憶宋玉賦登髙氣成霞宋玉有髙唐神女賦登章之髙見前注氣成霞言文氣蔚然如此荆州蓋楚地而宋玉楚人固因九日登髙遂及此事曹子建七啓曰慷慨則氣成虹蜺蜀都賦曰舒丹氣而為霞渚宮但衰柳朝雲為誰誇杜佑通典曰江陵縣有楚渚宫朝雲見宋玉髙唐賦巳具前注云吾宗懐古恨流涎過麴車一壺澆徃事聊送解愁嗟解一作耐李邕詩吾宗固神秀東京賦曰望先帝之舊墟慨長思而懐古老杜歌曰道逢麴車口流涎又詩呤詩解歎嗟謝靈運詩三江事多徃謝益修四弟送石屏石似滄江落日明鸕鷀烏鵲滿沙汀小児骨相能文字乞與班班作硯屏文選任彦昇詩滄江路窮此老杜詩山頭落日半輪明又詩鸕鷀西日照趐滿魚梁嘗見山谷在荆州與檀敦禮帖乞硯山欲與同惜試睟且云同惜知命㓜子小字也此詩所指豈此即耶骨相見前注戲答王觀復酴醿菊二首誰将陶令黄金菊幻作酴醿白玉花小草眞成有風味東園添我老生涯小草見前注吕園未肯輕沽我且寄田家砌下栽他日秋花媚重九清香知自故人来山谷在荆州與歐陽元老帖曰城東吕氏園竹木已老又寛敞有經行之地甚欲得之然託人徃問語輙再三難共語也又有與人帖云檀敦禮惠蘭数本皆煜煜成叢但不花耳方送田子平家培植之魯論曰求善賈而沽諸注云沽賣也戲答王子予送凌風菊二首病来孤負鸕鷀杓禪板蒲團入眼中太白詩鸕鷀杓鸚鵡杯傳燈録龍牙禪師傳師在翠微時問如何是祖師意翠微曰與我過禪板来師遂過禪板翠微接得便遂又問臨濟如何是祖師意臨濟曰與我過蒲團来師送過蒲團臨濟接得便打老杜詩江村野堂争入眼浪説閒居愛重九黄花應笑白頭翁閒居重九見前注下句大似東坡詩人老簪花不自羞花應羞上老人頭之意王郎頗病金瓢酒不耐寒花晩更芳瘦盡腰圍怯風景故来歸我一枝香晋書王導傳周顗曰風景不殊舉目有河山之異春秋書鄭伯使宛来歸祊又書齊人歸我濟西田謝王子予送橄欖方懐味諫軒中果忽見金盤橄欖来元注云戎州蔡次律家軒外有餘甘余名之曰味諫軒味諫言餘甘初苦而終有味南史劉穆之傳以金柈貯檳榔一斛橄欖見下注想共餘甘有𤓰葛苦中眞味晩方囘陳藏噐本草曰菴摩勒人食其子先苦後甘故曰餘甘晋書王説傳導之子也導與奕棋争道笑曰相與有𤓰葛那得為爾耶歐陽公詩又如食㰖橄眞味久愈在東坡橄㰖詩云待得微甘回齒頰巳輸崖密十分甜以椰子小冠送子予漿成乳酒醺人醉肉截鵝肪上客盤有核如匏可彫琢道装宜作玉人冠交州記曰椰子中有漿飲之得醉圖經本草曰椰子出嶺南州郡實大如瓠殻圓而堅裏有膚至白如豬肪厚半寸許味亦似胡桃膚裏有漿如乳飲之冷而氣醺老杜詩小瓶乳酒下青雲退之詩鵝肪截佩璜呈楊康國君家秋實羅浮種已作纍纍半拂墻莫遣児童酸打盡要看霜後十分黄韓詩外傳云秋得食其實劉楨書曰忘家丞之秋實唐盧氏雜説云明皇徳宗僖宗幸蜀年浙西奏羅浮山柑子皆不結子此甚異也按太湖中亦有羅浮山老杜詩児童莫信打慈鵶又戲呈康國整冠行客莫先嘗楊子家無数仞牆假借肅霜令弄色句添寒曰與争黄古樂府曰君子防未然不處嫌疑閒𤓰田不納履李下不整冠豳詩曰九月肅霜老杜詩柳條弄色不忍見句添蓋黄冶家語云次韻馬荆州馬城字中玉六年絶域夢刀頭判得南還萬事休山谷謫黔戎凡六年漢書耿育上書訟陳湯曰討絶域不羈之君古樂府云何當大刀頭破鏡飛上天呉兢解題云刀頭有環問何時當還也夢刀頭借用王濬夢三刀事柳子厚詩曰一生判却歸休謂著南冠到頭劉禹錫詩黄髪相看萬事休誰謂石渠劉校尉来依綘帳馬荆州漢書劉向傳經論五經于石渠元帝時廢十餘年成帝以向為中壘校尉山谷自館閣遷貶故用以自況後漢書馬融傳曰桓帝時為南郡太守又曰常坐髙堂施絳帳前授生徒後列女樂按南郡即今荆南霜髭雪鬢共看鏡茱糝菊英同送秋他日江梅臘前破還從天際望歸舟老杜有江梅詩云梅橤臘前破梅花年後多謝朓詩雲中辦江樹天際識歸舟中玉維掦人官當滿明年之冬道出當塗于時山谷巳赴太平州矣故有望歸舟之語山谷紹聖初跋關中雪景圖曰維掦馬中玉觀于上藍寺和中玉使君晩秋開天寕節道場江南江北盡雲沙車騎東来風斾斜倒影楼臺開紫府得霜籬落賸黃花文選謝靈運詩江南倦厯覽江北曠周旋漢書司馬相如傳曰時從車騎雍容閒雅倒影見前注退之詩青春白日映樓臺荆南有紫府觀抱朴子曰項曼都自言到天上過紫府樂府盧思道神仙篇曰雲軒逰紫府風駟立丹梯禮記月令季秋之月菊有黄華淵明詩采菊東籬下抱朴子曰葛洪籬落頓缺釣溪築野收多士航海梯山共一家尚書中候曰吕望即磻溪水釣其涯得玉環書曰説築傳巖之野詩曰濟濟多士後漢書梯山棧谷望風弭從文選顔延年曲水詩序曰棧山航海踰沙䡍幕之貢禮記曰聖人耐以天下為一家想見星壇祝堯壽歩虚聲裏静無譁孟郊詩囚怪星宿壇按南斗經曰修設兩極二斗同醮一壇各象斗星莊子曰堯觀于華封華封人曰嘻聖人請祝聖人使聖人壽本事詩許渾詩曰天風吹下歩虚聲按呉兢樂府解題曰歩虚詞道觀所唱備言衆仙縹緲輕舉之美書曰嗟人無譁入窮巷謁李材叟翹叟戲贈兼簡田子平三首紫冠黄鈿網絲窠蝶繞蜂圍奈晚何元注云紫冠雞冠黄鈿黄菊集韻元鈿金花飾也音田又音電退之城南聨句云絲窠掃還成二叟家居如避世開門自少俗人過用退之竹洞詩意只可闋中安止止誰能鐵裏鬬錚錚田多穀少無人㑹譬似無田過一生莊子曰瞻彼闋者虚室生白吉祥止止後漢書劉盆子傳徐宣等叩頭曰今日得降猶去虎口歸慈母光武曰卿所謂鐵中錚錚庸中佼佼者也北夢瑣言馮藻應二十五舉姻親勸令罷舉求官藻曰譬如一生無成更應五舉樂天詩譬如原是九江人田郎杞菊荒三徑文字時追二叟游萬巻藏書多未見老夫端擬乞荆州陸龜䝉有杞菊賦田子平荆南人其家多書未見書具前注南史王僧孺聚書至三萬巻次韻答馬中玉三首雨入紗窻風簸船菊花過後早梅前錦江春色熏人醉也到壺中小隠天老杜詩浪簸船應折杯乾甕即空又云錦江春色來天地壺中見前注文選王康琚詩曰小隠隠陵藪大隠隠朝市太白詩壺中别有日月天山谷時旅寓沙市故有小隠之句巻沙成浪北風顛銜尾千艘不敢前匝岸水居皆有酒行人得意買江天劉禹錫詩巻起沙灘似雪堆老杜詩曉來急雨春風顛漢書武帝紀曰舳艫千里注云言其船多前後相銜東坡樂府曰船尾凍相銜文選王仲宣詩連舫踰萬艘西京雜記滕公馬不肯前老杜詩藩籬無限景恣意買江天仁氣已蒸全楚盡同雲欲合暮江前争春梅柳無三月對雪樽罍屬二天上句以指中玉仁氣見禮記鄉飲酒孟浩然洞庭詩氣蒸雲夢澤波撼岳陽城詩曰上天同雲雨雪雰雰老杜詩天邊梅栁樹相見幾回新二天見前注次韻中玉早梅二首梅蘂争先公不嗔知公家有似梅人何時各得自由去相逐揚州作好春莊子曰見似人者而喜老杜詩東閣官梅動詩興還如何遜在揚州此時對雪還相憶送客逢花可自由樂天詩好作開成第二春折得寒香不露機小窻斜日兩三枝羅幃翠幕深調䕶己被遊蜂聖得知此詩亦似戲中玉之歌舞者李賀將進酒曰羅帳繡幕圍春風漢書張湯傳調䕶之尤厚退之盆池詩夜半青蛙聖得知次韻中玉水仙花二首借水開花自一竒水沈為骨玉為肌暗香已壓酴醿倒只此寒梅無好枝漢書呉王濞傳曰亦一奇也老杜詩秋水為神玉為骨退之馬少監墓誌曰肌肉玉雪可憐壓倒見前注水仙叢生故云無好枝淤泥解作白蓮藕糞壤能開黃玉花可惜國香天不管隨緣流落小民家元注云時聞民間事如此栁子厚詩糞壤擢珠樹莓苔插瓊英左傳曰蘭有國香人服媚之秦少游樂府亦有惱殺人天不管之句此詩葢山谷借以寓意也按高子勉所作國香詩序云國香荆渚田氏侍兒名也黄太史自南溪召為吏部副郎留荆州乞守當塗待報所居即此女子隣也太史偶見之以為幽閒姝美目所未覩後其家以嫁下俚貧民因賦此詩以寓意俾予和之後數年太史卒於嶺表當時賔客雲散此女既生二子矣㑹荆南嵗荒其夫鬻之田氏家田氏一日邀予置酒出之掩抑困悴無復故態坐間話當時事相與感歎予請田氏名曰國香以成太史之志政和三年春京師㑹表弟汝陰王性之問太史詩中本意因道其詳乃為賦之詩曰南溪太史還朝晚息駕江陵頗從欵綵毫曽詠水仙花可惜國香天不管将花託意為羅敷十七未有十五餘宋王門墻紆貴從藍橋庭戸怪貧居十年目色遙成處公更不來天上去巳嫁鄰姫窈窕姿空傳墨客慇懃句聞道離鸞别鶴悲藁碪無頼鬻蛾眉桃花結子風吹後巫峽行雲夢足時田郎好事知渠久酬贈明珠同石友憔悴猶疑洛浦妃風流固可章臺柳寳髻犀梳金鳯翹樽前初識董嬌饒來遲杜牧應須恨愁殺蘇州也合銷却把水仙花説似猛省西家黄學士乃能知妾妾當時悔不書空作黄字王子初聞話此詳索詩裁與漫凄涼只今驅豆無方法徒使田郎號國香此詩和者甚衆故併録之王充道送水仙花五十枝欣然㑹心為之作詠凌波仙子生塵襪水上輕盈歩微月洛神賦曰凌波微歩羅襪生塵此云微月葢言襪如新月之状詩曰彼月而微是誰招此㫁腸魂種作寒花寄愁絶招魂見前注陶淵明九日閒居詩寒華徒自榮老杜北風詩愁絶付摧枯含香體素欲傾城山礬是弟梅是兄應劭漢官儀尚書郎含雞舌香此借用淵明詩曰君其爱體素傾城見漢書李延年歌已具前注山礬即㻛花山谷律詩敘述頗詳坐對眞成被花惱出門一笑大江横老杜詩江上被花惱不徹無處告訴只顛狂山谷在荆州與李端叔帖云数日来驟暖瑞香水仙紅梅皆開明窻静室花氣撩人似少年都卜夢也但多病之餘嬾作詩爾山谷時寓荆渚沙市故有大江横之句老杜詩雞蟲得失無了時注目寒江倚秋閣山谷句意類此呉君送水仙花并二大本折送南園栗玉花并移香本到寒家何時持上玉宸殿乞與宫梅定等差魏文帝與鍾繇玉玦書曰黄伴烝栗唐書禮樂志康崑崙奏琵琶于玉宸殿按宋次道東京記後苑有玉宸殿山谷所指當謂此宋書曰武帝女壽陽公主人日臥于含章簷下梅花落額上成五出之花自後有梅花狀詩人用宫梅事蓋取此也退之李花詩長姫香御四羅列縞裙練帨無等差此反其意按漢書游俠傳序曰卿大夫以至于庶人各有等差劉邦直送早梅水仙花四首簸船綪䌫北風嗔霜落干林憔悴人欲問江南近消息喜君貽我一枝春簸船見前注綪音争儀禮士喪禮注曰綪讀為䋫䋫屈也江沔之間謂縈收繩索為䋫荆州記陸凱與范蔚宗相善自江南寄梅花一枝詣長安與范并贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春探請東皇第一機水邉風日笑横枝鴛鴦浮弄嬋娟影白鷺窺魚凝不知探請蓋俗語猶言預借東坡嘗有六言詩探支八月凉風又有樂府曰探借今年三月暖楚詞有東皇太一雲門問臥龍長連牀上學得是第幾機龍曰第二機門云作麽生是第一機龍曰緊峭草鞋林逋梅詩雪後園林纔半樹水邉籬落忽横枝集韻凝音牛孕反止水也又結固也又蒸勺得水能仙天與竒寒香寂寞動冰肌仙風道骨今誰有淡掃蛾眉篸一枝太白大鵬賦序曰余昔于江陵見天台司馬子微謂余有仙風道骨可與神逰八極之表今借用老杜詩却嫌脂粉汚顔色淡掃蛾眉朝至尊樂府沈約江南曲曰堕馬碧玉篸集韻篸音作紺切綴也錢唐昔聞水仙廟荆州今見水仙花暗香静色撩詩句宜在林逋處士家元注云錢塘有水仙王廟林和靖祠堂近之東坡先生以為和靖清節映世遂移神像配食水仙王云處士名逋字君復居錢塘西湖孤山有詩名于咸平景徳間既死諡和靖先生所作梅詩有疎影横斜水清淺暗香浮動月黄昏之句為世傳誦王介甫詩云物華撩我有新詩謝檀敦信送柑子色深林表風霜下香著尊前指爪間書後合題三百顆頻隨驛使未應慳文選謝朓詩林表呉岫微老杜詩破甘霜落爪米芾書史載石軍一帖云奉橘三百顆霜未降未可多得韋應物詩云書後欲題三百顆洞庭更待滿林霜謂此也驛使見前注老杜詩玉粒未吾慳贈李輔聖交蓋相逢水急流八年今復㑹荆州言卒然相遇不容少停如流波之急也文選樂府詩日中市朝滿車馬若川流楞嚴經曰如急流水望如恬静流急不見非是無流也已囘青眼追鴻翼肯使黄塵沒馬頭上句用稽康詩目送歸鴻之意文選陸士衡詩願假歸鴻翼翻飛曲江汜下句謂不復浮沈京洛風塵間也樂天詩舟辭三峽雨馬入九衢塵老杜詩馬寒防失道雪沒錦鞍韉古樂府日出東南隅行曰黄金絡馬頭舊管新收幾妝鏡流行坎止一虚舟舊管新收本吏文書中語山谷取用所謂以俗為雅也賈誼鵬賦曰乘流則逝得坎則止荘子曰汎若不繫之丹虚而遨遊者也易曰乘木舟虚劉子虚舟觸人人不知怨相看絶歎女博士筆研管絃成古丘元注云女博士謂輔聖後房孔君也于文藝無所不能皆妙絶世説殷中軍問劉尹云云一時絶歎以為名通又云袁虎作露布手不輟筆王東亭絶歎其才魏志甄后傳后年九嵗喜書輒用諸兄筆研兄言當作女博士邪太白詩晋代衣冠成古丘和髙仲本喜相見雨昏南浦曽相對雪滿荆州喜再逢有子才如不羈馬知君心是後凋松山谷自蜀放還過萬州時仲本為太守有約遊岑公洞詩萬州即唐南浦郡漢書司馬遷書曰少負不羈之才論語歳寒然後知松相之後凋閒尋書冊應多味老傍人門似更慵退之送石洪序曰戒行李載書冊班固叙傳曰味道之腴樂天詩好是老身消日處誰能騎馬傍人家近世盧秉詩云但得有錢留客醉也勝騎馬傍人門蓋出于此何日晴軒觀筆硯一樽相属要從容漢書灌夫傳夫起舞属田蚡注云属付也音之欲反退之詩一杯相属君當歌戰國䇿曰犀首從容談三國之相怨戲詠煖足瓶二首小姫煖足卧或能起心兵千金買脚婆夜夜睡天明邪念忽起甚于用兵不戢之祸退之詩詰曲避語穽冥茫觸心兵俗以煖足缾為鐵婆老杜詩客睡何曽著秋天不肯明此反而用之又詩天明登前途脚婆原不食纒裏一衲足天明更傾瀉頮面有餘燠書顧命注曰洮盥頮面戲呈聞善二兄黄友聞字聞善侍御史昭之第二子匏懸籬落鴉窺井草上堦除雪衮風想得尊前欹醉㡌渾家児女笑山公北史獨孤信因獵日暮馳馬入城其㡌微側詰旦吏人慕信而側㡌焉晋書山簡傳童児歌曰山公出何許徃至髙陽池日夕倒載歸酩酊無所知時時能騎焉倒著白接䍦舉鞭向葛彊何如并州児南唐近事史虚詩曰風雨揭却屋渾家醉不知次韻聞善扶醉三竿日題詩一研埃杜牧之詩醉頭扶不起三丈日還髙劉禹錫竹枝歌日出三竿春霧消按南齊書永明五年十一月丁亥日出三竿朱色黄色赤暈東坡密州謝上表曰塵埃筆硯慚忘舊學之淵源張羅門帯雪投轄井生苔漢書鄭當時傳曰翟公門外可設爵羅門帶雪用袁安事見前注漢書陳遵傳毎大飲賓客滿堂輙關門取客車轄投井中老杜詩君不見両時秋井塌古人白骨生青苔如何不飲令心衰東坡詩亦云我如廢井久不食古甃缺落生陰苔待得成丘隴誰能把酒盃東方朔七諌封比干之丘隴李賀将進酒日勸君莫惜酩酊醉酒不到劉伶墳上土常應黄菊畔悵望白衣来檀道鸞續晋陽秋日陶潛九月九日無酒于宅畔菊叢中摘盈把坐其側久望見白衣人乃王𢎞送酒即便就酌而後歸謝答聞善二兄九絶句此篇大槩以聞善與桞氏兄弟杯酒相失因為開廣之聞善蓋山谷族人山谷有與聞善帖云久聞䀲甫伯父負天下大名常恨不見其子孫今乃得識面又與黄顔徒帖云䀲甫自閩漕以侍御史召按黄氏世譜䀲甫名昭身入醉鄉無畔岸心與歡伯為友朋唐書王績傳曰績著醉鄉記詩曰淇則有岸隰則有泮箋云泮讀為畔焦贑易林坎卦之兌曰酒為歡伯除憂来樂更闌罵坐客星㪚午過未蘇髪鬅鬙蔡琰胡笳曰更深夜闌兮夢汝來思漢書灌夫傳曰有詔劾夫罵坐不敬蜀志姜維傳曰星㪚流離死者甚衆切韻曰鬅鬙被髪也朋僧二音廣燈録僧問祠山守初曰不昧宗乘請師舉唱師云頭鬅鬙耳愬未嘗頃刻可去酒無有一日不吟詩詩狂克念作酒聖意態忽如少年時皇甫湜韓文公神道碑曰未嘗一日不對客書曰惟狂克念作聖樂天詩曰不知老将至猶自放詩狂酒諸曰李白毎醉為文未嘗差誤人目為醉聖羣猪過飲尚可醉疥手轑甕庸何傷晋書阮咸傳諸阮皆能飲酒咸至宗人家共集以大盆盛酒時有羣豬来飲其酒咸直接去其上便共飲之曽慥集仙傳曰張開光嘗與母及弟出逰獨留嫗守舍俄有道士敝衣冠疥癬被體直入祼浴酒甕中嫗不能拒既暮出遊歸渴甚聞酒芳烈亟就盆中飲嫗心惡道士不敢白而但不飲居数日開光與母及弟㧞宅而去此事與葛洪神仙傳李八百事略問漢書楚元王傳曰嫂厭叔與客来陽為羮盡轑釡注云轑音勞轑轢也左傳一抶女庸何傷柳家兄弟太迫窄狂藥不容人發狂文選西京賦増九筵之迫脅五臣注曰迫脅迫窄也晋書裴楷傳孫季舒與石崇酣燕慢倣過度崇欲表免之楷曰足下飲人狂藥責人正禮不亦乘乎乃止老子曰馳騁田獵令人心發狂莫作呌號驚四鄰甕中有地可藏眞蕩詩曰式號式呼俾晝作夜北山詩曰或不知呌號此借用樂天詩今宵醉有興狂詠驚四鄰陸羽作懐素傳曰飲酒以養性草書以暢志酒酣興發靡不書之按懐素字藏眞此借用言全其天眞于酒中髙僧傳醋頭和尚頌揭起醋甕見天下天下原来在甕中甕中原來有天下淵明醉握逺公手大笑絶倒人不嗔廬山記逺公與陶元亮陸修静談道不覺過虎溪因相與大笑故作三笑圖阮籍醉睡不論昏劉伶雞肋避尊拳晋書阮籍傳文帝欲為武帝求昏于籍籍醉六十日不得言而止劉伶傳嘗醉與俗人相忤其人攘袂奮拳伶曰雞肋不足以安尊拳其人笑而止至今凛凛有生氣飲酒真成不愧天世説庾道季曰廉頗藺相如雖千載尚凛凛有生氣太白詩曰天地既爱酒飲酒不愧天公擇醉靣桃花紅人百忤之無愠容李常字公擇南康軍建昌人元祐間為戸部尚書御史中丞山谷之舅也樂府髙陽樂人歌曰何處䑜觴来兩頰色如火自有桃花容莫言人勸我朝野僉載張元一嘲武懿宗曰未見桃花面皮謾作杏子眼孔崔䕶詩人面桃花相映紅魯論曰三巳之無愠色莘老夜闌傾数斗焚香黙坐日生東孫覺字莘老髙郵人元祐初為諫議遷給事吏侍擢御史中丞山谷之婦翁也抱朴子曰管輅頓傾三斗而清辯綺粲貫休詩静只焚香坐詠懷悲歳闌退之詩黙坐念語笑乂詩杲杲寒日生于東椎牀破面棖觸人作無義語怒四鄰玉臺新詠焦仲卿妻詩阿母得聞之槌牀便大怒東坡䟦老蘓送石昌言北使引云彭任聞彦國當使不測之域憤憤椎酒牀拳皮裂南史沈昭畧以甌投徐孝嗣面曰使為破面鬼朝野僉載楊廷玉囘波詞曰阿姑婆見作天子旁人不得棖觸陸龜䝉蠹化曰人或棖觸之輒奮角而怒維摩經香積品曰是無義語是無義語報尊中歡伯笑爾輩西陽雜爼酒日歡伯我本和氣如三春樂天家醖詩曰飲似陽和滿腹春陶令舍中有名酒無日不為父老傾四座歡欣觀酒徳一燈明暗又詩成淵明飲酒詩序曰偶有名酒無夕不飲顧影獨盡忽焉復醉既醉之後輙題數句自娯樂天詩對雪盡寒灰殘燈明復滅晋書劉伶作酒徳頌阮籍劉伶智如海人間有道作糟丘晋書阮籍傳本有濟世志属魏晋之際天下多故名士少有全者遂不與世事酣飲為常劉伶見前注本傳又云常以細宇宙齊萬物為心張彦逺名畫記云董伯仁鄉里號為智海按華嚴經頌云不動如山智如海南史陳暄傳復兄子書曰速營糟丘吾将老焉按紂為酒池糟丘此借用酒中無諍真三昧便覺稽康輸一籌金剛經曰佛説我得無諍三昧人中最為第一亦見維摩經桞子厚詩共傾三昧酒晋書嵇康傳鍾會造康康不為之禮㑹謂文帝曰嵇康臥龍也不可起公無夏天下顧以康為慮耳遂遇害御史臺記曰楊纂恕尹君不同巳判遽命筆復沈呤少選乃判曰纂輸一籌戲呈聞善堆豗病鶴怯雞羣見酒特地生精神歐陽公詩云三日不出門堆豗類寒鴉晋書嵇康傳或曰昨于稠人中始見嵇康昻然若野鶴之在雞羣退之詩春半邉城特地愁坐中索起時被肘亦任旁人嫌我眞老杜遭田父泥飲詩髙聲索果栗欲起時被肘又詩不爱入州府畏人嫌我眞題子瞻畫竹石趙子湜家本云題全天粹東坡竹風枝雨葉瘠土竹龍蹲虎踞蒼蘚石東坡老人翰林公醉時吐出胸中墨東坡詩雨葉風枝曉自匀李太白永王東廵歌曰龍蟠虎踞帝王州胸中墨謂其藻翰之餘退之代張籍書曰一吐出胸中之竒戲贈米元章二首米芾字元章以能書知名喜蓄書畫有米氏書畫史行于世萬里風帆水著天麝煤䑕尾過年年滄江静夜虹貫月定是米家書畫船謝靈運詩苕苕萬里帆老杜詩一日過海收風帆退之詩海氣昏昏水拍天又祭張署文日洞庭汗漫粘天無壁李西臺題楊少師大字壁後云枯杉倒檜霜天老松煙麝煤風雨寒䑕尾謂栗䑕尾可為筆杜牧之詩廣文遺韻留樗㪚雞犬圖書共一船自說江湖不歸去阻風中酒過年年詩舍神霧曰瑤光如虹蜺貫月正白感女樞生顓頊此借用言船中有寳氣崇寜間元章為江淮發運掲牌于行舸之上曰米家書畫船云我有𤣥暉古印章印刓不忍與諸郎虎児筆力能扛鼎教字𤣥暉繼阿章𤣥暉謂謝朓也漢書藝文志曰摹印章書幡信漢舊儀曰銀印龜鈕其文曰章漢書韓信傳曰項王刻印刓忍不能予虎児即元章之子名友仁近嵗擢工部侍郎退之詩曰龍文百斛鼎筆力可獨扛兩章字義不同故得重用以元章為阿章猶晋人以王平子為阿平山谷内集巻十五
