body:
  text: 山谷內集詩注卷十七宋黃庭堅撰任淵注拜劉凝之畫像棄官清頴尾買田落星灣陳舜俞廬山記云劉渙字凝之筠州人天聖八年擢進士第居官有直氣不屑輒棄去卜居落星渚嘗乘黃犢往來廬山中張文潛水玉堂記云凝之年五十餘為頴上令即致仕歸隱于廬山年八十一卒清頴尾見前注寰宇記云落星石在江州廬山東周迥一百五步髙丈許圖經云昔有星墜水化為石當彭蠡灣中俗呼為落星灣身在菰蒲中名滿天地間建康寶録云殷禮與張溫使蜀諸葛亮見而嘆曰江東菰蘆中生此竒才謝靈運詩菰蒲冒清淺老杜詩詩卷長留天地間誰能四十年保此清靜退老子曰保此道者不欲盈漢書揚雄解嘲曰爰清爰靜遊神之庭文選盧子諒序曰用安靜退往來澗谷中神光射牛背見首句注晉書玉衍引王導共載而去曰吾目光乃在牛背上矣追和東坡壺中九華并序湖口人李正臣蓄異石九峯東坡先生名曰壺中九華并為作詩後八年自海外歸湖口石已為好事者所取乃和前篇以為笑實建中靖國元年四月十六日明年當崇寧之元五月二十日庭堅繫舟湖口李正臣持此詩來石既不可復見東玻亦下世矣感歎不足因次前韻有人夜半持山去頓覺浮嵐暖翠空莊子曰藏舟于壑藏山于澤謂之固矣然而夜半有力者負之而走昧者不知也下句謂失此石之清寒遂覺瘴嵐暖氣浮動于太虛耳捭蒼曰嵐山風也托言載趙嘏詩云何必青樓倚翠空試問安排華屋處何如零落亂雲中曹子建詩曰生存華屋處零落歸山邱此借用其字能回趙璧人安在已入南柯夢不通史記藺相如傳度秦王負約不償城使從者懷其璧從間道亡歸璧于趙南柯見前注謂東坡已死此段陳迹遂成幻境不可復追尋也賴有霜鐘難席卷袖椎來聽響玲瓏晉書石勒載記曰賴有此耳霜鐘謂石鏜山也水經曰彭蠡之口有石鐘山焉東坡作石鐘山記唐李渤記曰得雙石于潭上扣而聆之南聲函胡北音清越止響騰餘韻自歇山海經曰豐山有鐘九耳霜降則鳴此用其字漢書賈誼過秦論曰有席卷天下之心史記信陵君傳朱􅕀袖四十斤鐵椎揚雄甘泉賦曰何氏玲瓏罷姑熟寄元明用觴字韻通典曰當塗縣即晉姑熟城按當塗今為太平州追隨富貴勞牽尾準擬田園略濫觴上句言世人用力于富貴之地如曳牛尾徙自苦也文選曹子建詩冠蓋相追隨俗本勞或作榮非是太玄經勤首曰勞牽不于其鼻于尾弊范望注曰牽牛不于鼻而于尾故勞弊老杜詩春來準擬開懷久漢書汲黯傳隱于田圃濫觴見前注本與江鷗成保社聊隨海燕度炎涼南越志曰江鷗一名海鷗保社謂保伍同社傳燈録典化存奬禪師傳克賓曰我不入汝保社海燕以言去來無定梁吳均詠燕詩曰一燕海上來一燕髙堂息老杜雙燕詩應同避燥濕且復過炎涼未栽姑熟桃李徑郤入江西鴻鴈行别後常同千里月書來莫寄九回腸江西謂洪州山谷鄉里謝莊月賦隔千里兮共明月司馬遷書曰腸一日而九回次蘇子瞻和李太白潯陽紫極宫感秋詩韻追懷太白子瞻元豐二年東坡自黃移汝往筠州見子由過江州道士胡洞微示以太白詩石本蓋其師卓玘之所刻因和其韻且云玉芝一名瓊田草洞徼種之七八年矣不見兩謫仙長懷倚修竹唐書李白傳賀知章歎曰子謫仙人也兩謫仙謂蘇李老杜詩曰暮倚修竹南史云會稽山有人姓蔡不知名時人謂之謫仙行繞紫極宫明珠得盈掬老杜詩道州手札適復至紙長要自三過讀盈把那須滄海珠入懷本倚崑山玉禮記曰受珠玉者以掬詩曰不盈一掬平生人欲殺耿介受命獨老杜無李白消息詩曰世人皆欲殺吾意獨憐才離騷曰彼堯舜之耿介兮既遵道而得路莊子曰愛命于地惟松柏獨也在冬夏青青受命于天惟舜獨也正山谷跋東坡和陶詩云子瞻謫嶺南時宰欲殺之亦此意也往者如可作抱被來同宿禮記檀弓趙文子曰死者如可作也吾誰與歸注云作起也退之送殷侑序曰抱被入直樂天詩官曹冷似水誰肯來同宿砥柱閲頽波不疑更何卜劉禹錫詩世道劇頽波我心如砥柱其詳見前注詩意謂蘇李介持自信也按楚辭屈原卜居曰往見太卜鄭詹尹曰余有所疑願因先生決之寧昻昻若千里之駒乎將泛泛若水中之鳧乎與波上下偷以全吾軀乎詹尹謝曰用君之意龜䇿誠不能知事此詩用其意左傳廉云卜以決疑不疑何卜此詩用其語王維歸山歌亦云聊解印兮相從何詹尹兮可卜但觀草木秋葉落根自復草木秋見前注老子曰萬物並行吾以觀其復夫物藝藝各歸其根歸根曰靜靜曰復命唐人詩梧桐葉落滿庭隂古詩云一葉落知天下秋我病二十年大斗久不復山谷作發願文戒酒肉蓋元豐甲子嵗至崇寧壬午幾二十年行葦詩曰曾孫維主酒醴維醹酌以大斗以祈黃耉注云大斗長三尺正義謂從大麓挹之于尊用此勺隋書天文志曰天市垣斗五星在宦者南仰則天下斗斛不平覆則嵐穰此借用以言挹酒而注之則當覆斗久不飲故斗不覆也因之酌蘇李蟹肥社醅熟别本注云豫以病不能食暫開酒肉故云文選江文通擬休上人云桂水日千里因之平生懷林逋詩水痕初落蟹螯肥李商隱詩旗高社酒香按世説畢茂世云一手持蟹螯一手持酒杯拍浮酒池中便足了一生山谷此詩原有跋云子瞻詩所記胡道士玉芝一名瓊田草者俗號其葉為唐婆鏡葉底開花故號羞天花以豫考之其實本草之鬼臼也嵗生一臼如黃精而堅瘐滿十二嵗可為藥就土中生根取一臼勿令大本知也煮麵如饆餛皮裏一臼吞之數日不飢啖三臼可辟縠也黃龍山老僧多采而斷食令人體臞而神王今方家所用鬼臼乃鬼燈檠耳如蜀人用鬼箭但用一草根不知何物也鎮陽趙州間道旁叢生三羽者真鬼箭俗醫川藥如此而青古方不治病可勝歎哉因論玉芝故并記之以遺胡道士道士胡君洞卓君之弟子卓君之時欲崇飾宫觀而俗緑薄規模甚逺而不成就反胡君而官殿崇成便齋曲房松竹薈蔚觀其軒窗開塞宜冬而愜夏智慮通物者也又好文多藝能治賓客具至者忘歸此東坡先生所以每至而留連者歟瓊芝軒卓仙在時養瓊芝深根固蒂活人命憧憧來問此何草但告渠是唐婆鏡老子云深根固蒂易成卦之九四曰憧憧往來朋從爾思王弼云憧憧往來不絶貌詩意謂俗人聞此草能使人長生未必信之但以凡草告之可也龜殼軒紫極宫中三百楹道人獨藏一神屋開軒納息星月明時有白雲來侔宿本草龜殼一名神屋史記龜策傳曰龜能行氣導引太白紫極官詩曰白雲南山來就我簷下宿退之詩月明侔宿玉堂空秋聲軒誰居空間扇橐籥情與無情並時作莊子曰風起地方一西一東有上傍偟就噓吸是孰居無事而披拂是老子曰天地之間其猶橐籥手又曰萬物並作吾以觀其復法界觀頌曰情與無情共一體是聲皆自根極來更莫辛勤問南郭傳燈録鏡清問僧門外什麼聲曰雨滴聲師曰衆生顛倒建己逐物此詩用其意莊子繕性篇曰不當時命而大窮乎天下則深根寧極而待大宗師篇真人之息以踵郭象注曰乃在根本中來齊物論曰南郭子綦隱几而坐顔成子遊立侍乎前子綦曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫子遊曰敢問其方云云戲效禪月作逺公詠并序逺法師居盧山下持律精苦過中不受蜜湯而作詩換酒飲陶彭澤送客無貴賤不過虎溪而與陸道士行過虎溪數百步大笑而别故禪月作詩云愛陶長官醉兀兀送陸道士行遲遲買酒過溪皆破戒斯何人斯師如斯故效之禪目師名貫休其詩見于集中陳舜俞廬山記曰逺師送陶元亮陸偕靜不覺過虎溪因相與大笑今世傳三笑圖蓋起于此邀陶淵明把酒碗送陸修靜送虎溪胸次九流清似鏡人間萬事醉如泥陳舜俞盧山記曰簡寂觀宋陸先生之隱居也隱居名修靜明帝召至闕設崇盧館通仙堂以待之仍會儒釋之士講道于莊嚴佛寺九流見前注東坡詩曰道人胸中水鏡清後漢周澤時人語曰一日不齋醉如泥跋子瞻和陶詩東坡和陶淵明詩凡一百有九篇追和古人自東坡始子瞻謫嶺南時宰欲殺之飽喫惠州飯細和淵明詩東坡知揚州初和淵明飲酒詩二十首歸田居以下皆謫州後所作東坡以紹聖元年安置惠州時章惇為宰相老杜歌曰但使殘年飽喫飯只願無事長相見彭澤千載人東坡百世士出處雖不同風味乃相似唐人張旭有帖云賀八清鑒風流千載人也孟子曰伯夷桞下奮乎百世之上百世之下聞者莫不興起山谷作王持字説曰世無千嵗之人安得千嵗之士蓋其德可以經盛衰云耳易曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭子由作和陶集序亦曰區區之迹蓋未足以論士也題李亮功戴嵩牛圖張彥逺名畫記載戴嵩事曰韓晉公滉之鎮浙右署為巡官師晉公之畫不及他物惟善水牛而己田家川原亦有意思李亮功名公寅韓生畫肥馬立仗有輝光老杜丹青引云弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣雕喪立仗馬見前注文選阮嗣宗詩灼灼有輝光戴老作瘐牛平生千頃荒韓生作富貴想戴老作田野觀言胸懷異趣也觳觫告主人實巳盡筋力孟子注曰觳觫牛當到死地處恐貌老杜病馬詩庭中老盡力蓋用田子方事筋力見曲禮乞我一牧童林間聽橫笛南史陶𢎞景傳梁武帝屢加禮聘並不出唯畫作兩牛一牛散放水草之間一牛著金籠頭有人以杖驅之武帝笑曰此人豈有可致之理此詩頗采其意山谷于時正以軒冕為纍也追和東坡題李亮功歸來圖今人常恨古人少今得見之誰謂無南史張融傳常歎云不恨我不見古人所恨古人又不見我晉書玉衍傳王戎曰當從古人中求耳漢書劉平傳嘗聞烈士乃今見之欲學淵明歸作賦先煩摩詰畫成圖陶淵明集有歸去來辭序云彭澤去家百里公田之利是為酒故便求之及少日眷然有歸歟之情唐書王維傳維字摩詰别墅在輞川地竒勝畫斷曰王維畫輞川圖山谷盤鬱雲山飛動小池已築魚千里隙地仍栽芋百區齊民要術載陶朱公養魚經曰以六畝地為池池中有九州求懷子鯉魚二十頭牡鯉魚四頭內池中魚在池中周繞九州無窮自謂江湖也其詳已見前注左思蜀都賦曰瓜疇芋區泛勝之書曰種芋區方深皆三尺朝市山林俱有纍不居京洛不江湖世傳退之與大顛書云著山林與著城郭無異次韻徐仲車喜董元達訪之作南郭篇四韻徐積字仲車見前注元逹名達董侯從軍來意望名不朽王粲詩從軍有苦樂不朽見前注款門拜徐公在德不在酒魏志徐邈傳虛欽著書稱邈曰世人無常而徐公有常退之詩何人有酒身無事誰家有竹門可飲左傳王孫滿曰在德不在鼎此用其語律徐公雖避俗對客輒粲然耳不聞世事時誦陶令篇老杜詩陶潛避俗翁詩褎如充耳鄭氏注曰人之耳聾恆多笑而己仲車有此疾故以為戲粲然見前注次韻仲車為元達置酒四韻射陽三萬家莫貴徐公門楚州山陽縣本漢射陽縣地仲車家于楚故云誰能拜牀前泥乃共酒尊襄陽記曰諸葛孔明每至龎德公家獨拜牀下惟此酒中趣難為醒者論晉書孟嘉傳梪溫問酒有何好而卿嗜之嘉曰公未得酒中趣耳漢書司馬遷傳曰事未易一二為俗人言也陶淵明詩但得酒中趣勿與醒者傳山谷豈體此耶盜臥月皎皎雞鳴雨昏昏明月皎然盜所畏忌此古人所以自晦于酒世間萬事付之一醉而胸中了了自有常度如雞鳴之不為風雨所廢也然雖鳴雨中其聲往往難辨亦因以戲仲車之聲東坡和仲車詩蓋云蒼蠅莫亂逺雞聲世上誰如公覺早文選潘安仁詩皎皎窗中月鄭詩云風雨如晦雞鳴不已退之詩海氣昏昏水拍天次韻仲車因婁行父見寄之什前朝老諸生大半正邱首仲車與山谷同登治平四年第于時同年生零落大半矣檀弓曰孤死正邱首仁也投荒萬里歸煩公問健否桞子厚詩一身去六千里萬死投荒十二年往時望江宰今為夏津吏望江屬舒州夏津屬北京樂天有立碑詩曰我聞望江縣麴令撫􅑏嫠在官有仁政名不聞京師當是借用此事以言婁君之循良或嘗為此縣也他日可教之玉音尚無棄謂婁君有受道之質欲仲車教之也司馬相如長門賦曰願賜問而進兮得尚君之玉音注引詩曰無金玉爾音而有遐心老子曰常善救人故無棄人武昌松風閣武昌今鄂州縣依山築閣見平川夜闌箕斗插屋椽我來名之意適然老松魁梧數百年斧斤所赦今參天風鳴媧皇五十絃洗耳不須菩薩泉魁梧參天並見前注禮圖曰庖犧氏作瑟五十絃此云媧皇未詳東坡聽琴詩曰歸家且覔于斛水淨洗從前筝笛耳又菩薩泉銘序曰寒溪少西數百步别為西山寺有泉出于嵌竇間色白而甘號曰菩薩泉建昌李常謂余豈昔阿育王所鑄文殊金像之所在乎全像之見陳舜俞盧山記嘉二三子甚好賢力貧買酒醉此筵夜雨鳴廊到曉懸相看不歸臥僧氈泉枯石燥復潺湲山川光輝為我妍野僧早飢不能饘曉見寒溪有炊煙二三子見魯論東坡詩嘉我二三子楚辭曰觀流水兮潺湲寰宇記曰樊山在鄂州武昌縣西山東十步有岡岡中有寒溪張舜民南遷録曰寒溪即元次山故居王介甫詩瞑煙孤起隔林炊東坡道人已沈泉張侯何時到眼前東坡謫黃州時多往來武昌溪山間建中靖國元年還自海外七月殁于常州東都賦曰沈珠于泉此借用張侯謂文潛崇寧元年七月言者謂文潛知潁州曰聞蘇軾卒飯僧縞素而哭遂自管勾亳州明道宫責授房州别駕黃州安置老杜詩多病秋風落君來慰眼前釣臺驚濤可畫眠怡亭看篆蛟龍纏元次山樊上漫歌曰叢石橫大江人言是釣臺按水經樊山北背大江江上有釣臺孫權嘗極飲其上歐公集古録跋曰怡亭銘李陽氷彖裴虬撰銘在武昌江水中有小島亭在其上銘刻于島石老杜觀薜稷書畫壁詩曰鬱鬱三大字蛟龍岌相纒安得此身脫拘攣舟載諸友長周旋漢書鄒陽上書曰能越拘攣之見超域外之議退之詩攣拘屈吾身魏晉間多以交遊為周旋又蜀志後主傳注諸葛亮曰吾周旋陳元方鄭康成間又世説曰郗嘉賓開庫得錢一日乞與親友周旋略盡次韻文潛武昌赤壁弔周郎寒溪西山尋漫浪吳志周瑜傳吳中皆呼為周郎建安十三年九月曹公入荆州孫權遣瑜等與劉備并力逆曹公遇于赤壁黃蓋放諸船同時發火曹公軍馬燒溺死者甚衆軍遂大敗按赤壁山在今鄂州蒲圻縣而山谷所引蓋指黃州赤壁與武昌對岸者東坡題赤壁賦後所謂黃州少西山麓斗入江石色如丹即此地也元次山自釋曰將家瀼濱乃自稱浪士及有官時人以為浪者亦漫為官乎蒙呼為漫郎及家樊上漫遂顯焉又曰以近文多漫浪之稱故設之以自釋忽聞天上故人來呼船凌江不待餉老杜詩天上張公子官中漢客星退之詩遂凌大江極東陬按孔稚圭大舉帆詩云凌江及濤涌挂帆追風翻我瞻髙明少吐氣君亦歡喜失微恙後漢孔融傳李膺曰髙明祖父與僕有舊乎東都賦曰咸含和而吐氣老杜春陵行序曰萬姓吐氣又詩蘇侯得數過觀喜每傾倒文潛時有末疾故云微恙年來鬼崇覆三豪詞林根柢頗搖蕩三豪當是東坡先生及范淳夫秦少遊于時皆死矣蘇與秦山谷之師友范蓋修史時同僚老杜八哀詩曰憶昔李公存詞林有根柢莊子曰搖蕩人心天生大材竟何用只與千古拜圖像太白詩天生我材必有用此反而言之老杜詩古來材大難為用文選王元長䇿秀才文曰敷化一時餘烈千古退之孔子廟碑曰像圖孔肖張侯文章殊不病厯險心膽原自壯言其文章無衰苶之氣家語曰厯險致逺馬力盡矣魏武帝樂府歌曰烈士暮年壯心不已老杜詩天河原自白汀洲鴻鴈未安集風雪牖戶當塞向有人出手辦兹事正可隱几窮諸妄鴻鴈詩序曰萬民離散不安其居而能勞來還定安集之孟子曰國家間暇明其政刑雖大國必畏之矣詩云逮天之未陰雨徹彼桑土綢繆繡戶今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之詩意謂徽廟躬攬之初安民修政自有廟堂諸人身任此責吾曹但當學道山林爾七月詩云塞向墐戶傳燈録雲巖簽藥山曰與和尚共出隻手圓覺經曰于諸妄心亦不息滅經行東坡眠食地拂拭寶墨生楚愴法華經曰經行林中勤求佛道晉書郗超傳曰大損眠食文選謝靈運擬鄴中詩序曰撰文懷人感往增愴世説注婦人集載阮氏與許允書詞甚酸楚元豐二年東坡誦居黃州放浪溪山間凡所遊覽見于賦詠人皆刻之石東坡集中俱載之今不復録出山谷作是詩時文潛亦謫于此故有經行東坡眠食地之句文潛聞東坡之喪縞素而哭拂拭寶墨得無生楚愴耶此兩句非獨盡文潛之方寸又見其師友戀慕片言隻字不敢頃刻忘也水清石見君所知此是吾家祕密藏水清石見具前注圓覺經曰為諸菩薩開祕密藏詩意謂賢愚邪正久而自明自古皆然非世俗所知也涅槃經曰愚人不解謂之祕藏智者了逹則不名藏西清詩話載杜少陵詩云作詩用事要如釋語水中著鹽飲水万知監味此説詩家祕密藏也和文潛舟中所題舊本題云乘武昌小舟過黃岡木門間觀張文潛次韻和李文舉詩是日胃大風刺舟對赤鼻磯而渡江亦次文舉韻雲橫疑有路天逺欲無門謂文潛初在朝路疑若自致青雲然竟流落望君門而不可入也老杜詩雲橫雉尾髙文選沈休文詩惟使雲路通楚辭九歌曰廣開兮天門紛吾乘兮玄雲招魂曰虎豹九關啄害下人注謂天門九重虎豹啄齧天下欲上之人而殺之也信矣江山美懷哉譴逐魂王粲登樓賦曰雖信美而非吾土譴逐魂借用屈原事以言東坡舊謫黃州王逸楚辭章句曰宋玉憐屈原忠而斥棄魂魄放佚故作招魂詩曰懷哉懷哉曷月豫旋歸哉長波空淮記佳句洗眵昏誰奈離愁得村醪或可尊漢書揚雄傳反離騷曰因江潭而淮記兮欽弔楚之湘纍注云􅐹往也音于放反退之詩皇甫作詩止睡昏又詩兩目眵昏頭雪白玉篇眵音充支切目傷背也題君子泉雲夢澤南君子泉水無名字託人賢兩蘇翰墨相為重未刻他山世已傳雲夢澤南謂黃州杜牧之詩曰平生睡足處雲夢澤南州黃州通判孟震亨之朝中謂為孟君子公字中有泉出甚清東坡因以名泉子由為之記東坡在常州有詩曰忽見東平孟君子夢中相對説黃州詩曰他山之石可以攻玉宿黃州觀音院鐘樓上鐘鳴山川曉露下星斗濕老夫梳白頭潘何塤箎集老杜詩老夫清晨梳白頭玄都道士來相訪張文潛集中有同潘何小酌詩潘當是邠老邠老名大臨本閩人後家于黃文潛嘗為集序何當是斯舉斯舉名頡之黃閩人山谷嘗與書取色矣舉矣為之字事見曽慥詩選詩曰伯氏吹塤仲氏吹箎謝何十三送蟹山谷出峽後以病故頗開葷酒之戒形模雖入婦女笑風味可解壯士顔彌明石鼎聨句曰形模婦女笑列子曰老商始一解顔而笑寒蒲束縳十六輩己覺酒興生江山退之毛傳曰聚其族而加束縛焉羅研論蜀亂束縛之使自有二三老杜詩雲山巳發興玉佩仍當歌又借答送蟹韻并戲小何三首皆見俗水集今附于此草泥本自行郭索玉人為開桃李顔林逋詩草泥行郭索雲木呌鈎輈按太玄經鋭首曰蟹之郭索後蚓黃泉測曰蟹之郭索心不一也范望注云郭索多足貌李太白詩松柏本孤直難為桃李顔恐似曹瞞説雞肋不比東阿舉肉山魏志武帝紀云帝小字阿瞞後漢楊修傳曹操平漢中出教惟曰雞肋而己外曹莫能曉修獨曰夫雞肋食之則無所得棄之則如可惜公歸計決矣文選曹植子建與吳季重書曰願舉太山以為肉傾東海以為酒按魏志植傳徙封東阿王代二螯解嘲仙儒昔日卷龜殼蛤蜊自可洗愁顔淮南子曰盧敖遊乎北海至蒙轂之上見處士者方卷龜殼而食蛤蜊敖與之語處士囂然笑曰子中州之人不疑而逺至此漢史司馬相如曰列仙之儒居山澤之間形容甚􅋯不比二螯風味好那堪把酒對西山荀子曰蟹六跪而二螯退之詩我來無一事把酒對南山此言西山謂武昌又借前韻見意招潮庾惡無永味海鏡纖毫只強顔想見霜臍當大嚼夢回雪壓摩圍山海物異名記曰蟹之小者每潮欲來出穴舉螯迎之名招潮子文選郭景純江賦曰玉跳海月土肉石華注引海水土物志曰海月大如鏡白色正圓常死海邊其柱如搔頭大中食曹子建書曰過屠門而大嚼雖不得肉貴且快意此詩末句謂往在黔南雪中縣時嘗作霜蟹之想如昔人思尊鱸也次韻文潛立春日三絶句眇然今日望歐梅已發黃州首更回試問淮南風月主新年桃李為誰開王羲之帖云當今人物眇然山谷此詩在黃州所作蓋東坡舊謫之地東坡舉進士時歐陽文忠公梅聖俞愛其文置之異等後在黃州嘗有帖云江山風月本無常主問者便是主人此引用以屬文潛老杜詩西江首獨回樂天詩村杏野桃繁似雪行人不醉為誰開誰憐舊日青錢選不立春風玉筍班唐書張薦傳祖鷟能文員半千稱鷟文詞猶青銅錢萬選萬中時號青錢學士文潛舊為起居舍人鄭谷九日寄張超居詩曰渾無酒泛金英菊謾道官居玉筍班按北夢瑣言曰唐末朝士中有人物者時號玉筍班又外郎班清緊不雜亦號玉筍班者也傳得黃州新句法老夫端欲把降幡黃州句法亦謂東坡老杜詩佳句法如何長安薛氏有皇甫湜手帖云鄆堂時髙古風敢樹降旗謂退之溪堂詩也又孫樵與王霜書曰誠謂足下怪于文方舉降旗且大誇朋從間退之元和聖德頌曰降幡夜竪柱牧之詩擬把一麾江海去江山也似隨春動花栁真成觸眼新清濁盡須歸甕蟻吉凶更莫問波臣老杜詩天邊梅桞樹相見幾回新清濁酒用徐邈事見前注屈原卜居曰往見太卜詹尹詹尹乃端䇿拂龜屈原曰此孰吉孰凶何去何從莊子曰周顧視車轍中有鮒魚焉周問之對曰我東海之波臣也此借用以言龜蓋莊子乂載宋元君夢為清江使故爾再次前韻春工調物似鹽梅一一根中生意回風日安排催嵗換丹青次第與花開鹽梅見書説命晉書殷仲文傳曰此樹婆娑生意盡矣樂天詩曰果參雜種千枝次第開久狎漁樵作往還曉風宫殿夢催班鄰娃似與春爭道酥滴花枝綵剪幡老杜詩萬里狎樵漁又詩他鄉惟表弟還往莫辭文選顔延年詩萬古陳往還史記荆軻傳魯勾踐與荆軻博爭道又漢書吳王濞傳吳太子侍皇太子飲博爭道不恭此借用猶言爭勝也元絳春帖子詞曰幡字玲瓏玉花房點滴酥續翰林志立春賜鏤銀飾綵勝之物酒有全功筆有神可將心付白頭新春盤一任人爭席莫道前銜是近臣樂天詩曰湛湛樽中酒有功不自代文選阮元瑜書曰喜得全功老杜詩下筆如有神又詩春日春盤細生菜爭席見前注樂天詩十年不改舊官銜老杜詩宜居漢近臣山谷內集詩注卷十七
