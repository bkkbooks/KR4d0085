body:
  text: 山谷内集詩注巻十九宋黄庭堅撰任淵注徳孺五丈和之字詩韻難而愈工輒復和成可發一笑范徳孺見前注且然聊爾耳得也自知之詩意謂唱酬之作聊且遣興不必甚工至其自得之妙蓋未易與俗人言也老杜所謂文章千古事得失寸心知又云同調嗟誰惜論文笑自知山谷蓋用此意莊子曰且然無問謂之命晉書阮咸曰未能免俗聊復爾耳老子曰自知之謂明此並借用獨笑真成夢狂歌或似詩狂歌謂如楚接輿之流語言過差恐其似詩為人据拾不可不戒亦終上句之意按實録元祐四年四月吳處厚言蔡確昨謫安州作車葢亭十絶句皆涉譏訕其詩有云紙屏石枕竹方牀手倦抛書午夢長睡起莞然成獨笑數聲漁笛在滄浪今朝廷政事清明上下和樂不知蔡確獨笑何事詔確責授英州别駕新州安置范忠宣公純仁時為右相乞薄確之罪不從遂出知潁昌府忠宣即徳孺之兄也故此詩及之其事逮今已十餘年故云成夢唐人劉長卿詩世事終成夢老杜詩狂歌託聖朝照灘禽郭索燒野得伊尼原注云鹿名出佛書郭索謂蟹見前注般若經曰世尊三十二相第八相名雙腨纎圓如伊尼延鹿王早晩來同醉僧窻臥虎皮老杜詩遙聞出巡守早晩遍遐荒禮曰虎豹之皮示服猛也左傳盧蒲嫳曰譬之如禽獸吾寢處之矣注云能殺而席其皮次韻徳孺新居病起潭潭經略府寂寂閉門居退之詩一為公與相潭潭府中居南史王融傳曰為爾寂寂鄧禹笑人徳孺長為西帥今乃遷謫言無窮達之異觀京洛聖賢宅江湖魚鼈瀦選詩京洛多風塵京洛蓋古帝都書洛誥曰召公既相宅徳孺家在潁昌本西洛王畿之地今與魚鼈同居言無遐邇之異觀也越語范蠡曰吾先君改濵于東海之陂黿鼉魚鼈之與處而鼃黽之與同渚尚書禹貢曰大野既瀦官如一夢覺話勝十年書上句用邯鄲夢事退之祭柳子厚文云人之生世如夢一覺下句用前輩詩共君一夜話勝讀十年書之意稍喜過從近扶筇不駕車劉禹錫詩官班髙後少過從次韻徳孺感興二首于此吾忘我從誰尺直尋莊子齊物篇南郭子棊曰今者吾喪我汝知之乎注云我自忘矣天下有何物足識哉孟子曰枉尺而直尋者以利言也注謂陳代欲使孟子屈已伸道事來千萬種人有兩三心世變無常而人心亦異當元祐紹聖崇寧之間士全其守者鮮矣文選南都賦曰百種千名法華經偈曰施佛及僧千萬億種史記田叔傳禇先生曰武帝以任安坐觀成敗有兩心孔叢子謂孔子不見晏子曰晏子事三君而得順焉是有三心所以不見也自守藩籬小猶能井臼任賈誼過秦論曰使䝉恬北築長城而守藩籬此借用文選宋玉對楚王問曰夫藩籬之鷃豈能與之料天地之髙哉又顔延年作陶淵明誄曰少而貧病居無僕妾井臼弗任藜菽不給李善注引列女傳周南大夫之妻謂其夫曰親操井臼不擇妻而娶過時雖不采吾與菊花斟此語蓋有所寄文選古詩曰傷彼蕙蘭花含英揚光輝過時而不采將隨秋草萎此借用淵明詩酒能驅百慮菊為制頽齡老杜詩坐開桑落酒來把菊花枝眼前嘗廢忘事往更追尋言目前事猶不記憶往事可復尋繹耶往事謂紹聖黨禍法華經曰而尋廢忘不知不覺樂天詩舊遊多廢忘文選阮嗣宗詩曰髙蔡相追尋王羲之帖曰追尋傷悼但有痛心愛酒陶元亮著書王仲任昭明太子作淵明傳曰性嗜酒或置酒招之造飲輒盡後漢書王充字仲任閉門潛思著論衡寒蒲雖有節枯木已無心言有自守之節而無向榮之心老杜詩風斷青蒲節文選陸機連珠曰勁隂殺節不彫寒木之心此反其意客至還須飲逢歡起自斟淵明詩酒熟吾自斟次韻徳孺惠貺秋字之句少日才華接貴游老來忠義氣横秋周禮師氏曰凡國之貴游子弟學焉文選北山移文云霜氣横秋未應白髪如霜草不見丹砂似箭頭言未應鬢髪遽白豈不見有却老之丹砂耶本草圖經曰丹砂生石上狀若芙蓉頭箭鏃連牀者紫黯若鐵色而光明瑩徹真辰砂也老杜詩本無丹竈術那免白頭翁此反而用之顧我今成喪家狗期君早作濟川舟史記孔子世家曰孔子適鄭與弟子相失獨立郭門鄭人謂子貢曰東門有人纍纍然若喪家之狗書説命曰若濟巨川用汝作舟楫漢家宗廟英靈在定是寒儒浪自愁言區區憂國之心徒過計耳求范子黙染鴉青紙二首學似貧家老破除古今迷忘失三餘極知鵠白非新得謾染鴉青襲舊書魏志文帝紀評注曰人少好學則思專長則善忘退之詩破除萬事無過酒三餘見前注莊子曰鵠不日浴而白烏不日黔而黒此引用言天真本性非因學而有得然舊書亦不可棄也闞子曰革匱十重緹巾十襲深如女髪蘭膏罷明似山光夜月餘女髪山光皆取其青色楚辭曰蘭膏明燭為染溪藤三百箇待渠湔拂一牀書唐舒元輿有弔剡藤文謂剡溪以藤為紙語林云王右軍為會稽庫中有牋紙九萬枚枚即箇也李善注文選廣絶交論云翦拂與湔抜同謝榮緒惠貺鮮鯽偶思煗老庖𤣥鯽公遣霜鱗貫柳來老杜詩煖老思燕玉退之城南聨句云庖霜鱠𤣥鯽石鼔文曰其魚維何維鱮維鯉何以貫之維揚與柳虀臼方看金作屑鱠盤已見雪成堆蔡邕題邯鄲淳所作曹娥碑後曰黄絹㓜婦外孫虀臼謂絶妙好辭也虀臼受辛受辛即辭字金屑謂以橙為虀也隋唐嘉話有金虀玉鱠此借用老杜設鯉歌曰無聲細下飛碎雪又云放筯未覺金盤空退之雪詩凸處遂成堆謝榮緒割麞見貽二首舊本云榮緒見酬割鮮詩有要見無拘礙之句戲答何處驚麏觸禍機煩君遣騎割鮮肥文選沈休文詩曰驚麏去不息李善注云江東人呼鹿曰麏班彪王命論曰探禍福之機文選陳琳檄豫州曰動足觸機陷老杜詩大官喜我來遣騎問所須班固西都賦曰割鮮野食孟郊詩豪人飫鮮肥秋來多病新開肉糲飯寒葅得解圍樂天詩月中齋滿誰開素老杜詩百年粗糲腐儒餐寒葅見前注解圍言有所救助也晉書謝道韞傳曰為小郎解圍二十餘年枯淡過病來筯下劇甘肥果然口腹為災怪夢去呼鷹雪打圍枮淡見前注孟子曰肥甘不足於口與襄陽耆舊傳劉表任荆州刺史築臺名呼鷹打圍見前注吳執中有兩鵝為余烹之戲贈學書池上一雙鵝宛頸相追筆意多皆為涪翁赴湯鼎主人言汝不能歌上兩句用王羲之事曽子固作墨池記曰臨川新城之上有池窪然而方以長曰王羲之之墨池者茍伯子臨川記云也羲之嘗慕張芝臨池學書池水盡黒此為其故跡換鵝見晉書本傳西京雜記鶴賦曰宛脩頸而顧步下句蓋用莊子烹鴈意以戲之世以婢子為鴨謂呉貴鴨而賤鵝也山谷嘗有樂府其畧云聞道君家有翠娥施朱施粉總嫌多為君寫就黄庭了不要山隂道士鵝山谷亦號涪翁秋冬之間鄂渚絶市無蟹今日偶得數枚吐沫相濡乃可憫笑戲成小詩三首怒目横行與虎爭寒沙奔火禍胎成晉書劉伶酒徳頌曰怒目切齒文選丘希範詩析析寒沙漲奔火如退之乂魚詩所謂迷火逃翻近是也漢書枚乗傳曰福生有基禍生有胎雖為天上三辰次未免人間五鼎烹隂陽家以井鬼之分為巨蟹宫左傳曰三辰旗旂昭其明也次謂日月之㑹漢書律厯志曰凡十二次又主父偃傳曰死則五鼎烹勃窣媻跚烝涉波草泥出没尚横戈也知觳觫元無罪奈此尊前風味何漢書司馬相如子虚賦曰觳觫勃窣而上金隄注云匍匐上也媻音盤跚音先安切窣音先忽切詩曰有豕白蹢烝渉波矣横戈見前注孟子曰吾不忍其觳觫又曰無罪而就死地此借用風味見前注解縛華堂一座傾忍堪支解見薑橙東歸却為鱸魚鱠未敢知言許季鷹老杜縛雞行曰吾叱奴人解其縛文選嵇康琴賦曰華堂曲宴漢書司馬相如傳曰一座盡傾趙充國傳曰此坐攴解羌虜之具晉書張翰字季鷹見秋風起思吳中菰菜蓴羮鱸魚鱠遂命駕而歸孟子曰我知言甯子與追和予岳陽樓詩復次韻二首去年新霽獨憑欄山似樊姬擁髻鬟箇裏宛然多事在世間遙望但雲山文選髙唐賦曰遇天雨之新霽趙飛燕外傳序曰伶𤣥買妾樊通徳有才色頗能言趙飛燕姊弟故事顧視獨影以手擁髻悽然泣下此詩末句自掃除㓜妄之想言世之無知者但見山是山水是水反無心外之念殊覺省事也蓋山谷前詩有綰結湘娥十二鬟之語蔡琰胡笳曰雲山萬重兮歸路遐軒皇樂罷拱朝班天地為家不閉闗惟有金爐紫煙起至今留作御前山莊子曰黄帝張樂于洞庭之野君山在洞庭中故引用此事禮記曰聖人能以天下為一家此詩末句以君山比薫爐賈至詩衣冠身惹御爐香選詩駕鴻乗紫煙蜀道有御愛山和甯子與白鹿寺寺在潭州谷郎巖開見佛燈雲遮霧掩碧層層青山得意看流水白鹿歸來失舊僧白鹿蓋寺中故事未詳謝人惠貓頭笋長沙一月煨鞭笋鸚鵡洲前人未知走送煩公助湯餅貓頭突兀想穿籬長沙即潭州鸚鵡洲在武昌退之詩薔薇蘸水笋穿籬短韻奉乞臘梅臥雲莊上殘花笑香似早梅開不遲淺色春衫弄風日遣來當為作新詩老杜詩花殘步屐遲退之送鄭校理詩云歸騎春衫薄以酒渴愛江清作五小詩寄廖明略學土兼簡初和父主簿老杜詩酒渴愛江清餘酣潄晩汀將發沔鄂間盡醉竹林酒漢水入江處謂之沔口在今漢陽軍漢陽與鄂隔江相望廖明畧安陸人自號竹林居士初虞世字和父二三石友輩未肯棄老朽文選潘安仁詩曰投分寄石友白首同所歸南史沈慶之詩曰朽老筋力盡徒歩還南岡借問坐客誰盧溪紫髯叟文選郭景純詩曰借問此何誰云是鬼谷子盧溪蓋初和父所居山谷有盧泉詩吳志孫權傳注獻帝春秋曰張遼問吳降人向有紫髯將軍是誰答曰是孫㑹稽此翁今惜醉舊不論升斗老杜遭田父泥飲歌曰月出遮我留仍嗔問升斗平生思故人江漢不解渴蜀志諸葛亮傳曰思賢如渴老杜詩閔目踰十旬大江不止渴誰言放逐地燒燭飲至跋退之詩孤臣昔放逐曲禮曰燭不見跋注云跋本也燭盡則去之嫌若燼多有厭倦憂予先狗馬勸以愛膚髪揚雄美新文曰臣常有顛眴病恐一旦先狗馬填溝壑髪膚見孝經有罪當竄流但懼不得活退之詩潮州㡳處所有罪乃竄流又黄陵廟碑曰懼不得脱死莊子曰先生不得飽弟子雖飢不忘天下日夜不休曰我必得活哉山谷時有宜州之行故云廖侯勸我酒此亦雅所愛退之詩人皆勸我酒我若耳不聞中年剛制之常懼作災怪酒誥曰矧汝剛制于酒北史齊文宣帝紀曰惟數飲酒麴糵成災因而致斃連臺盤拗倒故人不相貸唐書五行志龍朔中時人酒令曰子母相去離連臺拗倒裕為盃盤為子母又名盤為臺老杜詩共指西日不相貸誰能知許事痛飲且一快南書王融傳沈昭略云不知許事且食蛤蜊世說王孝伯曰痛飲讀離騷便足稱名士又庾冰卒曰常患不得快飲酒曹子建書曰雖不得肉貴且快意東坡海外詩熖火生薪聊一快竹林文章伯國士無與雙比來少制作非以弱故降老杜詩每語見許文章伯按吳志張紘傳曰此間率少文章易為雄伯景陽機中錦猶衣被丘江南史江淹傳淹夢一人自稱張景陽謂曰前以一匹錦相寄今可見還掩探懐中得數尺與之此人大恚曰那得割截都盡顧見丘遲曰餘此數尺既無所用以遺君自爾淹文章躓矣按晉書張載字景陽時時能度曲秀句入新腔漢書元帝紀曰自度曲被歌聲注謂自隠度作新曲以為歌詩聲也音大各反一説謂歌終更授其次謂之度曲老杜詩最傳秀句寰區滿斯人絶少可白眼視公聊每與俗物逢三沐取潔清斯人謂明畧白眼俗物並見前注三沐取潔清謂其凂我也韓文三沐而三熏之我亦漫浪者君何許同盟漫浪用元次山事見前注孟子曰桓公葵丘之會束牲載書而不㰱血曰凡我同盟之人既盟之後言歸於好試問盧溪叟猶得多可名言和父尤耿介尚以明略為多可也嵇康與山濤絶交書曰足下旁通多可而少怪四休居士詩三首并序太醫孫君昉字景初為士大夫發藥多不受謝自號四休居士山谷問其説四休笑曰粗茶淡飯飽即休補破遮寒煖即休三平二滿過即休不貪不妒老即休山谷曰此安樂法也夫少欲者不伐之家也知足者極樂之國也四休家有三畎園花木鬱鬱客來煑茗傳酒談上都貴遊人間可喜事或茗寒酒冷賔主皆忘其居與予相望暇則步草徑相尋故作小詩遺家僮歌之以侑酒茗其詩曰富貴何時潤髑髏守錢奴與拘官囚列子曰死後榮名豈足潤枯骨又曰子列子適衛食于道從者見百歲髑髏後漢馬援傳曰凡殖財貴能賑施否則守錢虜耳又古今五行記估客謂鄧彪曰終不如臨沮鄧生平生不用為守錢奴耳退之詩守官類拘囚太醫診得人間病安樂延年萬事休禮記文王世子注曰文王以憂勤損壽武王以安樂延年此借用盧仝詩但有樽中物從他萬事休無求不著看人面有酒可以留人嬉欲知四休安樂法聴取山谷老人詩樂天詩曰不看人面免低眉傳燈録興化見魏府大覺禪師曰願與存奬箇安樂法門一病能惱安樂性四病長作一生愁一病謂疾苦四病謂反上所陳法華經問訊言世尊少病少惱安樂行不湼槃經岀家之人有四種病此效其語司馬池詩畫成應遣一生愁借問四休何所好不令一㸃上眉頭文選樂府云借問女安居晉書孟嘉傳桓温問嘉酒有何好而卿嗜之庾信愁賦云歌眠眼睫未嘗摻强戲眉頭那得伸又抒情集李延璧愁詩曰潘岳愁絲生鬢裏婕妤悲色上眉頭十二月十九日夜中發鄂渚曉泊漢陽親舊擕酒追送卿為短句陳繹漢陽軍鳳棲山藏經記曰漢水東南合大江夾江而城左武昌右漢陽按武昌即鄂渚接淅報官府敢違王事程宵征江夏縣睡起漢陽城孟子曰孔子之去齊接淅而行注云淅漬米也不及炊避惡亟也詩曰王事靡監劉禹錫詩萬里王程三峽外又詩園蜂速去恐違程小星詩曰肅肅宵征謝靈運詩宵濟漁浦潭旦及富春郭江夏縣即鄂州治所盧綸晩次鄂州詩雲開逺見漢陽城鄰里煩追送杯盤瀉濁清秖應瘴鄉老難答故人情謝靈運有鄰里相送至方山詩文選孫子荆詩傾城逺追送餞我千里道清濁謂酒見魏志徐邈傳老杜詩傾榼濁復清瘴鄉謂宜州次韻陳榮緒同倚鐘樓晩望别後明日見寄之作天外僧伽塔斜輝極照臨凭欄隨處好殘雪向來深泗州僧伽大師見傳燈録張舜民南遷録曰洞庭湖中有扁山上有小塔望之巋然曰啞女塔昔有士人女生數歲不能言一曰涉湖見塔輒語其父母書曰若日月之照臨青草無風浪枯松半死心原注云所謂城南老樹精張舜民南遷録曰洞庭湖西岸有沙州堆阜隆起即青草廟下一湖之内中有此洲南名青草北名洞庭所謂重湖也又曰岳陽樓有碑極大乃前知州李觀所紀吕洞賔事迹言吕憩于岳州白鶴寺前松下有老人自松梢冉冉而下致恭于吕問之為何乃曰某松之精也見先生過禮當候見吕因書二絶句于寺門璧間其一云獨自行兮獨自坐無限世人不識我惟有城南老樹精分明知道神仙過郡人松下創亭亭名曰吕仙樂天詩未夜黒巖昏無風白浪起文選枚乘七發曰龍門之桐其根半死半生衡陽有回鴈他日更傳音衡山有回鴈峰過洞庭青草湖乙丑越洞庭丙寅度青草似為神所憐雪上日杲杲青草湖一名洞庭湖荆州記云因青草山為名詩曰其雨其雨杲杲出日樂天詩杲杲冬日出照我屋南隅我雖貧至骨猶勝杜陵老憶昔上岳陽一飯從人討杜陵老謂子美也嘗有詩云杜陵有布衣老大意轉拙又云少陵野老吞聲哭大厯四年子美自公安上岳陽有泊岳陽樓下等詩其上水遣還詩云驅馳四海内童稚入餬口但遇新少年少逢舊知友史記范雎傳一飯之恩必報行矣勿遲留蕉林追獦獠時山谷赴宜州貶所嶺南多蕉林其地與夷獠相接前漢外戚傳曰行矣强飯勉之選詩遲留法豈輕五祖謂六祖曰汝廣南獦獠有甚佛性近世本和尚作白雲端真贊云假饒親見楊岐也是湖南獦獠過土山寨南風日日縱篙撑時喜北風將我行張籍祭退之詩曰移船入南溪東西縱篙根蔡琰胡笳曰將我行兮向天涯湯餅一杯銀線亂蔞蒿數筯玉簪横湯餅見前注漢書項籍傳曰幸分我一杯羮老杜詩鮮鯽銀絲鱠此效其語蔞篙菜狀如玉簪樂天詩秋風一筯鱸魚鱠西京雜記曰武帝過李大人就取玉簪搔頭晩泊長沙示秦處度湛范元實温用寄明略和父韻五首處度少游之子也當時䕶少游喪留長沙而元實來㑹于此山谷在宜州有答長沙平老帖云秦處度遂不成歸淮南得安居否昔在秦少游許我同門友掘獄無張雷劒氣在牛斗文選古詩曰昔我同門友髙舉掁六翻按鄭康成注魯論曰同門曰朋晉史張華傳曰斗牛之間常有紫氣雷煥曰此實劒之精上徹于天當在豫章豐城華即補煥為豐城令煥到縣掘獄屋基得一石函中有雙劒一曰龍泉一曰太阿今來見令子文似前哲有何用相澆潑清江緑如酒退之祭文曰幸隨令子詩曰維其有之是以似之澆潑用阮籍事見前注王介甫詩白髪望東南春江緑如酒按太白詩遥看漢水鴨頭緑恰似蒲桃新撥醅東坡詩清江緑漲蒲萄醅范公太史僚山立乃先達范祖禹字淳夫元祐初為著作佐郎充神宗實録檢討官兼脩撰知國史院與山谷同僚得罪本末己具前注禮記玉藻曰山立時行注云不動摇也此借用以言其正色立朝屹然如山先達見世説發揮百代史管以六經轄淳夫登第後從司馬温公脩通鑑凡十五年元祐初進唐鑑易曰六爻發揮旁通情也趙岐孟子題詞曰論語者五經之錧鎋音義曰錧音管車釭也鎋音黠車鎋也此引用言以經義是非褒貶投身轉嶺海就木乃京洛紹聖二年淳夫坐史事安置永州三年移賀州四年移賔州元符元年九月再移化州十月病卒三年徽考即位有㫖許歸葬西京退之潮州謝表曰經涉嶺海水陸萬里左傳季隗曰我二十五年矣又如是而嫁則就木焉注言將死人木京洛見前注仲子見長沙且用慰飢渴元實蓋范公仲子長沙今潭州文選潘正叔贈陸機詩云醪澄莫饗孰慰飢渴李善注引孔叢子子思謂穆公曰君若飢渴待賢秦郎水江漢范郎器鼎鼐逝者不可尋猶喜二子在相逢唾珠玉貧病問薪菜王介甫贈曽子固詩曰曽子文章世無有水之江漢星之斗詩曰鼐鼎及鼒唾珠玉見前注貧病山谷自道老杜詩吾老日貧病列子伯樂曰臣有所與共擔纆薪菜者漢書淮南厲王傳曰給薪菜鹽炊豫愁帆風船目極别所愛退之詩嚴程迫風帆楚辭曰目及千里兮傷春心涅樂經曰愛别離若淵明詩曰老夫有所愛思與爾為鄰往時髙交友宰木已樅樅髙交友言其不下交也老杜詩徐庶髙交友宰木見前注退之詩扶机導之言曲節初樅樅東坡樂府曰樅樅疏雨過風林舞破煙葢雲幢今我二三子事業在燈窻二三子見魯論孫樵集曰曉窻夜燈秦范波瀾濶笑陸海潘江老杜詩文章曹植波瀾澗晉書潘岳傳贊曰機文喻海岳藻如江機謂陸機也按鍾嶸詩品云予嘗言陸才如海潘才如江願兹秉經術出仕榮家邦退之詩勉哉戒徒御家國遲子榮書曰邦之用懐詩曰以御于家邦少游五十䇿其言明且清筆墨深闗鍵開闔見日星少游初應制科有進巻五十篇禮記緇衣篇詩云昔吾有先正其言明且清文選張茂先詩周仲有遺規其言明且清退之詩金石出聲音宫室發闗鍵禮記曰天秉陽垂日星山谷答洪駒父書有曰凡作一文皆須有宗有趣終始闗鍵有開有闔陳友評斯文如鐘磬鼓笙陳友謂無已下句謂八音克諧無相奪倫誰能續鳳鳴洗耳聴兩甥元注云秦范相謂為甥漢書律厯志曰黄帝使伶倫制十二筩以聴鳳之鳴其雄鳴為六雌鳴亦六比黄鍾之宫而皆可以生之是為律本曹子建七啓曰敬條耳以聴玉音皇甫謐髙士傳曰巢父臨池而洗耳此借用元寳蓋少游之壻爾雅曰妻之晜弟為甥又注云謂我舅者吾謂之甥然則亦宜呼壻為甥次韻元實病目道人嘗恨未灰心儒士苦愛讀書眼言為學者與為道者異莊子曰形固可使如槁木而心固可使如死灰乎東坡詩讀書眼如月罅隙靡不照要須𤣥覽照鏡空莫作白魚鑽蠧簡老子曰滌除𤣥覧能無疵手韻書曰蟫衣白魚也退之詩豈殊書蠧蟲生死文字間傳燈録古靈禪師傳云其師一日在窻下看經蜂子投窻紙求出師覩之曰世界如許廣闊不肯出鑽他故紙閲人朦朧似有味看字昏澀尤宜懶陸士衡歎逝賦曰世閲人而為世朦朧謂不甚了了所見多俗人不若不見之愈也按韻書朦朧月將入范侯年少百夫雄言行一一無可柬文選王仲宣詠史詩曰生為百夫雄死作壯士規按黄鳥詩注曰百夫之中最雄俊也無可柬孝經所謂口無擇言身無擇行退之詩云吾愛其風骨粹美無可㨂看君眸子當瞭然乃稱胷次常坦坦孟子曰胷中正則眸子瞭焉易曰履道坦坦魯論曰君子坦蕩蕩如何有物食明月涙睫隕珠衣䄂滿盧仝月蝕詩曰此時怪事發有物吞食來輪中金箆刮膜會有時湯熨取快術誠短老杜詩金箆刮眼膜價重百車渠按涅槃經曰有盲人為治目故造詣良醫是時良醫即以金鎞刮其眼膜又按法苑珠林曰後周張元其祖失明元讀經然燈夢一翁一金箆療之後三日果差史記扁鵲傳曰疾之在腠理也湯熨之所及也目惡㸃濯故云術短矣君不見岳頭懶瓚一生禪鼻涕垂頤渠不管潭州南岳福巖寺有懶殘巖按唐髙僧號懶瓚隱居衡山之頂石窟中徳宗遣使詔之寒涕垂膺未甞答使者笑之且勸拭涕瓚曰我豈有功夫為俗人拭涕耶竟不能致而去山谷時在潭州故引用衡山事言當遺外形骸不必以病目戚戚且終首句之意勝業寺悦亭苦雨己解嚴諸峯來獻狀不見白頭禪空倚紫藤杖左傳曰秋無苦雨解嚴言人喜雨止如罷兵也魏志趙儼傳曰曹仁解嚴左傳晉侯入曹數之以其不用僖負羈而乗軒者三百人也且曰獻狀注云積其功狀此借用王介甫詩木落岡巒因自獻白頭禪謂文政禪師師蓋雪竇法嗣也有題悦亭詩云山鳥無俗聲山雲無俗狀引得白頭翁時時來倚杖山谷此詩乃和其韻退之有赤藤杖歌離福嚴寺在衡山張舜民南還録云舊名般若寺陳太建中思公道場唐懐公磨塼之地山下三日晴山上三日雨不見祝融峯還泝潚湘去南嶽有七十二峯祝融其一也南嶽記及荆州記云南嶽衡山赤帝館其嶺祝融託其陽退之謁衡嶽廟詩須臾靜掃衆峯出仰見突兀撑青空紫葢連延接天柱石廩騰擲堆祝融此退之南還得歸之祥也山谷意謂不見祝融峯歸期未可卜耳花光仲仁出秦蘇詩巻思二國士不可復見開巻絶歎因花光為我作梅數枝及畫煙外逺山追少游韻記巻末仲仁蓋衡州花光山長老山谷為作天保松銘云夢蝶真人貎黄槁籬落逢花須醉倒夢蝶真人謂莊子今以屬秦少游取游戲花間之意夢蝶見前注莊子列禦冦篇曹商曰夫處窮閭巷槁項黄馘者商之所短者也籬落逢花用陶潛把菊事見前注雅聞花光能畫梅更乞一枝洗煩惱扶持愛梅説道理自許牛頭參已早盧仝詩石公説道理句句出凡格傳燈録法融禪師入牛頭山幽棲寺北巖之石室有百鳥銜花之異長眠橘洲風雨寒今日梅開向誰好少游北歸至藤州卒于江上其子處度䕶喪藁殯于潭故有長眠橘洲之語張舜民南遷録記潭州事云橘洲在湘江中南北與州城等老杜詩所謂橘洲田土能槀膄者也華嚴經曰一切衆生隨業所繫長眠生死太平廣記載冢中人對鄭生詩云長眠不知曉何況東坡成古丘不復龍蛇看揮掃太白詩吳宫花草埋幽徑晉代衣冠成古丘老杜詩龍蛇動篋蟠銀鈎我向湖南更嶺南繫船來近花光老歎息斯人不可見喜我未學霜前草山谷自言其未死文選阮嗣宗詩凝霜被野草歲暮亦云巳寫盡南枝與北枝更作千峯倚晴昊白氏六帖云大庾嶺上海南枝落北枝開老杜詩雷聲急送千峯雨又詩亂插繁花向晴昊題花光畫湖北山無地湖南水徹天雲沙真富貴翰墨小神仙元注云平沙逺水筆意超凡入聖法也每率此意而為之當冠四海而名後世楚辭曰下崢嶸而無地上寥廓而無天晉書張華傳雷煥曰寶劒之精上徹于天唐張謂長沙土風碑曰遁甲所謂沙土之地雲陽之虛可以長往可以隱居者焉老杜湘夫人祠南夕望詩云興來猶杖履日斷更雲沙真富貴見前注魏野詩有名閒富貴無事小神仙題花光畫山水花光寺下對雲沙欲把輕舟小釣車更看道人煙雨筆亂峯深處是吾家雲沙見前注元次山詩醉裏長歌揮釣車所住堂此山花光佛所住今日花光還放光天女來脩散花供道人自有本來香法華經曰佛告舍利弗汝于未來世當得作弗號曰華光傳燈録古靈禪師傳受業師因澡身命師去垢師乃拊背曰好所佛堂而佛不聖其師囘首視之師曰佛雖不聖且能放光第二句花光謂仲仁老按維摩經曰有一天女以天花散諸菩薩大弟子上而為供養又曰若入此室但聞佛功徳之香不樂聞聲聞僻支佛功徳香也楞嚴經大勢至法王子云此則名曰香光莊嚴我本因地其祥見前注戲詠髙節亭邊山礬花二首并序光亭在花寺江湖南野中有一種小白花木髙數尺春開極香野人號為鄭花王荆公嘗欲求此花栽欲作詩而陋其名予請名曰山礬野人采鄭花葉以染黄不借礬而成色故名山礬海岸孤絶處補陁落伽山譯者以謂小白花山予疑即此山礬花爾不然何以觀音老人堅坐不去耶此詩及序皆以山谷手蹟校過近世曽慥端伯作髙齋詩話云唐人有題唐昌觀玉橤花詩云一樹瓏璁玉刻成飄廊㸃地色輕輕今瑒花即玉蘂花也介甫以比瑒謂當用此瑒字蓋瑒玉名取其白耳山谷又更其名為山礬謂可以染也廬陵段謙叔家有楊汝士與白二十三一帖云唐昌玉蘂以少故見貴耳自來江南山山有之士人取以供染事不甚惜也則知瑒花之為玉蘂斷無疑矣北嶺山礬取意開輕風正用此時來平生習氣難料理愛著幽香未擬廻取意開猶王胄所謂庭草無人隨意緑取意或作取次非是後漢書劉𤣥傳韓夫人曰帝方對我飲正用此時持事來乎晉書王徽之傳桓沖嘗謂曰卿在府日久此當相料理髙節亭邊竹已空山礬獨自倚春風二三名士看顏笑把斷花光水不通退之記夢詩神官見我開顔笑言花光老定力堅固獨不為花所惱也傳燈録樂普云末後一句始到牢闗把斷要津不通凡聖禪門語曰徳山門下水洩不通山谷内集詩注巻十九
