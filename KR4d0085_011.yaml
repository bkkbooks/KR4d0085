body:
  text: 山谷內集詩注卷十一宋黃廷堅撰任淵注頤軒詩六首并序髙君素作頤軒請豫賦詩豫為説其義曰在易之頤觀頤自求口實其傳曰觀頤觀其所養也自求口實觀其自養也單豹巖棲谷飲有孺子之色而虎攻其外張毅擎跽曲拳養人間之譽而疾攻其內養虎者不以全物與之牧羊者去其敗羣視其後者而鞭之養鷹者飢之是謂觀其所養盡物之性也庖丁不以肯綮嬰其解牛之刀痀瘻丈人不以萬物昜蜩之翼匹夫之志不可奪于三軍之帥是謂觀其自養盡巳之性也詩云如切如磋如琢如磨求盡性而已君素樂善能貧將求學問日新之功故作頤軒以養其正吉乃以觀頤自求口實六字作詩以勸戒之金石不隨波松竹知嵗寒冥此藝藝境回向自心觀王充論衡曰湍瀨之回沙轉石而大石不動者是石重而沙輕大儒俗吏並在世俗有似于此魯論曰嵗寒然後知松柏之後雕也老子曰夫物藝藝各歸其根華嚴經有十回向老杜詩回向心地初四十二章經曰斷去欲愛識自心源知足是靈龜無厭乃朵頤虛心萬物表寒暑自四時老子曰知足不辱易頤之初九日舍爾靈龜觀我朵頤凶注云朵頤者嚼也居養賢之世不能貞其所履以全其德而舍其靈龜之明兆羡我朵頤而躁求凶莫甚焉老子又曰虛其心實其腹魯論曰天何言哉四時行焉百物生焉無外一精明六合同出自公能知本原佛亦不相似楞嚴偈曰諸幻成無性六根亦如是原依一精明分成六和合一處成休復六用皆不成傳燈録永嘉證道歌曰本原自性天真佛又雲居禪師曰若是思大佛亦不作又南陽忠國師廣語云僧問既無織毫可得名為何物師曰本無名字曰還有相似者否師曰無相似者世號無比獨尊辱莫辱多欲樂莫樂無求人生強學耳萬古一東流楚辭曰悲莫悲兮生别離樂莫樂兮新相知此用其律禮記儒行曰夙夜強學以待問老杜詩不廢江河萬古流此特借用其字言逝川之速如此不可不惜日也杜牧之詩萬古一飛鳥樂天詩年光東流水樞機要發遲飲食戒味厚漁人溺于波君子溺于口易曰言行君子之樞機樞機之發榮辱之主也國語曰厚味實臘毒頤卦之大象曰君子以慎言語節飲食故此句及之禮記曰小人溺于水君子溺于口大人溺于民皆在其所褻也此詩舊本云小人溺于水君子溺于口古來犯時機惟此沒粱斗按秦再思紀異録曰高駢命酒佐薛濤改一字令駢曰口有似沒粱斗濤曰川有似三條椽涇流不濁渭種桃無李實養去心塵緣光明生虛室谷風詩曰涇以渭濁湜湜其沚傳云涇渭相入而清濁異箋云涇水以有渭水清故見涇水濁湜湜持正貌俗諺曰種李不成桃種禾不生豆近世圜悟禪師克勤嘗以此兩語作頌孟子曰養心莫善于寡欲圓覺經曰妄誕四大為自身相六塵緣影為自心相又曰此虛妄心若無六塵則不能有四大分解無塵可得于中緣塵各歸散滅畢竟無有緣心可見莊子曰虛室生白寺齋睡起二首小黠大癡螳捕蟬有餘不足夔憐蚿退之送窮文曰驅我令去小黠大癡莊子曰莊子覩異鵲執彈而留之覩一蟬方得美蔭而忘其身螳螂執翳而搏之見得而忘其形異鵲從而利之見利而忘其真又曰夔憐蚿蚿憐蛇蛇憐風風憐目目憐心音義云夔一足獸蚿馬蚿蟲多足詩意謂巧詐之相傾智愚之相角與此數蟲何異得失竟安在哉退食歸來北窗夢一江風月趁漁船羔羊詩曰自公退食北窗夢見前注林逋秋江寫望詩曰最愛梨花經雨後一篷煙火飯漁船桃李無言一再風黃鸝惟見緑蔥蔥桃李一再經風無復顔色紅紫事退遽成緑隂意謂卒卒京塵中未嘗得細見春物也漢書李廣贊曰桃李不言下自成蹊漢書司馬相如傳曰為鼓一再行人言九事八為律儻有江船吾欲東漢書主父偃傳曰所言九事其八為律又韓信傳髙祖曰吾亦欲東耳安能鬱鬱久居此乎此皆借用謂世途狹隘動觸法令寧自放于江海也退之詩法吏多少年磨淬出角圭將舉汝愆尤以為身階梯收身歸關東期不到死迷記夢洪駒父詩詁曰豫嘗聞山谷云此篇記一假事也嘗從一貴宗室攜妓女遊某寺酒闌諸妓皆散入僧房中主人不怪也故有曉然夢之非紛紜之語僧惠洪泠齋夜話以為山谷元祐初畫卧酺池寺夢與一道士遊蓬萊覺而作此詩夜與余同宿湘江舟中親為言之兩説未知孰是衆真絶妙擁靈君曉然夢之非紛紜真誥真胄世譜云興寧三年衆真降楊羲家漢書公孫𢎞傳曰愚心曉然見治道之可以行也夢紛紜見前注窗中遠山是眉黛席上榴花皆舞裙文選謝朓詩曰窗中列遠岫西京雜記曰文君姣好眉色如望逺山樂府黃門倡曰佳人俱絶世握手上春樓點黛方初月縫裙學石榴借問琵琶得聞否靈君色莊妓搖手文選曹子建樂府云借問誰家子色莊見魯論漢書許后傳曰且使妾搖手不得僧惠洪冷齋夜話曰山谷夢有兩玉人導升殿主者衣絳衣仙女擁侍中有一女方整琵琶山谷極愛其風韻顧之忘揖主者主者色莊故其詩有曰借問琵琶可聞否靈君色莊妓搖手今山谷集語不同蓋復更易之耳兩客爭棊爛斧柯一兒壞局君不呵述異記晉王質詣信安石室山伐木見數童奕碁而歌俄頃謂質曰何不去質起視斧柯爛盡既歸無復時人矣亦見水經漸江水注魏志王粲傳粲觀人圍碁局壞即為覆之漢書李廣傳霸陵尉醉呵止廣杏梁歸燕語空多奈此雲窗霧閣何司馬相如長門賦曰飾文杏以為梁樂天詩翩翩兩玄鳥本是雙飛燕彼矜店梁貴此嗟茅棟賤退之華山女詩云雲窗霧閣事慌惚重重翠慢深金屏同元明過洪福寺戲題洪福僧園拂紺紗舊題塵壁似昏鴉洪福在汴京東坡詩曰玉仙洪福花如海托言王播詩曰三十年前塵撲面如今始得碧紗籠法書苑曰塢彤善草書如寒林棲鴉老杜詩有待至昏鴉春殘已是風和雨更著遊人撼落花樂天詩颯颯風和雨舊本有山谷序云三月中同吕元明畢公叔至洪福寺見元明壁間舊題云與晉之醉後使騎升木撼花以為笑樂戲題戲答朝深道乞消梅二首王立之詩話云消梅京師有之不以為貴因余摘遺山谷山谷作數絶遂名振于長安朝深之字深道後改名詠之字知道青莎徑裏香未乾黃鳥隂中實已團驚物化之速也唐劉滄詩莎徑晚煙凝竹塢歐陽公詩緑隂黃鳥春歸後蒸豆作烏鹽作白屬聞丹杏薦牙盤齊民要術有作白梅與作烏梅法此用其字今人作糖梅雜以蒸豆取其色黑圖經本草梅實條曰以鹽殺白梅入藥用漢書谷永傳曰屬聞以特進領城門兵注云屬近也音之欲反退之李花詩曰氷盤夏薦碧實脆盧氏雜説曰御廚進饌用九飣食以牙盤九枚裝食味于其間詩意謂當梅實稿悴失性之時丹杏方蒙獻御之寵與老成屏棄而新進見用何異哉北客未嘗眉自顰南人誇説齒生津筆談載沈存中茶論詩云誰把嫩香名雀舌定知北客未曾嘗按唐獨孤及有招北客文世説曰南人學問如牖中見日顰眉謂梅酸使人攢眉也世説又載魏武帝行失道三軍皆渴帝令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出磨錢和蜜誰能許去蒂供鹽亦可人今人清蜜梅法磨一二銅錢置其下顔色益鮮誰能許謂寒家不辦此也漢書食貨志曰或盜摩錢質而取鋊蜀志費褘傳曰君信可人必能辦賊者也字出禮記此借用謂悅可人意以梅餽朝深道戲贈二首帶葉連枝摘未殘依依茶塢竹籬間陸羽顧渚山記曰漫石塢巨石中生紫茗赭石塢生卷茶相如病渴應須此莫與文君蹙遠山相如逺山及魏武事並見前注蹙遠山即前詩顰眉之意渴夢吞江起解顔詩成有味齒牙間唐文粹有何諷夢渴賦曰奔九江走五湖手不暇于斡運心不息于躊躇吳都賦曰或吞江而納漢列子曰老商始一解顔而笑漢書鄭當時傳曰誠有味乎其言也叔孫通傳曰何足置齒牙間哉前身鄴下劉公幹今日江南庾子山以終上句詩成之意文選謝靈運擬魏太子鄴中集有劉貞詩按魏志王粲傳劉貞字公幹魏文帝與吳質書曰公幹五言詩妙絶當時梁江淹雜體詩序曰關西鄴下既巳罕同河外江南頗為異法北史文苑傳庾信字子山事梁與徐陵並為抄撰學士文並綺豔故世號徐庾體後留長安作哀江南賦次韻孫子實題少章寄寂齋虛名誤壯夫今古可笑憫文選古詩曰虛名復何益老杜詩從來禦魑魅多為才名誤法言曰壯夫不為也退之答崔立之書曰君子小人之所憫笑尸裹萬里歸書載五車稇安知衡門下身與天地凖後漢馬援傳曰要當以馬革裹尸還葬爾莊子曰惠施多方其書五車齊語曰垂橐而往稇載而歸注言重而歸也稇絭也陳詩曰衡門之下可以棲遲注謂橫木為門言淺陋也繫詞曰昜與天地凖秦朝兩美士內行頗修謹漢書鄭當時傳日內行修石奮傳曰馴行孝謹余欲造之深抽琴去其軫退之詩吾欲盈其氣不令見麾憧此用其律孟子曰君子深造之以道韓詩外傳曰孔子南遊適楚至于阿谷之隧有處子佩瑱而浣者孔子抽琴去其軫以授子貢曰善為之詞以觀其語此借用以明寄寂之意寄寂喧鬨間此道有汲引莊子曰冥冥之中獨見曉焉無聲之中獨聞和焉故深之又深而能物焉注云視聽而不寄之于寂則有暗昧而不和窮其原而後能物物山谷蓋用此意老杜詩無生有汲引獄户聞笞榜市聲雜嘲辴文選江淹上書曰含憤獄户漢書張敖傳曰吏榜笞數千榜音彭魏文帝典論曰孔融理不勝詞至乎雜以嘲戲退之詩亦云初喧或紛爭中靜雜嘲戲莊子曰齊桓公辴然而笑辴音敕忍反二生對曲肱圭玉發石蘊文選王褒四子講德論曰美玉蘊于碔砆凡人視之怢焉良工砥之然後知其和寶也大小窮鵬鷃短長見椿槿莊子曰冥海有鳥焉其名為鵬背若太山翼若垂天之雲摶扶搖羊角而上者九萬里絶雲氣負青天然後圖南且適南冥也斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而下翺翔蓬蒿之間此亦飛之至而彼且奚適也此小大之辨也又曰朝菌不知晦朔蛄蟪不知春秋上古有大椿者以八千嵗為春以八千嵗為秋音義曰菌朝生暮落潘尼云木槿也欲聞寂時聲黃鐘在龍筍鐘雖未擊聲音厯然楞嚴經曰佛語阿難聲銷無響汝説無聞若實無聞聞性已滅同于枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者陸機文賦曰叩寂寞以求音吕氏春秋曰黃鐘宫律之本也禮記曰夏后氏之龍簨簴韻書簨亦作筍東坡法雲寺鐘銘曰鳴寂寂時鳴次韻孫子實寄少遊一本云用寄寂齋韻人秦觀字少遊高郵軍薛宣欲吏雲季氏或招閔漢書朱雲傳薛宣為丞相雲往見之宣謂曰在田野亡事且留我東閣可以觀四方竒士雲曰小生乃欲相吏耶宣不敢復言東坡詩薛宣真欲吏朱雲魯論曰季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣注謂重來召我此公胸中秋萬物欲收稇此公指少遊莊子曰正得秋而萬寶成賣藥偶知名草玄非近準後漢逸民傳韓康字伯休賣藥長安市時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為下句見前注才難不昜得志大略細謹才難及下不易得皆見魯論史記酈食其傳曰舉大事略細謹少遊嘗教授蔡州顧官妓婁婉及陶心兒者詞中往往寄意王立之詩話秦少遊云少遊極怨山谷此句謂言蔡州事少人知者魯直詩語重人既見此語遂使吹毛耳士生要𢎞毅天地為蓋軫魯論曰士不可以不𢎞毅任重而道遠考工記曰蓋之圓也以象天也軫之方也以象地也驥來鹽車驂井下短綆引言賢才難識拔而深逺者未易汲引也戰國策汗明見春申君曰夫驥之齒至矣服鹽車上太行中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而羃之于是俯而噴仰而鳴聲造于天欣伯樂之知已也莊子曰楮小者不可以懷大綆短者不可以汲深難甘呼爾食聊寄粲然辴孟子曰呼爾而與之行道之人弗受注云呼爾猶呼爾咄啐之貌也粲然見前注誰能借前籌還婦用束縕漢書張良傳曰臣請借前箸以籌之退之詩兹道誠可尚誰能借前籌蒯通傳客謂通曰先生知梁石君東郭先生何不進之于相國乎通曰里母非談説之士也束緼乞火非還婦之道也然物有相感事有適可臣請乞火于曹相國韓非子人有亡其脈肩者意其婦而逐之鄰媪聞之束葦而詣之曰昨夜狗爭骨須火以燭之主母悟乃還其婦吾聞調羮鼎異味及枌堇左傳鄭子家曰他日我如此必嘗異味禮記內則曰堇荁枌榆免薧修瀡以滑之注云荁堇類也冬用堇夏用荁榆白曰枌堇音謹豈其供王羞而棄會稽筍退之詩幸當擇珉玉寧有棄圭瑁此用其意詩曰豈其食魚必河之魴周禮膳夫掌王之食飲膳羞醢人曰加豆之實筍葅魚醢爾雅曰筍竹萌又曰東南之美者有會稽之竹箭焉戲書秦少遊壁觀此詩意當是少遊過南京有所盼主翁待少遊厚欲令從歸而其家難之也此篇因有秦氏烏故事遂皆寄言衆禽以為戲丁令威以指少遊鸚鵒以指所盼者秦氏庭烏以指少遊之細君雅烏之兄言其所生子已長矣宋都今南京宋父指南京主翁末句戲謂少遊異時富貴雖有嫗妾何傷以開廣細君之意也丁令威化作遼東白鶴歸朱顔未改故人非續搜神記遼東華表柱有鶴歌曰有鳥有鳥丁令威去家千年今來歸城郭雖是人民非何不學仙冢纍纍微服過宋風退飛宋父擁篲待來歸誰饋百牢鸜鵒妃孟子曰孔子微服而過宋春秋僖公十六年六鷁退飛過宋都左傳曰風也昭公二十五年鸜鵒來巢師巳曰異哉吾聞文成之世童謡曰鸜鵒之巢遠哉遙遙稠父喪勞宋父以驕注謂稠父昭公死外故喪勞宋父定公代立故以驕此詩皆用宋事但摘取宋父鸜鵒及百牢字用之不取其意也史記孟軻傳曰騶子如燕昭王擁篲先驅請列弟子之坐而受業來歸見前注左傳哀公七年吳人曰宋百牢我魯不可以後宋注云吳過宋得百牢此詩引用謂南京主翁以所盼者代百牢而饋之也蓋老杜嘗有詩云有鳥名鸜鵒肉味不足充鼎俎故用以戲之妃匹也退之猛虎行曰朝怒殺其子暮還餐其妃秦氏烏生八九子雅烏之兄畢逋尾古樂府云烏生八九子端坐秦氏桂樹間爾雅曰鷽斯鶢鶋注云雅烏也小而多羣後漢靈帝紀注童謡曰城上烏尾畢逋憶炊門牡烹伏雌未肯增巢令汝棲顔氏家訓云樂府載百里奚妻詞曰百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴忘我為按蔡雍月令章句曰鍵關牡也所以止扉或謂之剡移此詩引用言少遊細君亦必怨望不肯增烏巢以容鸜鵒也莫愁野雉疏家雞但願主人印纍纍恐以新間舊也法書苑云庾翼字稚恭善草𨽻在荆州與都下書云小兒輩乃輕家雞愛野雉皆學逸少漢書石顯傳民歌之曰牢耶石耶五鹿客耶印何纍纍綬若若耶注云纍纍重積也主人謂少遊贈秦少儀少儀名覿少遊之弟汝南許文休馬磨自衣食但聞郡功曹滿世名籍籍蜀志許靖字文休汝南平輿人少與從弟劭俱知名而私情不協劭為郡功曹排擯靖不得齒敘以馬磨自給漢書陸賈傳名聲籍甚又劉屈氂傳曰事籍籍如此何謂祕也此借用渠命有顯晦非人作通塞文選有寧顯寧悔之語易曰知通塞也秦氏多英俊少遊眉最白蜀志馬良字季常兄弟五人並有才名鄊里為諺曰馬氏五常白眉最良良眉中有白毛故稱之頗聞鴻鴈行筆皆萬人敵禮記兄之齒鴈行項羽傳劍一人敵不足學學萬人敵耳吾早知有覯而不知有覿少儀袖詩來剖蚌珠的皪覯字少章剖蚌見前注文選舞賦曰珠翠的皪而照耀李善注引説文曰的皪珠光也乃能持一鏃與我箭鋒直文選射雉賦曰擎牙低鏃列子曰紀昌學射于飛衛既盡衛之術乃謀殺衛相遇于野二人交射中路矢鋒相觸而墜于地而塵不揚于是二子泣而投弓相拜于途請為父子其後叢林有箭鋒相直之語蓋出于此洪覺範僧寶傳載曹山寶鏡三昧曰羿以巧力射中百步箭鋒相直巧力何預自吾得此詩三日卧向壁世説王東亭轉卧向壁歎曰人固不可以無年此借用自恨知少儀之晚向壁愧歎也挽士不能寸推去輒數尺左傳曰夫二子者或挽之或推之此句止用其字老子曰不敢寸進而退尺孟子曰賢不肖之相去其間不能以寸才難不其然有亦未易識魯論曰才難不其然乎史記范雎傳曰人固不易知知人亦未易也送少章從翰林蘇公餘杭東南淮海惟揚州國士無雙秦少遊周禮職方氏東南曰揚州禹貢曰淮海惟揚州髙郵軍屬淮南路漢書韓信傳蕭何曰諸將昜得至如韓信國士無雙欲攀天關守九虎但有筆力回萬牛楚辭曰攀天階而下視招魂曰虎豹九關啄害下人些注謂天門九重使虎豹執其開閉啄嚙欲上之人也歐陽公詩曰興來筆力千鈞重萬牛見前注文學縱橫乃如此故應當家有季子後漢周舉傳曰五經縱橫周宣光老杜詩凌雲健筆意縱橫樂天詩當家美事堆身上何意林宗與細侯當音去聲時來誰能力作難鴻鴈行飛入道山南史膺時來之運樂府孫綽碧玉歌曰感郎不作難又太白詩曰回山倒海不作難老杜詩麒麟閣畫鴻鴈行道山見前注斑衣兒啼真自樂從師學道也不惡事親從師皆有可樂者列女傳曰老萊子孝養二親行年七十嬰兒自娛著五色綵衣嘗取漿上堂跌仆因卧地為小兒啼史記循吏傳曰老人兒蹄晉書謝道韞傳謝安曰王郎逸少子不惡汝何恨也但使新年勝故年即如常在郎罷前言少章儻從蘇公問學日新即所謂以志養志者何必以不逺其親為孝哉王立之詩話謂山谷此句蓋有深意玉臺新詠丘遲雜詩曰惟見君行久新年非故年唐人顧況有囝哀閩曰郎罷别囝吾悔生汝囝别郎罷心摧血下隔地絶天及至黃泉不得在郎罷前青箱雜記云閩人謂父為郎罷謂子為囝題淨因壁二首瞑倚蒲團挂鉢囊舊作晝夢長半窗疏箔度微涼傳燈録雲門傳曰高挂鉢囊拗折拄杖蕉心不展待時雨葵葉為誰傾太陽唐餘録路德延芭蕉詩云心似倒抽書退之詩升堂坐階新雨足芭蕉葉大梔子肥唐詩芭蕉不展丁香結時雨見前注曹子建表曰若葵藿之傾葉太陽雖不為之回光然終向之者誠也蓋用淮南子意文選鮑明逺詩端為誰苦辛門外黃塵不見山此中草木亦常間履聲如度薄冰過催粥華鯨吼夜闌劉禹錫詩門外黃塵人自走甕頭清酒我初開莊子曰北面而不見冥山履聲見漢書鄭崇傳詩曰如履薄冰華鯨謂齋魚之藻飾者釋氏要覽曰今寺院木魚或取鯨魚一擊蒲牢為之大鳴也按文選東都賦曰發鯨魚鏗華鐘又潘嶽西征賦曰華魴躍鱗老杜詩夜闌更秉燭六月十七日晝寢紅塵席帽烏鞾裏想見滄洲白鳥雙選詩曰復協滄洲趣老杜詩河間雙白鷗馬齕枯萁喧午枕夢成風雨浪翻江聞馬齕草聲遂成此夢也楞嚴經曰如重睡人眠熟牀枕其家有人于彼睡時搗練舂米其人夢中聞舂搗聲别作他物或為擊鼓或為撞鐘此詩略采其意以言江湖之念深兼想與因遂成此夢文選馬汧督誄曰箕稈空虛北窗生物趨功日夜流園林才夏麥先秋莊子曰主物之以息相吹文選孔文舉論盛孝章書曰嵗月不居時節如流禮記月令孟夏麥秋至緑隂黃鳥北窗簟付與來禽安石榴末句蓋有所寄言物化各用事于一時姑聽其自然歐陽公詩緑隂黃鳥春歸後尚書故實曰王內史書帖有與蜀郡太守書求櫻桃來禽日給藤子來禽言味甘來衆禽俗作林禽博物志云張騫使西域還得安石榴蘇子美詩别院深深夏簟清石榴花發透簾明趙子充示竹夫人詩蓋涼寢竹器憩臂休膝似非夫人之職豫為名曰青奴並以小詩取之二首青奴元不解梳妝合在禪齋夢蝶牀公自有人同枕簟肌膚氷雪助清涼文選嵇康琴賦序曰似元不解聲音夢蝶見前注山谷鼓盆已久故用莊子夢蝶事退之詩水文浮枕簟莊子曰藐姑射之山有神人焉肌膚若冰雪東坡樂府曰冰肌玉骨自清涼無汗濃李四絃風拂席昭華三弄月侵牀我無紅袖堪娛夜正要青奴一味涼元注云冬夏青青竹之所長故命曰清奴穠李昭華貴人家兩女妓也昭華蓋王晉卿駙馬家吹笛妓杜詩紅袖泣前魚歐陽公詩欲將何物招嘉客唯有新秋一味涼范蜀公挽詞二首蜀公諱鎮字景仁東坡為作墓志今采掇以證此詩信道雖常爾知人乃獨亨言公篤于信道蓋其常德至于知人之明獨心通意曉乃得之于天也昜曰有孚維心亨公事神宗復為翰林學士知通進銀臺司王介甫為政欲改常平為青苖法公三上疏爭之其後議論益不合年六十三即致仕此詩所謂知人蓋指介甫書林身老大諫紙字攲傾公在英宗朝已為學士書林見前注退之詩莫道官間身老大樂天與元稹書曰身是諫官月請諫紙老杜詩作詩呻吟內墨淡字攲傾鼇去三山動人危五鼎烹言公既去國本自此搖矣方公請致仕時介甫自草制極口詆公聞者皆為公懼列子曰歸墟中有五山帝使巨鼇十五戴之五山始峙而不動龍伯國之大人一釣連六鼇于是一山流于北極漢書主父偃傳曰大丈夫生不五鼎食死則五鼎烹耳保全天子聖几杖送餘生言神宗終覆護之使得終其夀考老杜詩淺把涓涓酒深憑送死生選詩餘生幸已多公在昭陵日文章近赤墀空嗟伏生老不侍邇英帷永昭仁宗陵名公事仁宗已掌內外制蓋先朝舊臣獨不見容于當世此詩所歎也漢書梅福傳曰涉赤墀之塗又儒林傳伏生故為秦博士孝文時求能治尚書者欲召之時伏生年九十餘老不能行邇英閣經筵所在公在神宗時兼侍讀已而致仕去國幾三虎聞韶待一夔誰言蓋棺了新樂鎖蛛絲韓子曰龐共與太子質于邯鄲謂魏王曰夫市無虎明矣然而三人言成市虎今夫邯鄲去魏遠于市議臣者過三人願王察之公與劉幾論樂不合既而請太府銅自為新樂比李照樂下一律有竒二聖御延和殿召執政同觀賜詔嘉奬樂奏三日而公薨聞韶見魯論吕氏春秋魯哀公問于孔子曰樂正夔一足矣老杜詩書籖藥裹封蛛網蓋棺了見前注詩意謂公以新樂卒不見用為恨也宗室公夀挽詞二首山谷嘗有贈宗室景道字跋云余與宗室越宫有葭莩故曩時與宣州院公夀景珍嘗共文酒之樂昔在熙寧日葭莩接貴遊漢書中山靖王傳曰葭莩之親注云葭蘆葉也莩者其筒中白皮至薄者也喻相著周禮師氏曰凡國之貴遊子弟學焉注云王公之子弟題詩奉先寺橫笛寶津樓東京記曰奉先資福禪院在明義坊寶津樓在天苑坊與金明池心亭榭相直天網恢中夏賓筵禁列侯但聞劉子政頭白更清修言禁網雖云疏闊至宗室獨加嚴密故賓客不復往來如向時但聞其白首清修之賢而已老子天網恢恢疏而不失文選任彥升表曰值齊網之宏弛賓客之禁李善注引後漢書建武中禁網尚寬諸王既長各招引賓客漢書高帝紀注云通侯舊曰徹侯後改曰列侯劉向字子政漢宗室也年七十二卒魏志陳矯傳陳登曰清修疾惡有識有義吾敬趙元達昧旦鳴珂路春朝禁殿班書曰先王昧爽丕顯坐以待旦唐書車服志曰三品以上珂九子四品七子五品六子又張嘉祐傳弟嘉貞為相嘉祐任金吾將軍時號所居坊曰鳴珂里周禮春見曰朝方看分寶玉何意作丘山書旅熬曰分寶玉于伯叔之國時庸展親文選張孟陽七哀詩曰昔為萬乘君今為丘山士燕入風榮舞花開日笑顔選詩曰風簾入雙燕儀禮注曰榮屋翼也太白詩妾似井底花開花向君笑空餘杜陵淚一為漢中潸老杜集中多有與漢中王瑀往還詩瑀蓋唐宗室出城送客過故人東平侯趙景珍墓朱顔苦留不肯住白髮正爾欺得人樂天詩鏡裏朱顔看已失又云留春不肯住薛能詩青春背我堂堂去白髮欺人故故生王直方詩話云魯直嘗言少時誦薛能詩云青春背我堂堂去白髮欺人故故生孫莘老問曰此何人詩公曰老杜莘老云杜詩不如此後公云庭堅因莘老之言遂曉老杜詩髙雅大體此句乃所以針薛能之膏肓爾嬋娟去作誰家妾意氣都成一聚塵文選西京賦曰增嬋娟以跐豸注云姿態妖蠱也樂天詩歌舞妝成心力盡一朝身去不相隨史記晏子傳意氣揚揚甚是得也寒山子詩云始憶八尺漢俄成一聚塵黃泉無曉日青草自知春今日牛羊上丘壟當時近前左右嗔古樂府曰繡幕園香風年節朱絳桐不如理何事淺立經管中護惜加窮袴隄防託守宫今日牛羊上丘壟當時近前面發紅老杜麗人行云慎莫近前丞相嗔花開鳥啼荆棘裏誰與平章作好春樂天勸令公開宴詩曰宜須數數謀歡會好作開成第二春黃潁州挽詞三首恭惟同自出纍世復通家老杜贈盧五丈詩曰恭惟同自出妙選纍髙標此借用言族姓同出也後漢孔融傳謂李膺曰與君纍世通家惠沫霑枯涸忠規補過差莊子曰泉涸魚相與處于陸相詬以濕相濡以沫文選左太沖詩曰塊若枯池魚陸士衡辨亡論曰忠規武節宋玉登徒子好色賦曰揚詩守禮終不過差胸中明玉石仕路困風沙尚有平生酒秋原灑菊花玉石見前注臨民次公老論事長輿通魯論曰居敬而行簡以臨其民漢書黃霸字次公為潁州守晉書和嶠字長輿潘安仁間居賦序曰昔通人知長輿之論豫也固謂拙于用多袖有投虛刃時無斫鼻工文選天台山賦曰投刃皆虛按莊子庖丁解牛注曰遊刃于空斫鼻見前注風流前輩近名實後人公晉書孫綽風流為一時之冠文選孔融論盛孝章書曰今之少年喜謗前輩歐陽公詩後世茍不公至今無聖賢不謂三日别今成萬事空吳志吕蒙傳曰士别三日即刮目相待樂天詩百年隨手過萬事轉頭空公與汝陽守人間孝友稀脊令鳴夜雨常棣倚春暉脊令見前注常棣詩曰常棣之華鄂不韡韡凡今之人莫如兄弟粉省雙飛入泉臺相與歸蔡質漢官典職曰尚書即奏事明光殿省省中皆以胡粉塗壁畫古賢列女老杜哭李嶧詩云青瑣陪雙入泉臺見前注禮記曰死者如可作也吾誰與歸哀笳宛丘道衰涕不勝揮老杜詩哀挽青門道宛丘今陳州家語公父文伯卒敬薑曰二三子無揮涕王肅曰揮涕者淚以手揮之選詩淚下不可揮樂夀縣君吕氏挽詞二首歸裝衣楚楚家世印纍纍詩曰蜉蝣之羽衣裳楚楚漢書石顯傳曰印何纍纍綬若若耶劉滋未第時夢人持印滿匣令吞之至十四枚正見印纍纍出于腹上來作箕帚婦不忘蘋藻詩漢書髙帝紀吕公曰臣有息女願為箕帚妾采蘋詩序曰大夫妻能循法度也其詩曰于以采蘋南澗之濱于以采藻于彼行潦居然成萬古何啻謁三醫列子曰李梁得疾七日大漸其子謁三醫一曰矯氏二曰俞氏三曰盧氏騎省還秋直霜侵鬢腳衰文選潘嶽秋興賦序曰余春秋三十有二始見二毛以太尉椽兼虎賁中郎將宇直于散騎之省嶽又有悼亡詩三首剪髻賓筵盛齊眉婦禮間老杜送王評事詩云自陳剪髻鬟鬻市充杯酒謂王圭母也蓋用晉書陶侃母事退之祭裴太常文曰方丈之食每盛于賓筵後漢書梁鴻傳曰孟光舉案齊眉間謂間習也謂宜俱白髮忽去作青山詩曰君子偕老選詩今為丘山土大夢驚蝴蝶何時識佩環莊子曰且有大覺而後有大夢蝴蝶見前注列女傳齊孝孟姬曰妾聞妃后踰閾必乘安車輜軿下堂必從傅母保阿進退則鳴玉佩環後漢書皇后紀論曰動有環佩之響此詩引用蓋古之婦容皆如此不特后妃也哀歌行欲絶丹旐雨斑斑老杜詩丹旐飛飛日初傳發閬州雨斑斑見前注叔父給事挽詞十首給事名廉字夷仲實録有傳元祐宗臣考十科公居八九未為多功名身後無瑕點孝友生知不琢磨宗臣為溫公漢書蕭曹贊曰為一代之宗臣溫公為相乞以十科舉士一曰行義純固可為師表二曰節操方正可備獻納三曰智勇過人可備將帥四曰公正聰明可備監司五曰經術精通可備講讀六曰學問該博可備顧問七曰文章典麗可備著述八曰善聽獄訟盡公得實九曰善治財賦公私俱便十曰練習法令能斷情讞論語生而知之詩云如切如磋如琢如磨平生治獄有隂功忠孝臨民父母同贛上樵夫談卓令宣城老吏識于公贛上今虔州宣城今宣州據廉傳中進士第調宣州司理參軍移虔州會昌令後漢卓荗傳茂為密令吏人親愛而不忍欺之漢書于定國傳于公曰我治獄多隂德未嘗有所冤子孫必有興者三晉山河數十州頻年水旱不能秋我公出把司農節粟麥還于地上流王安石薦亷為司農寺句當公事神宗召見稱旨遂命體量河東河北災傷除本寺丞推行荒政十二事漢書地理志曰晉為韓魏趙所滅三家自立為諸侯是為三晉唐書劉晏傳曰自言如見錢流地上更生苦訟石中書宰掾非人欲引裾兩猾論兵幾敗國同時御史更誰如廉嘗為監察御史裏行此詩中事傳所不載杜牧之作李給事詩曰可憐劉校尉會訟石中書按漢書劉向本名更生中書宦官恭顯弄權更生使其外親上變事又上封事云云魏志辛毗傳文帝欲徙冀州土豪十萬户實河南毗以為非帝不答起入內毗隨而引其裾帝遂徙其半漢書張良傳漢王罵曰豎儒幾敗乃公事老杜詩論兵遠壑靜王介甫作王侍御墓碣曰其言多同時御史所不能言者曾發公家巨萬錢溝中襁褓却生全三齊水後皆禾稼不殺耕牛更可傳河決曹村廉充京東體量安撫活飢民二十五萬人漢書食貨志曰京師之錢纍百巨萬又田儋傳曰田榮盡并三齊之地注謂齊及濟北膠東可傳見孟子晉地無戎卧賊曹民兵賜笏解弓刀六年講武儒冠在不踏金門著戰袍元豐三年團教三路民兵廉以提點河東刑獄兼提舉明年秋上親召閲澤州保甲補官者五十八人進秩一等七年十月罷提刑轉領保甲元祐初詔為户部郎中左傳曰無戎而城讎必保焉通典曰兩漢有決曹賊曹掾主刑法厯代或謂之賊曹或為法曹墨曹漢書揚雄傳曰厯金門上玉堂有日矣古樂府木蘭詩曰脫我戰時袍著我舊時裳軍容百萬轉風雷獨料王師不戰摧三篋飛書公對獄元豐天子照姦回王師伐夏國命廉兼河東轉運判官王中正將兵調發倉卒廉上言師必無功既而中正軍潰以轉運乖方歸罪于廉奏之上遣中貴人就詰狀廉謝不辨乃下潞獄月餘上察其情止奪一官中正宦官故用魚朝恩觀軍容事史記甘茂傳樂羊返而論功文侯示之謗書一篋漢書張安丗傳曰亡書三篋後漢書廣陵思王荆傳曰作飛書封以方底漢書劉向傳曰恭顯白令蕭望之詣獄置對泰誓曰崇信姦回注云回邪也隴上千山漢節回掃除民蜮不為災蜀茶總入諸蕃市胡馬常從萬里來廉為吏部郎中會御史論陸師閔𣙜茶六害請通商復劵馬如舊制遣廉按其實廉請熙河秦鳯涇原如故勿改以制蕃市而許東路通商禁南茶無侵陜西以利蜀賈定撥馬嵗以萬八千為額所奏皆可即拜都大提舉茶馬公事漢節見前注詩曰為鬼為蜮左傳曰有蜚不為災廊廟從來不在邊黃扉青瑣慶登賢除書未試回天筆何意佳城到馬前元祐六年十一月廉自陜西都轉運召拜給事中論議引大體朝廷稱焉左傳曰五大不在邊五細不在廷唐郭承嘏為給事中文宗為宰臣曰承嘏久在黃扉漢書故事黃門郎日暮入對青瑣門故謂之夕郎注云刻為連瑣文而青塗也白樂天詩黃紙除書無我名唐書張玄素傳魏微曰張公論事有回天之力後漢書馬后傳曰何意老志復不從哉佳城見前注榮祿常思澤九宗山摧梁壞並成空百年遺恨誰昭洗他日諸郎有父風莊子曰鄭人緩為儒河濶九里澤及三族九宗見前注禮記泰山其頽乎梁木其壞乎謝朓詩中區咸已泰輕生諒昭灑按灑與洗同廉四子叔豹叔向叔夏叔敖寂住閣元注云陳留宿一􅓖堂因書為寂住閣莊周夢為蝴蝶蝴蝶不知莊周莊子曰昔者莊周夢為蝴蝶栩栩然蝴蝶也俄然覺則蘧蘧然周也不知周之夢為蝴蝶歟蝴蝶之夢為周歟當處出生隨意急流水上不流楞嚴經曰一切浮塵諸幻化相當處出生隨處滅盡文選頭陀寺碑李善注曰意生身謂菩薩言能變化生死隨意住生文選古詩曰淮泗馳急流法師物不遷論云仲尼曰回也見新交臂非故如此則物不相往來明矣既無往返之微眹有何物而可動乎然則旋嵐偃嶽而常靜江河競注而不流復何怪哉深明閣象踏恆河徹底日行閻浮破冥若問深明宗旨風花時度窗櫺上兩句言深與明涅槃經云聲聞緣覺及大菩薩同在佛前閲佛説一味之法然其所證各有淺深譬象馬三獸渡河兔渡則浮馬渡及半唯大香象徹底截流華言經曰譬如日出于閻浮提先照一切須彌山等然後普照一切大地如來亦爾大智日光無所分别又頌曰譬如日出閻浮提光明破暗悉無餘傳燈録夀禪師曰欲識永明旨門前一湖水日照光明生風來波浪起又達磨傳曰外付袈裟以定宗旨説文曰櫺楯間子也山谷內集詩注卷十一
