body:
  text: 山谷内集詩注巻十宋黄庭堅撰任淵注次韻答曹子方雜言酺池寺湯餅一齋盂曲肱懶著書寰宇記曰酺池在開封府浚儀縣西北古大梁城内梁孝王作按浚儀後更名祥符束哲餅賦曰充虚解戰湯餅為最時山谷持戒律甚嚴故有齋盂之句曲肱用邉韶晝眠意史記虞卿傳曰非窮愁亦不能著書論語飯蔬食飲水曲肱而枕之樂亦在其中矣騎馬天津看逝水滿船風月憶江湖按東京記崇濟坊西有天漢橋橋南朱雀門與宣徳門相直此詩云天津葢唐之洛都有天津橋因偕用爾傳燈録船子和尚詩云滿船空載月明歸往時盡醉冷卿酒侍兒琵琶春風手冷卿如因話録以祠部為氷㕔老杜以廣文為冷官之類以下句攷之謂光禄卿也按實録元祐三年七月文及為光禄少卿及葢潞公之子此詩所指豈其人耶漢書袁盎傳注曰侍兒婢也王介甫明妃曲曰黄金捍撥春風手豫章外集又有和子方雜言亦及此事或云冷姓也竹間一夜鳥聲春明朝醉起雪塞門鳥聲春謂琵琶啄木聲也録異傳曰大雪丈餘洛陽令至袁安門無有行路退之詩藍田十月雪塞闗當年聞說冷卿客黄鬚鄴下曹將軍魏志任城威王彰太祖之子大破烏丸歸功諸將太祖喜持彰鬢曰黄鬚兒竟大竒也老杜有觀曹將軍畫馬圖引此借用曹植居鄴下一時從其游者名鄴下之學挽弓石八不好武讀書卧看三峯雲唐書張𢎞靖傳士挽兩石弓左傳顔高之弓六鈞注云六鈞百八十斤老杜詩挽弓當挽强又詩將軍不好武稚子總能文蘇子美詩卧看青天行白雲華山記云其三峯直上晴霽可觀誰憐相逢十載後釜裏生魚甑生塵退之詩尊酒相逢十載後我為壯夫君白首後漢書范丹字史雲為萊蕪長所止單陋有時絶粒窮居自若閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪冷卿白首大官寺樽前不復如花人通典大官掌百官之饌屬光禄卿大白詩金屏笑坐如花人曹將軍江湖之上可相忘舂鉏對立鴛鴦雙無機與游不亂行何時解纓濯滄浪莊子曰魚相忘于江湖爾雅曰鷺舂鋤文選江淹擬張綽詩曰亹亹𤣥思清胷中去機巧物我俱忘懐可以狎鷗鳥葢用列子事莊子山木篇曰孔子逃于大澤入獸不亂羣入鳥不亂行濯纓見前注喚取張侯來平章烹茶煮餅坐僧房張侯似是張仲謀言欲與之共往僧房商畧歸計也按外集有送曹子方兼簡張仲謀詩唐書郭正一傳曰平章事自正一等始此借用其字老杜詩隨意宿僧房次韻子瞻和王子立風雨敗書屋有感王適字子立蘇子由之壻從其婦翁學婦翁不可撾王郎非嬌客後漢第五倫傳光武戯謂倫曰聞君為吏篣婦公寧有之耶魏志武帝紀令曰第五伯魚三娶孤女謂之撾婦翁按今俗間以壻為嬌客十年為從學苦淡共陻厄漢書叔孫通傳曰吕后與陛下攻苦食淡左傳曰困窮陻厄燕雀嗤鴻漸犬羊睨麟獲此以下指子由漢書陳勝傳曰燕雀焉知鴻鵠之志易曰鴻漸于木春秋哀公十四年西狩𫉬麟遇逢涇渭分昨夢春氷釋涇渭春氷並見前注平生五車書才吐二三䇿莊子曰恵施多方其書五車二三䇿見孟子已作謗薰天金朱果何益子由在臺諫數論事不為當世所喜老杜詩北里富薰天按揚雄甘泉賦曰燎薰皇天此借用其字法言曰紆朱懐金之樂不如顔氏子之樂君窮一牕下風雨更削跡此以下述子立莊子山木篇孔子曰吾再逐于魯伐木于宋削跡于衛又見盗跖篇詩工知學進詞苦見意迫庾信哀江南賦序曰不無危苦之詞惟以哀悲為主俗情傲秦贅婦舎不煖席漢書賈誼傳曰秦人家貧子壯則出贅老杜詩倚著如秦贅淮南子曰墨突不暇黔孔席不及煖南冶從東家不聞被嘲劇魯論南容三復白圭孔子以其兄之子妻之又曰子謂公冶長可妻也以其子妻之東家見前注蜀都賦曰劇談戲論南兄謝靈運傳輕薄少年凡人士並為題目皆加苦言劇句師儒並世難日月過箭疾周禮天官曰師以賢得民儒以道得民史記仲尼弟子列傳曰孔子數稱臧文仲栁下惠然皆後之不並世樂天詩年光同激箭老杜詩破敵過箭疾公今未有田把筆耕六籍後漢班超傳注曰安能久事筆耕乎嘲小徳中年舉兒子漫種老生涯晉書王羲之傳謝安曰中年以來傷于哀樂史記孟嘗君傳曰君所以不舉五月子者何莊子曰吾生也有涯學語囀春鳥塗牕行暮鵶一作學語春蟲聒書牕秋鴈斜老杜詩驥子好男兒前年學語時樂府栁顧言陽春歌曰春鳥一囀有千聲按周禮羅氏仲春羅春鳥劉禹錫傳小兒弄筆不能嗔涴壁書牕且賞勤盧仝示添丁云忽然案上翻墨汁塗抹詩書如老鵶行音胡剛反欲嗔王母惜稍慧女兄誇一作待渠能小艇伴我釣煙沙爾雅父之妣為王母時山谷母夫人無恙解著潛夫論不妨無外家後漢王符傳曰安定俗鄙庶孽而符無外家為鄉人所賤隱居著書以譏當世失得不欲章顯其名故號曰潛夫論戲答張祕監饋羊細肋柔毛飽卧沙煩公遣騎送寒家同州沙苑監有桂羊俗謂之細肋卧沙曲禮羊曰柔毛老杜詩大官喜我來遣騎問所須按文選魏文帝書曰今遣騎到鄴世說王經母曰汝本寒家子忍令無罪充庖宰留與兒童駕小車孟子曰若無罪而就死地則牛羊何擇焉韓孟鬬雞聯句曰義肉耻庖宰晉書衛玠傳總角乘羊車入市見者以為玉人漢書車千秋傳朝見得乗小車戲答王定國題門兩絶句非復三五少年日把酒償春頰生紅摭言薛逢語新進士曰老婆三五少年時也曽東塗西抹來退之嘲少年曰直把春償酒都將命乞花又華山女云白咽紅頰長眉青白鷗入羣頗相委不謂驚起來賓鴻莊子曰入獸不亂羣委謂諳識也世說司馬徽人有委認徽豬者退之與栁中丞書亦曰與賊不相諧委禮記月令季秋鴻鴈來賓此句當是山谷往見定國不遇而姙妾有避之者來賓或是其名字頗知歌舞無竅鑿我心塊然如帝江山海經曰天山有神狀如黄囊赤如丹火六足四翼渾沌無靣目是識歌舞實惟帝江或作鴻江也莊子曰日鑿一竅而渾沌死又曰彫琢復樸塊然獨以其形立花裏雄蜂雌蛺蝶同時本自不作雙李義山桞枝詞曰花房與蜜脾蜂雄蛺蝶雌同時不同碩那復更相思老杜詩並蔕芙蓉本自雙此反其意不作雙見前注清人怨戲效徐庾慢體三首秋水無言度荷花稱意紅選詩曰涉江采芙蓉王介甫詩荷花稱意紅按漢書兒寛傳奏事稱意主人敬愛客催喚出房籠選詩云公子敬愛客終宴不知疲老杜詩遣人向市賖香粳喚婦出房親自饌梁元帝巫山詩無因謝神女一為出房籠一斛明珠曲何時落塞鴻一斛珠見前注禮記曰歌者纍纍乎端如賈珠鮑照京洛篇霜歌落塞鴻莫藏春笋手且為剥蓮蓬杜牧之㣲吟曰骰子逡巡裹手拈無因得見玉纖纖東坡樂府曰指尖露春笋纖長翡翠釵梁碧石榴裙摺紅庾信蕩子賦佩朱翠的釵梁粟鈿樂府黄門歌曰㸃黛方初月縫裙學石榴隙光斜斗帳香字冷薰籠樂府魏收永世樂曰綺牕斜影入上客酒須添又吳融秋閨怨日斜光隱西壁暮雀上南枝又長樂佳曰紅羅複斗帳四角垂明璫香字謂香篆薰籠見前注王建宫詞曰紅顔未老恩先斷斜倚薰籠坐到明聞道西飛燕將隨北固鴻古樂府曰東飛伯勞西飛燕黄姑阿母時相見江總歌南飛鳥鵲北飛鴻弄玉蘭香時㑹同按寰宇記北固山在潤州丹徒縣北此云北固鴻未詳恐字誤今按月令鴈北鄉鄉與向通恐當作北向鴻固葢向字之誤鴛鴦㑹獨宿風雨打船蓬終上句之意杜詩鴛鴦不獨宿又雨來霑席上風急打船頭杜牧之詩春半平江兩圓文破蜀羅聲眠蓬底客寒過釣來蓑障羞羅袂薄承汗領巾紅南史劉瑀傳曰羞靣見人扇障何益玉臺新詠雜詩曰舉袖且障羞迥梳理亂髪文選洛神賦曰抗羅袂以掩涕方言曰席裱謂之被巾注云婦人領巾退之詩白布長衫紫領巾晩風斜蠆髪逸艷照牕籠都人士詩曰巻髪如蠆注蠆螫蟲也尾抹揵然似婦人髪末曲上巻然文選鮑照詩蛾眉珠襲玉鉤隔𤨏牕胡琴抱明月寳瑟陣歸鴻劉禹錫泰娘歌曰低鬟綏視抱明月纖指破撥生胡風言其善琵琶也此借用文選沈休文詩曰象筵鳴寳瑟劉禹錫傷秦妹行言善其筝曰玫瑰寳柱秋鴈行按瑟亦有柱揚子所謂膠柱調瑟是也倚壁生蛛網年光如轉蓬言琴瑟久不御也文選江淹擬張司空詩曰蘭徑少行迹玉臺生網絲淮南子曰聖人觀轉蓬而為車此借用以言年運而往如車轂之轉傷美人之遲暮也呈外舅孫莘老二首九陌黄塵烏㡌底五湖春水白鷗前三轉舊事曰長安城中八街九陌退之詩子雲秪自守奚事九衢塵又詩雖有九衢無塵埃樂府讀曲歌曰不知烏㡌郎是誰越語曰范蠡遂乘輕舟以浮于五湖老杜詩時危兵甲黄塵裏日短江湖白髪前此頗用其語律扁舟不為鱸魚去收取聲名四十年晉書張翰傳齊王冏辟為掾因見秋風起乃思吳中菰菜蓴羹鱸魚鱠曰人生貴得適意何能羈官數千里以要名爵乎遂命駕而歸俄而冏敗人謂見機老杜詩夫子獨聲名又贈鄭䖍詩才名四十年甓社湖中有明月淮南草木借光輝沈存中筆談曰嘉祐中揚州有一珠甚大天晦多見初出于天長縣陂澤中後轉入甓社湖後又在新開湖中九十餘年居民行人常常見之珠大如拳爛然不可正視十餘里間林木皆有影如日初升此詩引用以比莘老按莘老高郵軍人高郵本屬揚州云漢書鄒陽傳曰明月之珠夜光之璧故應剖蚌登王府不若行沙弄夕霏用莊子龜寧曵尾之意蜀志秦宓奏記曰剖蚌求珠周禮鄉大夫曰登于天府又玉府掌共王之佩玉珠玉書曰王府則有歐公鸚鵡螺詩曰紅螺行沙夜生光又曰一螺千金價誰量豈若泥下追含漿文選謝靈運詩雲霞收夕霏李善注霏日氣也以天壇靈壽杖送莘老王屋千霜老紫藤扶公休沐對親朋異時駟馬安車去拄到天壇願力能王屋山在綘州垣曲縣千霜謂經千嵗之墨霜老杜詩三霜楚户砧禮記大夫七十而致事適四方乘安車自稱曰老夫老杜詩云安得仙人九節杖挂到玉女洗頭盆太白寄王屋山人孟大融詩曰願隨夫子天壇上閒與仙人掃落花圓覺經曰皆依無始清淨願力李通𤣥華嚴論曰地前菩薩是凡夫故有地前成佛者推為誓願力能非本法故詩言老而益健能為方外之游葢由願力所致戲答俞清老道人寒夜三首王立之詩話山谷云金華俞清老字子中二十年前與子共學于淮南元豐甲子相見于廣陵自云荆公欲使之脱縫掖著僧伽黎奉香火于半山寺予之僧名紫琳字清老清老無妻子之累云去作半山道人似不為難事然生龜脱筒亦難堪思後數年見之傳冠自若也因嘗戲和清老詩云云按山谷跋此詩云子瞻屢哦此詩以為妙也索索葉自雨月寒遥夜闌樂天詩乾葉不待黄索索飛下來又云葉聲落如雨月色白似霜楚辭曰覿杪秋之遥夜老杜詩夜闌更秉燭雨當如春秋雨螽之雨從去聲非葉聲落如雨故前輩論深院無人杏花雨非四雨數馬嘶車鐸鳴羣動不遑安晉書荀朂傳逢趙賈人牛鐸識其聲淵明詩曰日入羣動息文選東哲補南陔詩曰心不遑安有人夢超俗去髪脱儒冠平明視清鏡正爾良獨難言其未能忘形也超俗見前注退之詩猶思脱儒冠又詩脱冠剪頭髪項羽傳平明漢軍乃覺之樂天詩晨興照清鏡形影兩寂寞曹子建集怨歌行曰為臣良獨難聞道一稊米出身縛簪纓莊子河伯曰聞道百以為莫已若者我之謂也又北海若曰計四海之在天地不似稊米之在太倉乎音義曰小米也一曰稊草也文選詩出身䝉漢思北山移文曰今見觧蘭縛塵纓懷我伐木友寒衾夢丁丁代木丁丁見詩大雅富貴但如此百年半曲肱退之詩人生但如此朱紫安足僭下句用邯鄲夢事見前注曲肱見魯論早晚相隨去松根有茯苓唐趙嘏詩早晩粗酬身事了水邊歸去一閒人老杜詩知子松根長茯苓遲暮有意來同煮牧羊金華山早通玉帝籍神仙傳曰皇初平年十五家使牧羊有道士將至金華四十餘年其兄初起見之問羊何在初平叱白石皆起成羊数萬頭皇字他書或作黄山谷先世居金華故云漢元帝紀令從官給事宫司馬中者得為大父母父母兄弟通籍樂天詩但恐長生須有籍仙臺試為檢名看漢書通籍金門至今風低草􅋾􅋾見白石樂府敕勒歌曰天蒼蒼野茫茫風吹草低見牛羊無羊詩曰爾羊來思其角􅋾􅋾注曰聚其角而息􅋾􅋾然字書曰􅋾音阻立反角堅貌亦作濈金華風煙下亦有君履迹何為紅塵裏頷鬚欲雪白金華屬婺州清老亦金華人班婕妤賦曰思君兮履綦注云綦履迹也西都賦曰紅塵四合樂天詩滿頷白髭鬚祕書省冬夜宿直寄懷李徳素山谷有題薛醇老家李西臺書云徳素舒城李粢也浮沈于俗操行如古人徃時隱龍眠山駕青牛徃來皖公三祖自燒古松作墨云云故此詩末句有占少微之語曲肱驚夢寒皎皎入牖下文選古詩明月何皎皎又詩安寢北堂下明月入我牖出門問何祥岑寂省中夜左氏僖十六年傳隕石于宋五六鷁退飛過宋都宋襄公曰是何祥也吉凶焉在文選舞鶴賦去帝鄉之岑寂漢書昭帝紀共養省中注引蔡邕云本為禁中孝元皇后父名禁改曰省中姮娥攜青女一笑粲萬瓦李商隱詩青女素娥俱耐冷月中霜裏鬬嬋娟王充論衡曰羿請不死之藥于西王母羿妻姮娥竊以奔月託身于月是為蟾蜍淮南子曰至秋三月青女乃出降以雪霜注曰青女天神青媖玉女主霜雪也榖梁傳曰軍人粲然皆笑注云粲然盛笑貌宋景文筆記云粲明也知萬衆皆啟齒齒既白以粲義包之指我金玉人幽獨秉大雅晉書王戎傳戎目山濤如璞玉渾金人皆欽其寶莫知名其器楚辭曰幽獨處乎山中大雅見前注古來絶朱絃葢為知音者見前主同牀有不察而況子在野文選張華女史箴曰茍違斯義則同衾以疑此句畧采其意言世無知音雖在傍近猶不識察況逺外乎山谷作羅漢贊又曰我觀閻浮提衆生同牀猜忌若氷炭史記田叔傳曰田仁與任安二人同牀卧書曰君子在野獨立占少微長懷何由寫魯論曰他日又獨立隋書天文志少微四星在太微西士大夫之位也一名處士明大而黄則賢士舉楚辭曰情慨慨而長懷文選張茂先詩寫心出中誠嵗寒知松柏魯論曰嵗寒然後知松柏之後彫也羣陰彫品物松柏尚桓桓易曰品物流形書曰朂哉夫子尚桓桓注云桓桓武貎老去惟心在相依到嵗寒文選陸機演連珠曰勁陰殺節不彫寒木之心歐陽公詩老去自憐心尚在霜嚴御史府雨立大夫官漢書朱博為御史大夫其府列柏樹崔御史箴曰箴上霜凝筆端風起文選嘯賦曰騁羽則嚴霜夏彫應劭漢官儀秦始皇封泰山遇暴雨賴得抱樹因封其樹為五大夫松史記滑稽傳優旃曰陛楯郎汝雖長何益幸雨立犧象溝中斷徽絃爨下殘荘子曰百年之木破為犧尊青黄而文之其斷在溝中美惡有間矣其于失性一也左傳曰犧象不出門謂犧尊象尊也後漢蔡邕傳吳人有燒桐以炊者邕聞火烈之聲知其良木請而為琴時號焦尾琴晉書陶潛傳畜素琴一張絃徽不具荘子曰純樸不殘孰為犧尊退之木居士詩為神詎比溝中斷遇賞還同炊下餘光陰一鳥過翦伐萬牛難文選别賦曰明月白露光陰往來杜牧之詩長空碧日杳萬古一飛鳥選詩人生之海内忽如鳥過目老杜身輕一鳥過甘棠詩曰勿翦勿伐萬牛見前注春日輝桃李蒼顔亦頇觀言老成坐見新進也太白詩松柏本孤直難為桃李顔歐公醉翁亭記曰蒼顔白髪頽然乎其間東觀讀未見書後漢黄香傳京師號曰天下無雙江夏黄童肅宗詔香詣東觀讀所未嘗見書漢規羣玉府東觀近宸居漢書東方朔傳曰今規以為苑穆天子傳曰羣玉山先王之所謂䇿府通典曰後漢圖書在東觀按和帝紀永元十三年幸東觀見書林閲篇籍文逸曰景屬宸居詔許無雙士來觀未見書見題注皇文開萬巻家學陋三餘魏畧曰董遇字委真善左氏傳從學者云苦渴無日逸言當以三餘或問三餘之意遇言冬者嵗之餘夜者日之餘陰雨者時之餘竹帛森延閣星辰繞直廬文選曹子建求自試表曰名稱書于竹帛李善注字出墨子漢書藝文志注引七畧曰内則有延閣廣内祕室之府外則有太常太史博士之中老杜詩聴履上星辰又云乾坤繞漢宫西都賦曰周廬于列室注直宿曰廬諸生起孤賤天子自吹嘘後漢班超傳相者曰祭酒布衣諸生耳而當封侯萬里之外黄香上疏曰江淮孤賤愚䝉小生老杜詩惟待吹嘘送上天按魏志鄭澤曰孔公緒能清談高論嘘枮吹生韓退之詩雲風相吹嘘願以多聞力論思補帝裾說命曰王人求多聞時惟建事班固兩都賦序曰朝以論思日月獻納補帝裾用補衮意魏志辛毗傳言冀州民不可徙帝不答起入内毗隨而引其裾此借用其字被褐懷珠玉文選阮籍詩懷詩曰被褐懷珠玉顔閔相與期按家語子路問孔子曰有人于此被褐而懐玉何如孔子曰國無道可也國有道則衮冕而執玉國士懷珠玉通津不易扛國士見史記豫譲傳不易扛言其重慎之至也禮記曰執玉不趨又曰受珠玉者以掬淵明詩彈冠乘通津但懼時我遺櫝藏心有待褐短義難䧏子貢曰有美玉于斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也義難䧏言不可屈孟子雖褐寛愽吾不惴焉寗戚歌短布單衣長止骭寶唾歸青簡晴虹貫夜窻韓孟城南聯句曰寶唾恰未盡後漢趙壹傳曰咳唾自成珠又呉祐傳父恢守南海欲殺青簡以寫經書禮記曰君子于玉比徳氣如白虹天也直言方按劍豈是故迷邦按劔見前注魯論陽貨謂孔子曰懷其寶而迷其邦可謂仁乎彈雀輕千仞連城貫一雙莊子曰以隋侯之珠彈千仞之雀世必笑之選詩連城既偽往荆玉亦真還謂秦以十五都易趙璧也史記虞卿說趙孝成王一見賜白璧一雙安知藍縷底明月弄寒江左傳曰莫敖篳路藍縷以啟山林明月珠見前注魏志曰日月如合璧莊子曰藏珠于淵左傳曰子犯投其璧于河欵塞來享元祐三年夏人遣使謝封冊故以命題漢宣帝紀曰欵塞來享前朝夏州守來款塞門西五代史李仁福傳唐僖宗時有拓跋思敬者為夏州偏將後以預破黄巢功賜姓李氏拜夏州節度使思敬卒弟思諫立思諫卒子彛昌立彛昌為其將所殺軍中迎仁福立之不知其于思諫為親踈也其子彛超彛興繼立世有夏銀綏宥静等五州之地至元祐元年夏國主秉常卒于乾順承襲聖主敷文徳降書付狄鞮書曰帝乃誕敷文徳舞干羽于兩階七旬有苗格禮記王制曰西方曰狄鞮北方曰譯注曰狄之言知也氈裘瞻日月𠢐面帶金犀史記蘓秦傳云燕必致旃裘狗馬之地後漢耿秉傳匈奴聞秉卒舉國號哭或至黎面流血注云黎即𠢐字𠢐割也音力私反此借用以言祈哀請命漢書匈奴傳文帝遺單于黄金犀毗一注云要中大帶也法言被我純繢帶我金犀不亦享乎殿陛閒干羽邊亭息鼔鼙干羽見前注漢書云祭彤傳論曰卧鼓邉亭樂記曰君子聴鼓鼙之聲則思將帥之臣永輸量谷馬不作觸藩羝史記貨殖傳曰至用谷量牛馬此借用以言夏人入貢易大壯卦曰羝羊觸藩羸其角此借用以言不犯塞聲勢常相倚今聞定五溪退之平淮西碑曰凡叛有數聲勢相倚吾强不支汝弱奚恃定五溪謂南夷底定也後漢馬援傳劉尚擊武陵五溪蠻夷注云武陵有五溪謂雄溪酉溪酉溪潕溪辰溪憶邢惇夫惇夫本末具前注有呻吟集行于世東坡云惇夫自為童子所與交皆諸公長者百不一見遂與草木共盡詩到隨州更老成江山為助筆縱横惇夫父恕為起居舍人坐教髙公繪為書忤太后意元祐元年正月謫知隨州惇夫侍焉老杜詩毫髪無遺恨波瀾獨老成唐書張説傳謫岳州而詩益悽惋人謂得江山助云老杜詩凌雲健筆意縱横眼看白璧埋黄壤何況人間父子情晉書庾亮傳將𦵏何充嘆曰埋玉樹于土中使人情何能已世説注王愆期謂陶侃曰賢子越騎酷沒天下為公痛心況慈父情耶漢書張禹傳曰不勝父子私情次韻秦少章晁適道贈答詩二子論文地陰風雪塞廬後漢書袁安傳雪積地洛陽令至袁安門無有行路退之詩藍田十月雪塞闗寧穿東郭履不遺子公書史記滑稽傳東郭先生貧困飢寒行雪中履有上無下足盡踐地莊子曰衣敝履穿漢書陳萬年傳子咸予陳湯書曰即䝉子公力得入帝城死不恨也士固難推挽時聞有詔除上句用鄭當時推轂士之意退之誌云無相知有氣力得位者推挽漢書谷永曰免不正之詔條劉禹錫詩金門通籍真多士黄紙除書毎日聞左傳襄十四年臧武仲見衛侯曰二子者或挽之或推之欲無入得乎又晉書鄧侯挽不來謝令推不去蓋參而用之負暄真計得獻御恐成疎列子曰宋有田父暨春東作自曝于日顧謂其妻曰負日之暄人莫知者以獻吾君将有重賞荘子曰于魚得計退之詩食芹雖云美獻御固巳癡次韻答秦少章乞酒朝事鞍馬早吏曹文墨拘文選鮑明逺詩曰日晏罷朝歸鞍馬塞衢路劉公幹詩曰職事相填委文墨紛消散漢書司馬相如傳曰豈特委瑣齷齪拘文牽俗終無尺寸補但于朋友疎漢書李廣傳曰終無尺寸功諸葛豐傳曰獨恐未有云補魯論曰朋友數斯疎矣此借用豈如簞瓢子臥起一牀書簞瓢見魯論漢書蘇武傳曰杖漢節牧羊臥起操持寒山子詩曰家中何所有惟見一牀書炙背道堯舜雪屋相與娛文選嵇康絶交書曰野人有快炙背而美芹子者欲獻之至尊注引列子曰宋有田父負日之暄云云孟子道性善言必稱堯舜步出城東門野鳥吟廢墟梁甫吟曰步出齊東門遥望蕩陰里里中有三墳纍纍正相似頗知富貴事勢窮心亦舒因見廢墟知富貴之不可常故雖處窮而其心休然也退之王承福傳曰吾操鏝以入于富貴之家有年矣有一至者焉又徃過之則為墟矣又曰雖勞無媿吾心安焉楚辭哀郢曰聊以舒吾憂心老杜詩坦然心神舒詩來獻窮狀水餅嚼氷蔬本傳曰晉文公使曹人獻狀南史何戢傳髙帝好水引餅戢毎設上焉斗酒得醉否枵腹如瓠壺漢書楊惲傳曰烹羊炰羔斗酒自勞老杜詩百年渾得醉莊子曰魏王大瓠之種非不呺然大也音義曰虚大曰呺瓠壺見前注亦可召西舎侯嬴非博徒史記魏公子無忌傳魏有隱士曰侯嬴年七十家貧為大梁夷門監者公子從車騎虚左自迎侯生又曰公子聞趙有處士毛公藏于博徒薛公藏于賣漿家公子乃聞步徃從此兩人游甚歡山谷内集詩注巻十
