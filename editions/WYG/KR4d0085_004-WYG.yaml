body:
  text: 山谷内集詩注巻四宋黄庭堅撰任淵注奉和文潛贈无咎篇末多見及以既見君子云胡不喜為韻山谷嘗冩答邢居實詩及此詩與徐師川曰後八詩頗得意者故漫録徃或與潘洪諸友讀之龜以靈故焦雉以文故翳老杜詩漆有用而割膏以明自煎此用其意周禮天龜曰靈屬左傳曰衛侯將如五氏卜過之龜焦爾雅素質五采皆備成章曰翬注云翬亦雉屬潘安仁射雉賦序曰習媒翳之事李善注曰醫者所隠以射者也本心如日月利欲食之既孟子曰此之謂失其本心寒山子詩吾心似秋月碧潭清皎潔退之送髙序曰利欲鬬進有得有喪春秋桓公四年襄公二十四年皆書日有食之既杜預注云既盡也劉原父請觀歐陽永叔五代史詩曰仲尼日月也薄食為之既論語曰君子之過也如日月之食焉東坡謂本心者道心也後生玩華藻照影終没世魯論曰後生可畏揚子曰今之學也非獨為之華藻也又從而繡其悦文選潘正叔詩云玩爾清藻味爾芳風博物志曰山雞有美毛自愛其色終日映水目眩則溺死漢書司馬遷書曰鄙沒世而文采不裘于後沒世字本出魯論安得八紘􅆯以道獵衆智文選張平子思𤣥賦曰結典籍而為罟兮敺儒墨以為禽此用其子曹子建與楊徳祖書曰吾王設天網以該之頓八紘以掩之楊子曰獵徳而得徳蓋學道者惡衆志之為害故欲獵而去之談經用燕説束棄諸儒傳此句指熙寜經學穿鑿之弊韓非子曰先王有郢書而後世多燕説又曰郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭已而過書舉燭舉燭非書意也燕相受書而説之曰舉燭者尚明也尚明者舉賢而用之燕相白王大説國以治治則治矣非書意也今世學者多此類退之詩春秋五傳束髙閣濫觴雖有罪末派瀰九縣言非特荆公之罪諸儒穿鑿遂至失其本原明皇孝經序曰濫觴于漢按家語曰夫江始出于岷山其源可以濫觴及其至江津不舫舟不避風不可以渉非惟下流多故耶退之詩東都漸瀰漫派别百川導後漢書光武賛曰九縣颷回三精霧塞張侯真理窟堅壁不與戰晉書劉惔傳簡文帝曰張憑勃窣為理窟漢書項羽傳漢王堅壁不與戰難以口舌爭水清石自見漢書張良傳曰此難以口舌爭也古樂府艷歌行曰夫壻從門來斜倚西北眄語卿且勿眄水清石自見野性友麋鹿君非我同羣潘岳關中記曰辛孟年七十與麋鹿同羣遊世謂之鹿仙唐人陸暢詩曰野性從來偏愛月劉孝標絶交論歡與麋鹿同羣文明近日月我亦不如君言張侯文采可以入侍易曰文明以止人文也漢書蕭曹賛曰依日月之末光蜀志龎綂傳曰陶冶世俗甄綜人物吾不及卿論帝王之祕䇿攬倚伏之要最吾似有一日之長此頗采其意十載長相望逝川水沄沄逝川見魯論退之詩浪波沄沄去松伯在髙岡何當談絶倒茗椀對爐薰樂府解題曰何當大刀頭破鏡飛上天晉書衛玠傳王澄每聞玠言輒歎息絶倒語曰衛玠談道平子絶倒韓孟聨句曰茗椀纎纎捧應劭漢官儀曰尚書郎入直女侍史二人執香爐燒薫以從北寺鎖齋房塵鑰時一啟晁張跫然來連璧照書几北寺謂汴京酺池寺山谷寓几研于此酺池見下注金縢曰啟鑰見書莊子曰夫逃虚空者雚柱乎鼪鼬之徑踉位其空聞人足音跫然而喜矣又況乎昆弟親戚之磬欬其側者乎晉史夏侯湛傳湛與湷岳同輿接茵時謂連璧庭柏鬱葱葱紅榴罅多子後漢光武紀曰氣佳哉鬱鬱葱葱蜀都賦曰榛栗罅發此借用其字北史魏収傳曰石榴房中多子時䝉吐佳句幽處萬􅄜起吐佳句見前注唐人常建詩竹徑通幽處莊子齊物論子游曰敢問天籟子綦曰夫吹萬不同而使其自巳也咸其自取怒者其誰耶老杜詩萬籟眞笙竽先皇元豐末極厭士淺聞實録呂公著傳曰時科舉專用王安石經義士無自得學而朝廷文詞之官漸艱其選神宗以答髙麗書不稱旨蓋嘗以為言又東坡答張文潛書亦日近見章子厚言先帝晚年甚患文字之陋欲稍變取士法特未暇爾漢書儒林傳序曰小吏淺聞弟能究宣只今舉秀孝天未喪斯文元祐元年四月詔執政大臣各舉文學政事行􅁩之臣可充館閣之選者三人于是畢仲游及晁補之張來等皆召試學士院晉書孔坦傳曰秀孝到不䇿試普加除署秀孝謂秀才孝廉也此借用魯論曰天之未喪斯文也晁張班馬首崔蔡不足云班馬謂遷固崔蔡謂瑗邕劉禹錫作柳子厚集序云韓退之曰雄深雅健似司馬子長崔蔡不足多也文選沈休文恩倖傳論曰西京許史蓋不足云當令横筆陣一戰静楚氛法書衛夫人有筆陣圖老杜詩筆陣獨掃千人軍左傳曰一戰而霸又曰楚氛甚惡張侯窘炊玊僦屋得空壚戰國䇿曰蘇秦之楚三日乃得見王曰楚國之食貴于玊薪貴于桂今使臣食玉炊桂漢書司馬相如傳注曰賣酒之處累土為壚以居酒器形如鍛壚據張文潛集有初到都下供職寄黄九詩曰僦舍酒家樓椎壚卷其旗鼠壤敗晨炊守翁噪羣児但見索酒即不見酒家胡此句以獻文潜老杜詩馬上誰家白面郎臨街下馬坐人牀不通姓字麤豪甚指㸃銀瓶索酒嘗玉臺新詠載辛延年羽林郎詩曰昔有霍家姝姓馮名子都依倚將軍勢謂笑酒家胡胡姬年十五春日獨當壚雖肥如瓠壺胷中殊不麤漢書張蒼傳曰身長太肥白如匏蜀志張裔傳雍假鬼敎曰張府君如瓠壺外雖澤而内實麤不足殺令縳與呉晉史王湛傳王濟曰臣叔殊不癡何用知如此文彩似於莬榖梁曰何用見其是齊侯也又後漢鄧晨傳光武曰何用知非僕耶漢書司馬遷傳曰鄙沒世而文彩不表于後左傳曰楚人謂虎於菟荆公六藝學妙處端不朽王安石字介甫元豐三年封荆國公初熙寧六年三月命知制誥呂恵卿修撰經義以安石提舉子雱同修撰八年所撰詩書周禮義成送國子監鏤板頒行之元豐二年八月安石又上改定誤字焉世説司馬太傅問謝車騎恵子五車何以無一言入𤣥謝曰當是妙處不傳左傳叔孫豹曰其次立言雖久而不廢此之謂不朽諸生用其短頗復鑿户牖世説曰周宏叔巧于用短杜方叔拙于用長此借用其字孔安國注魯論曰吾黨之小子于大道妄作穿鑿以成文章明皇孝經序曰希陞堂者必自户牖注云言穿鑿也譬如學捧心初不悟己醜莊子師金曰西施病心而矉其里其里之醜人見而美之歸亦捧心而臏其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之玊石恐俱焚公為區别不書曰火炎崑岡玉石俱焚魯論曰譬諸草木區以别矣吾友陳師道抱獨門掃軌陳師道字履常一字無已徐州人文行甚髙來京師樞宻章惇欲一見之而不可退之詩曰吾友柳子厚其人藝且賢淵明詩曰顧我抱茲獨僶俛四十年後漢書杜宻傳曰劉勝閉門掃軌無所干及晁張作薦書射雉用一矢昜旅之六五曰射雉一矢亡終以譽命王弼注曰射雉以一矢而復亡之明雖有雉終不可得矣此云用一矢言為國之有人材猶射雉之有矢也世説注引虞預晉書陸機薦戴淵于趙王倫曰葢聞繁弱登御然後髙墉之功顯孤竹在肆然後降神之欒成按易曰公用射隼于髙墉之上獲之無不利繁弱弓名也山谷蓋用此意但改射隼為射雉繁弱為一矢耳吾聞舉逸民故得天下喜魯論曰舉逸民天下之民歸心焉雲漢詩序天下喜于王化復行兩公陣堂堂此士可摩壘兩公謂晁張孫子曰勿擊堂堂之陣左傳曰致師者御靡旌摩壘而還注云摩近也老杜詩氣摩屈賈壘目短曹劉牆次韻答邢惇夫惇夫名居實邢恕和叔之子少能文諸公多稱之為山不能山過在一簣止魯論曰譬如為山未成一簣止吾止也注云簣土籠也渥洼騏驎兒墮地志千里漢書元鼎四年馬生渥洼水中韻書曰騏驎白馬黒脊傅休奕豫章行曰男兒當門户墮地自生神此借用東坡作王大年哀詞云驥墮地走虎生而班魏武帝歌曰老􅂹伏櫪志在千里岷江初濫觴入楚乃無底書禹貢曰岷山導江濫觴見前注列子曰渤海之東有大壑焉實惟無底之谷將陞聖人堂道固有廉陛魯論曰由也陞堂矣未入于室也漢書賈􅁩傳曰陛九級上廉遠地則堂髙意謂學者不當躐等而陞進道必以漸也邢惇夫好大畧小幼日便為塗遠之計山谷書其文巻論之詳矣邢子好少年如世有源水南史何妃傳曰楊郎好年少此借用孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是注云有原本也方求無津涯不作蛙井喜書曰若渉大水其無津涯莊子秋水篇公子牟曰子獨不聞夫埳井之蛙乎謂東海之鱉曰擅一壑之水而跨跱埳井之樂此亦至矣兒中兀老蒼趣造甚竒異退之詩田巴兀老蒼憐汝矜𤓰觜晉史向秀傳曰發明竒趣過閲王公門袖中有漫刺漢書鄒陽傳何王之門不可曳長􅅂後漢禰衡傳隂懐一刺既無所之適至于刺字漫滅别來阻河山望遠每障􅃑淵明詩情通萬里外形迹滯江山宋玊髙唐賦曰其少進也若姣姬掦􅃑障目而望所思斯文向千載有志常寡遂陶淵明詩曰道喪向千載魏文帝與呉質書曰徳璉才學足以著書美志不遂良可痛惜漢書武帝策董仲舒日羣生寡遂後生文楚楚照影若孔翠言玩末而忘本詩曰蜉蝣之羽衣裳楚楚照影見前注楚辭曰孔葢兮翠旌注云孔雀之羽為車葢不應太𤣥草晞價咸陽市漢著揚雄傳曰雄方草太𤣥有以自守泊如也史記呂不韋傳著呂氏春秋布咸陽市門懸千金其上有能増損一字者予千金雨作枕簞秋官閒省中睡夢不到漢東茗椀乃為􅑂柳子厚詩清泠集濃露枕簟凄巳知文選沈休文有學省愁卧詩此借用左傳漢東之國隨為大時和叔謫隨州惇夫侍焉左傳楚昭王有疾卜之曰河為祟聞君肺渴減頗復佳食寐讀書得新功來鴈寄一字東坡詩一哦肺渴減惇夫病肺嘔血山谷嘗有詩云肺熱今好否微凉生井桐樂府伊州歌曰征人去曰殷勤囑歸鴈來時早寄書老杜詩親朋無一字和邢惇夫秋懐十首殘暑已俶裝好風方來歸張平子思𤣥賦曰簡元辰而俶裝李善注云俶始也春秋閔公元年書季子來歸左傳曰嘉之也未能疎團扇且復製秋衣班婕妤怨歌行曰裁為合歡扇團團似明月常恐秋節至凉風奪炎熱棄捐篋筍中恩情中道絶豳詩曰七月流火九月授衣楚辭曰製芰荷以為衣髙蟬遽如許長吟送落暉後漢左慈傳老羝人語曰遽如許文選陸士衡擬古詩曰大耋嗟落暉相戒趣女功莎蟲能表微春秋攷異郵曰立秋促織鳴宋均曰趣織蟋蟀也立秋女功急故趣之豳詩曰五月斯螽動股六月莎雞振羽十月蟋蟀入我牀下箋云言此三物之如此者將寒有漸非啐來也檀弓曰季武子寢疾蟜固不説齊衰而入見曰斯道也將亡矣士唯公門説齊衰武子曰不亦善乎君子表微注云表猶明也此詩借用言莎蟲戒寒如履霜之辨早曩時髙唐客暮雨朝行雲宋玉髙唐賦曰先王嘗游髙唐夢見一婦人曰妾巫山之女也為髙唐之客聞君游髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙丘之咀旦為朝雲暮為行雨朝朝暮暮陽臺之下隂居懐天匹楚觀夢紛紜文選洛神賦曰雖潛處于太隂長寄心于君王李善注曰太隂衆神之所居賦又云歎匏瓜之無匹兮詠牽牛之獨處謝惠連詩雲漢有靈匹彌年闕相從髙唐賦曰楚襄王與宋玉遊于雲夢之臺又曰上至觀側地蓋底平本草人參條注藥性論云患人虛而多夢紛紜我欲覩光儀齋明炷爐薰選詩曰脉脉阻光儀禮中庸曰齋明盛服劇談録曰唐昌觀有女子折玉橤花騰空而去嚴休復有詩曰終日齋心禱玊宸魂銷眼冷未逢真天髙萬物肅誰為帝子魂文選張景陽雜詩曰龍蟄暄氣凝天髙萬物肅楚辭湘夫人曰帝子降兮北渚目𦕈𦕈兮愁予李善注髙唐賦引襄陽耆舊傳赤帝女曰姚姬未行而卒葬于巫山之陽山谷此詩意若思古人而不得見故託興于此七均師無聲五和常主淡唐志祖孝孫定律一宮二商三角四變徵五徵六羽七變宮其聲由濁至清為一均淮南子曰無音者聲之大宗也又曰無聲而五音鳴焉無味而五味和焉禮記王制曰五味異和和音胡卧反揚推解嘲曰大味必淡芸芸觀此歸一徳貫真濫老子曰夫物芸芸各歸其根又曰萬物並作吾以觀其復魯論曰一以貫之退之詩古聲久埋沒無由見真濫夢臨秋江水魚鰕避窺瞰明月本無心誰令作寒鑑言本無意于當世世人忌其照見之也如明月之鑑物豈其心哉退之鏡潬詩魚鰕不用避只是照蛟龍乂寄盧仝詩每騎屋山下窺瞰渾舍驚怕走折東東坡晚年詩亦曰明月本自明無心孰為境挂空如水鑑冩此山河影王度無畦畛包荒用馮河王度見前注漢書韓安國傳曰聖人以天下為度莊子曰彼且無町畦亦與之為無町畦又日汎汎乎其若四海之無窮其無所畛域退之詩丈夫終莫生畦畛易泰卦之九二包荒用馮河不遐遺朋亡得尚于中行注謂包舍荒穢受納馮河者也用心宏大無所遐棄故曰不遐遺也秦収鄭渠成晉得楚材多亦前詩人材包新舊之意漢書溝洫志韓聞秦之好興事欲罷之無令東伐使水工鄭國間説秦令鑿涇水以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠左傳聲子使于晉選如楚令尹子木與之語問晉大夫與楚孰賢對曰雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多用人當其物不但軸與薖莊子曰言而當物則終日言而盡道此借用考槃詩曰考槃在阿碩人之邁注云邁寛大貌一云飢意又曰考槃在陸碩人之軸注云軸進也一云病也六通而四闢玉燭四時和莊子曰六通四闢于帝王之徳此借用以言當如舜之闢四門廣致衆賢也玉燭見前注漢書劉向傳曰衆賢和于朝則萬物和于野相如用全趙留侯開有漢史記藺相如傳曰事趙惠文王留侯世家曰漢六年封張良為留侯名登太山重功略天下半史記藺相如傳太史公曰藺相如名重太山其處智勇可謂兼之矣留侯世家髙帝曰運籌帷幄中決勝千里外此子房功也呉都賦曰灌注乎天下之半此借用讓頗封韓彭事成羣疑泮相如傳曰相如為上卿位在亷頗之右廉頗宣言曰我見相如必辱之相如聞不肯與㑹每朝時常稱病不欲與亷頗爭列相如出望見亷頗引車避匿曰吾所以為此者以先國家之急而後私讎也留侯世家曰漢王問良吾欲捐關以東棄之誰可與共功者良曰黥布彭越此兩人可急使韓信可屬大事即欲捐之捐之此三人則楚可破卒破楚者此三人力也易曰遇雨之吉羣疑亡也北史儒林傳序曰積滯羣疑滇然冰釋詩曰迨冰未沣天道當曲全小智驁後患老子曰曲則全枉則直莊子曰小智間間又曰不忍一時之傷而驁萬世之患此詩與前篇皆救朋黨之漸慶州名父子忠勇横八區慶州謂范徳孺見前注漢書蕭育傳以育名父子著村能文選辨亡論曰忠勇伯世又左太沖詠史詩曰英名擅八區老杜詩直氣横乾坤許身如稷契初不學孫呉老杜詩許身一何愚自比稷與契晉書山濤傳不學孫呉而闇與之合荷戈去防秋面皺鬢欲疎荷戈見前注老杜寄董嘉榮詩曰聞道君牙帳防秋近赤霄楞嚴經波斯匿王曰迫于衰耄髮白面皺雖折千里衝豈若秉事樞折衝見前注退之南海廟碑詩曰胡不均宏俾執事樞范文正公篤于忠亮雖喜功名而不為朋黨早嵗排呂申公勇于立事其徒因之矯厲遇直公不喜也自睦州還朝出領西事恐申公不為之地無以成功乃為書自咎觧仇而去其後以參知政事安撫陜西申公既老居鄭相遇于塗文正身歴中書知事之難有悔過之語于是申公欣然相與語終日申公問何為函去朝廷文正言欲經略西事耳申公曰終制西事莫如在朝廷之為便文正㮙然事見蘇黄門龍川志知此然後知山谷之詩有味也謝公藴風流詩作鮑照語謝公當是師厚師厚名景初南陽人南史鮑照字明逺文辭贍逸甞為樂府文甚蓮麗絲蟲縈草紙筆力挾風雨言遺藁雖為蛛絲所縈而韓墨英特之氣終不可掩西京雜記淮南王著鴻烈自云字中皆挾風霜老杜詩筆落驚風雨萬里投諫書石交化豺虎世方用賢髦先成泉下土師厚為成都路提刑坐燕飲事為言者所攻熙寧五年遂以罪廢觀此詩語似有所因蘇秦傳曰此所謂棄仇讎而得石交者也班固如還書張耳陳餘述曰張陳之交游如父子據國爭權漢豺虎文選張孟陽七哀詩曰昔為萬乗君今為丘山土今日呂虢州堂堂古遺直虢州未詳左傳孔子曰叔向古之遺直也許國輸九死補天鍊五色晉書周札傳王𨗳議札與臣等便以身許國死而後巳文選曹子建表曰輸能于明君楚辭曰雖九死其猶未悔列子曰天地亦物也物有不足故昔者女媧鍊五色石以補其闕頗修諫員缺人夀無金石文還古詩曰人生非金石豈能長夀考西風壯夫淚多為程顥滴韓絳作明道程先生墓誌曰伯淳諱顥元豐八年六月卒自元豐以來論賢士大夫宜在天子左右者君必豫焉實録曰御史中丞呂公著薦顥授太子中允權監察御史裏行後謫監汝州酒税哲宗即位召為宗正丞未行疾卒顥深有經濟之意不幸早死士大夫識與不識莫不哀傷按實録顥與李常孫覺熙寧中嘗言青苗不便皆外任云吾友陳師道抱瑟不吹竽選之詩曰吾友柳子厚其人藝且賢又答陳商書曰齊王好竽有求仕于齊者據瑟而徃立王之門三年不得入客罵之曰王好竽而子鼓瑟瑟雖工如王不好何文章似揚馬欬唾落明珠謂揚雄司馬相如後漢趙壹歌曰勢家多所宜欬唾自成珠固窮有膽氣風壑嘯於莬固窮見前注退之送張道士詩曰臣有膽與氣不忍死茅茨老杜詩將軍膽氣雄歐陽公病署賦云隂壑慘慘多悲風秋來入詩律陶謝不枝梧老杜詩曰詩律羣公問儒門舊長史又曰陶謝不枝梧風騷共准激陶謂淵明謝謂靈運邢子卧北窻吟秋意少悰卧北窻見前注漢書庾陵厲王胥傳歌曰出人無悰為樂函注云悰亦樂也讀書用意苦嘔血驚乃翁老杜詩更覺隂何苦用心左傳曰伏弢嘔血漢書項籍傳髙祖曰必欲烹乃翁幸分我一杯􅃵安得和扁輩為浣學古胷醫和見左傳扁鵲見史記扁鵲傳曰上古俞跗湔浣腸胃滌洗五藏書曰學古入官肺熱今好否微凉生井桐鮑照詩時危各奔命終然肺肝熱老杜詩髙秋蘇肺氣魏明帝詩雙桐生空井謝公定和二范秋懐五首邀予同作西風一葉脱迹亦不可掃淮南子曰見一葉落而知嵗之將暮謝莊月賦曰洞庭始波木葉徵脱文選北山移文曰或飛柯以折輪乍低枝而掃迹此引用言秋葉之變哀不復可掃迹也巷有白馬生朝囘焚諫草後漢書張湛傳湛常乗白馬光武每見湛輒言白馬生且復諫矣老杜詩朝回日日典春衣又詩避人焚諫草騎馬欲雞栖唐書馬周焚章表曰管晏暴君之過取身後名吾不為也魏志陳羣傳注曰前後密陳得失毎上封事輒削其草袁子曰夫仁者愛人施于君謂之忠施于親謂之孝其本一也故君親有過諫而不入求之反覆不得已而言不忍宣也君子謂陳羣于是乎長者矣誰云事君難是亦父子間所要功補衮不言能犯顔意巳見前注語曰為君難為臣不易禮記儒行曰事君難進而易退補衮見前注禮記檀弓注無犯謂不犯顔而諫四㑹有黄令學古著勲多謂有功于此道也四㑹縣𨽻端州黄令名介字幾復山谷為作墓誌銘説命曰學于古訓乃有獲曹子建書曰豈徒以翰墨為勲績此反其意而申之風俗通曰蓋嚴楊惲勲著王室白頭對紅葉奈此搖落何宋玉九辯曰悲哉秋之為氣也蕭索兮草木搖落而變衰雖懐斵鼻巧有斧且無柯斵鼻見前注伐柯詩注曰柯斧柄也安得五十絃奏此寒士歌言其聲之悲也漢書郊祀志曰黄帝命素女鼓瑟帝悲不止故破五十絃為二十五絃莊子曰曽子居衛捉衿而肘見納屨而踵決曳履而歌商頌聲滿天地若出金石南史劉祥傳褚彦囘曰寒士不遜采蓮渉江湖采菊度林藪言用心之苦也古樂府詩曰江南可采蓮選詩曰渉江采芙蓉瀾明詩曰采菊東籬下班固典引曰餚核仁義之林藪插鬢不成妍誰憐飛蓬首言無知己也老杜佳人詩曰摘花不插髻采柏動盈掬選詩曰皎潔不成妍詩曰自伯之束首如飛蓬豈無膏沐誰適為容山谷受知于謝師厚從之學詩作此詩時師厚已死平生耦耕地風雨深稂莠耦耕字見魯論南史陶淵明傳夫耕于前妻鋤于後山谷前娶師厚之女先死矣詩云不稂不莠劉向封事稂莠與蓬蒿並興謝公遂如此永袖絶絃手王羲之帖云蔡公遂委篤晉書王廙字世將廙卒明帝曰世將復至于此退之祭子厚文曰大匠旁觀縮手䄂間呂氏春秋曰鍾期死伯牙遂絶絃以世無知音徃日孫陽翟才可任遺補張方回家本有山谷自注云孫賁字公素陽翟縣屬許州唐書百官志武后置左右補闕拾遺掌供奉諷諫温造傳舒元襃曰遺補雖卑侍臣也擊强如摧枯食檗不知苦後漢龐參傳曰拔薤欲吾擊强宗漢書異姓侯王表曰摧枯朽者昜為力樂天詩三年為刺史飲冰復食檗屬者缺諫垣時論或未許漢書李尋傳曰屬者頗有變改注云屬者謂近時也音之欲反舊唐書元稹傳既居諫垣不欲碌碌自滯退之㑹合聨句曰君才誠倜儻時論方􅍅溶儻可假一邦使民作鄒魯一邦見魯論祕閣法帖有李斯篆日使父子為鄒魯按脩水集有山谷跋孫陽翟公素十詩云世笑予詩論公素不實曰公素能擊强則請聞命至于使民作鄒魯則不知也予告之曰公素之擊强亦以其害善良奪長吏之柄耶將不及問皁白并擊無罪爾然則以今之偷一切以規自免萬事決于老吏之口者為能使斯民作鄒魯耶用智常恨耄用決常恨早用人要當及其壯時元祐之用諸老熙寧之用新進皆不免有遺恨也左傳劉子曰諺所謂老將知而耄及之者其趙孟之謂乎十二國史曰齊子竒年十八齊君任為東阿既行矣而君悔焉使人追之使者不追還曰臣見子竒所與同載者白首矣夫老者之智少者之決此必能理東阿推轂天下士誠心要傾倒漢書鄭當時傳曰其推轂士及官屬丞史誠有味其言也世説庾公謂孫興公曰衛永風韻雖不及卿諸人傾倒處亦不近海宇日清明廟堂勤洒掃書曰永濟四海詩曰㑹朝清明又曰子有廷内弗洒弗埽此借用語曰洒掃進退抑末也何為陳師道白髮三徑草陳師道已見前注􅄞康髙士傳曰蔣元卿還杜陵荆棘塞門舍中有三徑不出按三輔決録蔣詡字元卿送謝公定作竟陵主簿竟陵縣𨽻後州謝公文章如虎豹至今斑斑在兒孫謝公謂師厚公定蓋其子也東坡作王大年哀詞曰驥墮地走虎生而斑視其父子以攷我言文選七命曰拉虎摧斑李善注云斑虎文也上林賦日被斑文老杜詩終老無兒孫竟陵主簿極多聞萬事不理專討論多聞見魯論後漢書胡廣傳萬事不理問伯始魯論曰世叔討論之此借用以言專意學問澗松無心古鬚鬛天球不琢中粹溫文選張景陽詩鬰鬰澗底松酉陽雜俎曰松言五粒者粒當言鬛自有一種名鬛皮無鱗甲而結實多書曰天球河圖在東序禮記曰大圭不琢琢音篆刻也文選顔延年陶微士誄曰貞夷粹温落筆塵沙百馬奔劇談風霆九河翻老杜詩觀我落筆中書堂又詩塵沙立􅉂途又詩奔騰獻荔支百馬死山谷文選七發曰沌沌渾渾壯如奔馬漢書揚雄傳曰口吃不能劇談晉書郭象傳王衍每云聽象語如懸河漹水注而不竭退之詩淚如九河翻胷中恢疎無怨恩當官持廉庭不煩老子曰天網恢恢疎而不失此摘其字用之史記范雎傳一飯之徳必償睚眦之怨必報退之聽琴詩昵昵兒女語恩怨相爾汝左傳曰當官而行何強之有退之盧丞誌銘曰能持廉名漢書翟方進傳居官不煩苛吏民斯公亦可忍慎勿驚魚使水渾漢書曹參傳屬其後相曰以齊獄市為寄慎勿擾也淮南子曰使葉落者風搖之使水濁者魚撓之老杜詩汲多井水渾漢濱耆舊今誰存駟馬髙葢徒紛紛安知四海習鑿齒拄笏看度南山雲襄陽在漢上習鑿齒作襄陽耆舊傳云漢末甞有四郡守七都尉二卿兩侍中朱軒高葢㑹山下因名冠葢山里曰冠葢里漢書于公曰少高大門閭令容四馬高葢車老杜詩世上兒子徒紛紛晉書習鑿齒襄陽人為恒温主簿温曰徒三十年讀書不如一詣習主簿桑門釋道安與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒人謂佳對又王徽之傳以手板拄頰云西山朝來致有爽氣此借用奉答謝公静與榮子邕論狄元規孫少述詩長韻謝公遂如此宰木已三霜謝公謂謝師厚已見前注公羊傳曰若爾之年者宰上之木拱矣注云宰冢也老杜詩十暑岷山葛三霜楚户砧無人知句法秋月自澄江老杜詩佳句法如何山谷作黄氏二室墓誌云庭堅之詩卒從謝公得句法按謝朓詩云澄江静如練故用以屬師厚盧仝詩曰謝朓澄江今夜月也應憶着此山夫二子學邁俗窺杜見牖窻二子謂狄孫文選石李倫思歸引序曰余少有大志夸邁流俗元楨作杜子美墓銘曰李白尚不能厯其藩翰況堂與手魯論曰窺見室家之好舒元與悲剡藤文曰今九牧士人自言能見文章户牖者其數與麻多相多試斲郢人鼻未免傷手創言二子猶未及其妙手也斲鼻見前注退之祭子厚文曰不善為斲顔指汗顔老子曰代大匠斲者希不傷其手矣蟹胥與竹萌乃不美羊腔言二子尚有好竒之病如嗜異饌而棄常珍也周禮庖人共祭祀之好羞注曰謂若荆州之䱹魚青州之蟹胥按説文曰胥蟹醢也爾雅曰筍竹萌退之詩酒壺綴羊腔自往見謝公論詩得濠梁往謂往曰得濠梁言有所悟入也晉書王坦之傳謝安曰常謂君粗得鄙趣者猶未悟之濠上耶按莊子與恵子遊于濠梁之上莊子曰儵魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂恵子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰汝安知魚樂云者既巳知吾知之而問我我知之濠上也杜詩谷口舊相得濠梁同見招世方尊兩耳未敢築受降張平子東京賦曰客所謂未學膚受貴耳而賤目者也李善注引桓子新論曰世咸尊古卑今貴所聞賤所見漢書曰武帝遣公孫敖築塞外受降城又按唐書張仁愿築三受降城丹穴鳯凰羽風林虎豹章言文章有種性也蜀志秦宓曰虎生而文炳鳯生而五色豈以五采自飾畫哉山海經曰丹穴之山有鳥名鳯凰老杜詩風林纎月落易曰雲從龍風從虎小謝有家法聞此不聽氷後漢書儒林傳序曰各以家法教授不聽冰言其不疑也述征記曰河冰合須狐聽而行漢書文帝紀注曰狐之為獸其性多疑毎渡冰河且聴且渡故言疑者稱狐疑冰字韻與章字韻不協葢詩人旁用他韻如退之此日足可惜詩是也又按玉䑓新詠徐翰雜詩曰沈隂結愁憂愁憂為誰興念興君生別各在天一方良㑹未有期中心摧且傷不聊憂餐食慊慊常飢空端坐而無為髣髴君容光此詩興與方空皆不同韻蓋古詩多如此相思北風惡歸鴈落斜行言無因寄書也文選古詩客從逺方來遺我一書札上言長相思下言乆離别唐人王建詩就中一夜東風惡老杜詩落鴈浮寒水張祜詩萬人齊指處一鴈落寒空贈送張叔和塤字叔和洛中人張燾龍圖之後娶山谷季妹張侯温如鄒子律能令隂谷黍生春劉向别録曰燕有谷地爽而寒不生五穀鄒衍吹律而温至黍生今名黍谷有齊先君之季女十年擇對無可人山谷父名度字亞夫終于大理寺丞有四女嫁叔和者其季也采蘋詩有齊季女注云齊敬也左傳曰則猶有先君之適若而人後漢書梁鴻傳孟光擇對不嫁禮記孔子曰管仲遇盗取二人焉上以為公臣曰其所與遊避也可人也又見蜀費禕晉桓温傳箕帚掃公堂上塵家風孝友故相親漢髙帝紀吕公曰臣有息女願為箕帚妾後漢曹世叔妻傳遺令曰執箕帚于曹氏注云言主賤役事舅姑詩曰張仲孝友廟中時薦南澗蘋兒女衣袴得補紉召南采蘋序曰大夫妻能循法度也詩曰于以采蘋南澗之濵又曰于以奠之宗室牖下注云宗室大宗之廟也左傳曰蘋蘩蕰藻之菜可薦于鬼神禮記内則曰衣裳綻裂紉箴請補綴兩家俱為白頭計察公與人意甚真言以嵗寒相期漢書鄒陽傳有曰白頭如新傾盖如故老杜詩甚知文人真退之詩與人常不欵吏能束縛老姧手要使鰥寡無顰呻退之上李實書曰老姦宿贓消縮摧沮顰呻謂蹙額愁嘆退之韓宏碑曰察其顰呻但迴此光還照巳平生倦學皆日新世出世間本無二致能束縛老奸者竟是誰耶傳燈録雲居義能曰回光返照看身心是何物書曰徳日新我提養生之四印君家所有更贈君宗門補三印謂印空印水印泥山谷作雲峯悦禪師語録序云不受然燈記别自提三印正宗今曰四印亦猶此意謂忍黙平直也黄庭經曰子能守一萬事畢子自有之持勿失此云君家所有亦此意也先徳萬云是汝屋裏事百戰百勝不如一忍孫子曰百戰百勝非事之善者也晉書朱伺傳曰兩敵共對惟當忍之彼不能忍我能忍是以勝耳老蘇先生權書曰一忍可以支百勇書曰必有忍其乃有濟萬言萬當不如一黙史記龜䇿傳云十言十當十戰十勝傳十語九中不如一黙無可簡擇眼界平三祖信心銘曰至道無難惟嫌簡擇但莫憎愛洞然明白心經曰無眼界乃至無意識界圓覺經云譬如眼光照了前境其光圓滿得無憎愛不藏秋毫心地直秋毫見孟子楞嚴經曰十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無委曲諸相傳燈録十七祖偈曰心地本無生我肱三折得此醫自覺兩踵生光輝言渉世既乆始信此理自覺入道有漸也左傳曰三折肱為良醫華嚴經夜摩天宫偈賛品曰爾時世尊從兩足跌上放百千億光明李長者論曰十信足下輪中放光十住足指端放光此十行之中足跌上明次第隨位昇進一本踵作種或引乾峯示衆云法身有三作病二種光須是一一透得始觧稳坐殊失此詩本意文選范彦龍詩傳瑞生光輝莊子真人之息以踵東坡詩八部猶光輝團蒲日静鳥吟時爐薫一炷試觀之欲其清心以觀此四印之妙用團蒲見前注傳燈録宗永禪師頌曰南䑓静坐一爐香亘日凝然萬慮忘歐公詩宴坐忘言一炷香送顧子敦赴河東三首頭白書林二十年印章令領晉山川後漢儒林傳序曰孝和亦數幸東觀覧閲書林河東古晉地也紫參可掘宜包貢青鐡無多莫鑄錢本草云人参主補五藏安精神定魂魄生上黨山谷注云潞州太行山所出謂之紫團參按潞州即上黨屬河東又按河東大通監西冶嵗鍊青鐡十餘萬事見韓魏公家傳紫參按本草別載一條功用極少前注乃言人参故指為潞州所産又紫團參乃牧䝉之一名也勸課農桑誠有道折衝樽爼不臨邊後漢張堪為漁陽守勸農桑折衝樽爼見晏子春秋具前注文仲子曰折衝樽爼可也不必臨邊也要知使者功多少看取春郊處處田欲其務本業以厚民家在江東不繫懐愛民憂國有從來月叙汾沁催驛馬雪暗岢嵐傳酒杯左傳曰有自來矣水經曰汾水出太原汾陽縣北管涔山又曰沁水出上黨洹縣竭戾山按輿地廣記管涔山在今憲州沁水縣在今澤州漢書文帝紀詔太僕見馬遺財足餘皆給傳置注云傳置驛也退之詩翻翻走驛馬輿地廣記河東有岢嵐軍盖因岢嵐山水為名老杜詩舊日重陽日傳杯不放杯塞上金湯惟粟粒胷中水鏡是人材漢書食貨志晁錯言神農之教曰有石城十仞湯池百歩帯甲萬萬而亡粟弗能守也後漢書光武賛曰金湯失險杜牧之阿房宫賦曰釘頭磷磷多于在庾之粟粒水鏡見前注遥知便解青牛句一寸功名心巳灰言學道有得志懐于功名也老子曰功成名遂身退天之道按闗令内傳曰尹喜嘗登樓望東極有紫氣曰應有聖人過京邑果見老君乘青牛車來過張文潜感遇詩亦曰我師青牛書不爭忌處先灰心見莊子老杜詩丹心一寸灰攬轡都城風露秋行臺無妾䕶衣篝後漢范滂傳滂為清詔使登車攬轡慨然有澄清天下之志應劭漢官儀曰尚書郎入直臺中女侍史二人執香爐燒薫以從入臺中給使䕶衣服説文曰篝落也可薫衣北魏有竹臺尚書謂在外不在朝廷也虎頭妙墨能頻寄馬乳蒲萄不待求老杜詩何年顧虎頭滿壁畫滄洲按歐陽詢藝文類聚引世説顧愷之為虎頭將軍然今世説不載而歴代名畫説云愷之小字虎頭未知孰是晉書愷之傳云􅀹善丹青江文通别賦云淵雲之墨妙嚴樂之筆精退之蒲萄詩若欲滿盤堆馬乳莫辭添竹引龍鬚按本草蒲萄注蜀本圖經云子有似馬乳者白樂天云燕姬酌蒲萄謂太原出蒲萄酒也上黨地寒應强飲兩河民病要分憂上黨今潞州周禮考工記曰强飲强食兩河謂河東河北猶聞昔在軍興日一馬人間費十牛元豐四年陜西用兵河東困于征調故十耕牛之費僅給一戰馬淮南子曰殺罷牛可以贖良馬之死莫之為也殺牛必亡之數山谷畧采此意亦欲子孰愛惜民力山谷内集詩注巻四
