body:
  text: 山谷内集詩注巻八宋黄庭堅撰任淵注次韻王炳之惠玉版紙王侯鬚若縁坡竹哦詩清風起空谷王襃髯奴詞曰離離若緑坡之竹鬰鬰若春田之苖王立之詩話曰潘十云之得此詩大以為憾古田小紙惠我百信知溪翁能解玉古田𨽻福州晉書何曽傳人有小紙為書者敕記室勿報唐舒元輿悲剡藤文曰剡溪上多古藤溪中多紙工刀斧斬伐無時鳴碪千杵動秋山裹糧萬里來輦轂裹糧一作裹囊碪與砧同𢷬繒石也詩曰乃裹餱糧于槖于囊司馬遷書曰待罪輦轂下儒林丈人有蘇公相如子雲再生蜀晉書王沈傳裴秀為儒林丈人蘇公謂東坡漢書司馬相如揚雄皆蜀郡成都人往時翰墨頗横流此公歸來有邉幅南史庾肩吾傳曰文章横流一至于此李陽氷作李白集序曰盧黄門云陳拾遺横制頽波天下質文翕然一變左傳曰富如布帛之有幅後漢隗囂傳論曰坐飾邊幅小楷多傳樂毅論法書苑云右軍樂毅論智永以為正書第一梁世摹出天下珍之高詞欲奏雲門曲退之詩高詞嫓皇墳周禮大司樂注曰雲門黄帝之樂莊子曰黄帝張樂于洞庭之野其卒無尾其始無首變化齊一不主故常天機不張而五官皆備此之謂天樂不持去掃蘇公門乃令小人今拜辱漢書高五王傳魏勃常獨早掃齊相舎人門外舎人怪之勃曰欲以求見相君曲禮注云自外來而拜拜見也自内來而拜拜辱也去騷甚逺文氣卑畫虎不成書勢俗老杜詩縱使盧王操翰墨劣于漢魏近風騷魏文帝典論曰文以氣為主又曰孔融體氣高妙此反而用之後漢馬援傳曰畫虎不成反類于狗晉書衛恒傳為四體書勢退之石鼓歌曰羲之俗書趂姿媚董狐南史一筆無誤掌殺青司記録左傳太史書趙盾弑其君孔子曰董狐古之良史也書法不隠又崔杼弑莊公太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人南史氏聞太史盡死執簡以往聞既書矣乃還一筆無猶摭言載皇甫湜書所謂詩未有駱賓王一句也風俗通曰殺青作簡書之新竹有汗後皆蠧故作簡者于火上炙乾之山谷時為史官故云雖然此中有公議或辱五鼎榮半菽言史之所書富貴者或辱而貧賤者反榮漢書主父偃傳曰丈夫生不五鼎食死則五鼎烹耳注謂牛羊豕魚麋項羽傳曰卒食半菽願公進徳使見書不敢求公米千斛退之答元稹書曰足下年尚强嗣徳有繼將大書特書不一書而已也易曰君子以進徳修業文選張景陽詩君紳宜見書晉書陳夀謂丁儀丁廙子曰可覓千斛米當為尊公作佳傳謝王炳之惠石香鼎薫爐宜小寢鼎製琢晴嵐香潤雲生礎煙明虹貫巖江文通擬休上人詩曰膏爐絶沈燎李善注云爐熏爐也歐公詩曰孤煙起晴嵐淮南子曰山雲蒸柱礎潤傳燈録慧忠國師化去有白虹貫于巖壑吕温詩空巖起白虹法從空處起人向鼻頭參宗鏡録曰若離此真空之門無有一法建立楞嚴經香嚴童子言見諸比兵燒沈水香香氣寂然來入鼻中我觀此氣非水非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號又孫陁羅難陁言世尊教我觀鼻端白此借用一炷聽秋雨何時許對談維摩經曰今二大士文殊師利維摩詰共談必說妙法雪竇頌前三三話曰誰謂文殊是對談按傳燈録僧問法眼禪師云維摩與文殊對談何事次韻栁通叟寄王文通故人昔有凌雲賦何意陸沈黄綬間凌雲賦見前注後漢景丹傳曰何意二郡良為我來莊子則陽篇仲尼曰是陸沈者也注曰人中隠者譬無水而沈也漢書朱博傳注曰丞尉職卑皆黄綬云頭白眼花行作吏兒婚女嫁望還山老杜詩頭白眼暗坐有胝肉黄皮皺命如綫又詩眠花落井水底眠􅄞康絶交書曰一行作吏此事便廢後漢書向長字子平男女婚嫁畢遂恣意游五岳名山心猶未死杯中物春不能朱鏡裏顔上句言飲興未衰也淵明詩曰天運茍如此且進杯中物樂天詩白髪逐流落朱顔辭鏡去又云獨有病眼花春風吹不落此用其意寄語諸公肯湔祓割雞今得近鄉闗文選廣絶交論曰翦拂使其長鳴李善注云與湔祓同割雞字見魯論謂為令宰北史庾信傳常有鄉闗之思送張天覺得登字張侯起巴渝翼若垂天鵬古樂府有巴渝舞巴渝蜀地也天覺葢蜀人莊子曰鵬之背不知其㡬千里也怒而飛其翼若垂天之雲厯詆漢諸公霜風拂觚稜漢書伍被傳上疏厯詆公卿大臣霜風謂天覺熙寧中嘗為監察御史裏行崔篆御史箴曰簡上霜凝筆端風起西都賦曰設璧門之鳯闕上觚稜而棲金爵去國行萬里淡如雲水僧天覺自御史得罪監荆南商稅周易流演題曰雲水僧仁英撰又僧問鷲嶺如何是境中人師云大殿毗盧佛堂中雲水僧歸來頭亦白小試不盡能天覺除閒封推官議役法不合乞外任乃除河東路提刑史記孫武傳曰可以小試勒兵乎湖海尚豪氣有人議陳登魏志張邈傳曰陳登字元龍劉表與劉備共論天下人許汜曰陳元龍湖海之士豪氣不除持節三晉邦典刑寄哀矜三晉謂韓魏趙河東葢晉之故地書曰象以典刑注謂法用常刑魯論曰如得其情則哀矜而勿喜公家有閒日禪窟問香燈左傳曰公家之利知無不為法茟經經行禪窟因來敘行李斬寄老崖藤肇法師答劉遺民書曰君與法師當數有文集因來何少又曰冀行李數有承問舒元輿悲剡溪古藤文曰剡溪多古藤溪中多紙工刀斧斬伐無時次韻徐文將至國門見寄二首槐催舉子著花黄來食邯鄲道上梁秦中嵗時記云進士下第當年七月復獻新文求解故語曰槐花黄舉子忙邯鄲事見前注漢書文帝指視慎夫人新豐道曰此走邯鄲道也便欲掃牀懸麈尾正愁喘月似燈光上句謂拂榻以待共談故懸麈尾也世說滿奮畏風在晉武帝坐上有琉璃屏實密似踈奮有寒色帝笑奮答曰臣如吳牛見月而喘謂吳牛畏熱見月疑是日所以喘也老杜詩今夕復何夕共此燈燭光世說殷中軍為庾公長史下都王丞相自起解帳帶麈尾語殷曰身今自當與君共談析理既其清言遂達三更丞相歎曰正始之音正當爾耳山谷意謂欲與文將夜語恐其觸暑而來畏見燈光如見月而喘也千頭剖蚌明珠熟百尺垂絲鱠縷長歐陽公食雞頭詩云剖蚌得珠從海底千頭借用襄陽記李衡千頭甘橘事潘岳西征賦曰華魴躍鱗素鱮揚人縷切鸞刀若飛應刃落俎靃靃菲菲栁下石門君有此可能衝雪厭清凉意謂徐君何苦舎林泉之樂奔走于名利之途孟子曰不賢者雖有此不樂也此用其字博士王揚休碾密雲龍同事十三人飲之戲作矞雲蒼璧小盤龍貢包新様出元豐並見前第二巻謝送碾壑源揀芽注王郎坦腹飯牀東大官分物來婦翁晉書王羲之傳郄鑒使門生求女壻于王導導令就東廂徧觀子弟門生歸曰一人在東牀坦腹食獨若不聞鑒曰正此佳壻耶訪之乃羲之也遂妻之國史職官志翰林司掌供果實茶茗屬大官令棘圍深鎻武成宫談天進士雕虚空國朝試進士多在武成王廟熙豐間進士高談性命溺于虛無元祐初其習猶在史記荀卿傳曰騮衍之術迂大而閎辯騶奭文具難施故齊人頌曰談天衍雕龍爽佛氏婆娑論曰欲畫虛空令成五色只益自勞鳴鳩欲雨喚雌雄南嶺北嶺宫徴同言程文聲調一律也歐陽公詩曰天將雨鳩逐婦鳴中林鳩婦怒啼無好音午牕欲眠視濛濛喜君開包碾春風注湯官焙香出籠官焙即建溪北焙非君灌頂甘露椀㡬為談天乾舌本蓮經偈云世尊慧燈明我聞受記音心歡喜充滿如甘露見灌華嚴經頌云則䝉十方一切佛手以甘露灌其頂甘露及舌本並見前注晉書蔡謨傳謝尚曰卿讀爾雅不熟㡬為勤學死答黄冕仲索煎雙井并簡揚休冕仲名裳江夏無雙乃吾宗同舎頗似王安豐後漢黄香傳博學能文章京師號曰天下無雙江夏黄童老杜詩吾宗老孫子李邕詩亦云吾宗固神秀漢書直不疑傳曰其同舎有告歸晉書王戎封安豐侯善發談端賞其要㑹此引用以屬王揚休能澆茗椀湔祓我風袂欲挹浮丘翁湔祓見前注文選郭璞遊仙詩云左挹浮丘袖右拍洪崖肩李善注引列仙傳曰浮丘公接王子喬以上嵩高山吾宗落筆賞幽事秋月下照澄江空落筆見前注老杜詩幽事頗相闗又云幽事亦可悅秋月澄江言詩之清絶如此家山鷹爪是小草敢與好賜雲龍同山谷家于雙井歐陽公雙井茶詩云西江水清江石老石上生茶如鳯爪此云鷹爪亦其比也小草見前注周禮天官玉府曰凡王之好賜共其貨賄注謂有所善則賜予之不嫌水厄幸來辱寒泉湯鼎聽松風夜堂朱墨小燈籠伽藍記曰王䝉好茶人至輒飲之士大夫甚以為苦每欲候濛必云今日有水厄東坡試院煎茶詩蟹眼已過魚眼生颼颼欲作松風鳴北史蘇綽傳始制文案程式朱出墨入之法此借用南史宋武帝紀壁上掛葛燈籠惜無纖纖來捧椀惟倚新詩可傳本韓孟聯句云茗椀纖纎捧再答冕仲丘壑詩書雖數窮田園芋栗頗時豐老子曰多言數窮此借用老杜詩錦里先生烏角巾園收芋栗不全貧小桃源口雨繁紅春溪蒲稗没鳧翁小桃源在雙井山谷所居之地李賀詩曰桃花亂落如紅雨選詩云蒲稗相因依史游急就章云春草雞翹鳬翁濯顔師古注曰鳧者水中之鳥翁頸上毛也東坡詩新苗未没鶴投身世網夢歸去摘山皷聲雷隱空選詩曰世􅃠嬰我身秋堂一笑共燈火與公草木臭味同左傳曰今譬于草木寡君在君君之臭味也安用茗澆壘塊胷他日過飯隨家風買魚貫栁雞著籠壘塊胷見前注漢書鮑宣傳曰俱過宣一飯去晉書夏侯湛傳潘岳作家風詩老杜詩稱家隨豐儉魚貫栁見前注更當力貧開酒椀走謁鄰翁稱子本力貧猶言力疾魏志曹爽傳注司馬宣王謂李勝曰今當與君别因欲自力設薄主人退之祭李使君文曰雖掾俸之酸寒要拔貧而為富世說江盧奴直喚人取酒自飲一椀老杜詩邊酒排金盌稱子本謂稱貸于鄰家以治具孟子曰又稱貸而益之漢書貨殖傳曰齎貨子錢家退之作栁子厚墓誌曰其俗以男女質錢約不時贖子本相侔則没為奴婢戲答陳元輿寳録元祐二年八月陳軒為主客郎中軒字元輿平生所聞陳汀州蝗不入境年屢豐漢書高帝紀曰平生所聞劉季竒怪當貴後漢魯恭公沙穆皆蝗蟲避境周頌桓詩曰屢豐年東門拜書始識靣鬢髪幸未成老翁退之送石洪序曰拜受書禮于門内此借用當是拜誥于東上閤門魏文帝與吳質書曰志意何時復類昔曰巳成老翁但未白頭耳官饔同盤厭腥膩茶甌破睡秋堂空周禮天官外饔掌賓客飱饔之事自言不復娥眉夢枯淡頗與小人同詩曰螓首蛾眉退之詩旅宿夢婉娩藥山云一切處放教枯淡去但憂迎笑花枝紅夜牕冷雨打斜風秋衣沈水換薰籠太白詩妾似井底花開花向君笑樂天詩蕭蕭暗雨打牕聲顔師古注急就章曰篝一名笿亦以為薰籠銀屏宛轉復宛轉意根難拔如薤本樂天長恨歌曰珠箔銀屏迤邐開釋氏有六根之說意根其一也後漢龎參傳曰拔大本薤者欲吾擊强宗也再答元輿君不能入身帝城結子公又不能擊强有如諸葛豐漢書陳咸傳與陳湯書曰幸䝉子公力得入帝城死不恨擊强見前注諸葛豐傳為司𨽻校尉刺舉無所避法當顦顇百僚底五十天涯一秃翁晉書石勒載記勒甞聞酈食其勸立六國後大驚曰此法當失何得遂成天下老杜詩冠葢滿京華斯人獨顦顇百僚底見前注漢書灌夫傳與長孺共一秃翁注謂無官立版授問君何自今為郎便殿作賦聲摩空漢書馮唐傳文帝曰父老何自為郎李賀高軒過曰殿前作賦聲摩空偶然樽酒相勞苦牛鐸調與黄鍾同漢書張敖傳曰勞苦如平生歡晉書荀朂傳及掌樂乃曰得趙之牛鐸則諧矣北史長孫紹逺傳曰聞浮屠上鐸鳴雅合黄鍾牛鐸山谷以自况黄鍾以比元輿謂貴賤雖異調韻刖同安得朱轓各憑熊江南樓閣白蘋風勸歸啼鳥曉牕籠朱轓見前注後漢輿服志曰公列侯安車朱斑輪倚鹿較伏熊式栁惲詩汀洲採白蘋曰落江南春宋玉風賦風起于青蘋之末古樂府前溪歌曰當曙與未曙白鳥啼牕前男兒邂逅功補衮鳥倦歸巢葉歸本意謂功名之㑹時來則偶為之初不必經意至于稅駕之地則不可不早計也詩曰邂逅相遇適我願兮陶淵明歸去來辭曰鳥倦飛而知還韓詩外傳曰詩云代馬依北風飛鳥棲故巢皆不忘本之謂也文選鮑明逺詩别葉早辭風李善注引翼氏風角曰木落歸本水流向東次韻冕仲考進士試巻少年迷翰墨無異蟲蠧木智度論云佛言善說無失無過佛語諸外道中設有好語如蟲蝕木偶然成文諸生程藝文承詔當品目文選韋宏嗣博奕論曰設程試之科李善注引說文曰程品也前漢書有藝文志文選沈休文恩倖傳論曰品目少多隨事俯仰牀敷設箱篚賦納忽數束牀敷見前注書曰敷納以言左氏僖二十七年傳作賦納以言注云賦猶取也退之詩止攜一東書變名混甲乙謄冩失句讀謂糊名謄録莫知某甲某乙也史記任少卿曰某子甲何為不來乎漢書藝文志曰俗師失其讀公羊序亦曰失其句讀書牕過白駒夜几跋紅燭莊子曰人生天地之間如白駒之過郤忽然而已郤亦作隙曲禮曰燭不見跋劉禹錫詩最宜紅燭下鉤深思嘉魚攻璞願良玉易曰鉤深致逺詩曰南有嘉魚又曰他山之石可以攻玉漢書董仲舒傳曰良玉不琢談天用一律呻訊厭重複一作佔畢厭重複談天見前注退之樊宗師銘曰由漢迄今用一律學記曰今之教者呻其佔畢多其訊注謂今之師自不曉經之義伹吟其所視簡之文多其難問也絲布澀難縫快意忽破竹樂府緑珠懊憹歌曰絲布澀難縫令儂十指穿史記李斯傳快意當前適觀而已矣晉書杜預傳曰譬如破竹數節之後皆迎刃而解聖言禆曲學割衮綴邪幅漢書轅固傳曰無曲學以阿世菜菽詩曰赤芾在股邪幅在下南史陸厥傳沈約曰以洛神比陳思他賦有似異手之作士衡雖云煥若縟錦寧有濯色江波其中復有一片是衛文之服此句用有意注金無全巧竊發或中鵠莊子曰以金注者昏考工記梓人注曰鵠所射也以皮為之射義曰射者各射已之鵠射中則得為諸侯翟公辟廱老薪槱茂棫樸棫樸詩序曰棫樸文王能官人也詩曰芃芃棫樸薪之槱之注謂山林茂盛萬民得而薪之賢人衆多國家得用蕃興御史威降霜行私不容粟崔御史箴曰簡上霜嚴筆端風起漢書孫寳謂侯文曰今鷹隼始撃以成嚴霜之威吏部提英鑒片善䝉采録唐書高季輔為吏部侍郎帝賜金背鏡一以况其清鑒退之進學解曰占小善者率以録博士刹其楚銓量頗三復漢廣詩言刹其楚注謂以喻取女之尤高潔者三復見魯論因人享成事賤子真碌碌史記平原君傳毛遂曰公等碌碌所謂因人成事者也漢書樓䕶傳王邑稱賤子上夀王聖美三子補中廣文生聖美名子韻王家人物從來逺今見諸孫總好賢王氏最盛于江左三級定知魚尾進一鳴已作鴈行連三秦紀河津一名龍門兩傍有山水陸不通江海大魚薄集龍門下上則為龍不得上㸃額暴腮雪竇頌三級浪高魚化龍癡人猶戽野塘水魏志鄧艾傳將士魚貫而進北里志名妓菜兒呼趙光逺為一鳴先輩按史記滑稽傳齊威王曰此鳥不飛一飛冲天此鳥不鳴一鳴驚人禮記曰兄弟之齒鴈行愧無藻鑑能推轂願巻囊書當贈錢老杜詩持衡留藻鑑按晉太康制云鑑銓衡漢書鄭當時傳曰其推轂士誠有味其言也歸去雄誇向兒姪舎中犢子賸狂顛老杜詩憶年十五心尚孩健如黄犢走復來晉書石季龍載記少時數彈人石勒將白母王殺之王曰快牛為犢子時多能破車汝當小忍之青箱雜記張師錫老兒詩曰長思當弱冠悔不賸狂顛次韻游景叔聞洮河捷報寄諸將四首景叔名師雄張舜民作种誼墓志云初王師拓土至枹罕始建州縣嘉勒氏餘種獨棟戬尚存退保青唐其首領果莊誘殺知河州景思立棟戬遂復其國王師亦不復西神宗命李憲致果莊十餘年不能得竟以漢爵縻之嵗有廩賜元祐初果莊有窺覬故士之心與夏國隂相結連約分其地自引兵城洮州結屬羌為内應知岷州种誼刺得其情條具攻取十利聞于朝朝廷遣將作監丞游師雄就商利害師雄議與誼合帥臣劉舜卿不得已從之乃遣總管姚兕統熙河軍趨講朱城誼出哥龍峗敗賊于邦令谷追奔至洮州賊入城拒守晨霧蔽野誼親鼓之果莊坐佛寺拱手就執捷報至遣近侍奏告裕陵命以果莊檻車送京師鬼案嘉勒氏舊作唃氏陳戬舊作董氊果莊舊作章今並依續通鑑綱目校改千仞溪中石轉雷漢家萬騎𢷬虚回孫子曰如轉圓石于千仞之山者勢也吕氏春秋决積水于千仞之溪太白蜀道難曰崩崖轉石萬壑雷史記衛青傳曰去病將萬騎出隴西有功孫武傳孫矉曰批亢擣虚定知獻馬胡雛入看即稱觴都䕶來禮記曰獻車馬者執䇿綏晉書石勒載記王衍日向者胡雛吾觀其聲視有竒志後漢書班超傳上疏曰臣超竊冀西域平定陛下舉萬年之觴其後超為都䕶中原日月九夷知不用禽胡釁鼓旗書曰遂通道于九夷八蠻老杜詩勢成禽胡月左傳知罃曰二國治戎臣不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也更向天階舞干羽降書剰破一年遲果莊雖就禽其子孫部族猶足以陸梁于邊阿里庫及温溪心皆未臣順恐諸將狃勝徼功故欲以文徳來之也東坡奏議述其事甚詳書曰舞干羽于兩階七旬有苖格楚辭曰攀天階而下視樂天詩此中來較十年遲案阿里庫棟戬養子舊作阿里骨今依續通鑑綱目校改漢得洮州箭有神斬闗禽敵不逡巡後漢書耿恭傳以毒藥傅矢虜中矢者瘡皆沸大驚曰漢兵神真可畏也孫子曰小敵之堅大敵之禽也賈誼過秦論曰秦人開闗延敵九國之師逡巡而不敢進將軍快上屯田計要納降胡十萬人漢書趙充國傳為蒲類將軍先零反充國願馳至金城圖上方畧上屯田奏曰萬人留田順天時因地利以待可勝之勢此坐支解羌人之具也明年充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人請罷屯兵振旅而還後漢書皇甫規傳曰高可以滌患下可以納降遥知一炬絶河津生縛青宜不動塵張舜氏作游師雄墓誌云分兵為兩道姚兕將而左攻講朱城斷黄河飛橋青唐十萬之衆不得度种誼將而右破洮州禽果莊及大首領九人此詩所云青宜即果莊青宜縳也晉書王濬傳吳人以錢鎻絶江濬作火炬燒之融液斷絶船無所礙漢書曹參等傳皆有絶河津之語老杜詩黄門飛鞚不動塵付與山河印如斗忍為䑕子腹心人言果莊嘗受爵命乃與夏國相結有窺故士之意晉書周顗傳曰取金印如斗大繫肘吳志孫權傳注魏文帝詔曰此䑕子自知不能保爾許地也後漢書冦恂傳曰隗囂將高峻遣皇甫文出降恂斬之曰文峻之腹心殺之則峻亡其膽和游景叔月報三捷漢家飛將用廟謀復我匹夫匹婦讐漢書李廣傳匈奴號為飛將軍孟子曰湯居亳與葛為鄰葛伯仇餉為其殺是童子而征之四海之内皆曰非富天下也為匹夫匹婦復讎也真成折箠禽胡月不是黄榆牧馬秋折箠見前巻注賈誼過秦論曰胡人不敢南下而牧馬史記云秦郤匈奴樹榆為塞幄中已斷匈奴臂軍前可飲月氐頭漢書張良傳曰運籌帷幄之中西域贊曰通西域以斷匈奴右臂張騫傳匈奴破月氐王以其頭為飲器願見呼韓朝渭上諸將不用萬戸侯漢宣帝甘露二年呼韓單于來朝上登渭橋咸稱萬嵗李廣傳文帝曰令廣當高祖世萬户侯豈足道哉老杜詩願見北地傅介子老儒不用尚書郎次韻崔伯易席上所賦因以贈行二首别本云次韻潁守崔伯易席上贈别諸同舎迎新與送故渠已不勝勤别本云傾城迎五馬財力巳三勤漢書黄霸傳曰數易長吏送故迎新之弊及姦吏縁絶簿書盗財物所易新吏又未必賢三勤見縠梁謂民勤于力勤于財勤于食法言曰民有三勤此借用其字民賣腰間劔公寛柱後文漢書龔遂傳為勃海太守民有帶持刀劔者使賣劔買牛賣刀買犢曰何為帶牛佩犢又張敞傳弟武曰吏民彫敝且當以柱後恵文治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁諸郎投賜沐高㑹惜臨分别本云同僚欣賜沐張飲惜臨分漢書石奮傳曰長子建為郎中令少子慶為内史每五日洗沐歸謁親入子舍高㑹見前注謝承後漢書曰王奐為漢陽太守范丹于道侯别之奐曰可共到前亭宿息以叙分隔退之詩臨分不汝誑有路即歸田去國雖千里分憂即近君别本云看即追嚴助遝疑借㓂君能為天子分憂即與在朝廷無異老杜同元使君舂陵詩序曰當天子分憂之地劉禹錫詩受譴時方久分憂政未成老惜交情别追隨車馬勤老杜詩惜别到文場漢書鄭當時傳翟公曰一死一生乃見交情追隨見前注臨朝思共理治郡復斯文漢書成帝紀曰臨朝淵黙黄霸傳功名損于治郡時共理見前注斯文謂以儒雅飾吏訟息常休吏民貧更勸分漢書薛宣傳曰及曰至休吏左傳曰振􅅒勸分西湖十頃月自比漢封君歐陽公自揚遷潁有詩曰都將二十四橋月換得西湖十頃秋史記貨殖傳曰齊魯千畝桑麻渭川千畝竹此其人皆與千户侯等又曰今有無秩禄之奉爵邑之入而樂與之比者命曰素封漢書貨殖傳曰秦漢之列侯封君食租稅千戸之君則二十萬同子瞻和趙伯充團練金玉堂中寂寞人仙班時得共朝真言伯充宗室子居富貴而自處如寒素也老子曰金玉滿堂英之能守富貴而驕自遺其咎兩宫無事安磐石萬國歸心有老臣兩宫謂宣仁哲廟漢書竇嬰傳曰有如兩宫奭將軍老臣謂文吕諸公萬國歸心用孟子二大老意磐石見前注家釀可供開口笑侍兒工作捧心顰晉書何充傳劉惔云見次道飲令人欲傾家釀莊子盗跖曰其中開口而笑者一月之中不過四五日而已矣捧心顰見前注醉鄉乃是安身處付與升平作幸民醉鄉見前注左傳曰善人在上則國無幸民此借用樂天詠興詩序曰頽然自適葢河洛間一幸人也戲答趙伯充勸莫學書及為席子澤解嘲叔盎延賞平生飲酒不盡味五鼎餽肉如嚼蠟選詩賓飲不盡觴孟子曰繆公之于子思也亟問亟餽鼎肉子思不悅楞嚴經曰當横陳時味如嚼蠟我醉欲眠便遣客三年窺牆亦靣壁南史陶潛傳曰潛若先醉便語客云我醉欲眠卿可去宋玉登徒子好色賦曰此女登牆窺臣三年至今未許也傳燈録逹磨寓正嵩山少林寺靣壁而坐終日黙然此借用空餘小來翰墨場松煙兔潁傍明牕選詩粲粲翰墨場鮑照飛白書銘曰沾此瑶液染彼松煙兔頴見韓退之毛頴傳偶隨兒戲灑墨汁衆人許在崔杜行漢書周亞夫傳文帝曰鄉者霸上棘門如兒戲耳盧仝示添丁云忽來案上翻墨汁塗抹詩書如老鵶按王子年拾遺記曰浮提國獻神通善書二人出肘間金壺壺中有墨汁如淳漆灑地及石皆成篆頴科斗之字羅叔景趙元嗣者與張伯英並時見稱于西州而矜巧自與衆頗惑之故伯英自稱上比崔杜不足下方羅趙有餘崔謂崔瑗杜謂杜度晉書王羲之傳自稱我書比鍾繇當坑行比張芝草猶當鴈行也老杜詩沈鮑得同行晚學長沙小三昧幻出萬物真成狂國史補曰長沙僧懷素自言得草聖三昧傳燈録毗婆尸佛偈曰身從無相中受生猶如幻出諸形像龍蛇起陸雷破柱自喜竒觀繞繩牀隂符經曰地發殺機龍蛇起陸世說曰夏侯太初嘗倚柱讀書時暴雨霹靂破所倚柱衣服焦然神色不變讀書如故此並借用以言草書之變熊墨藪云蔡邕得用筆法大呌歡喜晉書劉毅傳嘗聚樗蒲擲雉大喜褰衣纔牀呌太白作懷素草書歌曰吾師醉後倚繩牀須臾掃盡數千行家人罵笑寧有道汚染黄素敗粉牆書斷曰張芝字伯英性好書凡家之衣帛皆書而後練北史盧同傳勲簿對奏案若相應者即于黄素楷書大字任華懷素草書歌曰粉壁摇晴光素屏凝曉霜待師揮灑兮不可忘誠不如南鄰席明府蛛網鎻硯蝸書梁席君葢京師醫者與山谷寓舎相鄰山谷書帖中所謂席三即其人也文選左太冲詩南鄰擊鐘磬漢書龔遂傳曰明府且止願有所白文選張景陽詩曰蜘蛛網四屋杜牧之詩蝸涎蠧畫梁老杜詩蟲書玉佩鮮懐中探丸起九死才術頗似漢太倉漢尹賞傳曰相與探丸為彈此借用楚辭曰雖九死其猶未悔史記扁鵲傳曰越人非能生死人也此自當生者越人能使之起爾太倉公淳于意受公乘陽慶禁方為人治病决死生多驗感君詩句喚夢覺邯鄲初未熟黄梁喚夢覺熟黄梁並見前注身如朝露無牢强翫此白駒過隙光漢書蘇武傳曰人生如朝露何久自苦如此維摩經曰是身如芭蕉中無有堅遺教經曰世實危脆無牢强者栁子厚書曰前過三十七年與瞬息無異後所得者其不足把翫亦巳審矣從此永明書百巻自公退食一爐香傳燈録杭州永明寺知覺禪師延夀著宗鏡録一百卷其序曰舉一心為宗照萬法如鏡編聯古製之深義撮畧寳藏之圓銓云云羔羊詩曰自公退食傳燈録守安禪師頌曰南臺靜坐一爐香亘日凝然萬慮忘謝景叔惠冬笋雍酥水梨三物玉人憐我長蔬食走送厨珍自不嘗晉書衛玠傳見者以為玉人老杜詩鳴鞭走送煩漁父又詩御厨絲絡送八珍此借用魯論曰不敢嘗秦牛肥膩酥勝雪漢苑甘泉梨得霜秦牛謂旄牛也見漢書西南夷傳三秦記曰漢武帝御宿園有大梨如五升瓶落地則破名含消梨老杜詩紅梨迥得霜氷底斵春生笋束豹文解籜饌寒玉退之詠笋詩看皮虎豹存選詩云初篁包緑籜樂天詩聲聲麗曲敲寒玉老杜詩分明饌玉恩左思吳都賦云矜其宴居則珠服玉饌見他桃李憶故園嚵獠應殘遶牕竹古今詩話唐人詩曰見他桃李樹思憶故園春山谷此詩舊本云惠文緑籜包一束園丁破凍取寒玉堅氷封節春未回不怕南風吹作竹葢用樂天食笋詩且食勿踟蹰南風吹作竹之意再答景叔女三為粲當獻王三珍同盤乃得嘗國語周語曰三女奔密康公公母曰必致之王夫粲美物也衆以美物歸女而何徳以堪之周禮曰獻賢能之書于王世說桓公曰同盤時尚不相助况復危難此借用其字薛能詩賴有詩情合得甞甘泉下澆藜莧腸今我詩句挾風霜並見前注小人食珍敢取足都城一萬炊白玉左傳曰願以小人之腹為君子之心屬饜而巳禮記曰庶人無故不食珍前漢食貨志曰錢金以鉅萬計皆取足大農退之答元稹書曰勤巳取足炊玉見前注賜錢千萬民猶饑雪後排簷凍銀竹實録元祐二年十二月乙酉以大雪寒出錢百萬令開封府賜貧民亦見蘇子由奏議大白詩白雨映寒山森森似銀竹次韻㡬復和答所寄海南海北夢不到會合乃非人力能退之送李正字序曰雖十年幸而集處得燕而舉一觴此天也非人力也孟子曰非人之所能為也地褊未堪長袖舞夜寒空對短檠燈漢書長沙定王傳注曰景帝後二年諸王來朝有詔史前稱夀歌舞定王但張褏小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋史記范雎傳贊曰長袖善舞退之有短檠歌言書生寒苦之狀也相看鬢髪時窺鏡曽共詩書更曲肱作箇生涯終未是故山松長到天藤言其未能歸隱文選謝靈運詩故山日巳逺寄上叔父夷仲三首少年有功翰墨林中嵗作吏㡬陸沉選詩寄詞翰墨林陸沉見前注庖丁解牛妙世故監市履狶知民心解牛言其游刃有餘地也見莊子晉書桓石秀傳謝安訪以世務嘿然不答或問之石秀曰世事此公所謂吾尚何言哉文選潘正叔迎大駕詩曰世故尚未夷莊子曰正獲之問于監市履狶也每下愈况注云狶大豕也監市之履豕以知其肥瘦者愈履其難肥之處愈知豕肥之要此借用言知民之肥脊也萬里書來兒女瘦十月山行氷雪深夢魂和月繞秦隴漢節落毛何處尋揚文公談苑載菩薩蠻詞有月和殘夢園之句漢書蘇武傳杖漢節牧羊卧起操持節旄盡落蔡琰胡笳曰生死不相知兮何處尋艱難聞道有歸音部曲霜行璧月沉漢書李廣傳曰無部曲行陳南史張貴妃傳璧月夜夜滿王春正月調玉燭使星萬里朝天心春秋書春王正月杜預注曰周王之正月也玉燭見前注後漢李郃傳和帝遣二使到益部投候館吏李郃舎郃問二君發京師時知朝廷二使耶問何以知之郃指星云前有二星向並州分野頗令山海藏國用乃見縣官恤民深漢書吳王濞贊曰擅山海之利韓詩外傳曰王者藏于天下按漢昭帝時賢良文學願罷鹽鐡無與民爭利桑𢎞羊以為家人有寳器尚猶柙而藏之况天地之山海乎文學曰人庶藏于家諸侯藏于國天子藏于海内是以王者不蓄下藏于人禮記曰冢宰制國用縣官謂天子見漢書霍光傳注經心隴蜀封疆守必有人材備訪尋晉書謝道韞傳嘗譏謝𤣥學殖不進曰為塵霧經心為天分有限耶又退之書曰前古之興亡未嘗不經于心史記天官書曰中國山川其維首在隴蜀闗寒塞雪欲嗣音燕鴈拂天河鯉沉老杜詩天寒闗塞深詩曰子寧不嗣音燕鴈用蘇武事見前注老杜詩長歌燕鴈燈前落東都賦曰旌旗拂天河鯉用文選古詩呼童烹鯉魚中有尺素書之意詩曰豈其食魚必河之鯉百書不如一見靣㡬日歸來兩慰心終上句之意漢書趙充國傳曰百聞不如一見世傳退之與大顛帖曰所示廣大深迥如此讀來一百遍不如親靣而對之詩曰以慰我心弓刀陌上望行色兒女燈前語夜深退之送鄭尚書序曰府帥必戎服左握刀右屬弓矢帕首袴鞾迎于郊古樂府有陌上桑莊子曰車馬有行色老杜詩厨人語夜闌退之詩悄悄深夜語更懷父子東歸得手種江頭栁十尋漢書疏廣傳謂兄子受曰豈如父子相隨出闗歸老故鄉晉書桓温傳見少時所種栁皆已十圍慨然曰木猶如此人何以堪沈懐逺南越志曰宋昌縣有棘竹長十尋山谷内集詩注巻八
