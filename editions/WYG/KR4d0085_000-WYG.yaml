body:
  text: 山谷集詩注别集類二宋提要臣等謹案山谷詩内集注二十巻外集注十七巻别集注二巻宋任淵史容史季温所注黄庭堅詩也任淵所注者内集史容所注者外集其别集注則容之孫季温所補内集一稱正集其又稱前集者葢内集編次成書在外集前故注家相承謂為前集外集詩起嘉祐六年辛丑庭堅時年十七而内集起元豐元年戊午庭堅時年三十四故外集諸詩轉在内集之前黄㽦所編庭堅年譜云山谷以史事待罪陳留偶自編退聴堂詩初無意盡去少作胡直孺少汲建炎初帥洪并類山谷詩文為豫章集命汝陽朱敦儒山房李彤編集而洪炎玉甫専其事遂以退聴為斷史容外集注序亦云山谷自言欲倣莊周分其詩文為内外篇意固有在非欲去此取彼也譜又云洪氏舊編以古風二篇為首今任淵注本亦云東坡報山谷書推重此二詩故置諸編首是淵所注内集即洪炎編次之本史季温外集注跋云細考出處嵗月别行詮次不復以舊集古律詩為拘再攷李彤外集跋云彤聞山谷自巴陵取道通城入黄龍山為清禪詩遍閲南昌集自有去取仍改定舊句彤後得本用以是正其言非予詩者五十餘篇彤亦嘗見于他人集中輒已除去又云前集内木之彬彬諸篇皆山谷晚年刪去其去取據此而已然季温跋稱其大父為増注考訂在嘉定戊辰後又近十年則上距庭堅之殁已百有十年而外集原本巻次至是始經史容更定則所謂外集者併非庭堅自刪之本矣然則是三集者皆賴注本以傳耳趙與峕賔退録嘗論淵注送舅氏野夫之宣城詩不得春網薦琴高出典然注本之善不在字句之細瑣在于攷核出處時事淵注内集容注外集其大綱皆系于目録每條之下使讀者攷其嵗月知其遭際因以推求作詩之本㫖此斷非數百年後以意編年者所能為外集有嘉平元年晉陵錢文子序而内集鄱陽許尹序世傳抄本皆佚之惟劉壎水雲村泯稿載其大略目録亦多殘缺此本獨有尹序全文且三集目録犂然皆具可與注相表裏尤足尚也淵字子淵蜀之新津人紹興元年乙丑以文藝類試有司第一仕至潼川憲其稱天社者新津山名也容字公儀號薌室居士青衣人仕至太中大夫其孫季温字子威舉進士寶祐中官秘書少監淵又嘗撰山谷精華録詩賦銘贊六巻雜文二巻自序謂節其要而注之然原本已佚今所傳者出明人偽託獨此注則昔人所謂獨為其難者與史氏二注本藝林寶傳無異辭焉乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀黄陳詩注原序六經所以載道而之後世而詩者止乎禮義道之所在也周詩三百五篇有其義而亡其辭者六篇而已大而天地日星之變小而蟲烏草木之化嚴而君臣父子别而夫婦男女順而兄弟羣而朋友喜不至瀆怨不至亂諫不至訐怒不至絶此詩之大畧也古者登歌清廟㑹盟諸候季子之所􅀚鄭人之所賦與夫士大夫交接之際未有舍此而能逹者孔子曰為此詩者其知道乎又曰不學詩無以言蓋詩之用於世如此周衰官失學廢大雅不作久矣由漢以来詩道浸微陵夷至於晉宋齊梁之間哇淫甚矣曹劉沈謝之詩非不工也如刻繒染縠可施之貴介公子而不可用之黎庶陶淵明韋蘇州之詩寂寞枯槁如叢蘭幽桂可宜於山林而不可置於朝廷之上李太白王摩詰之詩如亂雲敷空寒月照水雖千變萬化而及物之功亦少孟郊賈島之詩酸寒儉陋如蝦蠏蜆蛤一啖便了雖咀嚼終日而不能飽人惟杜少陵之詩出入古今衣被天下譪然有忠義之氣後之作者未有加焉宋興二百年文章之盛追還三代而以詩名世者豫章黄庭堅魯直其後學黄而不至者逅山陳師道無巳二公之詩皆本於老杜而不為者也其用事深密雜以儒佛虞初稗官之説雋永鴻寳之書牢籠漁獵取諸左右後生晩學此秘未覩者徃徃苦其難知三江任君子淵博極羣書尚友古人暇日遂以二家詩為之注解且為原本立意始末以曉學者非若世之箋訓但能標題出處而巳也既成以授僕欲以言冠其首予嘗患二家詩興其髙逺讀之有不可曉者得君之解玩味累日如夢而寤如醉而醒如痿人之獲起也豈不快哉雖然論畫者可以形似而捧心者難言聞絃者可以数知而至音者難説天下之理渉於形名度数者可傳也其出於形名度数之表者不可得而傳也昔后山答秦少章云僕之詩豫章之詩也然僕所聞於豫章願言其詳豫章不以語僕僕亦不能為足下道也嗚呼后山之言殆謂是耶今子淵既以所得於二公者筆之於書矣若乃精微要妙如古所謂味外者雖使黄陳復生不能以相授子淵尚得而言乎學者宜自得之可也子淵名淵嘗以文藝類試有司為四川第一蓋今日之國士天下士也鄱陽許尹序黄陳詩注欽定四庫全書山谷内集詩注原注年譜附近世所編豫章集詩凡七百餘篇大抵山谷入館後所作山谷嘗倣莊子分其詩文為内外篇此葢内篇也晚年精妙之極具於此矣然詮次不倫離合失當今以事繫年校其篇目各如本第其不可考者即從舊次或以類相從詩各有注離為二十巻云第一巻元豐元年戊午是嵗山谷在北京古詩二首上蘇子瞻東坡守徐州山谷教授北京初通書并以此二詩寄意東坡亦有報書及和章山谷書云今日竊食于魏㑹閣下開幕府在彭門又云作古風詩二章賦諸從者即此詩是也以東坡集攷之葢元豐元年魏即北京彭門即徐州建炎中山谷之甥洪炎玉父編其舅文集斷自退聽堂始退聽以前葢不復取獨取古風二篇冠詩之首且云以見魯直受知于蘇公有所自也今從之退聽堂在汴京酺池寺南山谷作館職時寓筆硯于此其贈俞清老詩跋曰書于酺池寺南退聽堂下然此堂名其後隨所在揭之醇道得蛤蜊復索舜泉舜泉已酌盡官醖不敢不敢送舜泉當是河北酒名外集有和王世弼求舜泉詩首句云寒虀簿飯留佳客蠧簡殘篇作近隣張淵方回家本置此詩于北京教授時與詩意正合自此詩至未入館前洪玉父皆不編入今豫章前集有之然亦不過數篇爾方回大父名塤山谷妹壻也元豐三年庚申是嵗山谷在京師葢罷北京教官後赴吏部得改官知吉州太和縣其秋自汴京歸江南和舊有寄李公擇詩序云元豐庚申嵗庭堅得邑太外集有曉放汴州詩云秋聲滿山河未云又持三十日去作江南夢次韻王穉川客舎二首彭山黄氏有山谷手冩此詩題云王谹穉川元豐初調官京師云云當是山谷北京解官後至京師所作後篇欵乃歌有長安城中花片飛葢春晚時也欵乃歌二章戯王穉川詠史呈徐仲車張方回家本置此篇于太和詩中仲車家于楚州當是山谷赴太和時舟行經途所作宿舊彭澤懐陶令彭澤城在江州亦經途所作以張方回家本編次山谷過南康軍祭劉凝之文云元豐三年庚申十二月辛酉其宿彭澤葢亦同時到官或在明年之春夏歟題山谷石牛洞舊本有寄李公澤詩序云庭堅得邑太和舅氏李公擇提㸃淮南西道刑獄自同安來相見于皖口風雨中留十日此詩葢自時所作同安皖城皆𨽻舒州石牛洞在舒之三祖山山谷寺魯直嘗游而樂之因自號山谷道人題灊峯閣灊山亦在舒州詩有梅蘂之語葢冬末所作次韻公擇舅李常字公擇元豐四年辛酉至六年癸亥山谷在太和凡三年至元豐癸亥移監徳州徳平鎮十山谷有大孤山詩刻云是嵗癸亥有二月余自太和移徳平贛上食蓮有感贛上即䖍州䖍與吉鄰郡江西外臺所在山谷或以白事至此秋思寄子由是時蘇黄門謫監筠州鹽酒稅筠吉皆在江西山谷嘗有與黄門書云得邑極南幸執事在旁郡又云有髙安行李必問動静髙安即筠州黄門名轍字子由贈别李次翁以張方回家本編次演雅本句云江南野水碧於天中有白鷗閒似我嘗是在太和所作山房李彤季敵云此篇山谷晚年刪去彤葢山谷伯舅之子戱和答禽語附前篇贈鄭交山谷在荆州為興上人書此詩跋云癸亥嵗余解官太和過武寜聞清上人當來延恩因謁鄭子通問消息題詩子通之壁草堂鄭交處士隠處也云云余家所蔵舊本如此老禪謂延恩長老法安安死于元豐八年山谷為之銘此詩葢六年所作元豐七年甲子是嵗山谷監徳州徳平鎮嘗有發願文葢七年三月過泗州僧伽㙮所作到官當在夏秋也平陰張澄居士隠處三詩張方回家本題云王郎求此詩王郎即世弼其詳具後篇此詩山谷晩年亦刪去留王郎山谷在德平有與徳州太守書云客宦不能以家來官舎蕭然如寄而此詩有河外吹沙塵江南水無津之句又云我隨簡書來顧影將一身葢言身在河北家在江南送王郎豫章集原次前篇今從之次韻劉景文登鄴王臺見思五首詩有平原秋𣗳色沙麓暮鐘聲之句平原即德州又云繫匏兩相憶極目十餘城葢鄴王臺在相州相與徳皆河北郡相去數驛次韻呉宣義三徑懐友以張方回家本編次送劉季展從軍鴈門二首題宛陵張待舉曲肱亭從豫章集舊次第二巻元豐八年乙丑春夏山谷在徳平按實録是嵗三月哲廟即位四月丁丑以秘書省校書郎召到京師時當六七月間寄裴仲謨山谷在徳平與徳州太守書云某官局勉以不瘝幸親老在都下善眠食兄弟無他而此詩有我家輦轂下薪桂炊白玉在官與影俱衣綻髪曲局天機行日月春事勤草木之句在徳平過春平乙丑年爾寄黄㡬復舊本于題下注云乙丑年徳平鎮作其詳具元祐二年和篇下注神宗皇帝挽詞三首據實録是嵗三月戊戌神宗升遐此詩及王文㳟挽詩皆因崩薨嵗月為次後多倣此自此以下詩皆入館後所作王文㳟公挽詞二首王珪字禹玊相神宗哲宗按實録元豐八年五月庚戌薨諡文㳟謝送碾壑源揀芽詩有橋山事嚴庀百局謂營奉神宗山陵又云右丞似是李元禮謂李清臣邦直據實録淸臣以元豐六年八月拜右丞至元祐元年閏二月方遷左丞以小龍團及半挺贈無咎并詩用前韻為戯從舊次晁補之字無咎和答外舅孫莘老舊本云莘老病起作詩寄同舎莘老名覺實録本傳云元豐八年哲廟即位自秘書少監除右諫議大夫故詩中有少監巖壑姿及寄聲舊僚屬尚憐費諫紙之語而首句則云西風挽不來當是秋初所作次韻定國聞子由卧病績溪蘇黄門欒城集有復病詩云病作日短至病消秋風初黄門時為歙州績溪令王定國名鞏次韻子由績溪病起被召寄王定國蘇黄門頴濱遺老傳云移知歙績溪始至而奉神宗遺制居半年除秘書省校書郎明年至京師除右司諫此詩今嵗秋冬間所作次韻李之純少監恵硯詩有我亦洗湔與清流當是初入館時之純名周送舅氏野夫之宣城二首李莘字野夫據實録元豐八年十二月屯田郎中李莘知宣州然此詩未必是時所作姑以除官之嵗月為次餘多倣此元祐元年丙寅是嵗山谷在館中據實録十月丙戌除神宗實録院檢討官集賢校理送范徳孺知慶州徳孺名純粹據實録元豐八年八月直龍圖閣京東運使范純粹知慶州此詩云春風旌旗擁萬夫當是今年春初方作此詩爾趙子湜家有山谷與晁堯民帖云范五詩至今未成比來㡬月四十日不曽道一句范五即徳孺題黄州墨蹟後題王仲弓兄弟巽亭右二篇並從舊次寄尉氏倉官王仲弓附前篇第三巻有恵江南帳中香者戱答六言二首子瞻繼和復答二首有聞帳中香以為熬蝎者戯用前韻二首右六詩答東坡篇中有喜公新赴朝叅之句是嵗東坡自登州至京師為禮部郎中而迎燕潤花皆春事謝公擇分賜茶三首外集有以潞公所恵揀芽送公擇詩即此韻而詩有國老元年密賜來及􅂸冼一春湯餅睡亦知清夜有蚊雷之句當是元年春末所作便糴王丞送碧香酒用子瞻韻戲贈鄭彦能以類相從附前篇子瞻詩葢守密州時所作今追用其韻送鄭彦能宣徳知福昌縣附前篇顯聖寺庭枸把從舊次次韻子瞻贈王定國東坡詩所謂謫仙竄夜郎子羙耕東屯即此韻以東坡集考之是嵗春晚所作次韻張詢齋中晩春從舊次次韻答晁無咨見贈用前篇韻次韻答張文潜恵寄文潜名来據實録是嵗十二月試太學録張耒為秘書省正字此詩葢夏初方到太學供減所作故詩有忽復燕哺兒及學省得佳士之句同錢志仲飯籍田錢孺文官舎從舊次次韻曽子開舎人遊籍田載荷花歸附前篇子開名肇送劉士彦赴福建轉運判官據實録元祐元年六月朝請郎劉士彦為福建路轉運判官此篇後亦刪去次韻韓川奉祠西太乙宫四首次韻王荆公題西太乙宫壁二首東坡集亦有此詩以東坡集考之當在是年秋有懐半山老人再次韻二首用前韻和答錢穆父詠猩猩毛筆戱詠猩猩毛筆二首右二篇欒城集有和章今略依倣以為次山谷此詩舊題云前篇奉錢穆父後篇奉子瞻是時二公皆作中書舎人又有一跋具詩注中東坡是嵗九月方遷翰林學士第四巻奉和文潜贈无咎篇末多見及以既見君子云胡不喜為韻據實録元祐二年四月乙巳徐州布衣陳師道充徐州州學教授觀此詩陳師道之篇以為逸民葢猶未得官也而詩又有紅榴罅多子之句宜以為元年秋所作也次韻答邢惇夫據實録元祐元年正月起居舎人邢恕權發遣隨州惇夫恕之子也侍親以行此詩有夢不到漢東之句漢東即隨州又云雨作枕簟秋葢元年秋也和邢惇夫秋懐十首詩有陳師道篇如前說謝公定和二范秋懐五首邀予同作詩有黄令謂黄㡬復也㡬復丁夘嵗方至吏部改官見二年詩此詩葢元年所作明矣詩亦有陳師道篇如前說送謝公定作竟陵主簿附前篇奉答謝公静與榮子邕論狄元規孫少述詩長韻公静名愔公定名悰皆師厚之子附前篇贈送張叔和原在送謝公定詩後送顧子敦赴河東三首子敦名臨據實録元祐元年七月秘書少監顧臨為河東轉運使此詩有攬轡都城風露秋行臺無妾䕶衣篝之句葢秋晚所作第五巻司馬文正公挽詞四首是嵗九月丙辰温公薨而葬以明年二月欒城集亦有此詩當是今冬所作次韻子瞻武昌西山子瞻詩句妙一世乃云效庭堅體葢退之戲效孟郊樊宗師之比以文滑稽耳恐後生不解故次韻道之東坡集送楊盂容詩即此韻次武昌西山之後栁閎展如子瞻甥也其才徳甚美有意于學故以桃李不言下自成蹊八字作詩贈之附前篇戱詠蠟梅二首京師初不以蠟梅為貴其得名自山谷始今寄此篇于元年之冬蠟梅附前篇蜀中舊本題下注云和王都尉當以為正詩有埋玉之句謂王詵晉卿尚蜀國公主時主已下世從張仲謀乞蠟梅附前篇賈天錫恵寳薰乞詩予以兵衛森畫㦸燕寢凝清香十字作詩報之附前篇山谷有此詩跋云余甚寳此香未嘗與人城西張仲謀為我作寒計恵送騏驥院通薪二百因以杳二十餅報之次韻張仲謀過酺池寺齋附前篇詩有夜談霜月冷之句第六巻元祐二年丁夘是嵗山谷在史局據實録正月辛未山谷為著作佐郎常父恵示丁夘雪十四韻謹同韻賦之詩云春皇賦上瑞是嵗春所作詠雪奉呈廣平公附前篇詩有連空春雪之句次韻宋􅅷宗僦居甘泉坊雪後書懐附前篇和答子瞻和子由常父憶館中故事以東坡欒城集為次又此詩云桃李春畫永雙井茶送子瞻和答子瞻子瞻以子夏丘明見戲聊復戲答省中烹茶懐子瞻用前韻右四篇當是今嵗春送新茶所作詩有翰林貽我東南句謂東坡先生據實録元年九月丁夘東坡遷翰林學士東坡集有次韻黄魯直赤日詩即此韻而元年十月山谷遷實録院檢討官今嵗又為著作故有願載軒轅訖鼎湖之句以雙井茶送孔常父常父答詩有煎㸃徑須煩緑珠之句復次韻戲答戲呈孔毅父右三篇皆用前韻第三篇有校書著作頻詔除之句葢山谷今嵗正月除著作佐郎謝黄從善司業寄恵山泉亦用前韻山谷晚年刪去次韻奉酬劉景文河上見寄原在酴醿詩前詩有煮春茗之句見諸人唱和酴醿詩輒次韻戲詠欒城集中有次孔文仲仲舎人酴醿即此韻此後有和曽子開扈從詩見外集以欒城詩考之葢四月一二日也次韻秦覯過陳無已書院觀鄙句之作無巳來京師寓居陳州門見於所作秋懐詩書院當作此地而此詩有牆陰老春之句陳留市隠附前篇此詩葢陳無已先作晁張和答秦覯五言予亦次韻次前篇過陳無巳書院之後劉晦叔許洮河緑石硯因後篇附見以團茶洮州緑石硯贈無咎文潜次和答秦覯篇按實録元祐元年十二月試太學録張耒試太學正晁補之並為祕書省正字而此詩有道山延閣之句葢今嵗所作謝王仲至恵洮州礪石黄玉印材因洮硯附見次韻文潜同遊王舎人園次前篇文潜詩有濃緑張夏帷之誥卧陶軒附前篇詩云城南晁正字次韻寄晁以道附前篇次以道韻寄范子夷子黙附前篇僧景宗相訪寄法王航禪師從舊次子韻子瞻送顧子敦河北都運二首以東坡詩為次據實録元祐二年四月癸巳給事中顧臨為河北路都轉運使慈孝寺餞子敦席上奉同孔經父八韻附前篇次韻張昌言給事喜雨以東坡欒城詩為次欒城詩云已收蠶麥無多日葢四月間昌言名問第七巻送李徳素歸舒城因後篇附見詠李伯時摹韓幹三馬次子由韻簡伯時兼寄李徳素東坡集有此詩在喜雨後伯時名公麟次韻子曕和子由觀韓幹馬因論伯時畫天馬次韻答王眘中從舊本子瞻去嵗春侍立邇英子由秋冬間相繼入侍作詩各述所懐予亦次韻四首東坡有此詩在韓幹馬俊再次韻四首次韻子曕題郭熙畫秋山以東坡詩為次東坡詩所謂玉堂畫掩春日閒即此韻在入侍邇英詩後題郭熙山水扇題恵崇畫扇題鄭防畫夾五首戲題小雀捕飛蟲畫扇題畫孔雀睡鴨小鴨題劉將軍鴈二首題劉將軍鵝題晁以道雪鴈圖右十詩並附前篇次韻子瞻題无咎所得與可竹二首粥字韻戲嘲无咎人字韻詠竹東坡集此詩在郭熙秋山後次韻文潜休沐不出二首從舊次奉同子瞻韻寄定國東坡玉堂獨坐懐王定國詩即此韻在題无咎竹後次韻王定國楊州見寄往嵗過廣陵值早春嘗作詩云春風十里珠簾捲髣髴三生杜牧之紅藥梢頭初繭栗揚州風物鬢成絲今春有自淮南來者道揚州事戲以前韻寄王定國二首右二詩附前篇次韻錢穆父贈松扇戲和文潜謝穆父松扇東坡和張耒松扇詩在懐王定國後謝鄭閎中恵髙麗畫扇二首附前篇第八巻次韻王炳之恵玉版紙附前篇謝王炳之恵石香鼎附前篇次韻栁通叟寄王文通通舊次送張天覺得登字東坡此詩在松扇後據實録元豐二年七月開封府推官張商英提㸃河東路刑獄商英字天覺次韻徐文將至國門見寄二首詩有槐催舉子著黄花之句葢是嵗秋試博士王揚休碾密雲龍同事十三人飲之戲作答黄冕仲索煎雙井并簡揚休再答冕仲戲答陳元輿再答元輿次韻冕仲考進士試巻右六篇皆武成宫試闈所作詩中自了然王聖美三子補中廣文生附前篇次韻游景叔聞洮河㨗報寄諸將四首據實録元祐二年八月禽西畨首領杲莊青宜結檻送闕下和游景叔月報三㨗與前詩同時作次韻崔伯易席上所賦因以贈行二首據實録元祐二年十月將作少監崔公度知頴州又按本傳公度字伯易髙郵軍人此詩十月後所作同子瞻和趙伯充團練從舊次戲答趙伯充勸莫學書及為席子澤解嘲附前篇謝景叔恵冬笋雍酥水梨三物再答景叔右二篇並以時序為次次韻㡬復和答所寄山谷舊跋此詩云丁夘嵗㡬復至吏部改官和予乙丑在徳平所寄詩也詩有夜寒同對短檠燈之句當是冬時所作寄上叔父夷仲三首夷仲名亷元祐初為都大提舉成都府路𣙜茶兼陜西路買馬張方回家本前一篇題云寄上叔父夷仲後二篇題云叔父夷仲入奏近寄此詩用前韻今以蜀中題名考之亷奉使在元祐元年八月而三年正月除右司郎中則入奏葢在二年之冬也此詩第一篇因後詩同見于此第九巻元祐三年戊辰是嵗山谷在史局其春東坡知貢舉山谷與李公麟等皆為其屬考試局與孫元忠博士竹間對牕夜聞元忠誦書聲調悲壯戲作竹枝歌三章和之觀伯時畫馬東坡集有和篇題云試院中作題伯時畫揩痒虎題伯時畫觀魚僧題伯時畫頓塵馬題伯時畫嚴子陵釣灘題伯時畫松下淵明右皆試院中作舊本畫觀魚僧題云子瞻畫枯木伯時作清江游魚有老僧映樹身觀魚而禪筆法甚妙予為名曰𤣥洗畏影圖并題數語而頓塵馬有亦思歸家洗袍袴之句為試院所作無疑揩痒虎子陵灘葢從其舊次出禮部試院王才元恵梅花三種皆妙絶戲答三首山谷有此詩跋甚詳具詩注中王立之承奉詩報梅花已落盡次韻戲答立之名直方即才元之子今附前篇乞姚花二首附前篇效王仲至少監詠姚花用其韻四首附前篇寄杜家父二首從舊次王才元舎人許牡丹求詩謝王舎人剪送狀元紅右二篇從舊次戲答陳季常寄黄州山中連理松枝二首山谷有太平與國寺谷室院題名云故人陳季常林下士也寓棊簟于此蘇子瞻范子功數來從之元祐三年六月丁亥書然此詩未必是時所作姑以物色附見次韻子曕送李廌李廌字方叔是嵗下第而歸東坡此詩在次韻黄魯直畫馬後次韻宋懋宗三月十四日到西池都人盛觀翰林公出遨翰林公謂東坡東坡有和宋肇遊西池即此韻在送李方叔詩後韓獻肅公挽詞三首韓絳字子華事神宗再為􅌠相據實録元祐三年三月薨諡獻肅東坡有韓康公挽詞在遊西池後康公即獻肅次韻子瞻以紅帶寄王宣義東坡有慶源宣義王丈求紅帶詩即此韻在康公挽詞後此後冇送髙士敦鈐轄詩見外集聽宋宗儒摘阮歌從舊次自門下後省歸卧酺池寺觀盧鴻草堂圖欒城集有此圖詩當同時所作據欒城集次于韓康公挽詞後題子瞻寺壁作小山枯木二首寺壁即酺池寺附前篇題子瞻枯木附前篇和子瞻戲書伯時畫好頭赤東坡集此詩在紅帶詩後詠伯時畫太初所獲大宛虎脊天馬圖詠伯時畫馮奉世所獲大宛象龍圖題竹石牧牛右三詩附前詩而天馬圖有嵗在執徐同之句葢戊辰嵗也題伯時天育驃騎圖二首附前篇姨母李夫人墨竹二首附前篇第十巻次韻答曹子方雜言曹輔字子方東坡有送曹輔赴閩漕詩在好頭赤詩後據實録元祐三年九月太僕寺丞曹輔權發遣福建路轉運判官山谷此詩葢輔未出使以前所作今寄于此次韻子瞻和王子立風雨敗書屋有感東坡此詩在送曹輔後嘲小徳東坡有和章次前篇戲答張秘監饋羊詩有留與兒童駕小車之句今附小徳詩後戲答王定國題門兩絶句東坡嘲小徳詩徳有和王定國㑹飲清虛堂詩時定國歸自揚州清人怨戲效徐庾慢體三首畧從舊次元在嘲小徳之後呈外舅孫莘老二首詩意喜莘老得歸據實録元祐三年九月御史中丞孫覺提舉醴泉觀本傳云以疾堅請外提舉舒州仙靈觀此詩九月以後所作今寄于此以天壇靈壽杖送莘老從舊次戲答俞清老道人寒夜三首趙彦清家有山谷跋此詩其末云東坡屢哦此詩以為妙也元祐四年歸自門下省書於酺池寺南退聽堂上此跋四年所書而詩則三年冬所作葢四年之冬東坡在杭州也秘書省冬夜宿直寄懐李徳素附前篇嵗寒知松柏此詩效進士體元有兩篇知字韻一篇見外集東坡所和乃知字韻在嘲小徳詩後東坡讀未見書被褐懐珠玉欵塞來享右三篇未必同時所作然皆效進士體以教兒侄今附見東坡雜記云元祐三年十二月二十八日上御延和殿奏范鎮新樂時西夏方遣使欵延州塞故進士作延和殿奏新樂賦欵塞來享詩云憶邢惇夫山谷跋惇夫集有國馬不及奉輿斃于皁櫪之語葢元祐三年十一月庚戊也此詩宜附見于此次韻秦少章晁適道贈答詩詩有陰風雪塞廬之句當是此年冬所作葢明年冬少章從東坡在杭州矣次韻答秦少章乞酒附前篇詩有水餅嚼冰蔬之句亦冬時作第十一巻元祐四年已巳至八年癸酉夏四年至六年夏皆在史局據實録元祐六年三月癸亥進神宗實録為起居舎人以中書舎人韓川有言詔行秘書省著作佐郎是嵗六月特封母夀康縣太君為安康郡太君乞以轉官思回授也山谷在京師多與東坡唱和四年夏東坡出知杭州遂無詩伴而山谷嘗苦眩冒多在史局又多侍母夫人醫藥至六年六月遂丁家艱故此數年之間作詩絶少頤軒詩及送秦少章從東坡于杭州范蜀公挽章皆四年詩之可攷者其他諸詩多不可攷又于前巻無可傳著姑寄寓于此以俟異時或遇其真也盡山谷有與王長原詩跋云相見于京師匆匆不得平生朋友之意長原告行㑹小人年來頭眩不能苦思因以廢詩輙以舊詩十許贈長原又有書老杜詩跋去老夫今年四十三不復能作詩他文亦懶下筆欲學詩觀老杜足矣又與俞清老曹茍龍書皆云某自云年月月已不作詩山谷生于乙酉至元祐四年巳巳四月有五矣陳無已作山谷母李夫人墓銘曰元祐六年卒于東都又以山谷與洪駒父書考之云六月十八日郡太棄背諸孤而洪玊父作退聽堂集序云辛未嵗試禮部寓舅氏僦舎後一年魯直丁母夫人憂辛未即元祐六年其云後一年誤矣山谷䕶喪抵家以明年正月八日具書帖中頤軒詩六首張方回家本有此詩序云元祐四年正月癸酉黄某序寺齋睡起二首後詩云桃李無言一再風葢春時作又有人言九十八為律之句是時東坡為臺諫所攻求出補外而山谷亦不容於時故云記夢附前篇同元明過洪福寺戲題略從舊次原在寺齋睡起詩後戲答晁深道乞消梅二首以梅餽晁深道戲贈二首右四篇以時序為次次韻孫子實題少章寄寂齋因後有送少章詩附見於此此篇後亦刪去次韻孫子實寄少游戲書秦少游壁贈秦少儀送少章從翰林蘇公餘杭右四詩畧從舊次據實録東坡出知杭州在四年而行以五月陳無已至南京見東坡從登後樓詩云五月池無水又送行詩云一雨五月涼題凈因壁二首六月十七日晝寢右三篇亦以時序為次北牕從舊次趙子充示竹夫人詩葢涼寢竹器憇臂休膝似非夫人之職予為名曰青奴並以小詩取之二首附前篇范蜀公挽詞二首東坡作蜀公墓誌銘云元祐三年閏十二月薨葬以四年八月此詩葢四年夏秋間所作宗室公壽挽詞二首出城送客過故人東平侯趙景珍墓黄頴州挽詞三首樂壽縣君挽詞二首右八篇附前詩叔父給事挽詞十首據實録元祐七年五月丙申給事中黄亷卒是時山谷持母喪僅一年而葬以明年九月父山谷有與洪駒父書云比經祥練又間給事叔之卒又山谷與宇文伯修書云九月之末方畢叔父給事葬事又云欲乞一宫觀時已免喪矣紹聖元年甲戊四月改元據實録元祐八年七月吕大防言神宗正史欲差前實録院檢討官黄庭堅祕書省正字秦觀充編修官從之山谷以疾辭乞宫觀至甲戌嵗授宣鄂兩郡皆未赴繼除宫祠據實録紹聖元年六月丁亥新知鄂州黄庭堅許管勾亳州明道宫於開封府界居住就近報國史院取㑹文事山谷遂寓家于太平州之蕪湖與其兄元明俱來陳留止東寺之净土院舟行時與東坡相遇於江上與黄門相遇於貴池城山谷跋東坡磨衲賛云紹聖元年五月甲子新宣叚守黄某書山谷與梁大夫書云伯氏越州司理相送至府畿伯氏即元明山谷有東坡真賛云紹聖之元吾見東坡於彭蠡之上其貎不爾其後山谷在荆州黄門與書云貴池相别於今八年寂住閣深明閣右二篇陳留凈土院作元注云陳留宿一􅑼堂因書為寂住閣第十二巻紹聖二年乙亥是嵗山谷謫黔州先是紹聖元年章惇為相蔡卞修國史七月山谷與范龍學祖禹趙尚書彦若於開封府界居住就近應報文字卞至史院以前史官直書王安石事欲中傷以詆誣神考之罪簽出千餘條以為皆無證據紹聖二年正月范公安置永州趙公澧州山谷黔州事且范公家傳據實録紹聖元年十二月甲午黄庭堅謫涪州别駕黔州安置而范公家傳乃云二年正月葢據受命時日也山谷既被命與其兄元明出尉氏許昌由漢沔趨江陵上䕫峽三月辛亥至下牢闗四月二十三日到黔州寓開元寺寺有摩圍閣山谷與張叔和書云下處在南寺摩圍閣又有怡偲堂當是山谷以知命同處為名按揚明叔草書跋尾云黔中怡偲堂丁丑二月晦竹枝詞二首夢李白誦竹枝詞三疊並黔南道中作前詩有跋語且云四月甲申葢十九日也和答元明黔明贈别山谷書萍鄉㕔壁曰元明送余安置於摩圍之下淹留數月不忍别而此詩有急雪驚風之語當是冬時所作紹興三年丙子是嵗山谷在黔南初山谷既未能以家來二年之秋其弟知命自蕪湖登舟擕一妾李慶一子㭒小字韓十及山谷之子相小名四徳小字四十并其所生母俱來知命中道生一女又與其從兄嗣直㑹於䕫州是嵗五月六日扺黔南山谷書云知命居士得三月二十八日書知慶兒以兔娠入䕫州巳回客吹俱無恙嗣直又適得相㑹何慰如之嗣直名叔向給事之子山谷五月書云初五日宿太浩初六日可來趁疊石早飯又云今日甚思汝輩同剥粽子也題驢瘦嶺馬舖知命行次巫山宋懋宗遣騎送折花厨醖知命次韻懋宗送别二首知命戲答劉文學知命外姪李光祖往見尚垂髫今觀寄嗣直小詩已可受因次韻知命上南陵坡知命題小猿呌驛知命馬上口號呈建始李令知命施建始屬州次浮塘驛見張施州小詩次其韻知命將次施州先寄張十九使君三首知命和張仲謀送别二首知命次韻答清江主簿趙彦成知命成清江即施州治所彦名肯堂嘉州人宋懋宗寄䕫州五十詩三首知命來右二十詩皆知命黔州時所作知命名叔達山谷之弟數詩附見集中殊有家法當由山谷潤色因以成其弟之名今不復刪去當蘇若蘭迴文錦詩圖原雜置知命詩中紹聖四年丁丑是嵗山谷在黔南其春知命往見嗣直于涪州生一子是為小牛秋冬間還黔具山谷與知命嗣直書次韻楊明叔四首再次韻楊皓字明叔眉之丹稜人官於黔南時在山谷遷謫後此詩葢黔中所作故有我巳魑魅禦之句黔中詩絶少姑附於今嵗謫居黔南十首右謫樂天詩原題云謫居黔南今附于此葢明年又遷于戎州云元符元年戊寅六月改元張是嵗春初山谷在黔南以避外兄向之嫌遷戎州據實録紹聖四年三月知宗正丞張向提舉夔州路常平十二月壬寅詔涪州别駕黔州安置黄庭堅移戎州安置以避使者親嫌故也山谷三月間離黔六月初扺戎州寓居南寺作槁木寮死灰菴其後僦居城南山谷有與楊明叔大字跋尾云紹聖五年二月哉生明涪翁將遷于􅈎道治州開元寺江曲之間􅈎道即戎州戎今為叙葢是嵗六月方改元故猶稱五年又有與王觀復書云沂流在道㡬三月又有瀘州木龍巖題名云紹聖五年五月晦改知到戎州在六月初贈黔南賈使君山谷初到黔南曹譜伯逹張兟茂宗為守貳待之頗厚今賈使君葢與曹伯達為代者未知此詩何時所作姑附于離黔之嵗山谷與張叔和書云某至黔州將一月矣曹守張倅相待如骨月又與楊明叔書云守倅皆京洛人好事尚文不易得也元符二年已夘是嵗山谷在戎州九月知命如成都至明年二月還戎州具山谷與知命書及答句卨宗書又與範長老書云知命顛倒饜足二月七日乃到戎州次韻雨絲雲鶴二首蜀中舊本此詩序云代史夫人和石信道信道名諒時作瀘州江安令史夫人蓋山谷外兄張祺子履之妻張祺介卿之嫂録莱賛所謂維女博士史君炎玉者也此詩蓋在戎州所作當是夫人與其子俱來乞子履墓銘時也雨絲雲鶴皆春景物宜見於今年春具山谷有答蘇大通書曰頃見外兄張子履家嫂道才徳之美又曰昨史嫂過􅈎道云云卯山谷作子履墓銘曰葬以元符已之四月又曰女夫人博學能文從斌老乞苦笋當是今嵗夏初所作元年夏初猶未至戎也此篇原在戎州詩中但詮次不倫爾山谷有苦筍賦云􅈎道苦筍冠冕兩川􅈎道即戎州次韻黄斌老所畫横竹次韻謝斌老送墨竹十二韻用前韻謝子舟為予作風雨竹再用前韻詠子舟所作竹戲詠子舟畫兩竹兩鸜鵒第十三巻次韻答黄斌老病起獨遊東園二首又和二首又答斌老病愈遣悶二首次韻黄斌老晩遊池亭二首右與黄斌老唱和詩並因苦筍篇附見當是同時所作池亭詩有黄菊拒霜殊未秋之句必今嵗所作明年秋晩山谷葢在青神矣戱答史應之三首應之名鑄眉人瀘戎間山谷有應之真賛曰江安石不足江陽酒有餘江安屬瀘州漢江陽縣地也題也足軒軒在簡州為師範道人作山谷有與範帖云知命欲往成都看藥市又云别作一篇竹軒頌似可觀已付密師去可種竹于六祖印用之是嵗範公自簡州受成都六祖之請云範在簡州時山谷有種竹頌云往在江南住竹山道人兩嵗三來訪云云故今云别作一篇寄題榮州祖元大師此君軒山谷有此詩跋云元符二年閏月初吉書贈榮州琴師祖元韻是嵗閏九月又有一篇亦此見於外集答李任道謝分豆粥詩有豆粥能驅晩瘴寒之句似是冬時所作元符三年庚辰是嵗山谷在戎州正月徽考即位五月復宣徳郎監鄂州在城鹽税山谷既得放還以江漲未能下峽七月自戎舟行省其姑于青神十月改奉議郎簽書寧國軍節度判官十一月自青神復還戎十二月發戎州過江安為石信道挽留遂作嵗於此山谷之姑張祉介卿之母介卿時為眉州青神尉以七月二十一日解舟八月十一日抵青神具興張介卿書今中岩多有八九月間題字又有十一月二十日與嘉州至樂山王子厚書云到家悲苦滿懐蓋知命歸江南死於荆州當是初聞其計時也嵗石諒信道本眉人家于江津女嫁山谷之子相是十二月成親其詳具建中靖國元年注并具與杜拙翁書贈知命弟離戎州姪柜隨知命舟行是嵗知命自戎歸江南山谷與範長老帖云知命留此兩月三月十三日觧舟去故其詩有燕子日長宜讀書之句知命竟死荆南見山谷祭文次韻奉答文少激推官紀贈二首因後篇附見少激名抗臨卭人時為戎州幕官予嘗見其家山谷諸詩真迹次韻文少激祈雨有感此詩真本云伏承少激恵示夏日祈雨有感之詩末句云爱民天子似仁宗時徽考初即位次韻李任道晩飲鎻江亭詩有西來雪浪如炰烹之句當是夏中所作再次韻兼簡屨中南玊三首次前篇次韻任道食荔支有感三首山谷有戎州鎻水磨崖留題云元符三年五月戊寅太守劉廣之率賔寮來賞鎻江荔支此詩當同時所作詩有六年怊悵之句葢自紹聖二年乙亥入蜀至元符三年庚辰凡六見荔支親山谷與姪樸書云初到戎彭道微作守甚有親之意道微既去劉溢崇儀作守云云廖致平送緑荔支為戎州第一王公權送荔支緑酒亦為戎州第一附前篇謝楊履道送銀茄四首以時序為次送石長卿太學秋補詩有漢文新覽天下圖謂徽考初立山谷有試張通筆帖云戎州城南僦舎中眉山石長卿觀書次韻少激甘露降太守居桃葉上當是秋時所作詩語皆及徽考新政借景亭八月在青神尉㕔作尉即張祉介卿也祉父誾雅州人娶山谷之姑卒官太常卿見于山谷所作張子履墓誌戲贈家安國從舊次次韻楊君全送酒次韻君全送春花謝楊景山送酒器君全名琳景山名嵒皆青神人山谷有中巖題字云元符三年九月已巳王元直擕酒帥楊君全景山酌張子謙介卿黄魯直于慈姥之東堂此詩葢是時所作故有秋入園林花老眼之句綵以及酒當是重陽所送春花言其象春時之花爾史彦昇送春花附楊君全送花後詩有千林搖落照秋空之句題石恪畫嘗醋翁舊次在借景亭後似是青神作謝應之即史應之也應之往嵗見山谷於谷嘗有詩戲之此篇當是應之自眉來青神再見山谷叙述往事故有去年席上蛟龍語未委先生記得無之句山谷在青神有無眉山程信孺帖云應之在館時接從容賔主相樂也是嵗來自眉山可知第十四巻走筆謝王朴居士拄杖王朴字子厚隠居嘉州至樂山此詩當是自青神回舟經途所作詩有六年流落放歸時之語戲答王居士送文石次前篇次韻楊明叔見餞十首序云予䝉㤙東歸明叔作十詩見餞據實録元符三年十一月癸亥朔黄庭堅知舒州州此詩有老作同安守之句同安即舒次韻石七三六言七首詩云老境五十六翁又云欲行水繞山圍葢元符三年將出蜀所作石七三當是石信道家兒建中靖國元年辛巳是嵗正月解舟江安三月至峽州改知舒州四月至荆南泊家沙市又召以為吏部員外郎病癰初愈辭免恩命乞知太平州留荆待命遂南踰冬焉山谷有瀘州中壩葛氏竹林留題云江南黄某自􅈎道恩恩放還元符元年十二月道出江安江安􅌠石諒信道以親親見留作嵗建中靖國元年正月丙寅置酒中壩葛氏之竹林萬州太守髙仲本宿約遊岑公洞而夜雨連明戱作二首萬州下巖二首又戲題下巖山谷有萬州西山磨崖題名載髙仲本置酒葢建中靖國元年二月辛酉戲題巫山縣用杜子美韻詩有江陵換裌衣之句江陵即荆南山谷度自巫山至此時已初夏矣和王觀復洪駒父謁陳無已長句王蕃字觀復沂公之裔官閬中時多以書尺至戎州從山谷問學至是自京師改官復入蜀㑹山谷于荆州時山谷病癱初愈陳無已元符三年冬為祕書省正字故此詩有集賢學士見一角之語答觀復簡云卧病二十餘日㡬死者數矣忽奉手誨歡喜如從天上落也以古銅壺送王觀復附前篇病起荆江亭即事十首詩有大聖天子初元年及西風吹涙古藤州之句乂是嵗七月東坡卒於常州而此詩猶未及之當是秋初所作鄒松滋寄苦竹泉橙麴蓮子湯三首松滋𨽻荆南詩有新牧千百秋蓮菂之句次韻答黄與迪次前韻謝與迪惠所作竹五幅右二篇從舊次第十五巻戲簡朱公武劉邦直田子平五首朱劉田皆荆南人詩有葵莧秋之語次韻益修四弟詩有霜晩菊未花之句以峽州酒遺益修復繼前韻附前篇謝益修四弟送石屏附前篇戲答王觀復酴醿菊二篇戲答王子予送凌風菊二首右四篇以時序為次子予名雩王獻可補之之次子也時僑寓荆州謝王子予送橄欖附前篇以椰子小冠送子予附前篇呈楊康國又戲呈康國二詩皆言黄柑未熟次韻馬荆州詩有朱糝菊英同送秋之句和中玉使君晩秋開天寧節道場徽考以十月十日降誕為天寧節開啓葢九月十日入窮巷謁李材叟翹叟兼簡田子平三首詩有紫冠黄細綑絲窠之句次韻答馬中玉三首詩有菊花過後早梅前之句次韻中玉早梅二首次韻中玉水仙花二首王充道送水仙花五十枝欣然㑹心為之作詠呉君送水仙花并二大本劉邦直送早梅水仙花四首右十詩多從舊次惟王充道送水仙花一首附見謝檀敦信送柑子附前篇贈李輔聖原在劉邦直詩後和髙仲本喜相見從舊次詩有雪滿荆州喜再逢之句戲詠煖足缾二首以詩序為次戲呈聞善二兄詩有草上堦除雪衮風之句次韻聞善謝有張羅門帶雪之句謝答聞善二兄九絶句戲呈聞善右十詩附前篇題子瞻畫竹石舊題云題全天粹所收云云全璧字天粹山谷在荆州時有與天粹帖又有字說云全璧長林人長林屬荆門軍此詩當附於荆州詩中戲贈米元章二首米芾字元章為發運司屬官在江淮間建中靖國之秋東坡北還嘗有手帖與之此詩似亦當時所作葢詩有滄江書畫船之句今附于荆州詩中第十六巻崇寧元年壬午是嵗春初在荆南既而經岳嶽路歸洪州分寧遂往袁州萍薌省其兄元明還至江州與其家相㑹六月赴太平州九日而罷管勾洪州玉隆觀九月至鄂州寓居踰年正月與蘇子由書云某三兩日即拏舟下巴陵出陸至雙井六日爾山谷與洪龜父書曰四十及新婦在荆南巳遣十六節推弟往取船來㑹江州矣七山谷與徐師川書曰老舅六月九日領太平事十日奉朝㫖送送吏部即日解船至江口九崇寜二年山谷有南樓詩寄方公悅題云某以去嵗月至鄂登南樓歎其制作之美云云次韻答髙子勉十首髙荷字子勉荆州人而此詩有春從細草回之句當是春初所作贈髙子勉四首附前篇再用前韻贈子勉四首附前篇詩有鳥語花中管絃之句春稍動矣荆南簽判向和卿困予六言見韻次韻奉酬四首附前篇蟻蝶圖從舊次謝胡藏之送栗鼠尾畫維摩二首從舊次次韻向和卿行松滋縣與鄒天錫夜語南極亭二首詩有提壺及思歸樂之句當在二月間以上詩皆未離荆南所作戲答荆州王充道烹茶四首往分寧時經日長之句雨中登岳陽樓望君山二首往分寜時經途岳州所作自巴陵畧平江臨湘入通城無日不雨至黄龍奉謁清禪師繼而晚晴邂逅禪客戴道純欵語作長句呈道純巴陵平江臨湘皆屬岳州通城屬鄂州黄龍山在洪州武寧李彤季敵書豫章集後云先生自巴陵取道通城入黄龍山為清禪師遍閱南昌集自有去取即此時也題徐氏書院徐禧徳占洪州人此詩歸洪州時所作贈石敏若從舊次題胡逸老致虛庵題蓮花寺右兩篇原任逍遥觀後衝雨向萬載道中得逍遥觀遂託宿戲題此詩往萍鄉時所作萬載亦屬袁州山谷有跋陳日休所收舊字云崇寜元年三月已夘自分寜來宿萬載之廣惠道揚攷長歴己夘葢二十四日題竹尊者軒從舊次當是廣恵道場送密老住五峯從舊次山谷有為密公作草書跋尾云元年三月壬午旅寓宜春之開元飯崇勝密公之堂即此僧也壬午葢二十七日宜春屬袁州新喻道中寄元明用觴字韻元明作萍鄉􅌠山谷來省覲書萍鄉㕔璧記曰來以崇寧四年四月乙酉而去以是月之巳亥已酉葢四月朔至已亥凡十五日此詩葢别後所作新喻屬臨江軍去萍鄉未逺第十七巻拜劉凝之畫像劉凝之家於南康此詩當是還自萍鄉往江州經途所作或云赴太和時所作追和東坡壺中九華據此詩序五月二十日繫舟湖口所作湖口屬江州罷姑熟寄元明用觴字韻六月十七日罷姑蘇解船至江口㑹洪駒父奉其大母來又為之留七日閏六月十一日分手將家到荆南謀居山谷與徐師州書云衝東風至羗湖矣駒父大母李氏山谷之從母也山谷又有太平州後園石室聽楊殊彈琴題名云與郭公甫高太忠同酌桂漿實季夏之丁未葢六月二十三日也次韻子瞻和李太白潯陽紫極宫感秋詩韻追懐太白子瞻潯江今江州山谷罷太平後徘徊於江州此詩江州所作有蟹肥社酷熟之句葢八月也而蜀中雙井後集有此詩跋云崇寧元年八月乙夘乙夘葢初三日也瓊芝軒龜壳軒秋聲軒右三篇皆紫極宫作戱效禪月作逺公詠逺公道場即今江州盧山東林寺是嵗八月庚申山谷冇東林題名此詩當是同時所作庚申葢初八日跋子瞻和陶詩原在紫極宫詩前今附見題李亮功戴嵩牛圖從舊次追和東坡題李亮功歸來圖當是與前篇同時作次韻徐仲車喜董元達訪之作南郭篇四韻次韻仲車為董元達置酒四韻次韻仲車因婁行父見寄之什右三篇原在紫極觀詩後詩有萬里逺歸來煩公問健否之句葢晩年所作武昌松風閣山谷九月至鄂此詩經途所作時張文潜再謫黄州猶未至也故詩有張侯何時到眼前之句黄與武昌隔江相望云尺牘中有跋與李徳叟書云崇寜元年九月甲申繫舟樊口題次韻文潜和文潜舟中所題右二詩並次前篇時文潜已到黄山谷自鄂往見之前詩有風雪牖户當塞向之句葢冬深所作題君子泉泉在黄州次前篇宿黄州觀音院鐘樓上原在次韻文潜後詩有潘何之語今遷於此為後詩張本謝何十三送蟹從舊次何十三當是何頡之斯舉或其弟兄頡之葢黄州人事具曽造端伯詩選又借答送蟹韻并戲小何代二螯解嘲又借前韻見意右三詩見於修水集今附見次韻文潜立春日三絶句再次前韻攷長歴是嵗十二月二十一日立明年春時山谷已歸鄂故詩有巳發黄州首更回之句第十八巻崇寧二年癸未是嵗山谷在鄂州既而謫宜州十二月十九日發鄂渚至岳陽作嵗初山谷在荆州作承天院塔記轉運判官謀舉承執政趙挺之風㫖摘其間數語以為幸灾謗國遂除名編隸宜州過過湖以明年二月見於洞庭青草湖詩夢中和觴字韻序云崇寧二年正月已丑已丑葢初九日次韻呉可權題餘干縣白雲亭從舊次次韻廖明略同呉明府白雲亭宴集次前篇病來十日不舉酒二首詩有迴施青春與後生之句春時所作題小景扇從舊次鄂州南樓書事四首詩有我亦耒追六月凉之語山谷在鄂州作夏惟此年爾南樓畫閣觀方公悅二小詩戲次韻附前篇庭堅以去嵗九月至鄂登南樓歎其制作之美成長句久欲寄逺因循至今書呈公悅附前篇養鬬雞顔徒貧樂齋二首右三詩並從舊次和凉軒二首以時序為次詩有西風之語題黙軒和遵老原在凉軒前次韻文安國紀夢寄賀方回右二篇原在畫閣詩後文安國挽詞二首因前篇紀夢附見鄂州節推陳榮緒恵示沿檄崇陽道中六詩老懶不能追韻輒自取韻奉和詩有中秋山行之篇陳榮緒恵示之字韻推奬過實非所敢當輒次髙韻三首附前篇第十九巻徳孺五丈和之字詩韻難而愈工輒復和呈可發一笑附前篇范徳孺名純粹據實録崇寜元年十月管勾南京鴻慶宫范純粹鄂州居住二年正月又責常州別駕鄂州安置次韻徳孺新居病起次韻徳孺感興二首次韻徳孺恵貺秋字之句並從舊次求范子黙染鴉青紙二首從舊次子黙葢徳孺之子謝榮緒惠貺鮮鯽謝榮緒割麞見貽二首吳執中有兩鵝為余烹之戲贈右四詩並從舊次秋冬之間鄂渚絶市無蟹今日偶得數枚吐沬相濡乃可憫笑戲成小詩三首以題中時序為次寗子與追和予岳陽樓詩復次韻二首和寗子與白鹿寺從舊次謝人恵貓頭荀從舊次詩有鸚鵡洲前人未知葢未離鄂州也鞭筍當謂冬時作短韻奉乞蠟梅從舊次以酒渴愛江清作五小詩寄廖明略學士兼簡初和父主簿詩有將發沔鄂之句四休居士詩三首從舊次葢在鄂州所作十二月十九日夜中發鄂渚曉泊漢陽親舊㩦酒追送聊為短句此以後詩赴宜州貶所時所作山谷有與人帖云某治行已有緒既嫁女别無一事移舟漢陽留數日待親識之在旁近爾次韻陳榮緒同倚鐘樓晩望别後明日見寄之作詩中有青草枯松之句皆岳州事葢榮緒送山谷至岳時尚未過湖也崇寧三年甲申是嵗二月過洞庭經潭衡永桂等州五六月間至宜州貶所其家寓於永州處山谷有跋李資深書巻云崇寧三年十一月余謫宜州半嵗矣官司謂余不當居闗城中乃以是月甲戌抱被入宿于城南樓山谷與長沙崇寜平老帖云骨肉寓永州過洞庭青草湖詩有乙丑越洞庭丙寅渡青草之句攷長歴二月二十一日乙丑之十二日丙寅過土山寨張舜民南行録湖中有土山廵檢司去黄陵廟十五里晚泊長沙示秦處度范元實用寄明略和父韻五首長沙即潭州在洞庭之南次韻元實病目從舊次勝業寺悅亭從舊次南行録勝業寺在南岳廟東屬潭州衡山縣有栁子厚般舟和尚第二碑離福巖從舊次按南行録勝巖在南岳依巖架空為之葢思公道場有三生塔亦屬衡山縣花光仲仁出秦蘇詩巻思二國士不可復見開巻絶歎因花光為我作梅數枝及畫煙外逺山追少游韻記巻末從舊次花光寺在衡州經途所作題花光畫題花光畫山水所住堂戲詠髙節亭邊山礬花二首右五篇並次前詩第二十巻贈恵洪從舊次詩有眼横湘水暮之句戲詠零陵李宗古居士家馴鷓鴣二首零陵即永州經途所作李宗古出示謝李道人苕帚杖從蔣彦回乞葬地二頌作二詩奉呈從舊次書磨崖碑後浯溪圖太平寺慈氏閣題淡山巖二首明逺庵玉芝園游愚溪右八詩皆永州三月間作詩中可見愚溪詩序云三月辛丑葢二十八日也代書寄翠巖新禪師從舊次雖有早梅開之句不可作時節㑹戲答歐陽誠發奉議謝余送茶歌從舊次到桂州從舊次答許覺之恵桂花椰子茶盂二首因後篇附見以椰子茶瓶寄徳孺二首原在到桂州詩後寄黄龍清老三首詩有中秋月之句秋時所作崇寧四年乙酉是嵗山谷在宜州九月三十日卒宜陽别元明用觴字韻是嵗山谷年六十一有為元明書草庵歌圖跋尾曰時山谷年六十一元明自宜歸湖南時而此詩有千林風雨鶯求友之句葢春時作和范信中寓居崇寧遇雨二首信中名寥山谷東有跋范寥所收坡詩云實崇寧四年之五月山谷老人謫居宜州二年矣山谷又有宜州遊山記葢四年六月辛巳而信中掛名其間此詩亦四年夏所作歟乞鍾乳於曽公衮從舊次公衮公紆曽布子宣之子時編置永州三年矣豫章後集有與公衮書云鍾乳何時再成又云嶺南秋署殊未解此詩葢秋時所作或遂絶筆于此篇歟山谷内集詩注原目
