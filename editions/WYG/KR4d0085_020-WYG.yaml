body:
  text: 山谷内集詩注巻二十宋黄庭堅撰任淵注贈惠洪惠洪字覺範筠州彭氏子祝髪為僧數面欣羊胛論詩喜雉膏上句言每見輒移頃久而益親下句言得詩之膏腴陶淵明答龎參軍詩序曰俗諺云數面成親舊況情過此者乎唐書骨利幹日入烹羊胛熟東方已明葢近日出處也歐陽公詩嵗月纔如熟羊胛玉篇胛音古狎切背胛也易鼎卦之九三曰雉膏不食此借用南史謝瀹傳武帝問王儉誰能五言儉曰謝朏得父膏腴江淹有意眼横湘水暮雲獻楚天高言湘波如眼之明徹文選傳毅舞賦曰目流睇而横波按宋玉神女賦曰望余帷而延視兮若流波之將瀾李善注云流波目視貎王介甫詩暮林搖落獻南山下句頗采其意言亂雲脱壞星露天宇之高明楚詞九辯曰沉寥兮天高而氣清老杜詩天高雲去盡墮我玉麈尾乞君宫錦袍晉書孫盛傳詣殷浩談論對食奮擲麈尾毛悉落飯中又王衍傳手捉玉麈尾唐書李太白傳嘗乘月自采石至金陵著宫錦袍坐舟中旁若無人東坡以玉帶施元長老詩曰錦袍錯落知相稱乞與佯狂老萬回此句參用其事乞音氣東坡中山松醪賦曰淋漓宫錦袍月清放舟舫萬里渺雲濤老杜詩落日放船好退之詩一瀉百里翻雲濤東坡中山松醪賦曰渺翻天之雲濤戲詠零陵李宗古居士家馴鷓鴣二首元注云李唯一妻一女垂老病足養鷓鴣鸚鵡以樂餘年零陵今湖南永州山雌之弟竹雞兄乍入雕籠便不驚此鳥為公行不得報晴報雨總同聲法言曰山雌之肥其意得乎北夢𤨏言醫工梁新曰竹雞食半夏陶岳零陵記曰竹雞狀如鶉尾少長張籍謝裴晉公遺馬詩曰乍離華廏移蹄澁初到貧家舉目驚此反而用之言其馴也禰衡鸚鵡賦曰閉以雕籠又曰遇之不懼撫之不驚鷓鴣之聲若云行不得哥哥故末句及之老杜詩不勞鐘鼓報新晴真人夢出大槐宫萬里蒼梧一洗空真人謂舜史記曰舜南巡狩崩于蒼梧之野葬于江南九疑是為零陵莊子曰羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之堯聞舜之賢舉乎童土之地年齒長矣聰明衰矣而不得休歸又曰真人于蟻棄智于魚得計于羊棄意此詩用大槐蟻穴事意葢出于此謂舜厭天下不異蟻垤之陋故超然方外喜于雲山之一洗也老杜詩一洗萬古凡馬空終日憂兄行不得鷓鴣應是鼻亭公漢書昌邑王傳曰舜封象于有鼻顔師古注曰有鼻在零陵今鼻亭是也又按桞子厚有斥鼻亭神記葢在道州道州永實相接云舜至蒼梧不復能巡狩而孟子謂象以愛兄之道來故此詩因鷓鴣之聲以寄意陶岳零陵記王伸聞思歸樂詩云聲聲相勸敎歸去莫是陶潛化作君山谷當是戲效其體李宗古出示謝李道人苕帚杖從蔣彦回乞葬地二頌作二詩奉呈提擕禪客扶衰杖斷當姻家葬骨山因病廢棊仍廢酒鷓鴣鸚鵡伴清閒扶衰見前注淳化法帖中有王羲之帖云想反理斷當斷音短今俗間猶作此語意謂剖判其事也東坡嘗有詩云是處青山可埋骨按班婕妤自傷賦曰願歸骨于山足詩書傳女似中郎杞菊同盤有孟光退之詩中郎有女能傳業謂蔡邕之女文姬也文姬名琰與孟光並見後漢書陸龜䝉有杞菊賦同盤見前注今日鷓鴣鳴蹇蹇他年鸚鵡恨堂堂上句終扶杖意下句終乞葬地意易曰王臣蹇蹇匪躬之故此借用其字以言足蹇文選謝宣逺詩蹇步愧無良李善注引説又曰蹇跛也薛能詩曰青春背我堂堂去白髮欺人故故生此亦借用言其棄世而去也書磨崖碑後春風吹船著音斫浯溪扶藜上讀中興碑浯溪在今永州中興頌元結次山所作顔魯公書磨崖鐫刻葢言安禄山亂肅宗復兩京事平生半世看墨本摩挲石刻鬢成絲言垂老方見真刻退之石鼓歌曰誰復著手為摩挲老杜詩鄭公樗㪚鬢成絲明皇不作苞桑計顛倒四海由禄兒易否卦之九五曰其亡其亡繫于苞桑注云心存將危乃得固也元稹連昌宫詞曰廟謨顛倒四海搖唐書安禄山傳明皇以禄山為范陽節度禄山請為貴妃養兒九廟不守乘輿西萬官巳作烏擇栖烏字或作鳥非唐書明皇紀天寳十四載十一月禄山反十五載六月行在望賢宫七月次蜀郡又按禮樂志開元十年太廟為九室蔡邕獨斷曰天子至尊不敢䙝瀆言之故託于乗輿也楚語曰五物之官陪屬萬為萬官古樂府有烏栖曲史記世家曰鳥能擇木木豈能擇鳥乎禄山之反宰相陳希烈等皆臣賊撫軍監國太子事何乃趣取大物為左傳太子從曰撫軍守曰監國唐書肅宗紀禄山反天寳十五載明皇避賊行至馬嵬父老請留太子討賊明皇許之太子治兵于朔方七月即帝位于靈武尊皇帝曰上皇天帝本紀贊曰肅宗雖不即尊位亦可以破賊莊子曰夫有土者有大物也又曰天下大物也趣音促事有至難天幸爾上皇跼蹐還京師中興頌曰事有至難宗廟再安二聖重歡漢書霍去病傳曰軍亦有天幸未嘗困絶也文選謝朓詩敕躬每跼蹐正月詩云謂天葢高不敢不局謂地葢厚不敢不蹐注云局曲也蹐累足也上下皆可畏怖之言也肅宗紀至徳二載十二月上皇天帝至自蜀都内間張后色可否外間李父頤指揮唐書肅宗廢后張氏傳曰后與李輔國謀徒上皇西内肅宗内制于后不敢謁西宫又宦者李輔國傳曰李揆以子姓事之號五父輔國妄言太上皇居近市交通外人願徙太上皇入禁中太上皇曰吾兒用輔國謀不得終孝矣怏怏不豫至棄天下退之炭谷湫詩曰羣怪儼伺候恩威在其顔漢書賈誼傳曰力制天下頤指如意南内淒涼㡬茍活髙將軍去事尤危唐書明皇紀至自蜀郡居于興慶宫上元元年徙居西内興慶即南内也宦者高力士傳曰先天初為右監門衛將軍加累驃騎大將軍從明皇幸蜀上皇還徙西内居十日為李輔國所誣長流巫州按李輔國傳曰輔國詐請上皇按行宫中射生官􅃒道上皇驚㡬墜馬力士厲聲曰五十年太平天子輔國欲何事叱使下馬上皇執力士手曰微將軍朕且為兵死鬼臣結舂陵二三策臣甫杜鵑再拜詩舂陵或作春秋非是元結舂陵行序曰漫叟授道州刺史道州舊四萬餘户經賊已來不滿四千到官未五十日承諸使徵求符牒二百餘封吾將守官靜以安人待罪而已此州是舂陵故地故作舂陵行以達下情孟子曰吾於武成取二三策此借用杜甫杜鵑行曰我見常再拜重是古帝魂北征詩曰臣甫憤所切安知忠臣痛至骨世上但賞瓊琚詞舊作豈知忠臣心憤切後世但賞瓊琚詞史記荆軻傳曰每念之痛于骨髓漢書杜周傳注曰深刻至骨老杜詩世上兒子徒紛紛木瓜詩曰報之以瓊琚同來野僧舊作殘僧六七輩亦有文士相追隨曹子建詩曰清夜遊西園冠葢相追隨斷崖蒼蘚對立久涷雨為洗前朝悲老杜詩斷崖當白鹽楚詞九歌曰使涷雨兮灑塵涷音東暴雨也浯溪圖陶岳零陵記曰浯溪在永州北水路一百餘里流入湘江此溪口水石奇絶唐上元中容管經畧使元結罷任居焉成子寫浯溪下筆便造極空濛得真趣膚寸已千尺世説佛經以為祛練神明則聖人可致簡文云不知得登峯造極不文選謝朓觀雨詩曰空濛如薄霧江淹詩悠悠藴真趣膚寸見前注只今中宫寺在昔漫郎宅更作老夫船檣竿挿蒼石漫郎謂元結見前注結有浯溪銘序曰浯溪在湘水南北匯于湘愛其勝異遂家溪畔溪世無名稱者也為自愛之故名曰浯溪埤蒼曰帆柱曰檣唐獨孤及招北客文曰摧檣折竿老杜詩前臨洪濤寛却立蒼石大太平寺慈氏閣元注云晩與曽公袞同登青玻瓈盆挿千岑湘江水清無古今何處拭目窮表裏太平飛閣暫登臨退之詩谿呀巨壑頗黎盆文選楊徳祖牋曰觀者駭視而拭目表裏山河見前注文選謝靈運有登臨海嶠與從弟惠連詩按楚詞宋玉九辯曰登山臨水送將歸朝陽不聞皂葢下愚溪但見古木陰元結朝陽巖銘序曰永泰丙午中自舂陵至零陵愛其郭中有水石之異泊舟尋之得巖與洞此邦之形勝也以其東向遂以朝陽命之續漢志曰中二千石皂葢朱轓元結時為舂陵郡刺史桞子厚愚溪詩序曰灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故姓是溪為冉溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉更之為愚溪嘉木異石錯置皆山水之奇者以余故咸以愚辱焉按愚溪在永州子厚嘗謫為司馬誰與洗滌懷古恨坐有佳客非孤斟東京賦曰慨長思而懷古退之詩孤斟詎能醒題淡山巖二首陶岳零陵記云淡山巖在永州西南狀如覆盂其地宜淡竹故云淡山中有巖空闊可容數千人東南角有缺處仰望之如窻户洞照甚明去城二十五里近天與隔盡俗子塵王介甫澶州詩曰去都二百四十里河流中間兩城峙文選謝朓詩曰囂塵自茲隔楚詞屈原漁父曰安能以皓皓之白䝉世俗之塵埃乎春蛙秋蠅不到耳夏凉冬暖總宜人曹子建七啓曰温房則冬服絺綌清室則中夏含霜老杜詩疎快頗宜人巖中清磬僧定起洞口綠樹仙家春陶岳零陵記曰淡山巖唐咸通中僧元暢居于是至今香燈不絶按今巖側有佛寺洞口有道觀故此詩云僧定起仙家春老杜詩清樹杪磬逺謁雲端僧北山錄云如來滅後大迦葉昇須彌山頂擊銅犍椎起五百羅漢定西天以有聲之物為犍椎即此方鐘磬也老杜詩洞口經春長薜蘿玉臺新詠吳邁逺擬樂府曰綠樹搖雲光惜哉次山世未顯不得雄文鑱翠珉按元次山于永州有浯溪及朝陽巖銘獨淡巖無有葢是時未知名也陶岳零陵記載王伸浯溪詩云湘川嘉致有浯溪元結雄文向此題文選王仲宣詩惜哉空爾為其字本出史記宓不齊傳桞子厚作韓君誌銘曰載刻兹珉淡山淡姓人安在徴君避秦亦不歸零陵土人謂淡山以淡竹得名或云嘗有淡姓居之王介甫梁王吹臺詩繁臺繁姓人埋滅隨蒿蓬徵君謂周貞實零陵記曰周貞實零陵人居淡山石室秦始皇下詔徵之三徵皆不起遂化為石後漢黄憲傳天下號曰徴君此用其字石門竹徑㡬時有瓊臺瑤室至今疑上句用退之竹洞詩意囘中明潔坐十客亦可呼樂醉舞衣元次山有大回中小回中詩言樊水之回洑也此借用以言巖洞回環其中虚明仰見天日可為張飲之地閬州城南果何似永州淡巖天下稀老杜閬水歌曰閬州勝事可腸斷閬州城南天下稀明逺庵逺公引得陶潛住美酒沽來飲無數我醉欲眠卿且去只有空瓶同此趣山谷有戲效禪月作逺公東林詠序云初逺法師居廬山下持律精苦過中不受蜜湯而作詩換酒飲陶彭澤醉眠見前注空瓶同趣謂瓶空而亦臥也葢張籍詩有酒盡卧空瓶之句晉書孟嘉傳曰公未知酒中趣耳桞子厚西山宴遊記曰意有所極夢亦同趣誰知明逺似逺公亦欲我行庵上路多方挈取甕頭春大白梨花十分注樂天詩甕頭正是撆嘗時法書要録曰山東云缸面猶河北稱甕頭謂初熟酒也説苑曰魏文侯與大夫飲酒使公乘不仁為觴政曰飲不釂者浮以大白梨花謂酒杯様製如此與君深入逍遥遊了無一物當情素高僧傳支遁與劉系之等談莊子逍遙篇云各適性以為逍遥遁曰不然夫傑跖以殘害為適性若適性為得者彼亦逍遥矣于是退而注逍遥篇傳燈録仰山傳曰師問雙峯師弟近日見處如何對曰據某甲見處實無一法可當情師曰汝解猶在境汝豈真能知無一法可當情者又汾州無業傳曰常了一切空無一物當情是諸佛用心處戰國䇿蔡澤説應侯曰公孫鞅事孝王竭心謀示情素道卿道卿歸去來明逺主人今進步元注云道卿浯溪僧陶淵明有歸去來詞傳燈録長沙岑禪師偈曰百尺竿頭須進步十方世界現全身玉芝園并序去年三月清明蔣彦囘喜太守監郡過其玉芝園作詩十六韻二侯皆有報章今年三月余到玉芝園記録一時次其舊韻春生瀟湘水風鳴澗谷泉過雨花漠漠弄晴絮翩翩名園上朱閣觀後復觀前借問昔居人岑絶無炊煙人生須富貴河水清且漣百年共如此安用涕潺湲退之詩柳花還漠漠選詩里無曲突煙漢書楊憚傳曰人生行樂耳須富貴何時左傳曰俟河之清人壽㡬何伐檀詩曰河水清且漣猗楚詞曰横流涕兮潺湲蔣侯真好事杖屨喜接連車載溪中骨推排若差肩厭看孔壬面醜石反成妍溪中骨謂石也漢書朱買臣傳曰相推排陳列中庭拜謁曲禮注曰肩隨者與之並行差退元稹作老杜墓銘曰李白樂府歌詩誠亦差肩于子美矣書曰巧言令色孔壬選詩曰皎潔不成妍感君勸我醉吾亦無間然亂我朱碧眼空花墜便翾行動須人扶那能金石堅魯論曰禹吾無間然矣太白詩曰催絃拂柱與君飲看朱成碧顔始紅韻書曰翩翾小飛也又曰便翾輕麗也此借用老杜詩此生已媿須人扶文選古詩曰人生非金石豈能長壽考漢書賈誼傳曰堅若金石愛君雷氏琴湯湯發朱絃但恨賞音人大半隨逝川雷氏蜀人善製琴為世所寶家語曰伯牙鼓琴鍾子期聴之伯牙志在泰山子期曰善哉巍巍乎若在泰山少選之間志在流水子期曰善哉湯湯乎若在流水子期死伯牙鼓琴絶絃終身不復鼓賞音逝川並見前注平生有詩罪如痼不可痊今當痛自改三釁復三湔柳子厚答崔黯書曰凡人好詞工書者皆病癖也吾不幸早得二病纒結心腑牢甚願斯須忘之而不克文選劉公幹詩余嬰沈痼疾李善注引禮記曰身有痼疾説文曰痼久也三釁三浴見前注退之詩懼終莫洗湔遊愚溪并序三月辛丑同徐靖國到愚溪過羅氏修竹園入朝陽洞蔣彦囘陶介石僧崇慶及余子相步及余于朝陽巖徘徊水濵久之有白雲出洞中㪚漫洞口咫尺欲不相見介石請作五字記之意行到愚溪竹輿鳴擔肩韓孟城南聨句曰刈熟擔肩赬冉溪昔居人埋没不知年偶託文字工遂以愚溪傳柳侯不可見古木䕃濺濺冉溪見前注劉禹錫詩㑹書團扇上知君文字工柳子厚石澗記曰交絡之流觸激之音皆在牀下翠羽之木龍鱗之石均蔭其上柳侯字見退之羅池廟碑楚詞曰石瀬兮淺淺按淺與賤同濺濺水疾流貎音箋羅氏家瀟東瀟西讀書園笋茁不避道檀欒搖春煙梁王兔園賦曰修竹團欒夾池水下入朝陽巖次山有銘䥴蘚石破篆文不辨瞿李袁次山銘見前注次山陽華巖銘曰江華縣大夫瞿令問藝兼篆籀俾依石經刻之法書苑云李陽氷趙郡人善小篆袁氏未詳嵌竇響笙磬洞中出寒泉同遊三五客拂石弄潺湲老杜詩逺川曲通流嵌竇潛洩瀬詩曰笙磬同音又曰爰有寒泉在浚之下謝靈運詩乗月弄潺湲俄頃生白雲似欲駕我仙吾將從此逝挽牽遂囘船文選江賦曰千里俄頃莊子曰乗雲氣御飛龍而遊乎四海之外漢書高帝紀曰吾亦從此逝矣挽牽言為其子所挽留也太白詩出門妻子强牽衣又曰稽山無賀老空棹酒船囘退之詩波惡强牽挽代書寄翠巖新禪師黄龍死心悟新和尚晦堂老人之嫡子叢林謂之新孟八初住洪州分寜之雲巖次住西山翠巖後住黄龍山谷嘗參晦堂新清二老葢其道伴山谷青石牛自負萬鈞重舒州皖公三祖僧璨大師道場是為山谷寺西北有石牛洞其石狀如伏牛因以為名錢紳同安志云初李伯時畫魯直坐于石牛上魯直因自號山谷道人八風吹得行處處是日用又將十六口去作宜州夢寒山子詩曰寒山無漏巖其巖甚濟要八風吹不動萬古人傳妙此反用之按寶積經及大毗婆沙論以利衰毁譽稱譏苦樂為八風大毗婆沙論又曰佛亦曽遇此世八法如何説佛解脱答曰雖遇此事而不生染故説解脱傳燈録龎居士傳石頭問曰子自見老僧已來日用事作麽生呈一偈云日用事無别唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號丘山絶㸃埃神通并妙用運水及搬柴老杜詩兩京三十口雖在命如絲梅聖俞贈歐陽詩曰又隨落花飛去作江西夢杜牧之詩有云十年一覺揚州夢時山谷擕其子舍并亡弟知命骨肉俱往苦憶新老人是我法梁棟信手斫方圓規矩一一中高僧羅什傳曰釋慧逺學貫羣經棟梁遺法溈山禪師警䇿亦云心期佛法棟梁用作後來龜鏡樂普禪師頌曰入荒田不棟信手拈來草莊子曰方者中矩圓者中規遙思靈源叟分坐法席共靈源叟名唯清亦嗣晦堂新之法弟也後住黄龍法華經曰爾時多寶佛于寶塔中分半座與釋迦牟尼佛而作是言釋迦牟尼佛可就此座又按雜阿含經云尊者迦葉著弊衲衣來詣佛所時諸比丘心生輕慢世尊告摩訶迦葉于此半坐我今竟知誰先出家汝耶我耶彼諸比丘心生恐怖身毛皆竪聊持楚狂句往作天女供楚狂見前注維摩詰曰時維摩詰室有一天女見諸天人聞所説法便現其身即以天花㪚諸菩薩大弟子上嶺上早梅春參軍慙獨弄宜州在嶺南此句謂違去道伴無與共禪悦游戲爾獨弄俳優本出俗諺按因話錄曰肅宗宴宫中女優有弄假官戲其緑衣秉簡者謂之參軍樁戲答歐陽誠發奉議謝余送茶歌歐陽子出陽山山奇水怪有異氣生此突兀能豹顔退之送區冊序曰陽山天下之窮處也陸有丘陵之險水有江流悍急横波之石又送廖道士序曰郴之為州當中州清淑之氣蜿蟺扶輿磅礴而鬱積其水土之所生神氣之所感必有魁奇忠信才徳之民生于其間又送張道士詩曰張侯嵩高來面有熊豹姿按陽山隸連州飲如江入洞庭野詩成十手不供寫唐人詩酒腸俱逐洞庭寛莊子曰帝張樂于洞庭之野老杜有石硯歌曰揮灑容數人十手可對面老來抱璞向涪翁東坡原是知音者抱璞用卞和事見前注後漢方術郭玉傳有老父漁釣涪水因號涪翁山谷謫涪州别駕亦嘗以自稱或云涪皤蒼龍璧官焙香涪翁投贈非世味自許詩情合得嘗退之詩吾老世味薄東坡詩亦云吾衰向老世味薄所好未衰唯飲茶薛能謝王彦威寄茶詩云麤官乞與真抛却頼有詩情合得嘗却思翰林來餽光禄酒兩家水鑑共寒光翰林謂東坡按漢制光禄卿有良醖署水鏡見前注予乃安敢比東坡有如玉盤金叵羅直相千萬不啻過漢書曹參傳惠帝曰朕乃安敢望先帝此用其語律應劭漢官儀曰封禪壇南有玉盤北史祖珽竊金叵羅蔵髻中李太白詩蒲萄酒金叵羅孟子曰或相千萬老杜詩方駕曹劉不啻過愛公好詩又能多老夫何有更横戈奈此于思百戰何退之詩云四句意能多又詩文戰誰與敵浩汗横戈鋋左傳華元巡功城者謳曰于思于思棄甲復來使其驂乗謂之日牛則有皮犀兕尚多棄甲則那注云于思多鬚之貎歐陽君必多髯故用此事到桂州桂嶺環城如鴈蕩平地蒼玉忽嶒峨鴈蕩山在今温州李成不在郭熙死奈此百嶂千峰何名畫評曰李成營丘人能畫山水林木當時稱為第一張文懿公詩曰李成謝世范寛死唯有高陽許道寜退之石鼓歌曰少陵無人謫仙死才薄其奈石鼓何答許覺之惠桂花椰子茶盂二首萬事相尋榮與衰故人别來鬢成絲選詩纒綿自相尋老杜詩鄭公樗散鬢成絲欲知歲晩在何許唯説山中有桂枝文選阮嗣宗詩良辰在何許劉安招隱士曰桂樹叢生兮巖之幽又曰攀援桂枝兮聊淹留碩果不食寒林梢剖而器之如懸匏故人相見各貧病且可烹茶當酒肴易剥卦之上九曰碩果不食文選陸士衡歎逝賦步寒林而悽惻張景陽七命曰剖椰子之殻按劉淵林吳都賦注云椰樹似檳榔實大如匏核可作飲器家語曰剖而食之甜如蜜魯論曰其使人也器之潘岳笙賦河汾之寶有曲沃之懸匏焉頍弁詩爾酒既旨爾肴既嘉以椰子茶瓶寄徳孺二首碩果霣林梢可以代懸匏􅂝持二十年煑茗當酒肴我今禦魑魅學打衲僧包聊持堅重器遺我金石交祖庭事苑載打包説曰毗柰耶雜事云佛言苾蒭應以袋盛衣今禪人腰囊亦承佛之制也詩中所用字並見前注左傳祈招之詩曰式如玉式如金注云取其堅重劉師服石鼎聨句云徒示堅重性炎丘椰木實入用隨茗椀譬如楛矢砮但貴從來逺家語曰孔子在陳有隼集陳侯之庭而死楛矢貫之石砮其長尺有咫惠公使人持隼如孔子館而問焉孔子曰隼之來逺矣此肅慎氏之矢注云楛木名砮箭鍭韓詩外傳曰黄鵠無五徳君猶貴之以其所從來者逺矣往時萬里物今在籬落間知公一拂拭想我瘴霧顔上兩句山谷自況世説桓𤣥就桓崖求桃不得佳者𤣥與殷仲文書曰徳之休明則肅慎氏貢其楛矢如其不爾籬壁間物亦不可得此借用籬落見前注寄黄龍清老三首萬山不隔中秋月一鴈能傳寄逺書退之詩東西南北皆欲往千江隔兮萬山阻謝莊月賦曰隔千里兮共明月老杜詩邊秋一鴈聲深密伽陁枯戰筆真成相見問何如佛書有解深密經涅槃經曰因本經以偈頌名祇夜餘有説四句偈名伽陁祖庭事苑曰伽陁此云諷頌或名直頌謂直以偈説法法書苑曰平磔法口訣云不遲不疾戰筆側去此借用末句謂見其翰墨千里如對面也老杜詩道甫問訊今何如風前橄欖星宿落日下桄榔羽扇開異物志曰橄欖生南海浦嶼八月乃熟木高大難採以鹽擦木身其實自落嶺表録云桄榔樹身皮葉與蕃棗檳榔等小異羽扇見前雉尾注昭黙堂中有相憶清秋忽遣化人來僧寶傳曰清老居黄龍未㡬寶覺歿即移疾居昭黙堂頽然坐一室古詩上有長相憶下有加餐食維摩經云維摩詰不起于座居衆㑹前化作菩薩而告之曰汝往上方界分有國名衆香佛號香積彼諸大士見化菩薩即以問佛佛告之曰維摩詰為諸菩薩説法故遣化來列子曰周穆王時西域之國有化人來騎鱸覓驢但可笑非馬喻馬亦成癡傳燈録誌公大乘讚曰不解即心即佛真似騎驢覓驢莊子曰以馬喻馬之非馬不若以非馬喻馬之非馬也两句皆言知道者少一天月色為誰好二老風流只自知老杜宿讚公房詩云相逢今夜宿隴月向人圓又詩不知明月為誰好又寄贊上人詩云與子成二老來往亦風流孟子二老者天下之大老也此借用其字宜陽别元明用觴字韻霜鬚八十期同老酌我仙人九醖觴元注云術者言吾兄弟皆壽八十近得重醖法甚妙西京雜記漢制宗廟八月飲酎用九醖明月灣頭松老大永思堂下草荒涼明月灣永思堂皆在雙井堂在先墓之側故以永思為名老杜詩惆悵老大藤況吟屈蟠樹退之書曰窮居荒涼草樹茂密按文選北山移文曰石徑荒涼徒延佇千林風雨鶯求友萬里雲天鴈斷行言鳥猶求友而我獨與兄别也樂天詩樹集鶯朋友雲行鴈弟兄劉禹錫詩見鴈隨兄去聴鶯求友聲又詩斷行隨鴈翅孤嘯聳鳶肩别夜不眠聴䑕囓非關春茗攪枯腸别緒難為惰自不能寐非以茗椀破腄也盧仝茶歌三椀搜枯腸和范信中寓居崇寧遇雨二首范侯來㝷八桂路走避俗人如脱兔山海經曰桂林有八樹在番禺東孫子曰後如脱兔敵不及距衣囊夜雨寄禪家行潦升階漂兩屨漢書王吉傳曰所載不過囊衣詩曰泂酌彼彼潦曲禮曰户外有二屨遣悶悶不離眼前避愁愁已知人處老杜有遣悶詩庾信愁賦日閉户欲驅愁愁終不肯去深蔵欲避愁愁巳知人處慶公憂民苖未立旻公憂木水推去慶旻葢崇寧兩禪僧漢書劉章傳曰立苗欲疏兩禪有意開壽域嵗晩築室當百堵徽宗崇寧三年詔天下置崇寧寺觀為上祈年漢書王吉傳曰驅一世之民躋之仁壽之域斯干詩曰築室百堵他時無屋可蔵身且作五里公超霧無屋蔵身葢宗門中事船子和尚謂夾山云汝向去直須蔵身處没蹤跡没蹤跡處莫蔵身謝承後漢書曰張楷字公超性好道術能作五里霧當年游俠成都路黄犬蒼鷹代狐兔范君葢西蜀人漢書司馬遷傳贊曰序遊俠則退處士而進姦雄選詩曰京華游俠窟二十始肯為儒生行㝷丈人奉巾屨巾屨見前注千江渺然萬山阻抱衣一囊遍處處或持劍掛宰上囘亦有酒罷壺中去退之詩千江隔兮萬山阻又云情多地遐兮徧處處史記曰吳季札北過徐徐君好季札劍口不敢言季札知之而使上國未獻還至徐徐君巳死乃解其寶劍繫徐君冢樹而去曰始吾已心許豈以死倍吾心哉公羊傳曰宰上之木拱矣注云宰冢也後漢費長房傳市中有老翁賣藥懸一壺于肆頭及市罷輒跳入壺中長房詣翁翁乃與俱人壺中唯見玉堂嚴麗旨酒嘉肴盈衍其中共飲畢而出翁曰我神仙之人以過見責今事畢當去子寧能相隨乎昨來禪榻寄曲肱上雨傍風破環堵退之南海廟碑曰卜雨傍風無所葢障禮記曰儒有環堵之室何時鯤化北溟波好在豹隱南山霧見前注樂天詩好在李使君乞鍾乳于曽公袞寄語曽公子金丹㡬時熟願持鍾乳粉實此罄懸腹江文通别賦曰鍊金鼎而方堅李善注云鍊金為丹之鼎也抱朴子曰鄭君唯見授金丹之經罄懸言其空也左傳曰室如懸罄遙憐蟹眼湯已化鵝管玉蟹眼湯見前注按雷公修事鍾乳法再三以水煮之然後入臼搖如粉篩過研之陶隱居注本草鍾乳條云性通中輕薄如鵞翎管碎之如𤓰甲中無鴈齒光明者為善刀圭勿妄傳此物非碌碌退之詩金丹别後知傳得乞取刀圭救病身按本草云刀圭者十分方寸七之一此物見前注後漢書禰衡曰餘子碌碌莫足數也山谷内集詩注巻二十
