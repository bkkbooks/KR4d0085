body:
  text: 山谷內集詩注卷十六宋黃庭堅撰任淵注次韻高子勉十首高荷字子勉江陵人上山谷長篇警句云蜀天何處盡巴月幾回彎因此得名後知涿州而死自號還還先生事見曾慥詩選雪盡虛簷滴春從細草迥回文選王元長曲水詩序曰虛簷雲架按簷字俗作簷老杜詩更覺春從沙際歸文選謝朓詩風光草際浮丘希範詩細草藉龍騎德人泉下夢俗物眼中埃德人當謂東坡少遊莊子曰德人者居無思行無慮不藏是非善惡此借用其字老杜詩眼前無俗物多病也身輕久立我有待長吟君不來曽慥集仙傳載吕洞賓題汴都峩眉院法堂屋山云明月斜秋風冷今夜故人來不來教人立盡梧桐影老杜詩有待至昏雅退之詩長吟慰我思按洛神賦曰超長吟以永慕盧同詩鶯花爛漫君不來重玄鎖關籥要待玉匙開言高君可發古人之祕也文選陸機功臣頌曰重玄非奧頭陀寺碑曰玄關幽楗感而遂通同安和尚十玄談曰金鎖玄關留不住行于異類且輪回黃庭經曰玉匙金籥常完堅掃雪我三日御風君過旬上句用袁安事又至仁俗每大雪則自所居至坊巷口掃雪開徑迎接賓客至所居處飲宴謂之暖寒會退之詩閉門長安三日雪莊子曰列子御風旬有五日而後反易曰過旬災也言詩今有數下筆不無神魯論曰始可與言詩已矣老杜詩神仙才有數又詩曰下筆如有神又詩樂罷不無悲行布佺期近飛揚子建親行布字本出釋氏而山谷論書畫數用之按釋氏言華嚴之旨曰行布則教相施説圓融乃理性即用楞伽經曰名身與句身及字身差别解者曰名者是次第行别句者是次第安布唐詩宋之問傳曰魏建安後詩律屢變及之問沈佺期加靡麗學者宗之號為沈宋老杜贈李白詩飛揚跋扈為誰雄蓋借用北史齊神武紀中語老杜詩又曰詩看子建親為曹植也可憐金石友去不待斯人金石友見前注亦謂東坡少遊于時已死恨不見子勉峴南羈旅井灞上獵歸亭日繞分魚市風回落鴈汀老杜詩應同王粲宅留井峴山前按魏志王粲傳山陽人以西京擾亂乃之荆州依劉表漢書李廣傳屏居藍田南山中射獵嘗夜從人田間飲還至亭霸陵尉醉呵止廣筆由詩客把笛為故人聼上句言久不作詩因高君可與論此事故復援筆下句謂追懷東坡晉書向秀傳作思舊賦序云經稽康吕安舊廬鄰人有吹笛者發聲寥亮追想曩昔宴遊之好感音而嘆故作賦云但恐蘇耽鶴歸時或姓丁終上句之意亦指東坡言其不可測識也蘇耽丁令威見前注君不居郎省還應上諫坡蔡質漢官典職曰尚書郎省中皆以胡粉塗壁諫坡見李宗諤先公談録具前注才高殊未識嵗晚喜無它説文曰上古草居患它故相問無它乎音託何切徐鉉注云今俗作蛇音食遮反櫪馬羸難出鄰雞凍不歌老杜詩曰盍簪喧櫪馬退之書曰泥水馬弱不敢出鄰雞見孟子東坡雜説曰豫來黃州聞黃人羣聚謳歌宛轉其聲往返高下如雞唱爾漢官儀汝南出長鳴雞衛士候朱雀門外專傳雞鳴應劭曰今雞鳴歌也余今所聞豈亦雞鳴之遺聲乎老杜詩林鶯遂不歌寒爐餘幾火灰裏撥隂何言作詩當深思苦求方與古人相見也傳燈録百丈謂溈山曰汝撥爐中有火否師撥云無火百丈躬起身撥得火舉以示之云此不是火師發悟禮謝吕蒙正詩撥盡寒爐一夜灰老杜詩試學隂何苦用心謂隂鏗何遜荆渚樓中賦南陽壠底吟誰言小隱處頻屈故人臨上兩句皆述荆州渚宮見前注文選王粲有登樓賦李善注引盛𢎞之荆州記曰當陽縣城樓王仲宣登之而作賦蜀志諸葛亮傳躬耕壠畝好為梁父吟注引漢晉春秋曰亮家于南陽之隆中按後漢志南陽屬荆州文選王康琚詩曰小隱隱陵藪大隱隱朝市漢書灌夫傳曰將軍旦日蚤臨經笥難窺底詞源幸汲深思君眠竹屋雪月冰寒衾後漢邉韶傳腹便便五經笥老杜詩詞源倒流三峽水莊子曰綆短者不可以汲深劉禹錫涵碧圖詩序曰碧流貫于庭中冰徹射人自注云冰音去聲集韻冰音逋孕反冷迫也驚人得佳句或以傲王公用杜牧之千首詩輕萬戶候之意老杜詩為人性僻耽佳句語不驚人死不休又詩故人得佳句獨贈白頭翁荀子曰道義重則輕王公處世要清節滑稽安足雄言當慕伯夷之清不當如東方朔之陸沈也法言或問東方朔曰非夷尚容依隱玩世其滑稽之雄乎又曰古者高餓顯下祿隱深沈似康樂簡遠到安豐晉書謝玄封康樂縣公為叔父安所器重有經國才略王戎封安豐縣候裴楷傳鍾會曰裴楷清通王戎簡要漢書王嘉傳曰計謀深沈元稹作老杜墓銘序曰蘇李五言詞意簡逺謝靈運雖襲封康樂公然此詩以深沉言之必非指靈運也一點無俗氣相期林下同僧貫休題東林寺詩田地更無塵一點退之王仲舒墓志曰公所為文章無世俗氣晉書王戎傳與阮籍為竹林之遊戎嘗後至籍曰俗物已復來敗人意又王凝之妻謝氏傳曰王夫人神情散朗故有林下風志士難推轂將如髙子何心期誠不淺餘論或相多志士見魯論推轂見前注文選任彥忭詩曰中道遇心期王介甫作韓魏公挽詩曰心期自與衆人殊骨相知非淺丈夫南史謝朓傳曰士子聲名未立應共奬成無惜齒牙餘論戰國策或説張相國曰君安能少趙人而令趙人多君漢書何武傳注曰多重也欲向滄州去還能小艇麼鸕鷀西照處相並曬漁蓑言欲與之同往江海也選詩復協滄州趣老杜詩間引老妻乘小艇又云鸕鷀西日照曬趐滿漁梁東坡樂府曰仍傳語江南父老時與曬漁蓑鑿開混沌竅窺見伏羲心言伏羲發太極之藴也莊子曰倏與忽謀報混沌之德日鑿一竅七日而死易曰復其見天地之心乎有物先天地含生盡陸沈老子曰有物混成先天地生雪竇頌曰曹溪波浪如相似無恨平人被陸沈詩意謂大道坦然人自迷謬平地上沒溺而不自知也陸沈見莊子已具前注此借用伐山成大厦鼓橐鑄祥金上句欲其積學以成廣大之規模下句欲其煆煉以盡精微之極致漢書地理志曰楚地以漁獵山伐為業注云山伐謂伐山取竹木文選四子講德論曰大厦之材非一丘之木淮南子曰鼓橐吹捶注云橐冶爐排橐也莊子曰今大冶鑄金金踴躍曰我且必為鏌鎁大冶必以為不祥之金此反而用之三尺無絃木期君發至音無絃琴用淵明事見前注劉禹錫與桞子厚書曰嗟夫筝郭師與不可傳者死矣絃張柱差枵然貌存中有至音含糊弗聞噫人亡而器存布方册者是已少年基一簣長歲足三餘一簣三餘並見前注忽作飛黃去頓超同隊魚退之詩少長聚嬉戲不殊同隊魚又云飛黃騰踏去不能顧蟾蜍飛黃古良馬名尊前八采句窗下十年書北史盧思道傳朝士各作文宣帝挽歌十首擇其善者用之魏收陽休之等不過得一二篇唯盧思道得八篇故時號八采盧郎此借用十年書見南史沈攸之傳見前注定作牛腰束傳抄聼小胥太白詩云詩秃千毫書載兩牛腰老杜詩云抄詩聼小胥沙上步微暖思君剩欲招蔞蒿穿雪動楊桞索春饒髙適詩談經剩欲翻陸龜蒙鴉詩亂和殘照紛紛舞應索陽烏次第饒枉駕時逢出新詩若見撩若一作苦退之詩猿鳥莫相撩王介甫詩物華撩我有新詩樽前遠湖樹來飲莫辭遙老杜詩水有遠湖樹人今何處船蓋指江陵府而言山谷時寓居于此老杜又有詩他鄉惟表弟還往莫辭遙贈髙子勉四首文章瑞世驚人學行刳心潤身老杜詩語不驚人死不休莊子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉禮記曰富潤屋德潤身沅江求九肋鱉荆州見一角麟托言曰盧肇袁州人初赴舉先逹曰袁州出舉人耶答曰袁州舉人亦猶沅江出鱉甲九肋者稀一角麟見前注又傳燈録清原行思傳希遷曰衆角雖多一麟足矣張侯海內長句朝子廟中雅歌元注云無咎樂府于今第一高郎少加筆力我知三傑同科張侯謂文潛退之潮州謝表曰作為歌詩薦之郊廟後漢祭遵投壺雅歌干寶晉紀曰顧榮與陸機兄弟同入洛時號三傑魯論曰為力不同科山谷與李端叔帖曰此得荆州一詩人高荷極有筆力使之凌厲中州恐不減朝張嘗聞之長老云文潛見此句殊不樂妙在和光同塵事須鈎深入神上句欲其韜晦涵養與世同波下句欲其學之精微即事觀理老子曰和其光同其塵易曰探賾索隱釣深致逺又曰精義入神以致用也聼他下虎口著我不為牛後人上句謂無若世人行險僥幸如奕碁而置子于虎口下句欲其特立獨行不落人後也史記蘇秦傳曰寧為雞口無為牛後拾遺句中有眼彭澤意在無絃謂老杜之詩眼在句中如彭澤之琴意在絃外也老杜以上元二年拜右拾遺事具唐書本傳顧我今六十老付公以二百年南史謝朓傳長五言詩沈約云二百年無此詩也晉書陳夀傳張華謂曰當以晉書相付此借用言以一代之詩付之也再用前韻贈子勉四首胸中有度擇人事上無心活身上句欲口不臧否人物而胸中自有準則也退之書曰懼足下以吾不致黑白于胸中禮記曰進退有度左傳吳公子札見叔孫穆子曰子好善而不能擇人傳燈録德山語曰汝但無事于心無心于事則虛而靈空而妙樂天詩勿信人虛語君當事上看莊子曰烈士為天下見善矣未足以活身只麼情親魚鳥儻然圖畫麒麟言本志在于山林恐或不免富貴也傳燈録證道歌曰不可得中只麼得世説簡文帝在華林園謂左右曰會心處不必在逺翛然林水便有濠濮間之趣覺鳥獸禽魚自來相親莊子曰儻然立于四虛之道漢書蘇武傳宣帝甘露三年思股肱之美乃圖畫霍光等十一人于麒麟閣行要爭光日月詩須皆可絃歌史記屈原傳曰雖與日月爭光可也又按孔子世家曰詩三百五篇孔子皆絃歌之以求合韶武雅頌之音桞子厚簡吳武陵詩惜無協律者窈眇絃吾詩老杜詩謝朓每篇堪諷詠東坡山谷嘗論詩可絃歌者米芾曰某明月堂賦便可坡未應山谷曰可謂落大石調也見王定國聞見録云著鞭莫落人後百年風轉蓬科言當汲汲追逐古人恐年嵗之不與吾也著鞭用劉琨事見前注太白詩風流肯落他人後轉蓬見前注太白詩又曰蓬科馬鬛皆已平句法俊逸清新詞源廣大精神老杜詩清新庾開府俊逸鮑參軍又云詞源倒流三峽水禮記曰致廣大而盡精微建安才六七子開元數兩三人文選謝靈運擬魏太子鄴中集詩有魏太子王粲陳琳徐幹劉楨應瑒阮瑀平原侯植八人序曰建安末豫時任鄴宫云云又魏文帝典論曰今之文人孔融陳琳王粲徐幹阮瑀應瑒劉􅐃斯七子者于學無所遺于詞無所假韓文公詩建安能者七卓犖變風操唐書文藝傳曰明皇好經術羣臣稍厭雕琢索理致則燕許擅其宗六七人見魯論老杜詩野航恰受兩三人醉鄉間處日月鳥語花中管絃醉鄉見前注唐人皇甫嵩所著小説號醉鄉日月樂天詩間中日月長劉禹錫詩蘿密鳥韻如簧言漢書曰鐘鼓管絃之音未衰有興勤來把酒與君端欲忘年文士傳禰衡與孔融作爾汝交衡年二十餘融年五十敬衡秀才而忘年也又南史江總傳張纘等雅相推重為忘年友荆南簽判向和卿用豫六言見惠次韻奉酬四首仕宦初不因人富貴方來逼身上句言其自樹立劉禹錫連州謝表曰出身入仕並不因人下句用謝安恐不免富貴之意僧貫休與錢鏐詩曰貴逼身來不自由要是出羣拔萃乃成威鳳祥麟孟子公孫丑篇有若曰麒麟之於走獸鳯凰之於飛鳥類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也漢書宣帝紀詔曰威鳯為寶注云鳯之有威儀者左傳哀公十四年注曰麟者仁獸王者之嘉瑞退之獲麟解曰麟之為靈􅢖婦人小子皆知其為祥也向候賦我菁莪何敢當不類歌向以教育之意望于山谷詩曰菁菁者莪樂育材也左傳晉候曰歌詩必類齊髙厚之詩不類顧我乃山林士看君取將相科漢書王吉傳贊曰山林之士往而不能反王沂公言行録云公為參政或議以進士登科擇堂吏公曰我朝設此科為之將相科豈當屈以趨走吏耶衆皆嘆服而止覆却萬方無準安排一字有神言不為物役詩思乃凝于神也莊子曰視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍文選陸佐公漏刻銘曰盈縮之度無準前輩詩曰吟安一個字老杜詩下筆如有神更能識詩家病方是我眼中人李淑詩苑類格云梁沈約曰詩病有八一平頭二上尾三蜂腰四鶴膝五大韻六小韻七旁紐八正紐此借用文選陸士龍答張士然云感念桑梓域髣佛眼中人老杜王司直短歌行曰青眼髙歌望吾子眼中之人吾老矣丁晉公曰水底日為天上日楊公應口曰眼中人是面前人覔句真成小技知音定須絶絃覔句見前注老杜詩文章一小技于道未為尊絶絃見前注景公有馬千駟伯夷垂名萬年事見魯論蓋期之以逺者大者蟻蝶圖胡蝶雙飛得意偶然畢命網羅羣蟻爭收墜翼策勳歸去南柯此篇蓋有所屬陸龜蒙蠹化曰橘之蠹蛻為胡蝶翩旋軒虛曵揚粉拂甚可愛也須臾犯蟊網而膠之引絲環纒人􅢖甚憐不可解而縱矣文選七啓曰公叔畢命于西秦策勳及南柯並見前注謝胡藏之送栗巤尾畫維摩二首貂尾珍材可筆虎頭墨妙疑神後漢書輿服志曰武冠貂尾為飾注引應劭漢官儀曰貂內徑悍而外溫潤老杜詩虎頭金粟影神妙獨難忘謂顧愷之所畫維摩也莊子曰用志不分乃凝于神東坡嘗言古本凝作疑頗知君塵外物真是我眼中人分屬前兩句選詩肅此塵外軫晉書王戎傳曰王衍如瑶林瓊樹自然是風塵表物眼中人見前注丹青貌金粟影毛物宜管城公揚子丹青初則炳久則渝老杜有丹青引又詩畫工如山貌不同金粟影見前注文選頭陀寺碑李善注發迹經曰淨名大士是往古金粟如來又按祖庭事苑曰十門辨惑論云維摩是金粟如來吉藏法師謂出思惟三昧經自云未見其本今據諸經目録無此經名周禮曰其動物宜毛物管城公見前注只今為君落筆他日聼我談空亦分屬上兩句文選北山移文云談空空于釋部劉夢得詩與師相見便談空次韻向和卿行松滋縣與鄒天錫夜語南極亭二首雪泥滑滑到山郭提壺勸沽亦不惡林中解道不如歸家人應念思歸樂梅聖俞四禽言曰泥滑滑苦竹岡雨瀟瀟馬上郎提壺子規並見前注樂天詩曰山中不栖鳥半夜聲嚶嚶似道思歸樂行人掩泣聼陶嶽零陵記曰思歸樂狀如鳩而慘色三月則鳴其音云不如歸去衝風衝雨走七縣唯有白鷗盟未寒退之詩不衝風雨即衝埃寒盟見前注坐中更得江南客開盡南窗借月看鄭谷詩坐中亦有江南客莫向春風唱鷓鴣孟郊詩徵文北山外借月南樓中戲答荆州王充道烹茶四首舊本云居士酒徒不喜茗飲故多戲句三徑雖鋤客自稀醉鄉安穩更何之老翁更把春風碗靈府清寒要作詩老杜詩草茅無徑欲教鋤又詩幕下郎官安穩無又詩舍此復何之靈府謂心也見前注退之李花詩曰清寒瑩骨肝膽醒一生思慮無由邪茗碗難加酒碗醇暫時扶起藉糟人何須忍垢不濯足苦學梁州隂子春茗碗見前注世説江盧奴直喚人取酒自飲一碗老杜詩間道暫時人晉書劉伶傳酒德頌曰枕麴藉糟充道不喜茗飲無從洗濯塵昏故以陰子春戲之按南史陰子春傳身服垢汙腳數年一洗言每洗則失財敗事云在梁州以洗足致梁州敗曹子建責躬詩表曰忍垢茍全則犯詩人胡顔之譏香從靈堅壟上發味自白石源中生為公喚覺荆州夢可待南柯一夢成黃庭內景經曰鼻神玉壟字靈堅又曰呼吸元氣以求仙朱鳥吐縮白石源蓋言舌與齒也杜牧之詩三年一覺掦州夢贏得青樓薄幸名南柯見前注龍焙東風魚眼湯箇中即是白雲鄉更煎雙井蒼鷹爪始耐落花春日長趙飛燕外傳成帝曰不能效武皇帝求白雲鄉也春晝多睡故末句云爾王隨詩一聲啼鳥禁門靜滿池落花春日長雨中登嶽陽樓望君山二首嶽陽樓即嶽州城西門據圖志經始于張燕公慶歷中滕宗諒謫守始加增飾規制宏敞投荒萬死鬢毛斑生出瞿塘灔澦關未到江南先一笑嶽陽樓上對君山桞子厚詩曰萬死投荒十二年老杜詩更憶鬢毛斑後漢斑超傳上疏曰臣不敢望到酒泉郡但願生入玉門關瞿塘峽灔澦堆在今夔州灔澦即水經注所謂淫預石也冬出水二十餘丈夏則沒水經注又曰峽中有瞿塘黃龕二灘夏水洄洑沿泝所忌又曰洞庭湖中有君山湘君之所遊處曰君山滿川風雨獨憑欄綰結湘娥十二鬟可惜不當湖水靣銀山堆裏看青山山海經曰洞庭之山帝之二女居焉王逸注九歌曰堯二女娥皇女英隨舜不及沒于湘水之渚因為夫人按君山狀如十二螺髻北夢瑣言曰湘江北流至嶽陽逹蜀江夏潦後蜀江漲勢髙遏住湘江讓而退溢為洞庭湖凡數百里而君山宛在水中秋水歸壑此山復居于陸惟一條湘川而已劉禹錫詩遙望洞庭山翠色白銀盤裏一青螺貫休詩五湖大浪如銀山自巴陵略平江臨湘入通城無日不雨至黃龍奉謁清禪師繼而晚晴邂逅禪客戴道純欵語作長句呈道純山行十日雨霑衣幕阜峯前對落暉史記禹本紀曰山行乘攆禮記曰雨霑服失容則廢説苑曰孺子不覺露之霑衣幕阜即黃龍山之别峯輿地廣記曰在洪州武寧縣東坡詩放鶴亭前送落暉野水自添田水滿晴鳩却喚雨鳩歸歐陽公詩陂田繞郭白水滿又詩天雨止鳩呼婦歸鳴且喜靈源大士人天眼雙塔老師諸佛機惟清禪師自號靈源叟即雙塔之法嗣已具贈鄭交詩注初晦堂祖心禪師得法于黃龍山惠南南死塔于山中其後心亦葬南公塔東號雙塔事具洪覺範僧寶傳山谷常參問晦堂為之塔銘其于靈源待以師友常與徐師川書曰平生所見士大夫人品未有出此公之右者傳燈録靈樹如敏禪師書一帖云人天眼目堂中上座蓋謂雲門文偃和尚也佛偈曰若人生百歲不善諸佛機未若生一日而得決了之白髮蒼顔重到此問君還是昔人非歐陽公醉翁亭記曰蒼顔白髮頺然其間者太守醉也肇法師物不遷論云梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人皆愕然所謂有力者負之而趨昧者不覺其斯人之謂歟題徐氏書院元注云德占羡魚亭故基也徐禧字德占洪州分寧人娶山谷從妹學書但學溪老鵝讀書可觀樵父歌言不必作功名之想也山谷舊有詩云駕鵝引頸回似我胸中字右軍數能來不為口腹事樵父歌謂負薪能談王道老杜詩夷歌是處起漁樵紫髯將軍不復見空餘巖桂緑婆娑紫髯借用孫權事巖桂用淮南小山招隱事並見前注晉書殷仲文傳顧大司馬府中老槐樹而嘆曰此樹婆娑無復生意按實録元豐五年禧以直龍圖閣節制西師與沈括等城永樂夏人來攻城陷禧與內侍李舜舉轉運使李稷皆死贈石敏若石懋字敏若才似謫仙惟欠酒情如宋玉更逢秋相看領會一談勝注目長江天際流文選向秀思舊賦曰託運遇于領會注云領會冥理相會也老杜詩注目寒江依秋閣題胡逸老致虛庵藏書萬卷可教子遺金滿籯常作災漢書韋賢傳曰賢為丞相少子玄成以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如教子一經老子曰金玉滿堂莫之能守富貴而驕自遺其咎能與貧人共年榖必有明月生蚌胎東觀漢記梁商因年榖貴多有餒者輒令蒼頭以牛車致米鹽菜錢于四城門外乞貧民不告主姓名莊子曰使物不疵癘而年榖熟蚌胎用韋誕事見前注山隨宴坐圖畫出水作夜窗風雨來觀水觀山皆得妙更將何物汚靈臺一作莫將世事侵兩鬢小庵觀靜鎖靈臺太白詩丹青畫出是君山老杜詩飛閣捲簾圖畫裏王介甫詩芭蕉一枕西窗雨復似當年水繞牀老子曰常無欲以觀其妙靈臺見前注題蓮華寺狂卒猝起金坑西脅從數百馬百蹄漢書谷永傳曰將有驕臣悍妾醉酒狂悖卒起之敗注卒讀曰猝書曰脅從罔治史記貨殖傳曰牧馬二百蹄所過州縣不敢誰肩輿虜載三十妻賈誼過秦論曰陳利兵而誰過注云問之為誰伍生有膽無智略謂河可馮虎可摶退之詩臣有膽與氣史記田叔傳禇先生曰今取富人子又無智略魯論曰暴虎馮河死而無悔者吾不與也孟子曰馮婦善搏虎身膏白刃浮屠前此鄉父老至今憐文選潘安仁關中詩曰周殉師令身膏氏斧老杜詩到今耆舊悲按漢書項籍傳曰楚人憐之至今衝雨向萬載道中得逍遙觀託宿遂戲題逍遙近道邊憩息慰憊悶晴暉時晦明謔語諧讜論道邉見前注老杜詩平生憩息地韻書悶與悶同東都賦曰讜言宏説李善注引字林曰讜美言也音黨草萊荒蒙蘢室屋壅塵坌漢書朝錯傳曰草木蒙蘢枝葉茂按韻書云坌塵也蒲悶反法華經云糞土塵坌穢汚不淨僕僮侍逼側涇渭清濁混子虛賦曰逼側泌瀄注云相追也老杜詩有逼仄行又詩濁涇清渭何當分題竹尊者軒平生脊骨硬如鐡聽風聼雨隨宜説傳燈録巖頭云德山老人一條脊骨硬如鐡拗不折于唱教門中猶較些子法華經曰諸佛隨宜説法意趣難解王建宮詞曰聼風聼雨作霓裳百尺竿頭放步行更向腳跟參一節傳燈録長沙景岑禪師偈曰百丈竿頭不動人􅢖然得入未為真百丈竿頭須進步十方世界是全身玄沙傳曰老和尚腳跟猶未點地叢林舉前人一假語謂之一則一節與一則同竹尊者當是竹根形狀如此送密老住五峯密老蓋法昌之嗣我穿髙安過萍鄉七十二渡繞羊腸一本此下有二句云去時擷茗春風香歸來秧稻春日長髙安屬筠川萍鄉屬袁州羊腸見前注山谷書萍鄉縣廰壁曰庭堅杭荆江略洞庭涉修水徑七十二渡出萬載來宜春省伯氏元明于萍鄉按元明時為萍鄉令水邉林下逢衲子南北東西古道場蘇子由筠州聖夀院法堂記曰洞山有價黃檗有運真如有愚九峯有虔五峯有觀高安雖小邦而五道埸在焉前漢書南粵傳曰南北東西數千里五峯秀出雲雨上中有寶坊如側掌文選張景陽七命曰嶢榭迎風秀出中天李善注引國語曰秀出于衆列子曰化人之宫出雲雨之上寶坊見前注老杜詩秦川對酒平如掌此變其語用之去與青山作主人不負法昌老禪將倚遇禪師三十年單丁住法昌山法昌在洪州分寧之北事具洪覺範僧寶傳法華經曰佛賜戰魔賢聖諸將以禪定解脫無漏根力諸佛之財栽松種竹是家風莫嫌斗絶無來往僧寶傳又載南禪師至止遇方栽松南公曰小院子栽許多松作麼遇曰臨濟道底南公指石曰這裏何不栽遇曰功不浪施南公曰也知無下手處遇却指石上松曰從甚麼處得來南公大笑曰蒼天蒼天漢書胸奴傳曰胸奴有斗入漢地直張掖郡注云斗絶也後漢書竇融傳曰河西斗絶在羌胡中五峯高峻故云爾但得螺螄吞大象從來美酒無深巷法昌有法身頌云螺螄吞大象石虎咬蕃馬驚起假家龍踏落雲屋瓦古語曰美酒無曲巷言酒之美者雖在深僻之地人必就沽五峯雖險絶但解法昌宗旨何患不為人之所知哉新喻道中寄元明用觴字韻中年畏病不舉酒孤負東來數百觴喚客煎茶山店逺看人秧稻午風涼晉書顧榮傳曰惟酒可以忘憂但無如作病何文選李陵書曰孤負陵心區區之意歐陽公詩快哉天下樂一釂宜百觴杜詩野店引山泉樂天詩泥秧水畦稻但知家裏俱無恙不用書來細作行别本云不用書來細作行想李炳文極相肯也風俗通曰恙毒蟲也喜傷人古人草居露宿故相勞問必曰無恙老杜詩來書細作行按後漢書循吏傳序曰光武以手迹賜方國皆一札十行細書成文一百八盤携手上至今猶夢繞羊腸一百八盤路謂元明相送黔中時樂天詩夢尋來路繞羊腸羊腸見前注山谷內集詩注卷十六
