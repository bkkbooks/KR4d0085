body:
  text: 山谷內集詩注卷三宋黃庭堅撰任淵注有惠江南帳中香者戲答六言二首洪駒父香譜有江南李王帳中香法以鵝利汁蒸沈香用之百鍊香螺沉水寶薰近出江南一穟黃雲繞几深禪想對同參選詩豈意百鍊剛化作繞指柔此借用香螺謂螺甲見下篇注唐本草注曰沈水香出天竺單于二國木似櫸桞重實黑色沈水者是傳燈録第二十二祖摩孥羅至西印土焚香而月氐國王忽覩異香成穗按韻書穗亦作穟法華經曰皆得深妙禪定傳燈録又曰馬祖同參九人螺甲割崑崙耳香材屑鷓鴣斑欲雨鳴鳩日永下帷睡鴨春閒唐本草日蠡類生雲南者大如掌青黃色取黶燒灰用之今合香多用謂能發香復來香烟按韻書蠡亦作螺韓鄂四時纂要載修甲香方曰取大甲香如崑崙耳者酒煮密熬入諸香等用倦游録云髙竇等州産生結香山民見香木曲幹斜枝以刀斫成坎經年得兩水漬復鋸取之刮去白木其香結為斑㸃亦名鷓鴣斑禮記月令鳴鴆拂其羽李商隱詩睡鴨香爐換夕薰子瞻繼和復答二首置酒未容虛左論詩時要指南迎笑天香滿袖喜公新赴朝參史記滑嵇傳曰齊威王置酒後宮史記魏公子無忌傳曰無忌從車騎虛左自迎侯生東京賦曰幸見指南于吾子李善注引桓談上便宜曰管仲桓公之指南老杜詩頗怪朝參懶樂天詩時暑放朝參迎燕溫風旎旎潤花小雨斑斑一炷煙中得意九衢塵裏偷閒禮記月令季夏之月溫風始至此借用韻書曰旎旎旌旗從風貌亦借用歐陽公詩輕寒漠漠侵駝褐小雨斑斑作燕泥樂天詩馬入九衢塵又詩健偷聞且勤飲有聞帳中香以為熬蝎者戲用前韻二首海上有人逐臭天生鼻孔司南呂氏春秋曰人有大臭者其親戚兄弟妻妾無能與居者自苦而居海上人有悅其臭者晝夜隨而不去曹子建與楊德祖書曰海畔有逐臭之夫列子曰海上有人好鷗鳥者傳燈録南泉云父母已生了鼻孔在什麼處韓非子曰先王立司南車以端朝夕注云指南車也但印香嚴本寂不必叢林遍參楞嚴經香嚴童子曰佛言見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倏滅妙香密圓我從香嚴得阿羅漢祖庭事苑曰梵語貧婆此云叢林大論云譬如大柱叢聚是名為林諸比丘和合故僧聚處得名叢林傳燈録𤣥沙傳雪峯召曰備頭陀何不遍參去師曰逹磨不來西土二祖不往西天雪峯肯之我讀蔚宗香傳文章不減二班誤以甲為淺俗郤知麝要防間南史范蔚宗撰和香方序曰麝本多忌過分必害況實易和盈斤無傷棗膏昏鈍甲煎淺俗非惟無助馨烈乃彌增于尤疾也詩意謂蔚宗之論失于甲而得于麝二班謂彪固後漢書班彪傳贊曰二班懷文裁成帝墳詩序曰魯莊公不能防間文姜謝公擇舅分賜茶三首外家新賜蒼龍璧北焙風煙天上來明日蓬山破寒月先甘和夢聽春雷外家謂母家史記呂氏紀曰呂氏皆以外家惡而幾危宗廟北焙謂建溪北苑官焙後漢書竇章傳學者稱東觀為老氏藏室道家蓬萊山盧同茶歌曰手閲月團三百片退之詩新月憐半破又石鼎聨句序云道士倚牆睡鼻息如雷鳴元稹詩鼻息吼春雷文書滿案惟生睡夢裏鳴鳩喚雨來乞與降魔大圓鏡真成破柱作驚雷漢書刑法志曰文書盈于几文選嵇康書曰人間多事堆案盈几魔以言睡鏡以比茶降魔見佛書如楞嚴經優波離言親見如來降伏諸魔制諸外道是也楞嚴經又曰立大圓鏡空如來藏世說日夏侯太初嘗倚柱讀書時暴雨霹靂破所倚柱太初色無變楚辭曰凌驚雷軼駭電梁元帝金樓子有人讀書握卷即睡梁人謂書為黃嬭言其怡神養性如乳媪也東坡詩引睡文書信手翻細題葉字包青箬割取丘郎春信來拚洗一春湯餅睡亦知清夜有蛟雷隋蕭大圜竹花賦曰縹枝承露緗箬來風說文注曰楚謂竹皮曰箬音而勺反玉篇云竹葉也柳子厚詩青箬裏鹽歸洞客秦少游作李公擇行狀曰次女適郊祀齊郎丘楫詩言此茶本欲留遺其壻今乃見分也退之詩割取乖龍左耳來選詩清夜遊西園漢書中山靖王傳曰聚蚊成雷便糶王丞送碧香酒用子瞻韻戲贈鄭彥能王詵晉卿尚蜀國公主其家酒名碧香彥能名僅食貧好酒嘗自嘲日給上尊無骨相詩曰三歲食貧漢賜丞相上尊酒糯米二斗酒一斗為上尊骨相見前注大農部丞送新酒碧香竊比主家釀漢書食貨志曰桑𢎞羊請置大農部丞數十入分部主郡國東坡詩碧香近出帝子家漢書衛青傳曰季與主家僮衛媪通老杜詩主家隂洞細烟霧晉書何充傳云令人欲傾家釀應憐坐客竟無氈更遭官長頗譏謗老杜戲簡鄭廣文詩廣文到文舍繫馬堂階下醉則騎馬歸頗遭官長罵才名四十年坐客寒無氈賴有蘇司業時時與酒錢文選孔文舉書今之少年喜謗前輩或能譏評孝章銀杯同色試一傾排遣春寒出帷帳晉書王衍傳每作玉柄麈尾與手同色此借用其字老杜詩乾愁要排遣漢書文帝贊曰帷帳無文繡浮蛆翁翁杯底滑坐想康成論泛盎周禮灑正辨五齊之名一曰泛齊二曰醴齊三曰盎齊鄭康成注云泛者成而宰浮泛泛然如今宜城醪盎猶翁也成而翁翁然葱白色如今鄼白翁音烏動反重門著關不為君但備惡客來仇餉易曰重門擊柝以待暴客漢書陳遵傳曰每大飲賓客滿堂輒關門元次山集以不飲者為惡客孟子曰葛伯率其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也送鄭彥能宣德知福昌縣往時河北盜橫行白晝驅人取城郭往時見前注橫行見孟子漢書賈宜曰白晝大都之中剽吏而奪之金唯聞不犯鄭冠氏犬卧不驚民氣樂冠氏縣屬大名府後漢岑熙遷魏郡太守人歌曰狗吠不驚足下生氂漢書賈誼傳曰德教洽而民氣樂秖今化民作鋤耰田舍老翁百不憂老杜詩秖今年才十六七賈誼過秦論曰鋤耰棘矜師古注云耰摩田器也音憂南史宋武帝紀孝武曰田舍翁得此已為過矣老杜詩吾知徐卿百不憂銅章去作福昌縣山中讀書民有秋漢官儀曰縣令秩六百石銅章墨綬福昌縣屬西京書曰乃亦有秋詩意謂使民安于田里無飢寒之戚必非文俗吏所能也退之詩曰出宰山水縣讀書松桂林福昌愛民如父母當官不擾萬事舉詩曰豈弟君子民之父母左傳曰當官而行何强之有用才之地要得人眼中虛席十四五不知諸公用心許魯恭卓茂可人否退之詩侍從近臣有虛位公今此去何時歸後漢魯恭為中牟令專以德化為理後至侍中司徒卓茂為密令走人親愛而不忍欺光武以茂為太傳顯聖寺庭枸杞仙苗夀日月佛界承露雨誰為萬年計乞此一抔土管子曰百年之計樹之以木漢書張釋之傳曰假令愚民取長陵一抔土何以加其法乎注云抔音步侯反謂手掬之也乞字去聲讀本草枸杞一名地仙扶疏上翠蓋磊落綴丹乳漢書劉向傳曰梓樹生枝葉扶疏上出屋蜀志先主傳曰桑樹童童如小車蓋陸璣詩疏云枸杞子秋熟正赤文選宋玉風賦枳句來巢李善注引司馬彪曰桐子似乳著其葉而生此借用去家尚不食出家何用許本草枸杞條陶隱居注曰俗諺云去家千里勿食蘿藦枸杞言其强盛隂道也正恐落人間采剝四時苦言在僧坊則不用食此故免采剝之害東坡先生後把菊賦而吾方以把為糧以菊為糗春食苗夏食葉秋食花實而冬食根庶幾手西河南陽之夀養成九節杖持獻西王母本草枸杞一名仙人杖一名西王母杖老杜詩安得仙人九節杖拄到玊女洗頭盆按真誥楊羲夢蓬萊仙翁拄赤九節杖而視白龍次韻子瞻贈王定國遠志作小草蛙衣生陵屯但為居移氣其實何足言遠志小草見前注列子曰若蛙為鶉得水土之際則為蛙蠙之衣生于陵屯則為陵舄注云隨所生之處而變者也孟子曰居移氣養移體詩意謂士當特立獨行不以窮逹所居之異而易其操定國本貴公子嘗坐東坡纍遷謫賓州頗能自處云名下難為人醜好隨手翻言名士未必有其實往往隨世俯仰乍賢乍倿也史記范蠡曰大名之下難以久居國史纂異閻立本見張僧繇舊晝曰名下定無虛士列子曰賢愚好醜成敗是非無不消滅老杜詩時來展材才先後無醜好又詩翻手作雲覆手雨漢書韓信傳曰公隨手亡矣百年炊未熟用異聞集邯鄲枕中夢事見前注一垤蟻追奔異聞集載南柯太守淳于棼事云棼沈醉致疾夢見二使者扶生入宅南古槐穴中前行數十里有大城門樓題曰大槐安國其王以女瑤芳妻生使為南柯郡守在郡二十年有檀蘿國來伐王命生征之敗績生妻病死王謂生可暫歸生上車行俄出一穴見本里閭巷入其門見身已臥堂廡下發悟如初夢中倏忽若度一世矣遂呼二客尋古槐下穴見大穴洞然明朗有積土壤以為城郭臺殿之狀有蟻數斛隱聚其中中有小臺二大蟻處之即槐安國都邑也又窮一穴直上有枝亦有土城小樓即南柯郡也宅東一里澗側有大檀樹藤蘿擁織傍有蟻穴檀蘿之國豈非此耶山谷喜用此事故具載之東山詩注曰垤蟻冢也追莽用莊子蝸角蠻觸相戰伏尸逐北之意文選李陵書日追莽逐北夏日蓬山永戎葵茂牆藩後漢書竇章傳學者稱東觀為老氏藏室道家蓬萊山爾雅菺茙葵注云今蜀葵也似葵華如本槿華歐陽詹詩云芭蕉一葉妖茂葵一花妍異無材實資手植階墀前漢書揚雄甘泉賦曰電倏忽于牆藩注云藩籬也王子吐佳句如繭絲出盆晉書胡母輔之傳王澄曰彥國吐佳言如鋸木屑又孫綽傳作天台山賦示范榮期每至佳句輒云應是我輩語歐陽公詩問其别後學初若繭抽緒禮記曰夫人繅三盆手風􅐾極灑落雲氣畫罍樽晉書王衍傳風姿詳雅江淹擬許𣣔君詩曰五難既灑落周禮司尊彛注曰山尊山罍也亦刻而畫之為山雲之形屬有補衮章自當寵頻煩司馬溫公嘗薦定國句或指此屬音之欲反近也左傳曰屬有宗祧之事于武城詩曰袞職有闕維仲山甫補之杜詩三顧頻煩天下計按漢書王莽傳注曰鄭重猶頻煩也鄙夫無他能上車問寒溫老杜詩鄙夫行衰謝字出魯論史記孟嘗君傳代舍客馮歡無他技能通典曰祕書郎自齊梁之未多以貴游子弟為之無其才實當時諺曰上車不落則著作體中何如即祕書事本出顔氏家訓山谷時在館中故用此事惟思窮山去抱犢長兒孫漢書嚴安傳曰窮山通谷又文選王康琚反招隱詩曰放神青雲外絶迹窮山裏唐王摩詰歸山歌曰入雲中兮養雞上山頭兮抱犢愧不才兮妨賢嫌既老兮貪祿山谷蓋采此意按神仙傳王烈入河東抱犢山中見一石室有索書兩卷與嵇康共往讀之而寰宇記載潞州壷關縣有抱犢山道書福地記云抱犢山在上黨東南乙地有石城高十丈有草名玉照取其葉服之二三日不飢又按山水志云抱犢山北嶽佐命之山也後漢葛榮亂百姓抱犢于山上因名寒山子詩曰丈夫莫守困無錢即經紀養得一牸牛生得五犢子犢子又生兒積數無窮已寄語陶朱公富與君相似陸龜䝉詩曰五年重到舊山村樹有交柯犢有孫老杜詩自從盛酒長兒孫次韻張詢齊中晚春詢字仲謀學古編簡殘懷人江湖永非無車馬客心遠境亦靜書日學古入官漢書劉歆傳曰經或脫簡傳或間編詩曰嗟我懷人置彼周行選詩門有車馬客淵明詩心遠地自偏挽蔬夜雨畦煮茗寒泉井老杜詩夜雨剪春韭昜日井列寒泉食春去不窺園黃鸝頗三請漢書董仲舒傳三年不窺園老杜詩隔葉黃鸝空好音周禮司儀曰及出車送三請三進再拜立朝無物望補外儻天幸孟子曰立乎人之本朝後漢第五倫傳曰有損事望物云望物望也唐書馬周傳曰或京官不稱職始蟲補外莊子漁父篇孔子曰今也吾得遇也若天幸然漢書伍被傳曰儻可以僥幸想乘滄浪船濯髮晞翠嶺楚辭漁父鼓枻而去歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足又遠遊曰朝濯髮于暘谷兮夕晞全身手九陽文選張平子思𤣥賦曰旦余沐于清源兮晞余髮于朝陽李善注云晞乾也山東日朝陽老子新沐晞髮于庭次韻答朝無咎見贈翕翕一日炎謂權門炙手可熱曽不幾時世說謝安在東山兄弟巳有富貴者隼翕家門傾動人物韓退之作鄭羣志日不為翕翕熱耽耽萬年永言守正而寡欲可為不朽計也易頤之六四曰虎視耽耽其欲逐逐無咎注謂觀其自養則履正察其所養則養陽頤爻之貴斯為盛矣四海仰首觀一作榮名響六合頃復歸根靜榮華之不可恃如此老子曰萬物並作吾以觀其復夫物藝藝各歸其根歸根曰靜靜曰復命時雨㵼玊除潢流漲天井周禮小祝逆時雨禮記孔子曰天降時兩山川出雲老杜詩雨㵼暮簷竹除謂殿階選詩曰凝霜依玉除陸士衡詩曰豐注溢修霤黃潦浸階除左傳曰潢汙行潦之水退之詩曰是時新晴天井溢誰杞長劒倚大行天井蓋水名乃水經注所謂經堯城西流入汾水也此蓋借用性不耐衣冠人門疏造請世說王丞相性不耐酒南史張敷曰臣性不耐雜造請見前注煮餅臥北窗保此巳徼幸陶淵明與子疏曰常言五六月中北窗下卧遇凉風暫至自謂是羲皇上人意識淺罕謂斯言可保日月逝往機巧遂疏緬求在昔眇然如何世說劉真長為丹陽尹許𤣥度就劉宿牀帷新麗飲食豐甘許曰若此保全殊勝東山劉曰卿若知吉凶由人吾安得保此此詩兼采其意崔實四民月令曰立秋無食煮餅及水溲餅禮記問喪曰徼幸復反也空餘見賢心忍渴望梅嶺蜀志諸葛亮傳亮答先主曰將軍總攬英雄思賢如渴世說曰魏武行失道三軍皆渴帝令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出後漢書鍾離意傳曰孔子忍渴于盜泉之水白氏六曰大庾嶺上梅南枝落北枝開老杜詩短日行梅嶺次韻答張文潛惠寄文潛集有初到都下供職寄黃九詩即此韻文潛名來短褐不磷緇寧戚飯牛歌曰短褐單衣適至骭列子力命篇北宮子曰朕衣則短褐世說注蔡洪與周俊書曰張暢居磨涅之中無緒磷之擾其字本出魯論老杜詩亦云但取不磷緇文章近楚詩老杜詩縱使盧王操翰墨劣于漢魏近風騷史記屈原傳曰原既死之後楚有宋玉唐勒景差之徒皆好詩以賦見稱漢書地理志曰故世傳楚詞未識想風采别去令人思退之詩吾未識子時已覽贈豫篇寤寐想風采于今巳三年按漢書霍光傳天下想聞其風采世說謝太傳云安比見之乃不使人厭然出户去不復使人思安比坦之也此反其意而用之老子五色令人目肓斯文巳戰勝凱歌偃旍旗謂文潛杖中學官魯論曰天之未喪斯文也韋應物詩曰決勝文埸戰巳酣周禮大司馬若師有功則左執律右秉鉞以先愷樂獻于社注謂兵樂曰凱司馬法曰得意則愷樂愷歌示喜也按字書愷與覬同旍與旌同見前注晉書石勒載記日偃藏旗幟寂若無人君得魚上冰忽復燕哺兒月命孟春魚上冰文選潘安仁詩我來冰未泮暑忽隆熾學省得佳士催來費符移文潛元祐初為太學博士文選沈休文有學省愁臥詩注云學省國學也晉書任愷傳孫倫以淑行致稱為清平佳士王猛傳郡縣巳被符管攝漢書劉歆傳移書太常博士方觀追金玉如許遽言歸棫朴詩追琢其章金玊其相此引用以言學省作成人村也後漢左慈傳曰老羝人立而言曰遽如許詩云言旋言歸文潛元韻曰五日長安塵故山夢中歸故此句廣其意南山有君子握蘭懷令姿此句當以屬二蘇文潛蓋其門下士也小雅曰南山有臺北山有萊樂只君子邦家之基漢官儀尚書郎懷香握蘭東坡元祐幼為禮部郎中故山谷用此事謝靈運詩云想見山阿人薜蘿若在眼握蘭勤徒結折麻心莫展李善注曰握蘭以相贈問也末句蓋終此意選詩云煌煌發令姿但應潔齊俟勿詠無生詩宋玉登徒子好色賦秦章華大夫曰從容鄭衛溱洧之間羣女出桑臣觀其麗者因稱詩曰遵大路兮攬子祛贈以芳芳詞甚妙于是處子含喜微笑竊視流眄復稱詩曰寤春風兮發鮮榮潔齊俟兮惠音聲贈我如此兮不如無生因遷延而辭避李善注謂贈以芍藥欲結恩情而女不受詩曰知我如此不如無生恨之辭也山谷引用意謂蘭草之芳馨非芍藥凡草之比知我者必以是為好姑修潔以俟之可也士之于世正如女之從夫不可自獻故山谷以此為况龍居士頌大家團圞頭共說無生話同錢志仲飯籍田錢孺文官舍帝籍開千畝農功先九州禮記月令曰藏帝籍之收于神倉國語曰宣王即位不籍千畝五經要義曰天子籍田千畝率公卿親耕所以先百姓而致孝敬左傳曰政如農功王孫守耒耜吏隱極風流錢氏蓋吳越王錢鏐之後漢書韓信傳曰吾哀王孫而進食禮記月令孟春之月天子親載耒耜躬耕帝籍汝南先賢傳曰鄭欽吏隱于蟻陂之陽老杜詩吏隱適情性茲焉其窟宅風流見前注永夏豐草木五雲衛郊丘書曰日永星火以正仲夏屈原懷沙曰陶陶孟夏兮草木莽莽孝經援神契曰德至山陵則景雲出景雲五色雲也郊丘謂南郊之圓丘文選石闕銘曰興建庠序啓設郊丘牛羊臥籬落賓客解衣裘汲井羞熱啜挽溪供甘柔退之詩欲將層級壓籬落謝靈運詩激澗代汲开史記張儀傳趙襄子與代王飲隂告厨人曰即酒酣樂進熱啜國語曰公父文伯飲南宮敬叔酒羞鱉馬左傳曰澗溪沼泌之毛退之詩野蔬拾新柔又祭女拏文曰飲食柔耳倒靫收蓮的剖蚌煮鴻頭韻書靫鞴弓箭室也音又爾雅曰荷笑蕖其實􅘟其中的注云的子也歐陽公詩雞頭詩云剖蚌得珠從海底按蜀志秦宓奏記曰剖蚌求珠周禮注芡雞頭一名鴈頭退之聨句云鴻頭排刺芡野日草光合水風荷氣浮老杜詩野日荒荒白選詩風光草際浮韋應物詩雨微荷氣凉稻畦下白鷺林樾應鳴鳩王維詩曰漠漠水田飛白鷺隂隂夏木轉黃鸝林樾見前注主人發清賞況復佳同遊歸扇障小雨真成一賜休障字作平聲讀南史劉祥傳褚彥回以腰扇鄣日退之詩天街小雨潤如酥漢律有賜告有豫告見漢書馮野王傳又薛宣出教曰日至吏以令休所由來又老杜詩真成浪出遊次韻曾子開舍人遊籍田載荷花歸維王調玉燭時夏雨我田爾雅曰四時和謂之玉燭注云道光照詩曰雨我公田遂及我私壁掛蒼龍骨溜渠故濺濺龍骨謂水車王介甫詩曰龍骨長乾掛梁梠李商隱詩伊水濺濺相背流三推勸根本百榖收早堅禮記月令孟春之月天子親載耒耜躬耕帝籍天子三推漢書文帝詔曰農天下之本也其開籍田朕親率耕大田詩曰既方既早既堅既好注實未堅者日皂官司極齊明崇丘見升煙左傳曰分之官司彛器禮記曰齊明盛服又月令孟春以元日祈榖于上帝注謂以上辛郊祭天也甘泉賦崇崇圓丘隆隱天兮周禮大宗伯注日燔燎而升煙所以報陽也繫馬西門柳憶聽去夏蟬文選劉琨詩繫馬山下松陸機詩寒蟬鳴髙桞剝芡珠走盤釣魚柳貫鮮退之詩水果剝菱芡博物志曰鮫人泣而成珠滿盤杜牧注孫子序曰猶丸之走盤石鼓文曰其魚維何維鱮與鯉何以貫之維楊與柳掃堂延枕簟公子氣翩翩自爾欲繼往阻心如壅泉禮記內則云斂枕篋簟席退之詩水紋浮枕簟史記太史公曰平原君翩翩濁世之佳公子也紫微樂暇日披襟詠風漣唐開元五年改中書為紫微省元祐初子開為中書舍人孟子壯者以暇日修其孝弟忠信宋玉風賦曰有風颯然而至王乃披襟而當之詩曰河水清且漣猗注曰風行水上成文曰連紅妝倚荷蓋水鏡寫明蠲文選古詩曰娥娥紅粉妝玉臺新詠梁武搗衣詩曰弱翠低紅妝青箱雜記曹修已詩荷葉軍芙蓉圓青映嫩紅佳人南陌上翠蓋立春風退之詩曲江千頃秋波淨平鋪紅蕖蓋明鏡水鏡見前注梁元帝從軍行曰山虛和鐃管水淨寫樓船美物亦有實剪房助加籩國語曰三女為粲夫粲美物也衆以美物歸汝而何德以堪之周禮籩人曰加籩之實菱芡㮚脯此借用珠宮紫貝闕足此水府仙楚辭九歌曰紫貝闕兮珠宮文選木華海賦曰水府之內極深之庭樂府解題伯牙作水仙揉鬱鬱冠蓋宅追奔易雕年文選古詩曰洛中何鬱鬱冠帶自相索長衢羅夾巷王侯多第宅又左太冲詩曰冠蓋䕃四術朱輪竟長衢追奔見前注鮑照舞鶴賦曰急景雕年能從物外賞真是區中賢文選張平子歸田賦曰苟縱心于物外又焉知滎辱之所如退之詩窮探極覽頗恣橫物外日月本不忙漢書司馬相如大人賦曰迫區中之隘狹兮舒節出乎北垠仍聞載後乘籠燭照嬋娟孟子曰後車數十乘李商隱詩蠟照半籠金翡翠文選西京賦曰增嬋娟以􅝌豸注云姿態妖蠱也王立之詩話載此詩一本云令君誠重客食前頗加籩西漢足膴仕東觀多臞仙何時載尊俎坌入觀少年及此歸沐早少休從事賢傳觴定可醉下箔出嬋娟送劉士彥赴福建轉運秋葉雨墮來冥鴻天資髙樂天詩業聲落如雨孟郊詩商葉墮乾雨掦子日鴻飛冥冥弋人何慕焉零陵先賢傳諸葛亮謂劉巴曰足下天資高亮車馬氣成霧九衢行滔滔此以下四句大率用文選左太冲詠史詩意所謂濟濟京城內赫赫王侯居冠蓋䕃四術朱輪竟長衢寂寂揚子宅門無卿相輿是也史記天官書曰車氣乍髙乍下騎氣卑而布漢官典職曰正旦作樂潄水成霧樂天詩馬入九衢塵滔滔見魯論中有寂寞人靈府扃鎖牢文選郭景樂游仙詩曰青溪千餘仞中有一道士漢書揚雄傳京師為之語曰惟寂寞自投閣莊子曰不可入于靈府注云靈府者精神之宅淵明詩曰形迹憑化往靈府長獨間淮南子曰中扄外閉何事之不節歐陽公詩始知文景基扄牢西風持漢節騎從嚴弓刀漢書蘇武傳曰杖漢節牧羊唐人詩曰太雪滿弓刀單于夜遁逃惟閩七聚落􅑱獨困吏叨周禮職方氏掌七閩之人民莊子曰九洛之事疏云九州聚落之事書曰無虐煢獨而畏髙明按􅑱與煢同左傳曰縉雲氏有不才子天下之民以比四凶謂之叨餐注曰貪財為叨貪食為餐土弊禾黍惡水煩鱗介勞漢書溝洫志曰且溉且糞長我禾黍退之祭文曰覬鱗介之驚透按周禮大司徒曰川澤宜鱗物墳衍宜介物汝墳詩注曰魚勞則尾赤樂記土敝則萬木不長水煩則魚鱉不大山谷此兩句蓋本諸此南驅將仁氣百城共一陶禮鄉飲酒曰天地溫厚之氣始于西北而盛于東南此天地之仁氣後漢書賈琮傳曰為冀州刺史百城聞風自然震竦崔駰達旨壞冶一察人極涇渭問俗及豚羔文選任彥升哭范僕射詩云伊人有涇渭非余揚濁清李善注引孫綽曰涇渭殊流雅鄭異調禮記入境而問俗周禮庖人曰春行羔豚膳膏香末句謂求民疾苦委曲詳盡官閒得勝日杖屨之林皋晉書衛玠傳曰遇有勝日親友時請一言曲禮曰君子缺伸撰杕屨莊子曰山林歟皋瓖歟使我欣欣然而樂此歟人間閲忠厚一作功名付簪紱物外訪英豪英豪之士往往隱約于山林次韻韓川奉祠西太乙宫四首春明退朝録曰天聖中建西太乙宫萬靈未對甘泉五福間祀迎年旍旗三斿半偃風馬雲車闖然漢書郊祀志曰黃帝接萬靈于明廷明延者甘泉也又曰武帝定郊祀之禮詞太乙于甘泉就陽位也詩意謂皇家未接萬靈而特祀五福以為民祈年之故爾五福謂五福太乙蓋十神之一太乙金鏡經具載其詳郊祀志又曰立泰時璮秋及臘間祠又曰黃帝為五城十二樓以候神人名曰迎年注謂若云祈年也又曰為伐南越告禱泰一以牡荆畫幡象泰一三星為泰一絳旗命曰靈旗顔氏家訓曰接說文勿者州里所建之旗象其柄及三斿之形禮樂志郊祀歌曰靈之車結𤣥雲靈之下若風馬退之詩闖然入其户三稱天之言字出公羊哀六年傳白髦下金神節青祝攜御爐香百禮盡修毫祀九歌不取沈湘晉語曰虢公夢在廟有神人面白毛虎爪執鉞立于西阿公覺召史嚚占之對曰如君之言則蓐收也注云西方白虎金正之官青祝謂內出青詞以香熏之乃授祠官使祭告也詩曰以洽百禮漢書郊祀志曰毫人繆忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝于是天子令太祝立其祠長安城東南郊王逸楚辭章句曰九歌者屈原所作沅湘之間俗信鬼而好祠歌舞之樂其詞鄙陋因為作九歌之曲文選運命論曰屈原以之沈湘楚辭九歌者東皇太乙有湘君湘夫人豈獨取東皇太乙耶紫府侍臣鳴玊霜臺御史生風官燭論詩未了知秋自屬梧桐抱朴子曰項曼都自言到天上過紫府金牀几晃晃昱昱禮記曰行則鳴佩玉崔篆御史針曰簡上霜凝筆端風起後漢巴祇與客暗坐不然官末句意謂論詩得趣不覺其為秋夕也世說鄭康成語服子慎曰吾久欲注春秋傳尚未了王介甫詩只聽蟲聲巳無夢五更桐葉强知秋泰壇下瑞雲黃雨師灑道塵香禮記曰燔柴于泰壇祭天也下瑞論降瑞也退之詩生祥下瑞無時期漢書郊祀志武帝迎鼎至甘泉至中山晏溫有黃雲焉東都賦曰雨師泛灑風伯清塵唐書天子之行風伯清塵雨師灑道便面猶承墜露金鉦半吐東牆便面謂扇見漢書張敞傳西都賦曰抗仙掌以承露離騷曰朝飲木蘭之墜露東坡詩樹頭初日掛銅鉦老杜詩初日復吐次韻王荆公題西太乙宫壁二首風急啼烏未了雨來戰蟻方酣楊大年詩風來玉宇烏先覺按淮南子曰烏鵲識歲之多風去喬木而巢扶枝老杜詩啼烏爭引子太白詩語笑未了風吹斷錢昭度詩白蟻戰酣山雨來按焦贑易林曰蟻封穴户大雨將至韓非子曰楚晉戰于鄢陵酣戰之時子反渴而求飲真是真非安在人間北看成南莊子曰彼方一是非此亦一是非果且有彼是乎哉果且無彼是手哉楞嚴經曰如人以表表為中時東看則西南觀成北表體既混心應雜亂在熙豐則荆公為是在元祐則荆公為非愛憎之論特未定也晚風池蓮香度曉日宮槐影西白下長干夢到青門紫曲塵迷言荆公厭京洛風塵而思金陵山水公詩藎云三十六陂煙水白頭想見江南法華經曰如清淨池蓮花莊嚴涅槃經如日垂沒山陵堆阜影現東移理無西逝此詩采其意反而用之王摩詰輞川有宮槐陌寰宇記白下縣故城在金陵上元縣城西本江乘縣白石壘齊武帝移琅邪居之文選吳都賦曰長干延屬李善注云江東謂山水間為干建業之南有山其間平地吏民居之故號為千按今金陵城南門外有長干寺荆公詩有白下長干何可見風塵愁殺庾蘭成之句故此詩引用唐人樂府云紫陌青門三十六宫春晝永三輔黃圖曰長安城東出南頭第一門曰霸城門民見門色青名曰青城門有懷半山老人再次韻二首荆公所居在鍾山之半故號半山短世風驚雨過成功夢迷酒酣追念熙寧間一時建立之事今已墮渺茫如醉鄉夢境至其所可傳則有不朽者在後兩句終此意班固幽通賦曰道修長而世短文選運命論曰風驚塵起散而不止老杜詩村晚驚風度庭幽過雨霑左太沖詩酒酣氣益振草𤣥不妨準易論詩終近周南上句謂其經學下句謂其詩漢書揚雄傳曰雄方草創太𤣥有以自守贊曰以為經莫大于易故作太𤣥文選左太冲詩曰寂寂掦子宅門無卿相輿言論準仲尼詞賦擬相如魯論曰人而不為周南召南猶正牆面而立也歟啜羹不如放麑樂羊終愧巴西韓非子曰樂羊為魏將而攻中山中山之君烹其子而遺之羮樂羊坐于幕下而啜之盡一杯文侯謂堵師贊曰樂羊以我故而食其子之肉答曰其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心韓非子又曰孟孫獵得麑使秦西巴載之持歸其母隨之而啼秦西巴弗忍而與之孟孫大怒逐之居三月復召以為子傳曰夫不忍于麑又且忍吾子乎故日巧詐不如拙誠樂羊以有功見疑秦西巴以有罪益信按呂惠卿叛荆公發其私書有勿使上知之語山谷意謂惠卿之忍正如樂羊荆公之過當與西巴同科也蘇子由彈惠卿章蓋云放麑違命也推其仁則可以託國食子徇君也推其忍則至于弒君西巴他書或作巴西非是欲問老翁歸處帝鄉無路雲迷莊子曰千嵗厭世去而上仙秉彼白雲至于帝鄉神考春遇荆公始終不衰升遐之一年而公亦薨詩意謂神考滅靈在天公當從之非讒邪所能間也和答錢穆父詠猩猩毛筆雞林志云髙麗筆蘆管黃毫健而昜乏舊云猩猩毛或言是物四足長尾善緣木蓋狖毛或鼠鬚之類爾愛酒醉魂在能言機事疏猩猩事通典于哀牢國言之甚詳蓋出于華陽國志及水經注唐文粹載裴炎猩猩說大率本此其略云阮研使封溪見邑人云猩猩在山谷間數百為羣人以酒設于路側又愛著屐里人織草為屐更相連給猩猩見酒及展知里人設張則知張者祖先姓字乃呼名罵云奴欲張我捨之而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃滿人所擒獲刺其血染毳罽隨鞭箠輸人至于一斗退之詩愁狖酸骨死􅏜花醉魂馨曲禮曰猩猩能言不離禽獸易曰機事不密則害成平生幾兩屐身後五車書上句巳具前注晉書阮孚傳曰未知一生能著幾兩屐下句謂作筆寫書晉書張翰傳曰使我有身後名不如即時一杯酒莊子曰惠施多方其書五車物色看王㑹勳勞在石渠列仙傳曰闕令尹知老子當過物色而留之昭明太子集文選諸賦有物色門若雷月之類是也汲冢周書有王㑹篇鄭康成曰王城既成大㑹諸侯及四夷也唐書黠戛斯傳李德裕上言貞觀時顔師古請如周史臣集四夷朝事為王㑹篇今黠戛斯大通中國宜為王㑹圖以示後世以松扇詩考之猩猩筆蓋穆父使髙麗所得禮記曰昔者周公旦有勳勞于天下班固西都賦曰天祿石渠典籍之府拔毛能濟世端為謝楊朱孟子曰楊子為我拔一毛而利天下不為也列子楊朱篇禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟選詩端為誰苦辛􅀈詠猩猩毛筆二首山谷有此詩跋云錢穆父奉使高麗得猩猩毛筆甚珍之惠豫要作詩蘇子瞻愛其柔健可人意每過豫書案下筆不能休此時二公俱直紫微閣故豫作二詩前篇奉穆父後篇奉子瞻桄榔葉暗賓郎紅朋友相呼墮酒中花間集歐陽炯南鄉子詞曰詞入南中桄榔葉暗蓼花紅本草桄榔生嶺南山谷賓郎生南海墮酒中見前注正以多知巧言語失身來作管城公老杜鸚鵡詩紅觜漫多知退之詩惜哉此子巧言語又毛穎傳曰封諸管城號管城子易曰臣不密則失身按劉夢得和樂天鸚鵡詩曰誰遣聰明好顔色爭須安置入深籠與此詩意同而山谷語尤工明窗脫帽見䝉茸醉著青鞋在眼中謂去其管韜覩䝉茸之狀如見其飮酒著屐時老杜詩脫帽露頂王公前此借用如退之毛穎傳所謂免冠謝也史記晉世家狐裘䝉茸著鞋見前注老杜詩青鞋布襪從此始選詩薛蘿若在眼老杜詩武帝旌旗在眼中束縛歸來儻無辱逢時猶作墨頭公意謂東坡起自謫籍也鮑叔牙曰使管仲無忘束縛于魯時毛穎傳曰聚其族而加束縳焉晉書諸葛恢名亞王導庾亮謂曰朋府當作黑頭三公又王珣傳桓溫曰王掾當作黑頭公按北史古弼傳弼頭失帝常名之曰筆頭時人呼為筆公故山谷于筆詩參用此事山谷內集詩注卷三
